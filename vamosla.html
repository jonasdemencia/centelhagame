<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha - Motor Narrativo Híbrido</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #local-atual { color: #ffaa00; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #3a3228; padding-bottom: 4px; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; }
        .narrator { color: #a13d3d; margin-bottom: 10px; }
        .player { color: #7a8c66; margin-bottom: 10px; }
        .system { color: #6b6b4a; margin-bottom: 10px; font-style: italic; font-size: 0.9em; }
        #progress-bar-container { width: 100%; background: #2a251e; height: 12px; margin-bottom: 10px; display: block; }
        #progress-bar { width: 0%; height: 100%; background: #5c2c2c; transition: width 0.3s; }
        input { width: 80%; padding: 10px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; }
        button { padding: 10px; cursor: pointer; background: #3a3228; color: #fff; border: none; }
        button:disabled { opacity: 0.3; }
        .loading { display: inline-block; width: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status">Iniciando...</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="local-atual">
        📍 Local: <span id="local-span">Carregando...</span>
    </div>
    
    <div id="chat-box"></div>
    
    <div id="controls">
        <input type="text" id="player-input" placeholder="Sua ação..." disabled>
        <button id="btn-enviar" onclick="enviarAcao()" disabled>AGIR</button>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    // ------------------------------------------------------------
    // Configurações
    // ------------------------------------------------------------
    const MY_MODEL_ID = "Qwen2.5-7B-Instruct-q4f16_1-MLC";
    
    // ------------------------------------------------------------
    // Estado global
    // ------------------------------------------------------------
    let engine;
    let salaAtual = null;
    let inventario = [];
    let aguardandoModelo = false;

    // ------------------------------------------------------------
    // Classe Sala
    // ------------------------------------------------------------
    class Sala {
        constructor(id, nome, descricao = "") {
            this.id = id;
            this.nome = nome;
            this.descricao = descricao;
            this.itens = [];
            this.estado = {};
            this.saidas = {};
            this.descricoesItens = {};
            this.ultimasAcoes = [];
            this.criadoEm = Date.now();
            this.modificadoEm = Date.now();
        }
    }

    // ------------------------------------------------------------
    // Persistência
    // ------------------------------------------------------------
    function carregarSala(id) {
        const chave = `sala_${id}`;
        const data = localStorage.getItem(chave);
        if (data) {
            try {
                const obj = JSON.parse(data);
                const sala = new Sala(obj.id, obj.nome, obj.descricao);
                sala.itens = obj.itens || [];
                sala.estado = obj.estado || {};
                sala.saidas = obj.saidas || {};
                sala.descricoesItens = obj.descricoesItens || {};
                sala.ultimasAcoes = obj.ultimasAcoes || [];
                return sala;
            } catch (e) {
                console.error("Erro ao carregar sala", e);
                return null;
            }
        }
        return null;
    }

    function salvarSala(sala) {
        if (!sala || !sala.id) return;
        sala.modificadoEm = Date.now();
        const chave = `sala_${sala.id}`;
        localStorage.setItem(chave, JSON.stringify(sala));
    }

    function carregarInventario() {
        const data = localStorage.getItem('jogador_inventario');
        if (data) {
            try {
                inventario = JSON.parse(data);
            } catch (e) {
                inventario = [];
            }
        } else {
            inventario = [];
        }
    }

    function salvarInventario() {
        localStorage.setItem('jogador_inventario', JSON.stringify(inventario));
    }

    // ------------------------------------------------------------
    // Utilitários de interface
    // ------------------------------------------------------------
    function atualizarDisplayLocal() {
        document.getElementById('local-span').innerText = salaAtual ? salaAtual.nome : 'Desconhecido';
    }

    function addMsg(txt, cls) {
        const box = document.getElementById("chat-box");
        const div = document.createElement('div');
        div.className = cls;
        div.innerText = (cls === 'player' ? "> " : "") + txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // ------------------------------------------------------------
    // Interpretador de comandos
    // ------------------------------------------------------------
    function interpretarComando(texto) {
        texto = texto.toLowerCase().trim();
        const palavras = texto.split(/\s+/);
        
        let verbo = palavras[0];
        let objeto = palavras.slice(1).join(' ');
        
        const verbos = {
            'ir': 'movimento',
            'vou': 'movimento',
            'siga': 'movimento',
            'andar': 'movimento',
            'caminhar': 'movimento',
            'norte': 'movimento',
            'sul': 'movimento',
            'leste': 'movimento',
            'oeste': 'movimento',
            'entrar': 'movimento',
            'pegar': 'pegar',
            'pegue': 'pegar',
            'apanhar': 'pegar',
            'largar': 'largar',
            'largue': 'largar',
            'soltar': 'largar',
            'usar': 'usar',
            'utilizar': 'usar',
            'examinar': 'examinar',
            'olhar': 'examinar',
            'ver': 'examinar',
            'inspecionar': 'examinar',
            'abrir': 'abrir',
            'fechar': 'fechar'
        };

        if (['norte', 'sul', 'leste', 'oeste', 'nordeste', 'noroeste', 'sudeste', 'sudoeste'].includes(verbo)) {
            return { tipo: 'movimento', direcao: verbo };
        }

        if (verbo === 'ir' && palavras.length >= 2) {
            const direcao = palavras[palavras.length - 1];
            return { tipo: 'movimento', direcao: direcao };
        }

        if (verbo === 'entrar') {
            const direcao = palavras[palavras.length - 1];
            return { tipo: 'movimento', direcao: direcao };
        }

        if (verbos[verbo]) {
            return { tipo: verbos[verbo], objeto: objeto };
        }

        return { tipo: 'desconhecido', original: texto };
    }

    // ------------------------------------------------------------
    // Regras para ações comuns
    // ------------------------------------------------------------

    // Movimento
    async function processarMovimento(direcao) {
        direcao = direcao.toLowerCase();
        const saidas = salaAtual.saidas;
        if (!saidas[direcao]) {
            return { tipo: 'erro', mensagem: "Não há passagem nessa direção." };
        }
        const idDestino = saidas[direcao];
        salvarSala(salaAtual);
        
        let novaSala = carregarSala(idDestino);
        if (!novaSala) {
            return { tipo: 'gerar_sala', idDestino, direcao };
        }
        salaAtual = novaSala;
        atualizarDisplayLocal();
        return { tipo: 'sucesso', mensagem: salaAtual.descricao || `Você entra em ${salaAtual.nome}.` };
    }

    // Pegar item
    function processarPegar(objeto) {
        if (!objeto) return { tipo: 'erro', mensagem: "Pegar o quê?" };
        const item = salaAtual.itens.find(i => i.toLowerCase().includes(objeto.toLowerCase()));
        if (!item) return { tipo: 'erro', mensagem: "Não há isso aqui." };
        salaAtual.itens = salaAtual.itens.filter(i => i !== item);
        inventario.push(item);
        salvarSala(salaAtual);
        salvarInventario();
        return { tipo: 'sucesso', mensagem: `Você pegou ${item}.` };
    }

    // Largar item
    function processarLargar(objeto) {
        if (!objeto) return { tipo: 'erro', mensagem: "Largar o quê?" };
        const item = inventario.find(i => i.toLowerCase().includes(objeto.toLowerCase()));
        if (!item) return { tipo: 'erro', mensagem: "Você não tem isso." };
        inventario = inventario.filter(i => i !== item);
        salaAtual.itens.push(item);
        salvarSala(salaAtual);
        salvarInventario();
        return { tipo: 'sucesso', mensagem: `Você largou ${item}.` };
    }

    // Usar item (básico)
    function processarUsar(objeto) {
        if (!objeto) return { tipo: 'erro', mensagem: "Usar o quê?" };
        const partes = objeto.split(/\s+em\s+/);
        const itemNome = partes[0].trim();
        const alvo = partes.length > 1 ? partes[1].trim() : null;

        const item = inventario.find(i => i.toLowerCase().includes(itemNome.toLowerCase()));
        if (!item) return { tipo: 'erro', mensagem: "Você não tem isso." };

        if (item.toLowerCase().includes('chave') && salaAtual.estado.porta_trancada) {
            salaAtual.estado.porta_trancada = false;
            salvarSala(salaAtual);
            return { tipo: 'sucesso', mensagem: "Você usou a chave e destrancou a porta." };
        }
        // Se não houver regra, chama modelo
        return { tipo: 'complexa', descricao: `usar ${item}${alvo ? ' em ' + alvo : ''}` };
    }

    // Examinar
    function processarExaminar(objeto) {
        if (!objeto) {
            return { tipo: 'sucesso', mensagem: salaAtual.descricao || "Você olha ao redor, mas não vê nada especial." };
        }
        const itemSala = salaAtual.itens.find(i => i.toLowerCase().includes(objeto.toLowerCase()));
        const itemInv = inventario.find(i => i.toLowerCase().includes(objeto.toLowerCase()));
        const item = itemSala || itemInv;
        if (!item) return { tipo: 'erro', mensagem: "Não há isso para examinar." };
        if (salaAtual.descricoesItens[item]) {
            return { tipo: 'sucesso', mensagem: salaAtual.descricoesItens[item] };
        } else {
            return { tipo: 'descrever_item', item };
        }
    }

    // Abrir (exemplo)
    function processarAbrir(objeto) {
        if (!objeto) return { tipo: 'erro', mensagem: "Abrir o quê?" };
        if (objeto.includes('porta')) {
            if (salaAtual.estado.porta_trancada) return { tipo: 'erro', mensagem: "A porta está trancada." };
            return { tipo: 'sucesso', mensagem: "A porta já está aberta." };
        }
        return { tipo: 'complexa', descricao: `abrir ${objeto}` };
    }

    function processarFechar(objeto) {
        return { tipo: 'complexa', descricao: `fechar ${objeto}` };
    }

    // ------------------------------------------------------------
    // Funções que chamam o modelo
    // ------------------------------------------------------------

    async function gerarRespostaModelo(messages, maxTokens = 150, temperatura = 0.7) {
        try {
            const result = await engine.chat.completions.create({
                messages,
                temperature: temperatura,
                max_tokens: maxTokens,
                top_p: 0.9,
                frequency_penalty: 0.2,
                presence_penalty: 0.2,
                stop: ["\n\n", "Jogador:", ">"]
            });
            return result.choices[0].message.content.trim();
        } catch (e) {
            console.error("Erro no modelo:", e);
            return null;
        }
    }

    // Gera uma nova sala
    async function gerarNovaSala(idSala, direcao) {
        addMsg("O narrador descreve um novo local...", "system");
        const prompt = `Com base na direção ${direcao} a partir de ${salaAtual.nome} (${salaAtual.descricao}), crie uma nova sala de um cenário de sobrevivência realista e sombrio. Forneça:
- Nome da sala (curto)
- Descrição visual (2 frases)
- Itens presentes (lista separada por vírgula, se houver)
- Estado inicial (ex: porta_trancada=true, perigo=desabamento, etc.) no formato chave=valor, separado por vírgula
- Saídas possíveis (mapeamento direção -> nome da sala de destino, ex: norte: "Salão Principal", leste: "Corredor Escuro")

Responda em formato JSON puro, sem comentários adicionais. Exemplo:
{"nome": "Porão", "descricao": "Escuro e úmido. Fungos crescem nas paredes.", "itens": ["lanterna", "corda"], "estado": {"porta_trancada": false}, "saidas": {"norte": "Salão"}}`;

        const messages = [
            { role: "system", content: "Você é um gerador de salas para RPG. Responda apenas com JSON válido." },
            { role: "user", content: prompt }
        ];
        const resposta = await gerarRespostaModelo(messages, 250, 0.7);
        if (!resposta) {
            // Fallback
            const fallback = new Sala(idSala, "Local Indefinido", "Um lugar estranho e vazio.");
            fallback.saidas = { norte: idSala };
            salvarSala(fallback);
            return fallback;
        }
        // Extrair JSON da resposta (pode vir com texto antes/depois)
        const jsonMatch = resposta.match(/\{.*\}/s);
        if (!jsonMatch) {
            const fallback = new Sala(idSala, "Local Indefinido", "Um lugar estranho e vazio.");
            fallback.saidas = { norte: idSala };
            salvarSala(fallback);
            return fallback;
        }
        try {
            const dados = JSON.parse(jsonMatch[0]);
            const novaSala = new Sala(idSala, dados.nome || idSala, dados.descricao || "Sem descrição.");
            novaSala.itens = dados.itens || [];
            novaSala.estado = dados.estado || {};
            novaSala.saidas = dados.saidas || {};
            salvarSala(novaSala);
            return novaSala;
        } catch (e) {
            console.error("Erro ao parsear JSON da sala:", e);
            const fallback = new Sala(idSala, "Local Indefinido", "Um lugar estranho e vazio.");
            fallback.saidas = { norte: idSala };
            salvarSala(fallback);
            return fallback;
        }
    }

    // Gera descrição para um item
    async function gerarDescricaoItem(item) {
        addMsg("O narrador examina o item...", "system");
        const prompt = `Descreva o item "${item}" no contexto de um jogo de sobrevivência sombrio. Use 1-2 frases curtas. Seja imersivo.`;
        const messages = [
            { role: "system", content: "Você é um narrador de RPG." },
            { role: "user", content: prompt }
        ];
        const desc = await gerarRespostaModelo(messages, 60, 0.6);
        if (!desc) return "Você não vê nada de especial nisso.";
        salaAtual.descricoesItens[item] = desc;
        salvarSala(salaAtual);
        return desc;
    }

    // Processa ação complexa
    async function processarAcaoComplexa(acao) {
        addMsg("O narrador reflete sobre sua ação...", "system");
        const prompt = `Você é um narrador de RPG de sobrevivência. O jogador está em ${salaAtual.nome}. Descrição: ${salaAtual.descricao}. Itens na sala: ${salaAtual.itens.join(', ') || 'nenhum'}. Estado: ${JSON.stringify(salaAtual.estado)}. Inventário: ${inventario.join(', ') || 'vazio'}. Ele realizou a ação: "${acao}". Narre as consequências de forma coerente com o ambiente, em 1-2 frases. Se a ação modificar o estado ou itens, inclua uma tag [UPDATE: ...] no final com as modificações (formato item:remover, item:adicionar, estado:chave=valor). Se resultar em mudança de sala, inclua [SAIR: id_da_sala].`;

        const messages = [
            { role: "system", content: "Você é um narrador conciso." },
            { role: "user", content: prompt }
        ];
        const resposta = await gerarRespostaModelo(messages, 150, 0.7);
        return resposta || "Nada de especial acontece.";
    }

    // ------------------------------------------------------------
    // Processador de resposta do modelo (tags)
    // ------------------------------------------------------------
    function processarRespostaModelo(resposta) {
        const updates = [];
        let saidaId = null;

        const updateRegex = /\[UPDATE:\s*(.*?)\]/g;
        let match;
        while ((match = updateRegex.exec(resposta)) !== null) {
            updates.push(match[1]);
        }
        let textoSemUpdates = resposta.replace(/\[UPDATE:\s*.*?\]/g, '');

        const sairRegex = /\[SAIR:\s*(.+?)\]/;
        const sairMatch = sairRegex.exec(textoSemUpdates);
        if (sairMatch) {
            saidaId = sairMatch[1].trim();
            textoSemUpdates = textoSemUpdates.replace(sairRegex, '');
        }

        textoSemUpdates = textoSemUpdates.trim();
        return { texto: textoSemUpdates, updates, saidaId };
    }

    function aplicarUpdates(updates) {
        for (let upd of updates) {
            upd = upd.trim();
            if (upd.startsWith('item:remover ')) {
                const item = upd.substring('item:remover '.length).trim();
                const index = salaAtual.itens.indexOf(item);
                if (index !== -1) {
                    salaAtual.itens.splice(index, 1);
                    inventario.push(item);
                    addMsg(`[Sistema: você pegou ${item}]`, 'system');
                }
            }
            else if (upd.startsWith('item:adicionar ')) {
                const item = upd.substring('item:adicionar '.length).trim();
                if (!salaAtual.itens.includes(item)) {
                    salaAtual.itens.push(item);
                }
            }
            else if (upd.startsWith('estado:')) {
                const parte = upd.substring('estado:'.length);
                const igualIndex = parte.indexOf('=');
                if (igualIndex !== -1) {
                    const chave = parte.substring(0, igualIndex).trim();
                    let valor = parte.substring(igualIndex + 1).trim();
                    if (valor === 'true') valor = true;
                    else if (valor === 'false') valor = false;
                    else if (!isNaN(valor) && valor !== '') valor = Number(valor);
                    salaAtual.estado[chave] = valor;
                }
            }
        }
        salvarSala(salaAtual);
        salvarInventario();
    }

    // ------------------------------------------------------------
    // Inicialização do mundo
    // ------------------------------------------------------------
    async function iniciarMundoLivre() {
        addMsg("O narrador começa a tecer o mundo...", "system");

        const promptCriacao = `Crie um cenário de RPG de sobrevivência realista e desafiador em português brasileiro. 
O jogador acorda em um local desconhecido, com um objetivo claro e perigos iminentes. 
Forneça:
- Nome do local inicial (ex: "Porão úmido", "Cabana abandonada")
- Uma descrição curta do local (2 frases)
- Contexto: por que o jogador está aqui? O que ele precisa fazer? (máx 3 frases)
- Itens que ele tem no início (lista curta, se houver)
- Saídas iniciais (mapeamento direção -> nome da sala de destino, ex: norte: "Salão Principal")

Use o formato JSON:
{"nome": "...", "descricao": "...", "contexto": "...", "itens": [...], "saidas": {"norte": "..."}}`;

        const messages = [
            { role: "system", content: "Você é um gerador de cenários de RPG. Responda apenas com JSON válido." },
            { role: "user", content: promptCriacao }
        ];

        const resposta = await gerarRespostaModelo(messages, 300, 0.8);
        if (!resposta) {
            // Fallback
            const fallback = new Sala("inicio", "Local Desconhecido", "Um lugar estranho e vazio.");
            salaAtual = fallback;
            atualizarDisplayLocal();
            addMsg("Você acorda em um lugar estranho, sem memória.", "narrator");
            return;
        }
        const jsonMatch = resposta.match(/\{.*\}/s);
        if (!jsonMatch) {
            const fallback = new Sala("inicio", "Local Desconhecido", "Um lugar estranho e vazio.");
            salaAtual = fallback;
            atualizarDisplayLocal();
            addMsg("Você acorda em um lugar estranho, sem memória.", "narrator");
            return;
        }
        try {
            const dados = JSON.parse(jsonMatch[0]);
            const nomeSala = dados.nome || "Local Desconhecido";
            const descricao = dados.descricao || "Um lugar estranho.";
            const contexto = dados.contexto || "Você não lembra como chegou aqui.";
            const itensIniciais = dados.itens || [];
            const saidas = dados.saidas || {};

            addMsg(contexto, "narrator");

            let salaInicial = carregarSala(nomeSala);
            if (!salaInicial) {
                salaInicial = new Sala(nomeSala, nomeSala, descricao);
                salaInicial.itens = itensIniciais;
                salaInicial.saidas = saidas;
                salvarSala(salaInicial);
            }

            salaAtual = salaInicial;
            atualizarDisplayLocal();

            carregarInventario();
            if (inventario.length === 0 && itensIniciais.length > 0) {
                inventario = [...itensIniciais];
                salvarInventario();
            }

            addMsg(salaAtual.descricao, "narrator");
        } catch (e) {
            console.error("Erro ao processar mundo:", e);
            const fallback = new Sala("inicio", "Local Desconhecido", "Um lugar estranho e vazio.");
            salaAtual = fallback;
            atualizarDisplayLocal();
            addMsg("Você acorda em um lugar estranho, sem memória.", "narrator");
        }
    }

    // ------------------------------------------------------------
    // Loop principal
    // ------------------------------------------------------------
    window.enviarAcao = async () => {
        if (aguardandoModelo) {
            addMsg("Aguarde, o narrador está pensando...", "system");
            return;
        }

        const input = document.getElementById("player-input");
        const textoAcao = input.value.trim();
        if (!textoAcao) return;

        addMsg(textoAcao, "player");
        input.value = "";
        document.getElementById("btn-enviar").disabled = true;

        const comando = interpretarComando(textoAcao);
        let resultado;

        try {
            switch (comando.tipo) {
                case 'movimento':
                    resultado = await processarMovimento(comando.direcao);
                    if (resultado.tipo === 'erro') {
                        addMsg(resultado.mensagem, "narrator");
                    } else if (resultado.tipo === 'gerar_sala') {
                        aguardandoModelo = true;
                        const novaSala = await gerarNovaSala(resultado.idDestino, resultado.direcao);
                        salaAtual = novaSala;
                        atualizarDisplayLocal();
                        addMsg(novaSala.descricao || `Você entra em ${novaSala.nome}.`, "narrator");
                        aguardandoModelo = false;
                    } else {
                        addMsg(resultado.mensagem, "narrator");
                    }
                    break;

                case 'pegar':
                    resultado = processarPegar(comando.objeto);
                    addMsg(resultado.mensagem, "narrator");
                    break;

                case 'largar':
                    resultado = processarLargar(comando.objeto);
                    addMsg(resultado.mensagem, "narrator");
                    break;

                case 'usar':
                    resultado = processarUsar(comando.objeto);
                    if (resultado.tipo === 'complexa') {
                        aguardandoModelo = true;
                        const resp = await processarAcaoComplexa(resultado.descricao);
                        const { texto, updates, saidaId } = processarRespostaModelo(resp);
                        if (texto) addMsg(texto, "narrator");
                        if (updates.length) aplicarUpdates(updates);
                        if (saidaId) {
                            salvarSala(salaAtual);
                            let novaSala = carregarSala(saidaId);
                            if (!novaSala) novaSala = await gerarNovaSala(saidaId, "desconhecida");
                            salaAtual = novaSala;
                            atualizarDisplayLocal();
                            addMsg(salaAtual.descricao || `Você entra em ${salaAtual.nome}.`, "narrator");
                        }
                        aguardandoModelo = false;
                    } else {
                        addMsg(resultado.mensagem, "narrator");
                    }
                    break;

                case 'examinar':
                    resultado = processarExaminar(comando.objeto);
                    if (resultado.tipo === 'descrever_item') {
                        aguardandoModelo = true;
                        const desc = await gerarDescricaoItem(resultado.item);
                        addMsg(desc, "narrator");
                        aguardandoModelo = false;
                    } else {
                        addMsg(resultado.mensagem, "narrator");
                    }
                    break;

                case 'abrir':
                    resultado = processarAbrir(comando.objeto);
                    if (resultado.tipo === 'complexa') {
                        aguardandoModelo = true;
                        const resp = await processarAcaoComplexa(resultado.descricao);
                        const { texto, updates, saidaId } = processarRespostaModelo(resp);
                        if (texto) addMsg(texto, "narrator");
                        if (updates.length) aplicarUpdates(updates);
                        if (saidaId) {
                            salvarSala(salaAtual);
                            let novaSala = carregarSala(saidaId);
                            if (!novaSala) novaSala = await gerarNovaSala(saidaId, "desconhecida");
                            salaAtual = novaSala;
                            atualizarDisplayLocal();
                            addMsg(salaAtual.descricao || `Você entra em ${salaAtual.nome}.`, "narrator");
                        }
                        aguardandoModelo = false;
                    } else {
                        addMsg(resultado.mensagem, "narrator");
                    }
                    break;

                case 'fechar':
                    resultado = processarFechar(comando.objeto);
                    if (resultado.tipo === 'complexa') {
                        aguardandoModelo = true;
                        const resp = await processarAcaoComplexa(resultado.descricao);
                        const { texto, updates, saidaId } = processarRespostaModelo(resp);
                        if (texto) addMsg(texto, "narrator");
                        if (updates.length) aplicarUpdates(updates);
                        if (saidaId) {
                            salvarSala(salaAtual);
                            let novaSala = carregarSala(saidaId);
                            if (!novaSala) novaSala = await gerarNovaSala(saidaId, "desconhecida");
                            salaAtual = novaSala;
                            atualizarDisplayLocal();
                            addMsg(salaAtual.descricao || `Você entra em ${salaAtual.nome}.`, "narrator");
                        }
                        aguardandoModelo = false;
                    } else {
                        addMsg(resultado.mensagem, "narrator");
                    }
                    break;

                default: // desconhecido
                    aguardandoModelo = true;
                    const resp = await processarAcaoComplexa(textoAcao);
                    const { texto, updates, saidaId } = processarRespostaModelo(resp);
                    if (texto) addMsg(texto, "narrator");
                    if (updates.length) aplicarUpdates(updates);
                    if (saidaId) {
                        salvarSala(salaAtual);
                        let novaSala = carregarSala(saidaId);
                        if (!novaSala) novaSala = await gerarNovaSala(saidaId, "desconhecida");
                        salaAtual = novaSala;
                        atualizarDisplayLocal();
                        addMsg(salaAtual.descricao || `Você entra em ${salaAtual.nome}.`, "narrator");
                    }
                    aguardandoModelo = false;
            }
        } catch (e) {
            console.error("Erro no processamento:", e);
            addMsg("[Sistema: O mundo vacilou. Tente novamente.]", "system");
        } finally {
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus();
        }
    };

    // ------------------------------------------------------------
    // Inicialização
    // ------------------------------------------------------------
    async function init() {
        const status = document.getElementById("status");
        const pb = document.getElementById("progress-bar");

        try {
            status.innerText = "Despertando o Narrador...";
            
            engine = await CreateMLCEngine(MY_MODEL_ID, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    pb.style.width = `${report.progress * 100}%`;
                }
            });

            document.getElementById("progress-bar-container").style.display = "none";
            status.innerText = "Criando o mundo...";

            await iniciarMundoLivre();

            status.innerText = "O Pesadelo Começou.";
            document.getElementById("player-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus();

        } catch (err) {
            status.innerText = "ERRO CRÍTICO: " + err.message;
            console.error(err);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('player-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('btn-enviar').disabled && !aguardandoModelo) {
                enviarAcao();
            }
        });
    });

    init();
</script>
