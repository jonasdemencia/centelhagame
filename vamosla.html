<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha • Jogo Medieval Brutal (com testes visíveis)</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #local-atual { color: #ffaa00; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #3a3228; padding-bottom: 4px; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .user-message { color: #7a8c66; align-self: flex-end; background: #1e2a1a; padding: 6px 12px; border-radius: 12px 0 12px 12px; max-width: 80%; word-wrap: break-word; }
        .ai-message { color: #a13d3d; align-self: flex-start; background: #2a1a1a; padding: 6px 12px; border-radius: 0 12px 12px 12px; max-width: 80%; word-wrap: break-word; }
        .system-message { color: #6b6b4a; text-align: center; font-style: italic; font-size: 0.9em; margin: 5px 0; }
        #controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; font-family: inherit; font-size: 16px; }
        button { padding: 12px 20px; cursor: pointer; background: #3a3228; color: #fff; border: none; font-family: inherit; font-size: 16px; transition: 0.2s; }
        button:hover:not(:disabled) { background: #5a4a38; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="local-atual">
            ⚔️ Reinos Desolados • <span id="modelo-span">qwen2.5-7b-instruct-abliterated-v2</span>
        </div>

        <div id="chat-box">
            <div class="system-message">⚔️ O narrador está preparando o cenário...</div>
        </div>

        <div id="controls">
            <input type="text" id="user-input" placeholder="Sua ação..." disabled>
            <button id="send-btn" onclick="enviar(document.getElementById('user-input').value.trim())" disabled>Agir</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ============================================================
        // Configuração do Firebase & Firestore
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC0XfvjonW2gd1eGAZX7NBYfPGMwI2siJw",
            authDomain: "centelhagame-9d511.firebaseapp.com",
            projectId: "centelhagame-9d511",
            storageBucket: "centelhagame-9d511.appspot.com",
            messagingSenderId: "700809803145",
            appId: "1:700809803145:web:bff4c6a751ec9389919d58"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const sessionId = "sessao_dev_01"; 

        // ============================================================
        // Configuração do LM Studio e Controle de Contexto
        // ============================================================
        const LM_URL = 'http://localhost:1234/v1/chat/completions';
        const MODELO = 'qwen2.5-7b-instruct-abliterated-v2';
        const LIMITE_MENSAGENS = 24;
        window._introGenerating = false;

        let turnosJogados = 0;

        const jogadorStats = {
            HABILIDADE: 5,
            CARISMA: 3,
            SORTE: 4
        };

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let mensagens = [
            {
                role: 'system',
                content: `Você é um motor narrativo de um RPG de fantasia brutal e punitiva. Responda APENAS em Português Brasileiro CORRETO. Nunca escreva em outro idioma.
REGRAS DE OURO:
- Tensão Psicológica: O verdadeiro horror está no que não é dito ou mostrado. Mostre as consequências (cadáveres, loucura, ruínas), atrase o monstro.
- Realismo Sujo: Evite adjetivos bonitos. Use verbos de ação e substantivos concretos (barro, sangue coagulado, ferrugem, silêncio sufocante).
- Imparcialidade Cruel: Nunca decida o que o jogador sente (ex: "Você sente medo"). Apenas descreva o ambiente hostil com frieza.
- Mecânica: Nunca resolva um obstáculo pelo jogador.`
            },
            {
                role: 'system',
                content: 'Resumo da jornada até agora: A aventura acabou de começar.'
            }
        ];

        let resumoAtual = "";

        // ============================================================
        // Funções de Inicialização e Firebase
        // ============================================================
        async function carregarSessao() {
            try {
                const docRef = doc(db, "sessoes", sessionId);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    if (docSnap.data().resumo) {
                        resumoAtual = docSnap.data().resumo;
                        mensagens[1].content = `Resumo da jornada até agora: ${resumoAtual}`;
                    }
                    if (docSnap.data().turnos !== undefined) {
                        turnosJogados = docSnap.data().turnos;
                    }
                }
            } catch (e) {
                console.error("Erro ao carregar do Firestore:", e);
            }
        }

        async function salvarResumoFirestore(novoResumo) {
            try {
                await setDoc(doc(db, "sessoes", sessionId), { 
                    resumo: novoResumo,
                    turnos: turnosJogados 
                }, { merge: true });
            } catch (e) {
                console.error("Erro ao salvar no Firestore:", e);
            }
        }

        // ============================================================
        // Função do Diretor de Fases
        // ============================================================
        function obterDiretrizDeFase() {
            if (turnosJogados < 50) {
                return "FASE 1 - RASTROS (Lentidão): O perigo é apenas um sussurro, uma lenda ou um rastro perturbador no cenário. É ESTRITAMENTE PROIBIDO mostrar a ameaça principal. Foco no mistério e na exploração do infamiliar.";
            } else if (turnosJogados < 250) {
                return "FASE 2 - PARANOIA: Os sinais da ameaça são recentes. O ambiente reage a algo invisível (animais mortos, cheiro de podridão, NPCs aterrorizados). O perigo é iminente, mas ainda indireto.";
            } else if (turnosJogados < 450) {
                return "FASE 3 - PERSEGUIÇÃO: O jogador vê a ameaça de relance. Sobrevivência se torna o foco. O cerco está se fechando. Tensão alta, descreva o som e o impacto da ameaça no ambiente.";
            } else {
                return "FASE 4 - O CLÍMAX: O confronto direto, visceral e inevitável. Apostas máximas. Descreva a brutalidade do embate.";
            }
        }

        // ============================================================
        // Funções de Compressão de Memória — Structured State Representation (SSR)
        // ============================================================
        const SSR_TEMPLATE = `LOCAL: [onde o jogador está agora]
NPCS: [lista de personagens encontrados e seu estado atual: nome/descrição, relação, vivo/morto/desconhecido]
ITENS: [itens carregados ou relevantes no cenário]
EVENTOS_CHAVE: [lista de fatos consumados, em ordem, sem atmosfera — apenas o que aconteceu]
SITUACAO_ATUAL: [uma frase: o que o jogador está fazendo ou diante de agora]
GANCHOS_ATIVOS: [pistas ou ameaças não resolvidas que devem ser lembradas]`;

        async function comprimirMemoria() {
            if (mensagens.length > LIMITE_MENSAGENS) {
                adicionarMensagem('⚙️ As engrenagens do destino giram. Consolidando memórias...', 'system');
                
                const mensagensParaResumir = mensagens.splice(2, 6); 
                const textoExtraido = mensagensParaResumir
                    .map(m => `${m.role === 'user' ? 'JOGADOR' : 'NARRADOR'}: ${m.content}`)
                    .join('\n---\n');

                const promptResumo = [
                    { 
                        role: 'system', 
                        content: `Você é um extrator de estado de jogo. Sua única função é preencher o formulário abaixo com dados factuais extraídos dos eventos fornecidos. REGRAS ABSOLUTAS:
1. ZERO prosa, ZERO atmosfera, ZERO adjetivos literários.
2. Cada campo deve ser preenchido com fatos secos e objetivos.
3. Se o estado anterior já tiver um campo, ATUALIZE-O com as novas informações — não apague o que ainda é verdade.
4. Se não houver informação para um campo, escreva: [sem dados].
5. Responda APENAS com o formulário preenchido, sem nenhum texto adicional antes ou depois.

FORMULÁRIO:
${SSR_TEMPLATE}`
                    },
                    { 
                        role: 'user', 
                        content: `ESTADO ANTERIOR:\n${resumoAtual || '[início da aventura — sem estado anterior]'}\n\nNOVOS EVENTOS:\n${textoExtraido}\n\nPreencha o formulário de estado atualizado agora.`
                    }
                ];

                try {
                    const response = await fetch(LM_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: MODELO,
                            messages: promptResumo,
                            temperature: 0.1,
                            max_tokens: 350
                        })
                    });
                    
                    const data = await response.json();
                    const novoSSR = data.choices[0].message.content.trim();
                    
                    console.debug('[SSR] Estado estruturado gerado:\n' + novoSSR);
                    
                    resumoAtual = novoSSR;
                    mensagens[1].content = `ESTADO ATUAL DO MUNDO (use como referência factual, não repita como narração):\n${resumoAtual}`;
                    await salvarResumoFirestore(resumoAtual);
                    
                } catch (error) {
                    console.error("Erro ao comprimir memória:", error);
                    mensagens.splice(2, 0, ...mensagensParaResumir); 
                }
            }
        }

        // ============================================================
        // Funções auxiliares Visuais
        // ============================================================
        function adicionarMensagem(texto, tipo, temporaria = false) {
            const div = document.createElement('div');
            div.className = tipo === 'user' ? 'user-message' : tipo === 'system' ? 'system-message' : 'ai-message';
            div.innerText = texto;
            if (temporaria) {
                div.id = 'temp-' + Date.now() + '-' + Math.random();
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.id;
        }

        // ============================================================
        // Função 1: O Juiz Invisível
        // ============================================================
        async function avaliarAcao(acaoUsuario) {
            const promptJuiz = [
                { 
                    role: 'system', 
                    content: `Você é um classificador de ações de RPG. Analise a mensagem do jogador e decida se ela representa uma ação que exige teste de atributo ou apenas uma pergunta descritiva. Categorias: HABILIDADE, CARISMA, SORTE, NENHUM. Responda APENAS com a categoria em maiúsculas. NÃO adicione explicações.` 
                },
                { role: 'user', content: acaoUsuario }
            ];

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: promptJuiz,
                        temperature: 0.2,
                        max_tokens: 10
                    })
                });
                const data = await response.json();
                const classificacao = data.choices[0].message.content.trim().toUpperCase();
                
                if (['HABILIDADE', 'CARISMA', 'SORTE', 'NENHUM'].includes(classificacao)) {
                    return classificacao;
                }
                return 'NENHUM';
            } catch (error) {
                console.error('Erro no juiz:', error);
                return 'NENHUM';
            }
        }

        // ============================================================
        // Função 2: Motor de Regras
        // ============================================================
        function rolarTeste(atributo) {
            if (atributo === 'NENHUM' || !jogadorStats[atributo]) return null;
            const rolagem = Math.floor(Math.random() * 10) + 1;
            return rolagem <= jogadorStats[atributo] ? 'SUCESSO' : 'FALHA';
        }

        // ============================================================
        // Streaming SSE com loop de auto-continuação
        // ============================================================
        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            console.log("🔥 Temperatura usada:", window._introGenerating ? 0.85 : 0.55);
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: mensagensPayload,
                        temperature: window._introGenerating ? 0.85 : 0.55,
                        max_tokens: maxTokens,
                        presence_penalty: 0.3,
                        frequency_penalty: 0.3,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                console.debug('[LLM STREAM] Iniciando leitura de chunks SSE...');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        console.debug('[LLM STREAM] Leitor finalizado (done=true)');
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') {
                            console.debug('[LLM STREAM] Sinal [DONE] recebido.');
                            continue;
                        }
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr = chunk.choices?.[0]?.finish_reason;

                            if (fr && fr !== 'null') {
                                console.debug(`[LLM STREAM] finish_reason recebido: "${fr}"`);
                            }

                            if (delta) {
                                fullText += delta;
                                if (onToken) onToken(fullText);
                            }
                            if (fr && fr !== 'null') {
                                finishReason = fr;
                            }

                            if (chunk.error) {
                                console.error('[LLM STREAM] Erro no chunk:', chunk.error);
                            }
                        } catch (parseErr) {
                            console.error('[LLM STREAM] Erro ao parsear chunk:', parseErr, 'Linha:', line);
                        }
                    }
                }

                console.debug(`[LLM STREAM] Geração concluída. Tokens gerados: ~${fullText.split(' ').length} palavras. finish_reason final: "${finishReason}"`);
                return { text: fullText, finishReason };
            } catch (error) {
                console.error('[LLM STREAM] Falha na requisição fetch:', error);
                throw error;
            }
        }

        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elemento, maxContinuacoes = 0) {
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];

            for (let tentativa = 0; tentativa <= maxContinuacoes; tentativa++) {
                if (tentativa > 0) {
                    console.debug(`[CONTINUAÇÃO ${tentativa}/${maxContinuacoes}] finish_reason=length. Enviando extensão...`);
                    msgsAtual = [
                        ...msgsAtual,
                        { role: 'assistant', content: textoCompleto },
                        { role: 'user', content: 'Continue.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
                        elemento.innerText = textoCompleto + parcial;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

                if (finishReason !== 'length') {
                    console.debug(`[GERAÇÃO] Encerrado naturalmente (finish_reason="${finishReason}") na tentativa ${tentativa}.`);
                    break;
                }

                if (tentativa === maxContinuacoes) {
                    console.debug(`[GERAÇÃO] Limite de ${maxContinuacoes} continuação(ões) atingido. Encerrando.`);
                }
            }

            return textoCompleto;
        }

        // ============================================================
        // PROMPT DE INTRODUÇÃO — Dimensional Seeding + Structural Modes
        //
        // Técnica 1: DIMENSIONAL SEEDING
        //   Um número aleatório é injetado a cada carregamento. O modelo
        //   não usa o número matematicamente, mas o trata como uma
        //   "impressão digital" da sessão — forçando-o a divergir de
        //   gerações anteriores que tiveram sementes diferentes.
        //
        // Técnica 2: EIXOS ORTOGONAIS
        //   Quatro dimensões independentes (Cenário, Protagonista, Crise,
        //   Estrutura) com 20-30 opções cada. A combinatória é vasta o
        //   suficiente para cobrir todo o corpus Fighting Fantasy —
        //   incluindo House of Hell, Seas of Blood, Starship Traveller,
        //   Creature of Havoc, Appointment with F.E.A.R., etc.
        //
        // Técnica 3: STRUCTURAL MODES
        //   Cinco modos narrativos de abertura genuinamente distintos.
        //   Nenhum deles impõe a sequência rígida Mundo→Você→Ameaça→Missão.
        //   O modelo escolhe um por sessão, quebrando a previsibilidade
        //   estrutural independentemente do cenário.
        // ============================================================
        const PROMPT_INTRO = (() => {
            // Semente numérica única por sessão — força divergência entre gerações
            const seed = Math.floor(Math.random() * 99999);

            // Listas de eixos — o modelo seleciona internamente, sem revelar ao jogador
            const cenarios = [
                "oceano abissal (criaturas, pressão, escuridão, estações submersas)",
                "espaço sideral (nave, vácuo, planetas hostis, anomalias)",
                "mansão amaldiçoada (cômodos impossíveis, mortos inquietos, segredos enterrados)",
                "coliseu ou arena de gladiadores (plateia, apostas, sangue, política disfarçada de espetáculo)",
                "metrópole industrial vitoriana (fumaça, pobreza, máquinas vivas, conspirações)",
                "floresta primordial que se move ou respira",
                "deserto de sal e ossos (ruínas, miragens, tribos, calor que mata)",
                "pântano de névoa tóxica (afogamento lento, fauna letal, segredos submersos)",
                "tundra ártica ou glacial (frio que mata, criatura sob o gelo, isolamento)",
                "vulcão habitado (culto, lava, sacrifícios, mineral precioso proibido)",
                "cidade flutuante em colapso iminente",
                "ruínas de civilização extinta há milênios (armadilhas ainda ativas)",
                "catacumbas sem fim sob uma cidade viva",
                "monastério de assassinos em montanha inacessível",
                "navio pirata ou navio fantasma à deriva",
                "labirinto vivo (paredes que se movem, entidade que o habita)",
                "planeta alienígena com ecologia incompreensível",
                "fábrica de experimentos proibidos (alquimia, vivisecção, autômatos)",
                "campo de batalha suspenso no tempo — guerra que nunca terminou",
                "mercado negro interdimensional (portais, câmbio de almas, mercadores de memória)",
                "interior de um ser vivo colossal (órgãos como biomas, anticorpos como inimigos)",
                "arquipélago de ilhas voadoras (gravidade instável, piratas do ar)",
                "cidade submarina de civilização antiga ainda operando",
                "prisão em alto mar ou no espaço (motim, fuga, guardiões corrompidos)",
                "floresta de fungos bioluminescentes com esporos alucinógenos",
                "castelo que muda de planta a cada amanhecer"
            ];

            const protagonistas = [
                "mercenário com uma dívida que não pode ser paga em dinheiro",
                "prisioneiro que acorda em um lugar desconhecido sem memória do crime",
                "monstro ou criatura que ganhou consciência e não sabe o que é",
                "capitão que perdeu navio, tripulação e nome — nessa ordem",
                "espião infiltrado cuja identidade foi descoberta",
                "gladiador disputando sua última luta antes da execução",
                "caçador de recompensas cujo alvo desta vez é alguém inocente",
                "único sobrevivente de algo que não deveria ter acontecido",
                "criatura não-humana (demônio, golem, espectro) com agenda própria",
                "criminoso em fuga com algo que não deveria ter roubado",
                "morto que voltou — com uma tarefa que não escolheu e não entende",
                "nobre destituído, caçado pelos próprios antigos aliados",
                "escravo que escapou e carrega um segredo que vale vidas",
                "alquimista cujo experimento deu errado de forma catastrófica",
                "tripulante comum jogado em situação extraordinária sem preparo",
                "agente de uma ordem secreta em missão que a própria ordem nega",
                "prisioneiro de guerra solto para uma missão suicida"
            ];

            const crises = [
                "um antagonista nomeado, localizado, com poder consolidado — e uma fraqueza desconhecida",
                "uma praga, corrupção ou maldição sem rosto que se expande",
                "o próprio ambiente quer matar: clima, fauna, física do lugar",
                "conspiração política em colapso — várias facções, nenhuma confiável",
                "um ritual em curso que deve ser interrompido — ou, surpreendentemente, completado",
                "o jogador É o problema: amaldiçoado, caçado, ou perigoso sem saber por quê",
                "uma descoberta proibida que não pode ser desfeita nem guardada com segurança",
                "uma entidade que não deveria existir — e que não pode ser morta",
                "a estrutura física do lugar está em colapso iminente e irreversível",
                "o tempo está literalmente acabando: contagem regressiva, maldição temporal, ciclo prestes a se fechar",
                "guerra entre facções onde o jogador está no meio sem ter escolhido lado",
                "uma dívida, um contrato ou um juramento que transforma em missão impossível",
                "algo foi roubado, corrompido ou destruído — e a culpa recaiu sobre o jogador",
                "uma criança, cidade ou conceito abstrato (memória, linguagem, cor) está desaparecendo do mundo"
            ];

            const modos = [
                `[MODO: CLÁSSICO] Apresente o mundo, depois o protagonista, depois a crise, depois a missão e suas apostas, depois a posição atual e a decisão imediata. Cada elemento em seu próprio parágrafo.`,
                `[MODO: IN MEDIAS RES] Comece no meio do perigo — o protagonista já está em risco, em movimento, ou diante de algo irreversível. O contexto (quem é, por que está aqui) emerge em fragmentos dentro da ação, não antes dela.`,
                `[MODO: INVERSÃO] O protagonista é visto como a ameaça pelo mundo ao redor. Ele foge, se esconde, ou é caçado. A crise não é o que ele enfrenta — é o que ele representa para os outros. A missão emerge do ponto de vista de quem é perseguido.`,
                `[MODO: BRIEFING] Um terceiro (contratante, prisioneiro, moribundo, voz sem corpo) revela a crise ao protagonista. O background é contado como uma conversa, um documento encontrado, ou uma gravação. O protagonista recebe a missão — e descobre que não tem escolha.`,
                `[MODO: DESCOBERTA] O protagonista tropeça no problema sem ter sido chamado. Ele não é um herói — estava passando. A crise se revela aos poucos, e a missão nasce da impossibilidade de ignorar o que foi visto.`
            ];

            // Seleção baseada na semente para garantir distribuição diferente a cada sessão
            const idxCenario  = seed % cenarios.length;
            const idxProtag   = Math.floor(seed / 7)  % protagonistas.length;
            const idxCrise    = Math.floor(seed / 13) % crises.length;
            const idxModo     = Math.floor(seed / 31) % modos.length;

            const cenario    = cenarios[idxCenario];
            const protagonista = protagonistas[idxProtag];
            const crise      = crises[idxCrise];
            const modo       = modos[idxModo];

            console.debug(`[INTRO SEED: ${seed}] Cenário[${idxCenario}]: ${cenario}`);
            console.debug(`[INTRO SEED: ${seed}] Protagonista[${idxProtag}]: ${protagonista}`);
            console.debug(`[INTRO SEED: ${seed}] Crise[${idxCrise}]: ${crise}`);
            console.debug(`[INTRO SEED: ${seed}] Modo[${idxModo}]: ${modo}`);

            return `Esta é a abertura da aventura. Siga as instruções abaixo com precisão.

SEMENTE DE SESSÃO: ${seed} — esta aventura deve ser radicalmente diferente de qualquer geração anterior.

ELEMENTOS DEFINIDOS PARA ESTA SESSÃO:
• CENÁRIO: ${cenario}
• PROTAGONISTA: ${protagonista}
• CRISE: ${crise}
• ${modo}

INSTRUÇÕES DE ESCRITA:
— Escreva em 5 parágrafos de prosa corrida. Zero títulos. Zero marcadores. Zero meta-comentários.
— Segunda pessoa: "você". Frases curtas e secas.
— Um detalhe sensorial concreto por parágrafo (cheiro, textura, som, temperatura — nunca emoção).
— Preserve mistério: o jogador não sabe tudo sobre a crise nem sobre si mesmo.
— Não revele a Semente nem os elementos escolhidos. Apenas escreva.
— Termine com uma circunstância que force uma decisão imediata e irreversível.`;
        })();

        // ============================================================
        // Função principal de envio
        // ============================================================
        window.enviar = async function(mensagemUsuario = null) {
            const isInitial = mensagemUsuario === null;
            
            if (!isInitial) {
                turnosJogados++;
            }

            let pergunta;
            if (isInitial) {
                if (!resumoAtual) {
                    pergunta = PROMPT_INTRO;
                } else {
                    pergunta = 'O jogo foi recarregado. Com base no resumo da história, narre rapidamente a cena atual (usando a regra padrão de frases curtas) e pergunte o que eu faço agora.';
                }
            } else {
                pergunta = mensagemUsuario;
            }

            if (!isInitial) {
                adicionarMensagem(pergunta, 'user');
                userInput.value = '';
            }

            sendBtn.disabled = true;
            userInput.disabled = true;

            const tempId = adicionarMensagem('...', 'ai', true);
            const elementoDisplay = document.getElementById(tempId);

            try {
                await comprimirMemoria();

                let mensagemParaNarrador = pergunta;

                if (!isInitial) {
                    const faseAtual = obterDiretrizDeFase();

                    const diretrizes = `\n\n[DIRETRIZES DE DIREÇÃO]: 
1. ESTADO DO JOGO: ${faseAtual}
2. REGRA DE ESTILO: Máximo 4 frases. Frases secas, curtas. Segunda pessoa do singular.
3. TENSÃO: Não use clichês emocionais. Construa medo pelo que FALTA ou pelo que está QUEBRADO no ambiente. Mostre, não conte. Oculte informações do jogador.`;

                    mensagemParaNarrador += diretrizes;

                    const tipoAcao = await avaliarAcao(pergunta);
                    const resultadoTeste = rolarTeste(tipoAcao);

                    if (resultadoTeste) {
                        adicionarMensagem(`[Teste de ${tipoAcao}: ${resultadoTeste}]`, 'system');
                        
                        let logicaFisica = '';
                        if (resultadoTeste === 'FALHA') {
                            const consequenciasPorAtributo = {
                                HABILIDADE: [
                                    'Ação FALHOU CRITICAMENTE. O jogador errou o movimento e sofreu DANO FÍSICO. Descreva o ferimento com crueza.',
                                    'Ação FALHOU. O corpo do jogador cedeu no momento decisivo. Descreva a dor física e a posição vulnerável em que ficou.',
                                    'Ação FALHOU. A falta de destreza custou caro. Descreva um erro mecânico com consequências físicas imediatas.'
                                ],
                                CARISMA: [
                                    'Ação FALHOU. O jogador disse a coisa errada. O interlocutor reagiu com HOSTILIDADE ABERTA — descreva a rejeição humilhante, o silêncio cortante ou a ameaça que surgiu.',
                                    'Ação FALHOU. O jogador foi ignorado ou escarnecido. Descreva a frieza do outro personagem, talvez acompanhada de riso ou desprezo. A situação social piorou.',
                                    'Ação FALHOU. A abordagem irritou o interlocutor. Descreva como ele se fechou, virou as costas ou sinalizou que a conversa acabou — de forma ameaçadora ou humilhante.'
                                ],
                                SORTE: [
                                    'Ação FALHOU. O destino foi cruel: Descreva uma consequência mortal ou quase letal para o azar do jogador.',
                                ]
                            };

                            const lista = consequenciasPorAtributo[tipoAcao] || consequenciasPorAtributo['HABILIDADE'];
                            logicaFisica = lista[Math.floor(Math.random() * lista.length)];
                        }

                        mensagemParaNarrador += `\nMECÂNICA: Teste de ${tipoAcao} = ${resultadoTeste}. DIRETRIZ OBRIGATÓRIA: ${logicaFisica}`;
                    }
                }

                mensagens.push({ role: 'user', content: mensagemParaNarrador });

                const isIntro = (isInitial && !resumoAtual);
                const maxTokens       = isIntro ? 1000 : 200;
                const maxContinuacoes = isIntro ?    1 :   1;

                console.debug(`[ENVIO] isIntro=${isIntro} | maxTokens=${maxTokens} | maxContinuacoes=${maxContinuacoes}`);

                if (isIntro) window._introGenerating = true;

                const respostaIA = await gerarRespostaComContinuacao(mensagens, maxTokens, elementoDisplay, maxContinuacoes);

                if (isIntro) window._introGenerating = false;

                mensagens.push({ role: 'assistant', content: respostaIA });

                await salvarResumoFirestore(resumoAtual);

                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }

            } catch (error) {
                elementoDisplay.innerText = `❌ Erro: ${error.message}`;
                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                }
            } finally {
                if (!isInitial) {
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }
        };

        // ============================================================
        // Inicialização
        // ============================================================
        window.onload = async () => {
            await carregarSessao();
            window.enviar(); 
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                window.enviar(userInput.value.trim());
            }
        });
    </script>
</body>
</html>
