        async function chamarGroq(messages, temperatura = 0.3, formato = { type: "json_object" }) {
    const response = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            messages: messages,
            temperature: temperatura,
            response_format: formato,
        }),
    });

    // Captura o body independente do status HTTP
    const data = await response.json();
    console.log('[Groq] Resposta raw do Worker:', JSON.stringify(data).slice(0, 400));

    if (!response.ok) {
        // Worker retornou HTTP 4xx/5xx вҖ” loga o body para diagnГіstico
        throw new Error(`Erro no Worker [${response.status}]: ${JSON.stringify(data)}`);
    }

    // Groq retornou HTTP 200 mas com body de erro (ex: rate limit, token expirado)
    if (data.error) {
        throw new Error(`Erro da Groq API: ${data.error.message ?? JSON.stringify(data.error)}`);
    }

    // Valida shape mГӯnimo antes de retornar
    if (!data.choices || !Array.isArray(data.choices) || data.choices.length === 0) {
        throw new Error(`Resposta da Groq sem 'choices': ${JSON.stringify(data).slice(0, 300)}`);
    }

    return data;
}

async function gerarGrafoGroq(cenarioTema) {
    adicionarMensagem("вҡҷпёҸ [Arquiteto Groq] Gerando estrutura do mundo...", "system", true);
    
    const promptGroq = `
    Atue como um arquiteto de level design sГЎdico e mestre de RPG focado em Dark Fantasy e Survival Horror hiper-realista.
    Sua missГЈo Г© gerar um mapa em grafo JSON de 25 seГ§Гөes (salas) para o tema: "${cenarioTema}".

    REGRAS DE CONTEГҡDO E TOM (INVIOLГҒVEIS):
    1. O ambiente Г© DECRГүPITO, OPRESSIVO e FORENSE. Descreva a arquitetura com foco na textura do horror (ferrugem, cheiro de cobre/sangue, madeira podre, umidade, escuridГЈo, sons Гәmidos, ossos, correntes).
    2. As "opcoes" devem refletir aГ§Гөes de sobrevivГӘncia tensas e especГӯficas (ex: "ForГ§ar a grade enferrujada", "Rastejar pelo duto estreito") e NUNCA genГ©ricas ("Explorar a sala", "Continuar").
    3. Crie becos sem saГӯda letais e retornos claustrofГіbicos. Nenhuma escolha deve parecer "segura".

        EXEMPLO DE PADRГғO DE QUALIDADE ESPERADO:
    {
      "1": { 
        "texto_logico": "O corredor cheira a urina velha e ferrugem. As paredes estГЈo descascadas, revelando tijolos escurecidos por incГӘndios antigos. No final, uma porta de ferro pesada bloqueia o caminho, ladeada por ganchos de aГ§ougue.", 
        "opcoes": [
          { "texto": "Tentar erguer a porta de ferro", "destino": 2 }, 
          { "texto": "Inspecionar os ganchos sujos", "destino": 3 },
          { "texto": "Examinar as paredes descascadas", "destino": 4 }
        ] 
      }
    }
    
    Regras do JSON:
    1. Retorne APENAS o JSON, sem markdown, sem introduГ§Гөes.
    2. Estrutura obrigatГіria:
    {
      "1": { "texto_logico": "DescriГ§ГЈo seca do ambiente", "opcoes": [{ "texto": "aГ§ГЈo", "destino": 2 }] },
      "2": { ... }
    }
    3. Crie caminhos nГЈo lineares (loops, becos sem saГӯda, atalhos). O ID mГЎximo de destino Г© 25.
    4. DENSIDADE DE ESCOLHAS: Cada sala (ID) deve obrigatoriamente ter entre 2 e 4 opГ§Гөes de destino. Evite salas com apenas uma saГӯda, a menos que seja um beco sem saГӯda estratГ©gico.
    5. COMPLEXIDADE DO GRAFO: Crie um design de mapa "em teia". Isso significa que caminhos diferentes podem levar ao mesmo ID, e alguns IDs devem apontar para salas anteriores (backtracking), forГ§ando o jogador a explorar.
    `;

    try {
        const data = await chamarGroq([{ role: "user", content: promptGroq }], 0.7, { type: "json_object" });
        const conteudo = data.choices[0].message.content;

        let mapaParseado;
        try {
            mapaParseado = JSON.parse(conteudo);
        } catch (parseErr) {
            throw new Error(`JSON do mapa invГЎlido: ${parseErr.message} | Raw: ${conteudo.slice(0, 200)}`);
        }

        // Valida que o mapa tem pelo menos a sala "1"
        if (!mapaParseado["1"] || !mapaParseado["1"].texto_logico) {
            throw new Error(`Mapa gerado sem estrutura vГЎlida. Keys: ${Object.keys(mapaParseado).join(', ')}`);
        }

        mapaMundo = mapaParseado;
        secaoAtualId = "1";
        await salvarEstadoJogador();
        adicionarMensagem("вң… Mapa estrutural carregado na memГіria.", "system");

        console.error("Erro ao gerar mapa na Groq:", error);
        adicionarMensagem(`вқҢ Falha ao criar a arquitetura do mundo. (${error.message})`, "system");
    }
}

        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: mensagensPayload,
                        temperature: window._introGenerating ? 0.4 : 0.4,
                        max_tokens: maxTokens,
                        presence_penalty: 0.0,
                        frequency_penalty: 0.0,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') continue;
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr = chunk.choices?.[0]?.finish_reason;

                            if (delta) {
                                fullText += delta;
                                if (onToken) onToken(fullText);
                            }
                            if (fr && fr !== 'null') finishReason = fr;
                        } catch (parseErr) {}
                    }
                }
                return { text: fullText, finishReason };
            } catch (error) {
                throw error;
            }
        }

                        { role: 'user', content: 'Continue a narraГ§ГЈo em portuguГӘs brasileiro.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,

        primeiroTokenRecebido = true;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

        function buildEntityIndex(ssrJson) {
            entityIndex = {};
            entidadeEmFoco = null;

            for (const entrada of (ssrJson?.npcs || [])) {
                const virgulaIdx = entrada.indexOf(',');
                if (virgulaIdx === -1) continue;
                const nome   = entrada.slice(0, virgulaIdx).trim().toLowerCase();
                const estado = entrada.slice(virgulaIdx + 1).trim().toLowerCase();
                entityIndex[nome] = estado;
            }

            const situacao = ssrJson?.situacao_atual?.toLowerCase() || '';
            for (const [nome, estado] of Object.entries(entityIndex)) {
                if (situacao.includes(nome)) {
                    entidadeEmFoco = { nome, estado };
                    break;
                }
            }
            if (!entidadeEmFoco && Object.keys(entityIndex).length > 0) {
                const [nome, estado] = Object.entries(entityIndex)[0];
                entidadeEmFoco = { nome, estado };
            }
        }

        function resolverMicroContexto(acao) {
            const lower = acao.toLowerCase();
            for (const [nome, estado] of Object.entries(entityIndex)) {
                if (lower.includes(nome)) return `[${nome}: ${estado}]`;
            }
            if (entidadeEmFoco) {
                const todosPronomes = [...PRONOMES_FEMININOS, ...PRONOMES_MASCULINOS, ...PRONOMES_NEUTROS];
                const temPronome = todosPronomes.some(p => lower.includes(p));
                if (temPronome) return `[${entidadeEmFoco.nome}: ${entidadeEmFoco.estado}]`;
            }
            return '';
        }

function resolverEstadoRelacionalNPC(entidade) {
    if (!entidade) return 'desconhecido';
    const estado = entidade.estado || '';

    if (/mort[ao]|cadГЎver|sem vida|desmaiou|inconsciente/.test(estado)) return 'morto';
    if (/hostil|agressiv|furios|raivos|ameaГ§|atacando/.test(estado))     return 'hostil';
    if (/aliado|amigo|confia|ajudando|parceiro/.test(estado))            return 'aliado';
    if (/apavorad|assustad|tremendo|submisos|rendid/.test(estado))       return 'submisso';
    return 'neutro';
}

// --- PARSER DE ESTADO DE ENTIDADES (roda apГіs CADA resposta do narrador) ---
function parsearEstadoEntidades(textoNarrador) {
    const match = textoNarrador.match(/\[NPCS:\s*([^\]]+)\]/i);
    if (!match) {
        console.warn('[ENTIDADES] Tag [NPCS:] nГЈo encontrada na resposta. Mantendo estado anterior.');
        return;
    }

    const payload = match[1].trim();
    if (payload.toLowerCase() === 'nenhum') {
        entityIndex = {};
        entidadeEmFoco = null;
        console.log('[ENTIDADES] Nenhum NPC em cena. Index zerado.');
        return;
    }

    const entradas = payload.split('|');
    const novoIndex = {};

    for (const entrada of entradas) {
        const [nome, estado] = entrada.split(':').map(s => s.trim().toLowerCase());
        if (nome && estado) novoIndex[nome] = estado;
    }

    // --- GUARDA: estado "morto" Г© irreversГӯvel ---
    // Se um NPC jГЎ estava morto no Гӯndice anterior, mantГ©m "morto" no novo Гӯndice.
    for (const [nome, estadoAntigo] of Object.entries(entityIndex)) {
        if (estadoAntigo === 'morto') {
            novoIndex[nome] = 'morto';
        }
    }

    entityIndex = novoIndex;

    const situacao = ssrJson?.situacao_atual?.toLowerCase() || '';
    let focoEncontrado = null;

    for (const [nome, estado] of Object.entries(entityIndex)) {
        if (situacao.includes(nome)) {
            focoEncontrado = { nome, estado };
            break;
        }
    }

    entidadeEmFoco = focoEncontrado
        ?? (Object.keys(entityIndex).length > 0
            ? { nome: Object.keys(entityIndex)[0], estado: Object.values(entityIndex)[0] }
            : null);

    console.log('[ENTIDADES] Index atualizado:', entityIndex, '| Foco:', entidadeEmFoco);
}

// --- RENDERIZADOR DE NAVEGAГҮГғO DO MAPA ---
function atualizarBotoesNavegacao() {
    const container = document.getElementById('map-controls');
    container.innerHTML = ''; // Limpa os botГөes antigos

    // Se o mapa nГЈo carregou ou a sala nГЈo existe, nГЈo faz nada
    if (!mapaMundo || !mapaMundo[secaoAtualId]) return;

    const salaAtual = mapaMundo[secaoAtualId];

    // Cria um botГЈo para cada opГ§ГЈo de saГӯda do JSON da Groq
    salaAtual.opcoes.forEach(opcao => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.innerText = `рҹ§ӯ ${opcao.texto}`;
        
        btn.onclick = () => {
            // 1. Oculta os botГөes para evitar duplo clique
            container.innerHTML = '';
            
            // 2. Atualiza a variГЎvel de estado para a nova sala
            secaoAtualId = opcao.destino.toString();
            
            // 3. Salva no Firebase instantaneamente
            salvarEstadoJogador();
            
            // 4. Envia o comando para o Qwen narrar a transiГ§ГЈo
            window.enviar(`[AГҮГғO DE SISTEMA]: O jogador realiza a aГ§ГЈo: "${opcao.texto}". Descreva o resultado dessa aГ§ГЈo, aplicando as regras de brutalidade e realismo.`);
        };
        
        container.appendChild(btn);
    });
}
        
      
        window.enviar = async function(mensagemUsuario = null) {
            const isInitial = mensagemUsuario === null;
            
            if (!isInitial) {
                turnosJogados++;
            }

            let pergunta;
            
            if (isInitial) {
    // Se jГЎ temos um mapa carregado (da Groq) e a sala 1 existe
    if (mapaMundo && mapaMundo["1"] && mapaMundo["1"].texto_logico) {
        // Em vez de usar o PROMPT_INTRO, constrГіi uma requisiГ§ГЈo para o Qwen descrever a sala 1
        pergunta = `[AГҮГғO DE SISTEMA]: InГӯcio do jogo. Descreva o local usando a base estrutural: "${mapaMundo["1"].texto_logico}". Aplique as regras de brutalidade e hiper-realismo. Sempre liste as opГ§Гөes de saГӯda.`;
    } else if (!resumoAtual) {
        // Fallback: se nГЈo hГЎ mapa, usa o prompt antigo
        pergunta = PROMPT_INTRO;
    } else {
        pergunta = 'O jogo foi recarregado. Com base no resumo da histГіria, narre rapidamente a cena atual (usando a regra padrГЈo de frases curtas) e pergunte o que eu faГ§o agora.';
    }
} else {
                pergunta = mensagemUsuario;
            }

            if (!isInitial) {
                adicionarMensagem(pergunta, 'user');
                userInput.value = '';
            }

            sendBtn.disabled = true;
            userInput.disabled = true;

            const tempId = adicionarMensagem('', 'ai', true);
const elementoDisplay = document.getElementById(tempId);

// Inicia a animaГ§ГЈo de palavras sombrias
let contadorAnim = 0;
let indicePalavra = Math.floor(Math.random() * PALAVRAS_SOMBRIAS.length);
let exibindoPensando = false;
let ciclosPensando = 0;
primeiroTokenRecebido = false;

intervaloAnimacao = setInterval(() => {
    if (!primeiroTokenRecebido) {
        // A cada ~1.2 segundos (8 ciclos de 150ms), alterna para "pensando..." por 3 ciclos
        if (contadorAnim % 8 === 0) {
            exibindoPensando = true;
            ciclosPensando = 0;
        }
        
        let textoExibido = '';
        if (exibindoPensando && ciclosPensando < 4) {
            // Exibe "pensando..." com reticГӘncias variГЎveis
            const pontos = '.'.repeat(ciclosPensando % 4);
            textoExibido = `pensando${pontos}`;
            ciclosPensando++;
            if (ciclosPensando >= 4) exibindoPensando = false;
        } else {
            // Exibe palavra sombria
            const palavra = PALAVRAS_SOMBRIAS[indicePalavra % PALAVRAS_SOMBRIAS.length];
            const pontos = '.'.repeat((Math.floor(contadorAnim / 2) % 4));
            textoExibido = `${palavra}${pontos}`;
            indicePalavra++;
        }
        
        elementoDisplay.innerText = textoExibido;
        
        // PulsaГ§ГЈo suave (opacidade entre 0.4 e 0.9)
        const opacidade = 0.4 + (Math.sin(Date.now() / 400) * 0.25);
        elementoDisplay.style.opacity = opacidade;
        elementoDisplay.style.letterSpacing = '2px';
        elementoDisplay.style.transition = 'opacity 0.1s ease';
        
        contadorAnim++;
    } else {
        clearInterval(intervaloAnimacao);
        elementoDisplay.style.opacity = '1';
        elementoDisplay.style.letterSpacing = 'normal';
        elementoDisplay.style.transition = '';
        intervaloAnimacao = null;
    }
}, 150);

            try {
                let mensagemFinal = pergunta;
                let payloadAPI = []; // 1. DECLARAГҮГғO NO TOPO (FIX DO ERRO)

                if (!isInitial) {
                    // --- CLASSIFICADOR DETERMINГҚSTICO v3.0 (com ГЎrbitro 1.5B opcional) ---
                    const classificacaoRaw = classificarAcao(pergunta);
                    let classificacao;

                    if (classificacaoRaw === null) {
                        const tempJuizId = adicionarMensagem('вҡ–пёҸ ГҒrbitro avaliando a aГ§ГЈo...', 'system', true);
                        classificacao = await classificarComArbitro(pergunta, entidadeEmFoco);
                        const msgJuiz = document.getElementById(tempJuizId);
                        if (msgJuiz) msgJuiz.remove();
                    } else {
                        classificacao = classificacaoRaw;
                    }

                    _ultimoTipoAcao = classificacao.tipo;
                    _ultimoAtributo = classificacao.atributo;
                    const { tipo, atributo } = classificacao;

                    let resultado = null;
                    let danoBase = 0;

                    if (tipo === 'ARRISCADA' && atributo !== 'NENHUM') {
                        await animarTextoTeste(`TESTE DE ${atributo}`);
                        await criarBotaoRolar();
                        const semente = Math.floor(Math.random() * 20) + 1;
                        const valorAtributo = jogadorStats[atributo] ?? 0;
                        resultado = semente <= valorAtributo ? 'SUCESSO' : 'FALHA';
                        
                        if (resultado === 'FALHA') {
                            danoBase = Math.max(1, Math.floor((semente - valorAtributo) / 2));
                        }

                        mostrarResultadoDado(semente, atributo, valorAtributo, resultado);
                        await new Promise(r => setTimeout(r, 600));

                        if (resultado === 'SUCESSO') {
                            danoBase = 0; // Trava de seguranГ§a mantida
                        }
                    }

                    // --- MANTEMOS A REGRA DOS MORTOS ---
                    const npcsMortos = Object.entries(entityIndex)
                        .filter(([_, estado]) => estado === 'morto')
                        .map(([nome]) => nome)
                        .join(', ');

                    const alertaMortos = npcsMortos
                        ? `\n[MORTOS NO CENГҒRIO: ${npcsMortos} вҖ” cadГЎveres NГғO reagem, NГғO respiram. SГЈo matГ©ria inerte.]`
                        : '';

                    let instrucaoResultado = "";
                    let danoFinal = 0;

                    if (tipo === 'TRIVIAL') {
                        instrucaoResultado = "Esta Г© uma aГ§ГЈo livre de risco. Narre o jogador executando a aГ§ГЈo sem falhas.";
                        danoFinal = 0;
                    } else if (resultado === 'SUCESSO') {
                        instrucaoResultado = `O jogador testou o atributo ${atributo} e obteve SUCESSO ABSOLUTO. ESTRUTURA OBRIGATГ“RIA DE SUCESSO: (1) O jogador inicia a aГ§ГЈo com intenГ§ГЈo clara. (2) Executa com precisГЈo e controle total. (3) Conclui com ГӘxito perceptГӯvel. A brutalidade do cenГЎrio Г© apenas pano de fundo visual вҖ” ela NГғO interfere no resultado. Zero tropeГ§os, zero dor, zero falha.`;
                        danoFinal = 0;
                    } else {
                        instrucaoResultado = `O jogador testou o atributo ${atributo} e FALHOU MISERAVELMENTE. A aГ§ГЈo deu totalmente errado. Narre uma consequГӘncia brutal, dolorosa ou humilhante que justifique a falha.`;
                        danoFinal = danoBase;
                    }

                    const salaAtual = mapaMundo && mapaMundo[secaoAtualId] ? mapaMundo[secaoAtualId] : null;
                    const descricaoSala = salaAtual ? salaAtual.texto_logico : 'CenГЎrio sombrio.';
                    
                    // Extrai as opГ§Гөes dos botГөes para forГ§ar o modelo a mencionГЎ-las no cenГЎrio
                    let elementosInterativos = "";
                    if (salaAtual && salaAtual.opcoes) {
                        const textosOpcoes = salaAtual.opcoes.map(opcao => opcao.texto).join(" | ");
                        elementosInterativos = `\n[PONTOS DE INTERESSE DO AMBIENTE]: VocГӘ DEVE mencionar a presenГ§a fГӯsica dos seguintes elementos na sua narraГ§ГЈo: ${textosOpcoes}. Integre-os organicamente na descriГ§ГЈo do cenГЎrio. NUNCA crie listas numeradas (1, 2, 3...).`;
                    }

                    const systemPrompt = {
                        role: 'system',
                        content: `VocГӘ Г© um mestre de RPG brutal e hiper-realista. Responda APENAS em PortuguГӘs Brasileiro CORRETO. NUNCA RESPONDA EM OUTRO IDIOMA.\n\nREGRAS INVIOLГҒVEIS:\n- Seja objetivo em suas narraГ§Гөes: MГЎximo de 3 frases por resposta. Evite advГ©rbios e adjetivos dramГЎticos.\n- FOCO: o jogador Г© o herГіi em um mundo opressivo.\n- QUANDO EXISTIR VIOLENCIA: Descreva a deformaГ§ГЈo da carne, o espasmo nervoso e o som Гәmido da brutalidade.\n- SE SEXUAL: Descreva como um ato animal e cru.\n- O JOGADOR Гү O PROTAGONISTA. Interprete as aГ§Гөes dele no contexto do cenГЎrio, narrando as consequГӘncias.\n\n[CENГҒRIO (AMBIENTE ATUAL)]\n${descricaoSala}${alertaMortos}`
                    };

                    let conteudoUser = "";
                    if (pergunta.startsWith("[AГҮГғO DE SISTEMA]")) {
                        conteudoUser = `[ORDEM PARA O NARRADOR]\n${pergunta}\nNarre a transiГ§ГЈo de ambiente e detalhe a atmosfera opressiva.\nObrigatГіrio terminar o texto com: [DANO: 0]`;
                    } else {
                        conteudoUser = `[AГҮГғO DO JOGADOR (PROTAGONISTA)]\nO que o personagem executa com maestria: "${pergunta}"  вҶҗ se SUCESSO\nO que o personagem tenta desesperadamente fazer: "${pergunta}"  вҶҗ se FALHA\n\n[ORDEM PARA O NARRADOR]\n- Foque EXCLUSIVAMENTE no jogador executando a aГ§ГЈo descrita acima.\n- ${instrucaoResultado}\n- ATENГҮГғO SEMГӮNTICA: Interprete palavras ambГӯguas como "mortal", "salto" ou "ataque" como as AГҮГ•ES FГҚSICAS do jogador, NUNCA como nomes de NPCs ou criaturas se aproximando. O cenГЎrio serve apenas de palco.\n- ObrigatГіrio terminar o texto com a tag: [DANO: ${danoFinal}]`;
                    }

                    const conversaRecente = historicoConversa.slice(-6); 
                    payloadAPI = [systemPrompt, ...conversaRecente, { role: 'user', content: conteudoUser }];

                } else {
                    // --- LГ“GICA DE INTRODUГҮГғO (FIX DE ALCANCE) ---
                    payloadAPI = [
                        { role: 'system', content: 'VocГӘ Г© um mestre de RPG brutal. Narre a introduГ§ГЈo com tom opressivo e pergunte o que o jogador faz.' },
                        { role: 'user', content: pergunta }
                    ];
                }


                    const isIntro = (isInitial && !resumoAtual);
                    const maxTokens       = isIntro ? 200 : 180;
                    const maxContinuacoes = isIntro ?    1 :   1;

                    if (isIntro) window._introGenerating = true;

                    const respostaIA = await gerarRespostaComContinuacao(payloadAPI, maxTokens, elementoDisplay, maxContinuacoes);
                console.log(`[PROMPT ENVIADO] ${mensagemFinal.substring(0, 500)}...`);


                const danoMatch = respostaIA.match(/\[DANO:\s*(\d+)\]/i);

                let respostaLimpa = respostaIA
    .replace(/\[TESTE:[^\]]+\]/g, '')
    .replace(/\[DANO:\s*\d+\]/gi, '')
    .replace(/\[NPCS:[^\]]+\]/gi, '')
    .trim();

                if (!isInitial && danoMatch && parseInt(danoMatch[1]) > 0) {
                    const div = document.createElement('div');
                    div.className = 'system-message';
                    div.innerHTML = `<em style="color:#e53935; font-weight:bold;">[FALHA NO TESTE: CONSEQUГҠNCIA APLICADA]</em>`;
                    chatBox.appendChild(div);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                elementoDisplay.innerText = respostaLimpa;

                if (danoMatch && parseInt(danoMatch[1]) > 0) {
                    const valorDano = parseInt(danoMatch[1]);
                    energia -= valorDano;
                    document.getElementById('energia-span').innerText = `рҹ©ё Energia: ${Math.max(0, energia)}/10`;
                    adicionarMensagem(`[O mundo cobra seu preГ§o. VocГӘ perdeu ${valorDano} de Energia.]`, 'system');

                    if (energia <= 0) {
                        adicionarMensagem("рҹ’Җ SEU CORPO CEDE. A ESCURIDГғO O CONSOME. FIM DA JORNADA.", 'system');
                        userInput.disabled = true;
                        sendBtn.disabled = true;
                        await salvarEstadoJogador();
                        return;
                    }
                }

                if (isIntro) window._introGenerating = false;

                // Salva a interaГ§ГЈo atual limpa na memГіria da conversa
                if (!isInitial) {
                    historicoConversa.push({ role: 'user', content: pergunta });
                }
                historicoConversa.push({ role: 'assistant', content: respostaLimpa });

                // GATILHO: IDLE-TIME PROCESSING
                setTimeout(() => {
                    salvarEstadoJogador().catch(e => console.error('Erro no salvamento background:', e));
                    
                    // ==========================================
                    // COMPRESSГғO DE MEMГ“RIA SUSPENSA
                    // O contexto da sala atual jГЎ ancora a narrativa.
                    // ==========================================
                    /* if (mensagens.length > LIMITE_MENSAGENS && !window._compressaoEmAndamento) {
                        window._compressaoEmAndamento = true;
                        setTimeout(() => {
                            comprimirMemoria().catch(e => {
                                console.error('Erro na compressГЈo background:', e);
                                window._compressaoEmAndamento = false;
                            });
                        }, 4000); 
                    }
                    */
                }, 0);

                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }


            atualizarBotoesNavegacao();
            } catch (error) {
                if (intervaloAnimacao) clearInterval(intervaloAnimacao);
                elementoDisplay.innerText = `вқҢ Erro: ${error.message}`;
                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                }
            } finally {
                if (!isInitial) {
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }
        };

            if (!mapaMundo) {
