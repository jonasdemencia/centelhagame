<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha - Motor Narrativo</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; }
        .narrator { color: #a13d3d; margin-bottom: 10px; }
        .player { color: #7a8c66; margin-bottom: 10px; }
        .system { color: #6b6b4a; margin-bottom: 10px; font-style: italic; font-size: 0.9em; }
        #progress-bar-container { width: 100%; background: #2a251e; height: 12px; margin-bottom: 10px; display: block; }
        #progress-bar { width: 0%; height: 100%; background: #5c2c2c; transition: width 0.3s; }
        input { width: 80%; padding: 10px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; outline: none; }
        button { padding: 10px; cursor: pointer; background: #3a3228; color: #fff; border: none; font-weight: bold; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        
        /* Adicionando um indicador visual de local no cabeçalho */
        #location-header { background: #2a251e; padding: 5px 10px; font-size: 0.8em; margin-bottom: 10px; border: 1px solid #3a3228; color: #d1c5b4; font-weight: bold; text-transform: uppercase;}
    </style>
</head>
<body>

<div id="game-container">
    <div id="status">Iniciando...</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="location-header">Local: Desconhecido</div>
    
    <div id="chat-box"></div>
    
    <div id="controls">
        <input type="text" id="player-input" placeholder="Sua ação..." autocomplete="off" disabled>
        <button id="btn-enviar" onclick="enviarAcao()" disabled>AGIR</button>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const MY_MODEL_ID = "Qwen2.5-7B-Instruct-q4f16_1-MLC";

    // O Segredo: Substituímos o array "elementos" por um Grafo de Nodos (mapa)
    const MUNDOS = [
        {
            nome: "Hospital Psiquiátrico Abandonado",
            resumo: "Você está no Hospital Colina Verde, fechado em 1995. Objetivo: achar provas no subsolo (4 horas restantes). Ameaças: estrutura colapsando, gás.",
            localizacaoInicial: "Recepção Principal",
            itens: ["gravador de voz", "chave mestra quebrada", "foto polaroid desbotada"],
            mapa: {
                "Recepção Principal": {
                    detalhes: "Térreo. Balcão apodrecido. Janelas bloqueadas com tábuas. Escadas levam para cima.",
                    conexoes: ["Capela (1º Andar)", "Corredor Norte"]
                },
                "Corredor Norte": {
                    detalhes: "Corredor escuro no térreo. Há uma porta pesada trancada para o subsolo.",
                    conexoes: ["Recepção Principal", "Arquivo Médico (Subsolo)"]
                },
                "Arquivo Médico (Subsolo)": {
                    detalhes: "Sala inundada. Cheiro forte de formaldeído. Armários cheios de fichas antigas de 1980 a 1995.",
                    conexoes: ["Corredor Norte"]
                },
                "Capela (1º Andar)": {
                    detalhes: "Bancos quebrados. Confessionário com sangue seco. Escrito na parede: 'ELE AINDA ESTÁ AQUI'.",
                    conexoes: ["Recepção Principal", "Ala de Isolamento (2º Andar)"]
                },
                "Ala de Isolamento (2º Andar)": {
                    detalhes: "Celas acolchoadas. Uma está aberta com o nome 'Dr. Carvalho' arranhado na porta.",
                    conexoes: ["Capela (1º Andar)", "Sala de Cirurgia (3º Andar)"]
                },
                "Sala de Cirurgia (3º Andar)": {
                    detalhes: "Mesa enferrujada com manchas escuras. Um diário médico está jogado no chão. Acesso à torre.",
                    conexoes: ["Ala de Isolamento (2º Andar)", "Torre (5º Andar)"]
                },
                "Torre (5º Andar)": {
                    detalhes: "Vento uivando pelas janelas quebradas. Vista da cidade com luzes vermelhas e azuis da polícia se aproximando.",
                    conexoes: ["Sala de Cirurgia (3º Andar)"]
                }
            }
        },
        {
            nome: "Bunker Nuclear Abandonado",
            resumo: "Bunker militar subterrâneo Sigma-9, selado desde 1986. Oxigênio para 3 horas. Precisa do código de descontaminação para escapar.",
            localizacaoInicial: "Câmara de Descontaminação (Nível 1)",
            itens: ["contador geiger", "máscara de gás rachada", "cartão de acesso vermelho"],
            mapa: {
                "Câmara de Descontaminação (Nível 1)": {
                    detalhes: "Alarmes silenciosos piscam vermelho. Há bloqueios selados, exceto por uma porta de aço pressurizada.",
                    conexoes: ["Corredor Principal (Nível 1)"]
                },
                "Corredor Principal (Nível 1)": {
                    detalhes: "Amplo corredor metálico. Placas indicam o Arsenal e as Escadas para níveis inferiores.",
                    conexoes: ["Câmara de Descontaminação (Nível 1)", "Arsenal (Nível 1)", "Poço da Escada Central"]
                },
                "Arsenal (Nível 1)": {
                    detalhes: "Porta blindada pesada. Cofres de armas e explosivos. Um terminal exige o código do reator.",
                    conexoes: ["Corredor Principal (Nível 1)"]
                },
                "Poço da Escada Central": {
                    detalhes: "Estrutura de metal rangendo no escuro. Permite trânsito entre os níveis principais.",
                    conexoes: ["Corredor Principal (Nível 1)", "Sala de Controle Central (Nível 2)", "Setor do Reator (Nível 3)"]
                },
                "Sala de Controle Central (Nível 2)": {
                    detalhes: "Terminais ainda ativos emitindo luz verde. O código de descontaminação pode estar nestes computadores.",
                    conexoes: ["Poço da Escada Central", "Laboratório Biológico (Nível 2)"]
                },
                "Laboratório Biológico (Nível 2)": {
                    detalhes: "Tanques de vidro quebrados. Espécimes preservados e anotações sinistras espalhadas no chão.",
                    conexoes: ["Sala de Controle Central (Nível 2)"]
                },
                "Setor do Reator (Nível 3)": {
                    detalhes: "Calor opressivo. O núcleo exposto vaza radiação (seu contador Geiger enlouquece aqui).",
                    conexoes: ["Poço da Escada Central", "Túnel de Evacuação (Nível 4)"]
                },
                "Túnel de Evacuação (Nível 4)": {
                    detalhes: "Parcialmente colapsado. Há escombros bloqueando a saída principal. Talvez explosivos resolvam.",
                    conexoes: ["Setor do Reator (Nível 3)"]
                }
            }
        }
    ];

    const MUNDO_ESCOLHIDO = MUNDOS[Math.floor(Math.random() * MUNDOS.length)];
    
    let engine;
    let chatHistory = [];
    let jogador = { habilidade: 10, carisma: 10, sorte: 10 };
    let locaisVisitados = [];
    let estadoJogo = {
        localizacao: "",
        itens: [],
        condicao: "saudável"
    };

    // Prompt ajustado para navegação rígida baseada em mapa
    const PROMPT_BASE = `Você é um narrador direto de RPG de sobrevivência em português brasileiro.

REGRAS RÍGIDAS:
1. MÁXIMO 2 frases curtas (15 palavras cada). Exceção: pedidos detalhados (máximo 3 frases, 40 palavras).
2. NAVEGAÇÃO ESPACIAL: O jogador SÓ PODE navegar para os locais listados em "SAÍDAS DISPONÍVEIS". Não invente salas, corredores ou portas que não estão listados.
3. Se o jogador pedir para ir para uma das "SAÍDAS DISPONÍVEIS" e for bem sucedido, narre a transição de forma breve e OBRIGATORIAMENTE adicione a seguinte tag exata no final da sua resposta: [IR: Nome da Saída]
4. Em ações exploratórias, use o texto em "CENÁRIO DO LOCAL ATUAL" para guiar sua resposta.
5. SEMPRE termine com ponto final.`;

    function atualizarCabecalhoLocal() {
        document.getElementById("location-header").innerText = `Local: ${estadoJogo.localizacao}`;
    }

    function ehAcaoExploratoria(texto) {
        return /entrar|seguir|continuar|andar|avançar|prosseguir|ir|caminhar|mover|descer|subir|voltar/.test(texto.toLowerCase());
    }

    function ehPedidoDetalhado(texto) {
        return /detalh|descrev|expliq|como é|o que (tem|há|existe)|me (diga|fale|conte)|olhar ao redor/.test(texto.toLowerCase());
    }

    function gerarEvento() {
        const tipo = Math.random();
        if (tipo < 0.4) return "DESCOBERTA";
        if (tipo < 0.7) return "PERIGO";
        return "ATMOSFERA";
    }

    function analisarAcao(texto) {
        const textoLower = texto.toLowerCase();
        if (/escalar|saltar|equilibrar|decifrar|hackear|forçar|arrombar|nadar|correr|lutar|pular|subir|descer|esquivar|rolar|atacar/.test(textoLower)) {
            return { tipo: 'habilidade' };
        }
        if (/convencer|persuadir|intimidar|seduzir|negociar|mentir|enganar|subornar|ameaçar/.test(textoLower)) {
            return { tipo: 'carisma' };
        }
        if (/vasculhar|procurar|explorar|investigar|buscar|examinar|revistar|ouvir|farejar|iluminar|ver/.test(textoLower)) {
            return { tipo: 'sorte' };
        }
        return null;
    }

    function rolarTeste(tipo) {
        const dado = Math.floor(Math.random() * 20) + 1;
        const atributo = jogador[tipo];
        const dificuldade = 18;
        const resultado = dado + atributo;
        return { sucesso: resultado >= dificuldade, dado: dado, total: resultado };
    }

    // Injeção de contexto altamente focada e econômica em RAM
    function gerarSystemPrompt() {
        const localAtual = MUNDO_ESCOLHIDO.mapa[estadoJogo.localizacao];
        const visitados = locaisVisitados.length > 1 ? `\nJÁ VISITOU: ${locaisVisitados.join(", ")}` : "";
        
        const estado = `MUNDO: ${MUNDO_ESCOLHIDO.resumo}${visitados}

LOCAL ATUAL: ${estadoJogo.localizacao}
CENÁRIO DO LOCAL ATUAL: ${localAtual.detalhes}
SAÍDAS DISPONÍVEIS: ${localAtual.conexoes.join(" | ")}

ESTADO DO JOGADOR:
- Inventário: ${estadoJogo.itens.join(", ") || "vazio"}
- Condição: ${estadoJogo.condicao}`;
        
        return `${PROMPT_BASE}\n\n${estado}`;
    }

    async function iniciarMundo() {
        addMsg("Preparando o motor narrativo...", "system");
        
        try {
            estadoJogo.localizacao = MUNDO_ESCOLHIDO.localizacaoInicial;
            estadoJogo.itens = [...MUNDO_ESCOLHIDO.itens];
            locaisVisitados.push(MUNDO_ESCOLHIDO.localizacaoInicial);
            atualizarCabecalhoLocal();
            
            const promptAbertura = `Você está em: ${estadoJogo.localizacao}. Cenário: ${MUNDO_ESCOLHIDO.mapa[estadoJogo.localizacao].detalhes}\nEscreva a abertura despertando neste local. 2 frases curtas, tom sombrio.`;
            
            const resultIntro = await engine.chat.completions.create({
                messages: [
                    { role: "system", content: "Você é o narrador do jogo." },
                    { role: "user", content: promptAbertura }
                ],
                temperature: 0.6,
                max_tokens: 45
            });

            let intro = resultIntro.choices[0].message.content.trim();
            addMsg(intro, "narrator");
            chatHistory.push({ role: "assistant", content: intro });

            console.log("=== MUNDO: " + MUNDO_ESCOLHIDO.nome + " ===");

        } catch (e) {
            addMsg("Falha ao carregar o mundo.", "system");
            console.error(e);
        }
    }

    async function init() {
        const status = document.getElementById("status");
        const pb = document.getElementById("progress-bar");

        try {
            status.innerText = "Carregando IA Local...";
            
            engine = await CreateMLCEngine(MY_MODEL_ID, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    pb.style.width = `${report.progress * 100}%`;
                }
            });

            document.getElementById("progress-bar-container").style.display = "none";
            status.innerText = MUNDO_ESCOLHIDO.nome;

            await iniciarMundo();

            document.getElementById("player-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus();

        } catch (err) {
            status.innerText = "ERRO CRÍTICO: " + err.message;
            console.error(err);
        }
    }

    window.enviarAcao = async () => {
        const input = document.getElementById("player-input");
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, "player");
        
        document.getElementById("btn-enviar").disabled = true;
        const tempId = addMsg("...", "narrator");

        const ehExploracao = ehAcaoExploratoria(text);
        const ehDetalhado = ehPedidoDetalhado(text);
        const teste = analisarAcao(text);
        let acaoCompleta = text;

        if (ehExploracao) acaoCompleta += `\n[SISTEMA: Avalie se o jogador quer ir para as SAÍDAS DISPONÍVEIS.]`;
        if (ehDetalhado) acaoCompleta += `\n[SISTEMA: O jogador quer detalhes. Descreva os arredores e mencione visualmente as SAÍDAS DISPONÍVEIS (3 frases, 40 palavras).]`;

        if (teste) {
            const resultado = rolarTeste(teste.tipo);
            acaoCompleta += resultado.sucesso 
                ? `\n[${teste.tipo.toUpperCase()}: SUCESSO]`
                : `\n[${teste.tipo.toUpperCase()}: FALHA]`;
        }

        chatHistory.push({ role: "user", content: acaoCompleta });
        input.value = "";

        try {
            const messages = [
                { role: "system", content: gerarSystemPrompt() },
                ...chatHistory.slice(-10) // Mantendo contexto curto para poupar RAM
            ];

            const result = await engine.chat.completions.create({ 
                messages: messages,
                temperature: ehExploracao ? 0.3 : 0.45, // Mais baixo em exploração para forçar obediência ao mapa
                max_tokens: ehDetalhado ? 65 : 45,
                top_p: 0.82,
                frequency_penalty: 0.2,
                presence_penalty: 0.2
            });

            let answer = result.choices[0].message.content.trim();

            // Interceptador de Mapa: Procura pela tag que criamos nas regras
            const regexMudanca = /\[IR:\s*(.+?)\]/i;
            const matchTag = answer.match(regexMudanca);

            if (matchTag) {
                let novoLocalTentativa = matchTag[1].trim();
                // Limpeza básica caso o modelo adicione ponto final dentro do colchete
                novoLocalTentativa = novoLocalTentativa.replace(/[.!?\]]+$/, '').trim();

                // Verifica se o local exigido realmente existe nas conexões possíveis
                const localAtualMap = MUNDO_ESCOLHIDO.mapa[estadoJogo.localizacao];
                if (localAtualMap.conexoes.includes(novoLocalTentativa) || MUNDO_ESCOLHIDO.mapa[novoLocalTentativa]) {
                    estadoJogo.localizacao = novoLocalTentativa;
                    if (!locaisVisitados.includes(novoLocalTentativa)) locaisVisitados.push(novoLocalTentativa);
                    atualizarCabecalhoLocal();
                }
                
                // Remove a tag do texto final que o jogador vai ler
                answer = answer.replace(regexMudanca, '').trim();
            }

            document.getElementById(tempId).innerText = answer;
            chatHistory.push({ role: "assistant", content: answer });

            if (chatHistory.length > 16) {
                chatHistory = chatHistory.slice(-16);
            }

        } catch (e) {
            document.getElementById(tempId).innerText = "[SISTEMA: O mundo vacilou. Tente novamente.]";
            console.error("Erro no motor:", e);
            chatHistory.pop();
        } finally {
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus(); 
        }
    };

    function addMsg(txt, cls) {
        const box = document.getElementById("chat-box");
        const div = document.createElement('div');
        div.className = cls;
        div.id = "msg-" + Date.now() + "-" + Math.floor(Math.random() * 1000);
        div.innerText = (cls === 'player' ? "> " : "") + txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div.id;
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('player-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('btn-enviar').disabled) {
                enviarAcao();
            }
        });
    });

    init();
</script>

</body>
</html>
