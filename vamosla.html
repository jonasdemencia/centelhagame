<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha - Motor Narrativo</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #local-atual { color: #ffaa00; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #3a3228; padding-bottom: 4px; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; }
        .narrator { color: #a13d3d; margin-bottom: 10px; }
        .player { color: #7a8c66; margin-bottom: 10px; }
        .system { color: #6b6b4a; margin-bottom: 10px; font-style: italic; font-size: 0.9em; }
        #progress-bar-container { width: 100%; background: #2a251e; height: 12px; margin-bottom: 10px; display: block; }
        #progress-bar { width: 0%; height: 100%; background: #5c2c2c; transition: width 0.3s; }
        input { width: 80%; padding: 10px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; }
        button { padding: 10px; cursor: pointer; background: #3a3228; color: #fff; border: none; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status">Iniciando...</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="local-atual">
        📍 Local: <span id="local-span">Carregando...</span>
    </div>
    
    <div id="chat-box"></div>
    
    <div id="controls">
        <input type="text" id="player-input" placeholder="Sua ação..." disabled>
        <button id="btn-enviar" onclick="enviarAcao()" disabled>AGIR</button>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    // ------------------------------------------------------------
    // Configurações e constantes
    // ------------------------------------------------------------
    const MY_MODEL_ID = "Qwen2.5-7B-Instruct-q4f16_1-MLC";
    
    // ------------------------------------------------------------
    // Estado global do jogo
    // ------------------------------------------------------------
    let engine;                         // instância do modelo
    let salaAtual = null;               // objeto da sala corrente
    let inventario = [];                 // itens do jogador
    let chatHistory = [];                // histórico da conversa (para contexto)

    // ------------------------------------------------------------
    // Classe Sala (estrutura de dados)
    // ------------------------------------------------------------
    class Sala {
        constructor(id, nome, descricao = "") {
            this.id = id;                 // usaremos o nome como ID (devem ser únicos)
            this.nome = nome;
            this.descricao = descricao;    // descrição base da sala
            this.itens = [];               // itens presentes na sala
            this.estado = {};               // flags personalizadas (ex: porta_trancada: true)
            this.saidas = [];                // { direcao, salaId, descricao } (opcional)
            this.ultimasAcoes = [];          // últimas 5 ações ocorridas aqui
            this.criadoEm = Date.now();
            this.modificadoEm = Date.now();
        }
    }

    // ------------------------------------------------------------
    // Funções de persistência (localStorage)
    // ------------------------------------------------------------
    function carregarSala(id) {
        const chave = `sala_${id}`;
        const data = localStorage.getItem(chave);
        if (data) {
            try {
                const obj = JSON.parse(data);
                const sala = new Sala(obj.id, obj.nome, obj.descricao);
                sala.itens = obj.itens || [];
                sala.estado = obj.estado || {};
                sala.saidas = obj.saidas || [];
                sala.ultimasAcoes = obj.ultimasAcoes || [];
                sala.criadoEm = obj.criadoEm || Date.now();
                sala.modificadoEm = obj.modificadoEm || Date.now();
                return sala;
            } catch (e) {
                console.error("Erro ao carregar sala", e);
                return null;
            }
        }
        return null;
    }

    function salvarSala(sala) {
        if (!sala || !sala.id) return;
        sala.modificadoEm = Date.now();
        const chave = `sala_${sala.id}`;
        localStorage.setItem(chave, JSON.stringify(sala));
    }

    function carregarInventario() {
        const data = localStorage.getItem('jogador_inventario');
        if (data) {
            try {
                inventario = JSON.parse(data);
            } catch (e) {
                inventario = [];
            }
        } else {
            inventario = [];
        }
    }

    function salvarInventario() {
        localStorage.setItem('jogador_inventario', JSON.stringify(inventario));
    }

    // ------------------------------------------------------------
    // Utilitários
    // ------------------------------------------------------------
    function atualizarDisplayLocal() {
        document.getElementById('local-span').innerText = salaAtual ? salaAtual.nome : 'Desconhecido';
    }

    function addMsg(txt, cls) {
        const box = document.getElementById("chat-box");
        const div = document.createElement('div');
        div.className = cls;
        div.id = "msg-" + Date.now() + "-" + Math.random();
        div.innerText = (cls === 'player' ? "> " : "") + txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div.id;
    }

    // Remove tags de atualização e saída do texto, e retorna objeto com modificações
    function processarResposta(resposta) {
        const updates = [];
        let saidaId = null;

        const updateRegex = /\[UPDATE:\s*(.*?)\]/g;
        let match;
        while ((match = updateRegex.exec(resposta)) !== null) {
            updates.push(match[1]);
        }
        let textoSemUpdates = resposta.replace(/\[UPDATE:\s*.*?\]/g, '');

        const sairRegex = /\[SAIR:\s*(.+?)\]/;
        const sairMatch = sairRegex.exec(textoSemUpdates);
        if (sairMatch) {
            saidaId = sairMatch[1].trim();
            textoSemUpdates = textoSemUpdates.replace(sairRegex, '');
        }

        textoSemUpdates = textoSemUpdates.trim();
        return { texto: textoSemUpdates, updates, saidaId };
    }

    // Aplica as atualizações na sala atual e no inventário
    function aplicarUpdates(updates) {
        for (let upd of updates) {
            upd = upd.trim();
            if (upd.startsWith('item:remover ')) {
                const item = upd.substring('item:remover '.length).trim();
                const index = salaAtual.itens.indexOf(item);
                if (index !== -1) {
                    salaAtual.itens.splice(index, 1);
                    inventario.push(item);
                    addMsg(`[Sistema: você pegou ${item}]`, 'system');
                }
            }
            else if (upd.startsWith('item:adicionar ')) {
                const item = upd.substring('item:adicionar '.length).trim();
                if (!salaAtual.itens.includes(item)) {
                    salaAtual.itens.push(item);
                }
            }
            else if (upd.startsWith('estado:')) {
                const parte = upd.substring('estado:'.length);
                const igualIndex = parte.indexOf('=');
                if (igualIndex !== -1) {
                    const chave = parte.substring(0, igualIndex).trim();
                    let valor = parte.substring(igualIndex + 1).trim();
                    if (valor === 'true') valor = true;
                    else if (valor === 'false') valor = false;
                    else if (!isNaN(valor) && valor !== '') valor = Number(valor);
                    salaAtual.estado[chave] = valor;
                }
            }
        }
        salvarSala(salaAtual);
        salvarInventario();
    }

    // Adiciona uma ação ao histórico da sala (limitado a 5)
    function adicionarAcaoHistorico(acao) {
        salaAtual.ultimasAcoes.push(acao);
        if (salaAtual.ultimasAcoes.length > 5) {
            salaAtual.ultimasAcoes.shift();
        }
        salvarSala(salaAtual);
    }

    // ------------------------------------------------------------
    // Interação com o modelo (LLM)
    // ------------------------------------------------------------
    async function gerarResposta(messages, maxTokens = 80, temperatura = 0.6) {
        try {
            const result = await engine.chat.completions.create({
                messages: messages,
                temperature: temperatura,
                max_tokens: maxTokens,
                top_p: 0.82,
                frequency_penalty: 0.25,
                presence_penalty: 0.2,
                stop: ["\n\n", "Jogador:", ">", "\n>"]
            });
            return result.choices[0].message.content.trim();
        } catch (e) {
            console.error("Erro no modelo:", e);
            return "[Sistema: O mundo vacilou. Tente novamente.]";
        }
    }

    // Monta o prompt de sistema para a sala atual
    function montarPromptSistema() {
        let historicoAcoes = salaAtual.ultimasAcoes.length > 0 
            ? "Últimas ações nesta sala:\n" + salaAtual.ultimasAcoes.map(a => "- " + a).join('\n')
            : "Nada de relevante aconteceu ainda nesta sala.";

        let saidasStr = salaAtual.saidas.length > 0
            ? "Saídas conhecidas: " + salaAtual.saidas.map(s => `${s.direcao} (para ${s.salaId})`).join(', ')
            : "Não há saídas conhecidas.";

        return `Você é um narrador de RPG de sobrevivência em português brasileiro. Você descreve apenas a sala atual e reage às ações do jogador.

SALA ATUAL:
Nome: ${salaAtual.nome}
Descrição: ${salaAtual.descricao}
Itens visíveis: ${salaAtual.itens.join(', ') || 'nenhum'}
Estado particular: ${Object.entries(salaAtual.estado).map(([k,v]) => `${k}=${v}`).join(', ') || 'normal'}
${saidasStr}

${historicoAcoes}

INVENTÁRIO DO JOGADOR: ${inventario.join(', ') || 'vazio'}

REGRAS:
- Responda em português brasileiro, com no máximo 2 frases curtas, a menos que o jogador peça detalhes (aí pode usar até 3 frases).
- Sempre que a ação do jogador modificar o estado da sala (pegar item, abrir porta, etc.), você DEVE incluir uma tag [UPDATE: ...] no final da resposta com a modificação. Use os formatos:
  • [UPDATE: item:remover nome_do_item] para item que sai da sala e vai para o inventário.
  • [UPDATE: item:adicionar nome_do_item] para item que aparece na sala.
  • [UPDATE: estado:nome_do_estado=valor] para alterar uma flag (ex: estado:porta_trancada=false).
- Se a ação resultar em mudança para outra sala, você DEVE incluir a tag [SAIR: id_da_sala] no final da resposta (após qualquer UPDATE). O id deve ser um nome único e descritivo para a nova sala (ex: "Sala de Cirurgia").
- A narrativa deve vir antes das tags.
- Mantenha o tom sombrio e imersivo.`;
    }

    // Função para descrever a sala atual (chamada ao entrar em uma sala nova)
    async function descreverSalaAtual() {
        const messages = [
            { role: "system", content: montarPromptSistema() },
            { role: "user", content: "Descreva esta sala para mim." }
        ];
        const resposta = await gerarResposta(messages, 80, 0.7);
        if (resposta && !resposta.startsWith("[Sistema")) {
            salaAtual.descricao = resposta;
            salvarSala(salaAtual);
            addMsg(resposta, "narrator");
        } else {
            addMsg("A sala parece indistinta...", "narrator");
        }
    }

    // ------------------------------------------------------------
    // Transição para uma nova sala
    // ------------------------------------------------------------
    async function irParaSala(novaSalaId) {
        if (salaAtual) salvarSala(salaAtual);

        let novaSala = carregarSala(novaSalaId);
        if (!novaSala) {
            novaSala = new Sala(novaSalaId, novaSalaId, "");
            addMsg(`Você entra em um novo local: ${novaSalaId}...`, "system");
        } else {
            addMsg(`Você retorna a ${novaSala.nome}.`, "system");
        }

        salaAtual = novaSala;
        atualizarDisplayLocal();

        if (!salaAtual.descricao || salaAtual.descricao === "") {
            await descreverSalaAtual();
        } else {
            addMsg(salaAtual.descricao, "narrator");
        }
    }

    // ------------------------------------------------------------
    // Inicialização do mundo (agora livre)
    // ------------------------------------------------------------
    async function iniciarMundoLivre() {
        addMsg("O narrador começa a tecer o mundo...", "system");

        // Prompt para o modelo criar o cenário inicial
        const promptCriacao = `Crie um cenário de RPG de sobrevivência realista e desafiador em português brasileiro. 
O jogador acorda em um local desconhecido, com um objetivo claro e perigos iminentes. 
Forneça:
- Nome do local inicial (ex: "Porão úmido", "Cabana abandonada")
- Uma descrição curta do local (2 frases)
- Contexto: por que o jogador está aqui? O que ele precisa fazer? (máx 3 frases)
- Itens que ele tem no início (lista curta, se houver)
- Uma ou duas saídas iniciais (com direções e para onde levam, brevemente)

Use o formato:
NOME: ...
DESCRIÇÃO: ...
CONTEXTO: ...
ITENS: ...
SAÍDAS: ...`;

        const respostaCriacao = await gerarResposta([
            { role: "system", content: "Você é um gerador de cenários de RPG. Responda apenas com as informações solicitadas, sem comentários adicionais." },
            { role: "user", content: promptCriacao }
        ], 200, 0.8);

        // Parse simples da resposta
        const nomeMatch = respostaCriacao.match(/NOME:\s*(.+)/i);
        const descMatch = respostaCriacao.match(/DESCRIÇÃO:\s*(.+)/i);
        const contextoMatch = respostaCriacao.match(/CONTEXTO:\s*(.+)/i);
        const itensMatch = respostaCriacao.match(/ITENS:\s*(.+)/i);
        const saidasMatch = respostaCriacao.match(/SAÍDAS:\s*(.+)/i);

        const nomeSala = nomeMatch ? nomeMatch[1].trim() : "Local Desconhecido";
        const descricao = descMatch ? descMatch[1].trim() : "Um lugar estranho.";
        const contexto = contextoMatch ? contextoMatch[1].trim() : "Você não lembra como chegou aqui.";
        const itensIniciais = itensMatch ? itensMatch[1].split(',').map(i => i.trim()) : [];
        const saidasTexto = saidasMatch ? saidasMatch[1].trim() : "";

        // Exibe o contexto como narrativa inicial
        addMsg(contexto, "narrator");

        // Cria a sala inicial
        let salaInicial = carregarSala(nomeSala);
        if (!salaInicial) {
            salaInicial = new Sala(nomeSala, nomeSala, descricao);
            salaInicial.itens = itensIniciais;
            // Parse simples de saídas: espera-se algo como "norte: Sala Escura, leste: Corredor"
            if (saidasTexto) {
                const partes = saidasTexto.split(',').map(s => s.trim());
                for (let parte of partes) {
                    const matchDir = parte.match(/(\w+)\s*:\s*(.+)/);
                    if (matchDir) {
                        salaInicial.saidas.push({
                            direcao: matchDir[1].toLowerCase(),
                            salaId: matchDir[2].trim(),
                            descricao: `Uma passagem para ${matchDir[2].trim()}`
                        });
                    }
                }
            }
            salvarSala(salaInicial);
        }

        salaAtual = salaInicial;
        atualizarDisplayLocal();

        // Define inventário inicial (se não houver nada salvo)
        carregarInventario();
        if (inventario.length === 0 && itensIniciais.length > 0) {
            inventario = [...itensIniciais];
            salvarInventario();
        }

        // Exibe a descrição da sala
        addMsg(salaAtual.descricao, "narrator");
    }

    // ------------------------------------------------------------
    // Loop principal: enviar ação do jogador
    // ------------------------------------------------------------
    window.enviarAcao = async () => {
        const input = document.getElementById("player-input");
        const textoAcao = input.value.trim();
        if (!textoAcao) return;

        addMsg(textoAcao, "player");
        input.value = "";
        document.getElementById("btn-enviar").disabled = true;

        adicionarAcaoHistorico(textoAcao);

        const messages = [
            { role: "system", content: montarPromptSistema() },
            ...chatHistory.slice(-6),
            { role: "user", content: textoAcao }
        ];

        const resposta = await gerarResposta(messages, 120, 0.6);
        
        const { texto, updates, saidaId } = processarResposta(resposta);

        if (texto) {
            addMsg(texto, "narrator");
            chatHistory.push({ role: "assistant", content: texto });
            if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
        }

        if (updates.length > 0) {
            aplicarUpdates(updates);
        }

        if (saidaId) {
            await irParaSala(saidaId);
        }

        document.getElementById("btn-enviar").disabled = false;
        document.getElementById("player-input").focus();
    };

    // ------------------------------------------------------------
    // Inicialização do motor e do jogo
    // ------------------------------------------------------------
    async function init() {
        const status = document.getElementById("status");
        const pb = document.getElementById("progress-bar");

        try {
            status.innerText = "Despertando o Narrador...";
            
            engine = await CreateMLCEngine(MY_MODEL_ID, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    pb.style.width = `${report.progress * 100}%`;
                }
            });

            document.getElementById("progress-bar-container").style.display = "none";
            status.innerText = "Criando o mundo...";

            // Inicia o mundo livre (sem predefinições)
            await iniciarMundoLivre();

            status.innerText = "O Pesadelo Começou.";
            document.getElementById("player-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus();

        } catch (err) {
            status.innerText = "ERRO CRÍTICO: " + err.message;
            console.error(err);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('player-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('btn-enviar').disabled) {
                enviarAcao();
            }
        });
    });

    init();
</script>

</body>
</html>
