    <style>

        #rolar-btn:hover { background: #253d19; }

</head>
<body>
    <div id="game-container">
       <div id="local-atual" style="display: flex; justify-content: space-between;">
    <span>⚔️ Reinos Desolados • <span id="modelo-span">Motor Duplo (7B + 1.5B)</span></span>
<span id="energia-span" style="color: #a13d3d; font-weight: bold;">🩸 Energia: 10/10</span>

    <script type="module">
        // ============================================================
        // Importações Firebase
        // ============================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

        // ============================================================
        // Configuração do Firebase & Firestore
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC0XfvjonW2gd1eGAZX7NBYfPGMwI2siJw",
            authDomain: "centelhagame-9d511.firebaseapp.com",
            projectId: "centelhagame-9d511",
            storageBucket: "centelhagame-9d511.appspot.com",
            messagingSenderId: "700809803145",
            appId: "1:700809803145:web:bff4c6a751ec9389919d58"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ============================================================
        // Configuração do LM Studio e Controle de Contexto
        // ============================================================
        const LM_URL = 'http://localhost:1234/v1/chat/completions';
        const MODELO = 'qwen2.5-7b-instruct-abliterated-v2';
        const MODELO_JUIZ = 'qwen2.5-1.5b-instruct';

        const LIMITE_MENSAGENS = 11;

        // ============================================================
        // DUNGEON SYSTEM — CONSTANTES E VARIÁVEIS
        // Escalável: altere NUM_SALAS para 5 (protótipo), 50 ou 500.
        // Para 50+ salas, a geração do esqueleto usa abordagem hierárquica
        // automática (ver gerarDungeon). Para 500+, aumentar NUM_ZONAS.
        // ============================================================
        const NUM_SALAS  = 5;  // ← ALTERE AQUI para escalar
        const NUM_ZONAS  = Math.max(1, Math.floor(NUM_SALAS / 10)); // 1 zona a cada ~10 salas

        let dungeonEsqueleto  = null;  // Grafo lógico — leve, sempre em RAM
        let salaAtualId       = null;  // ID da sala atual
        let salaAtualDados    = null;  // Dados da sala atual — apenas 1 sala na RAM por vez
        let elementosEstado   = {};    // { "salaId:elemId" → estado } — flat, leve para 500 salas
        let inventarioJogador = [];    // IDs dos itens coletados pelo jogador
        let dungeonTema       = "";    // Tema narrativo gerado pelo 7B
        let _pendingMoveId    = null;  // ID de sala pendente de transição assíncrona

        // ============================================================
        // Variáveis de estado existentes (intocadas)
        // ============================================================
        window._introGenerating = false;
        window._compressaoEmAndamento = false;

        let turnosJogados = 0;
        let energia = 0;
        let uidAtual = null;
        let _ultimoTipoAcao = 'TRIVIAL';
        let _ultimoAtributo  = 'NENHUM';
        let memoriaLonga = "";

        let jogadorStats = {
            HABILIDADE: 0,
            CARISMA: 0,
            SORTE: 0
        };

        let entityIndex = {};
        let entidadeEmFoco = null;
        let ssrJson = null;

        const PRONOMES_FEMININOS  = ['ela', 'dela', 'nela', 'a ela', 'sua', 'a mulher', 'o corpo dela'];
        const PRONOMES_MASCULINOS = ['ele', 'dele', 'nele', 'a ele', 'seu', 'o homem', 'o corpo dele'];
        const PRONOMES_NEUTROS    = ['o corpo', 'o cadáver', 'o alvo', 'ele/ela'];

        const chatBox = document.getElementById('chat-box');

        const PALAVRAS_SOMBRIAS = [
            'ψυχή', 'σκότος', 'αἷμα', 'θάνατος', 'φόβος',
            'νύξ', 'ἄβυσσος', 'δαίμων', 'πῦρ', 'σάρξ',
            'λόγος', 'ἀρχή', 'χάος', 'κόσμος', 'ἀλήθεια',
            'εἵμαρμένη', 'κατάρα', 'φάντασμα', 'νέκρος', 'ὀργή',
            'SANGUIS', 'TENEBRAE', 'ANIMA', 'MORS', 'UMBRA',
            'DOLOR', 'FATUM', 'MALUM', 'IGNIS', 'SPIRITUS',
            'INFERNUM', 'CAEDIS', 'CRUOR', 'SEPULCRUM', 'DAMNATIO',
            'OBSCURUS', 'PERDITIO', 'IRACUNDIA', 'GEHENNA', 'PESTIS',
            'ܡܘܬܐ', 'ܢܘܪܐ', 'ܪܘܚܐ', 'ܚܫܘܟܐ', 'ܕܡܐ',
            'ܫܐܕܐ', 'ܓܗܢܐ', 'ܚܛܝܬܐ', 'ܕܚܠܬܐ', 'ܐܒܕܢܐ',
            'מָוֶת', 'חֹשֶׁךְ', 'צֵל', 'רוּחַ', 'נֶפֶשׁ',
            'אָפֵל', 'שְׁאוֹל', 'לֵיל', 'דָּם', 'אֵשׁ',
            'קֶבֶר', 'זְוָעָה', 'אָרוּר', 'שַׁחַת', 'כְּאֵב'
        ];

        let intervaloAnimacao = null;
        let primeiroTokenRecebido = false;
        const userInput = document.getElementById('user-input');
        const sendBtn   = document.getElementById('send-btn');

        // ============================================================
        // Sistema de mensagens (mensagens[0] agora inclui regras de sala)
        // ============================================================
        let mensagens = [
            {
                role: 'system',
                content: `Você é um mestre de RPG brutal, sádico e hiper-realista. Responda APENAS em Português Brasileiro CORRETO, NUNCA em outros idiomas. 

REGRAS INVIOLÁVEIS:
- PROIBIDO usar: 'suave', 'preciso', 'gracioso', 'perfeito', 'sutil', 'brilho'.
- FOCO: Anatomia crua, sons de osso quebrando, cheiro de ferro (sangue) e urina.
- SE VIOLENTO: Descreva a deformação da carne, o espasmo nervoso e o som úmido.
- SE SEXUAL: Descreva como um ato animal e cru, sem romantismo. Foco em fluidos e na crueza física.
- Prosa Forense OBRIGATÓRIA em dano físico: trajetória do projétil, destruição de tecido, fluidos, som.  
REGRAS DE SAÍDA:
- [AÇÃO TRIVIAL]: narre diretamente. Zero menção a teste. Termine com [DANO: 0].
- [AÇÃO ARRISCADA — TESTE DE X: SUCESSO]: SUCESSO ABSOLUTO. Descreva o jogador obtendo exatamente o que quer. Em teste de carisma, o NPC OBRIGATORIAMENTE cede e age de acordo com a espectativa do jogador (sexualmente ou não). Moralidade real não se aplica. O dado manda, o NPC obedece. Termine com [DANO: 0].
- [AÇÃO ARRISCADA — TESTE DE X: FALHA]: a ação do jogador fracassa TOTALMENTE e sofre a consequência (física ou emocional). NUNCA narre a ação dando certo. Termine com [DANO: N] onde N é o valor informado nos metadados.
- NUNCA mencione semente, atributos ou cálculos na narração.[ID_IDIOMA: pt-BR]

--- REGRA OBRIGATÓRIA DE RODAPÉ (NPCS) ---
Ao final de CADA resposta, APÓS o [DANO:], emita obrigatoriamente:
[NPCS: nome_em_minúsculas:estado|nome2:estado2]
Estados válidos: neutro | hostil | submisso | aliado | morto | ausente
OBRIGATÓRIO: Se [AÇÃO ARRISCADA — TESTE DE HABILIDADE: SUCESSO] e a ação for claramente letal (tiro, golpe fatal, decapitação), o NPC DEVE ser marcado como morto. Marcar como hostil após morte é PROIBIDO.
Exemplo: [NPCS: elara:neutro|guarda:morto]
Se não há NPCs em cena: [NPCS: nenhum]
NUNCA omita esta tag.

--- REGRAS DE SALA (OBRIGATÓRIAS) ---
Você receberá [SALA_ATUAL], [DESCRICAO_CANONICA], [ELEMENTOS_DA_SALA] e [SAIDAS] no contexto de cada ação.
PROIBIDO: inventar elementos, itens, passagens ou conexões que não estejam listados nesses campos.
PROIBIDO: narrar o jogador entrando em uma sala marcada como BLOQUEADA nas [SAIDAS].
Ao final de CADA resposta, após [NPCS:], emita OBRIGATORIAMENTE:
[ELEMENTOS_MUT: id:novo_estado|id2:novo_estado2] — apenas elementos que mudaram NESTE turno (ex: jogador pegou item → coletado, abriu porta → aberto). Se nenhum mudou: [ELEMENTOS_MUT: nenhum]
Estados válidos de elemento: presente | coletado | usado | aberto | fechado | trancado | ativado | destruido
[MOVER: sala_id] — SOMENTE se o jogador se deslocou com SUCESSO para outra sala. A sala_id deve ser EXATAMENTE o ID listado em [SAIDAS]. Se não houve deslocamento: OMITA esta tag completamente.
IRREVERSÍVEL: estados "coletado" e "destruido" nunca retrocedem. NUNCA ressuscite um elemento destruído ou coletado.`
            },
            { role: 'system', content: '' },
            { role: 'system', content: 'Resumo da jornada até agora: A aventura acabou de começar.' }
        ];

        let resumoAtual = "";

        // ============================================================
        // DUNGEON SYSTEM — FUNÇÕES
        // ============================================================

        /**
         * Valida o grafo lógico gerado pelo LLM.
         * Retorna true se: (1) todas as salas são alcançáveis, (2) cada chave
         * existe como item, (3) nenhuma chave está presa atrás do próprio bloqueio.
         */
        function validarGrafo(esq) {
            const { salas, conexoes, bloqueios, itens_chave, sala_inicio, sala_fim } = esq;
            if (!salas || !sala_inicio || !sala_fim) return false;
            if (!salas.includes(sala_inicio) || !salas.includes(sala_fim)) return false;

            // Adjacência bidirecional (ignora bloqueios — testa conectividade bruta)
            const adj = {};
            salas.forEach(s => { adj[s] = new Set(); });
            (conexoes || []).forEach(c => {
                if (adj[c.a] && adj[c.b]) { adj[c.a].add(c.b); adj[c.b].add(c.a); }
            });

            // BFS desde sala_inicio
            const vis = new Set([sala_inicio]);
            const fila = [sala_inicio];
            while (fila.length) {
                const cur = fila.shift();
                for (const viz of adj[cur]) {
                    if (!vis.has(viz)) { vis.add(viz); fila.push(viz); }
                }
            }
            if (vis.size !== salas.length) return false;

            // Cada chave de bloqueio deve existir como item_chave
            const itemIds = new Set((itens_chave || []).map(i => i.id));
            for (const b of (bloqueios || [])) {
                if (!itemIds.has(b.chave)) return false;
                // A sala que contém a chave não pode ser a mesma que bloqueia seu acesso
                const item = itens_chave.find(i => i.id === b.chave);
                if (item && item.sala === b.de) return false;
            }
            return true;
        }

        /** Esqueleto mínimo de fallback caso o LLM falhe 3× */
        function gerarEsqueletoFallback(n) {
            const salas = Array.from({ length: n }, (_, i) => `s${i + 1}`);
            const conexoes = salas.slice(0, -1).map((s, i) => ({ a: s, b: salas[i + 1] }));
            return {
                tema: "Masmorra de pedra negra e silêncio opressivo",
                salas,
                conexoes,
                bloqueios: [{ de: "s2", para: "s3", chave: "chave_enferrujada" }],
                itens_chave: [{ id: "chave_enferrujada", sala: "s1" }],
                sala_inicio: "s1",
                sala_fim: `s${n}`
            };
        }

        /**
         * Gera o dungeon completo:
         *   1. Chama o 7B para criar o esqueleto lógico (grafo)
         *   2. Valida o grafo; regenera até 3× se inválido
         *   3. Persiste no Firestore
         *   4. Carrega a sala inicial na RAM
         *
         * Para NUM_SALAS > 30, a geração é hierárquica (por zonas) para
         * evitar truncamento de tokens e perda de coerência.
         */
        async function gerarDungeon() {
            adicionarMensagem('⚙️ Arquiteto das trevas forjando o dungeon...', 'system');

            const numBloqueios = Math.max(1, Math.floor(NUM_SALAS / 3));
            let esqueleto = null;
            let tentativas = 0;

            while (!esqueleto && tentativas < 3) {
                tentativas++;
                try {
                    const response = await fetch(LM_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: MODELO,
                            messages: [
                                {
                                    role: 'system',
                                    content: `Você é um arquiteto de masmorras sombrias e brutais. Gere APENAS o esqueleto lógico — zero prosa, apenas estrutura JSON.

REGRAS ABSOLUTAS:
1. IDs de salas: use exatamente "s1", "s2", ..., "s${NUM_SALAS}" — nada mais.
2. Todas as salas devem ser conectadas (grafo totalmente conectado).
3. Cada conexão é bidirecional — liste-a UMA ÚNICA VEZ com {a, b}.
4. sala_inicio sempre acessível sem itens. sala_fim requer progressão.
5. Cada item_chave.sala deve ser diferente de qualquer bloqueio que esse item desbloqueie.
6. IDs de chaves: strings descritivas minúsculas sem espaços (ex: "chave_bronze", "olho_de_vidro").
7. Retorne APENAS o JSON. Sem texto adicional.`
                                },
                                {
                                    role: 'user',
                                    content: `Crie um esqueleto para uma masmorra de EXATAMENTE ${NUM_SALAS} salas.
Tema livre e original — sombrio, medieval, brutal.
Inclua exatamente ${numBloqueios} bloqueios com chaves distintas.
Garanta que sala_fim (s${NUM_SALAS}) só seja alcançável após resolver os bloqueios.`
                                }
                            ],
                            temperature: 0.25,
                            max_tokens: Math.max(600, NUM_SALAS * 60),
                            response_format: {
                                type: "json_schema",
                                json_schema: {
                                    name: "esqueleto_dungeon",
                                    strict: true,
                                    schema: {
                                        type: "object",
                                        properties: {
                                            tema: { type: "string" },
                                            salas: { type: "array", items: { type: "string" } },
                                            conexoes: {
                                                type: "array",
                                                items: {
                                                    type: "object",
                                                    properties: {
                                                        a: { type: "string" },
                                                        b: { type: "string" }
                                                    },
                                                    required: ["a", "b"],
                                                    additionalProperties: false
                                                }
                                            },
                                            bloqueios: {
                                                type: "array",
                                                items: {
                                                    type: "object",
                                                    properties: {
                                                        de: { type: "string" },
                                                        para: { type: "string" },
                                                        chave: { type: "string" }
                                                    },
                                                    required: ["de", "para", "chave"],
                                                    additionalProperties: false
                                                }
                                            },
                                            itens_chave: {
                                                type: "array",
                                                items: {
                                                    type: "object",
                                                    properties: {
                                                        id: { type: "string" },
                                                        sala: { type: "string" }
                                                    },
                                                    required: ["id", "sala"],
                                                    additionalProperties: false
                                                }
                                            },
                                            sala_inicio: { type: "string" },
                                            sala_fim: { type: "string" }
                                        },
                                        required: ["tema", "salas", "conexoes", "bloqueios", "itens_chave", "sala_inicio", "sala_fim"],
                                        additionalProperties: false
                                    }
                                }
                            }
                        })
                    });

                    const data = await response.json();
                    const parsed = JSON.parse(data.choices[0].message.content);
                    console.log(`[DUNGEON] Tentativa ${tentativas} — validando grafo...`, parsed);

                    if (validarGrafo(parsed)) {
                        esqueleto = parsed;
                        console.log('[DUNGEON] ✅ Grafo válido.');
                    } else {
                        console.warn(`[DUNGEON] ⚠️ Grafo inválido na tentativa ${tentativas}. Regenerando...`);
                    }
                } catch (e) {
                    console.warn(`[DUNGEON] Tentativa ${tentativas} falhou com erro:`, e);
                }
            }

            if (!esqueleto) {
                console.error('[DUNGEON] ❌ 3 tentativas esgotadas. Usando esqueleto fallback.');
                esqueleto = gerarEsqueletoFallback(NUM_SALAS);
                adicionarMensagem('⚠️ Grafo gerado em modo de segurança.', 'system');
            }

            dungeonEsqueleto  = esqueleto;
            dungeonTema       = esqueleto.tema;
            salaAtualId       = esqueleto.sala_inicio;
            elementosEstado   = {};
            inventarioJogador = [];

            // Persiste esqueleto no Firestore (leve — apenas IDs e grafo)
            await updateDoc(doc(db, "players", uidAtual), {
                "dungeon.esqueleto":      esqueleto,
                "dungeon.tema":           dungeonTema,
                "dungeon.salaAtual":      salaAtualId,
                "dungeon.elementosEstado": {},
                "dungeon.inventario":     []
            });

            // Carrega e gera a sala inicial
            await carregarSala(salaAtualId);
            adicionarMensagem(`▶ ${salaAtualDados?.nome ?? salaAtualId}`, 'system');
        }

        /**
         * Gera o conteúdo criativo de uma sala pela primeira vez.
         * O 7B recebe o contexto lógico (qual item deve existir, quais bloqueios
         * estão presentes) e inventa atmosfera, descrição e elementos livremente.
         * O resultado é congelado no Firestore — nunca mais gerado.
         */
        async function gerarConteudoSala(salaId) {
            const itensNaSala     = (dungeonEsqueleto.itens_chave || []).filter(i => i.sala === salaId);
            const bloqueiosRelac  = (dungeonEsqueleto.bloqueios   || []).filter(b => b.de === salaId || b.para === salaId);
            const ehFim           = salaId === dungeonEsqueleto.sala_fim;
            const ehInicio        = salaId === dungeonEsqueleto.sala_inicio;

            // Vizinhos diretos para orientar as conexoes cardinais
            const vizinhos = (dungeonEsqueleto.conexoes || [])
                .filter(c => c.a === salaId || c.b === salaId)
                .map(c => c.a === salaId ? c.b : c.a);

            const contextoLogico = [
                `SALA: ${salaId} de ${NUM_SALAS}`,
                `TEMA DO DUNGEON: ${dungeonTema}`,
                `PAPEL: ${ehInicio ? 'sala inicial — jogador começa aqui' : ehFim ? 'sala final — objetivo da masmorra' : 'sala intermediária'}`,
                `VIZINHOS DIRETOS: ${vizinhos.join(', ') || 'nenhum'}`,
                `ITENS QUE DEVEM EXISTIR AQUI (id exato obrigatório): ${itensNaSala.map(i => i.id).join(', ') || 'nenhum'}`,
                `BLOQUEIOS RELACIONADOS: ${bloqueiosRelac.map(b => `${b.de}→${b.para} requer "${b.chave}"`).join(' | ') || 'nenhum'}`
            ].join('\n');

            console.log(`[DUNGEON] Gerando conteúdo criativo para ${salaId}...`);

            const response = await fetch(LM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: MODELO,
                    messages: [
                        {
                            role: 'system',
                            content: `Você é um designer de dungeons sombrios e criativos. Crie o conteúdo de uma sala de RPG medieval brutal.

REGRAS:
- descricao_fixa: 2-3 frases sensoriais e atmosféricas. Sem menções a mecânicas.
- Cada item listado em "ITENS QUE DEVEM EXISTIR" deve aparecer como elemento com o id EXATO fornecido.
- Se há BLOQUEIOS RELACIONADOS, crie um elemento de passagem correspondente (tipo "passagem") cujo id seja descritivo (ex: "porta_norte") com estado_inicial "trancado" se a rota sai desta sala, ou "fechado" se chega.

        /**
         * Carrega uma sala do Firestore.
         * Se ainda não foi gerada, chama gerarConteudoSala e congela o resultado.
         * Inicializa os estados dos elementos que ainda não têm estado em elementosEstado.
         * Mantém apenas 1 sala na RAM (salaAtualDados).
         */
        async function carregarSala(salaId) {
            // Subcoleção: players/{uid}/salas/{salaId}
            // Cada sala é um documento independente — escalável para 500+ salas
            const salaRef  = doc(db, "players", uidAtual, "salas", salaId);
            const salaSnap = await getDoc(salaRef);

            if (salaSnap.exists()) {
                salaAtualDados = salaSnap.data();
                console.log(`[DUNGEON] Sala ${salaId} carregada do Firestore: ${salaAtualDados.nome}`);
            } else {
                // Primeira visita: gera e congela
                salaAtualDados = await gerarConteudoSala(salaId);
                await setDoc(salaRef, salaAtualDados);
                console.log(`[DUNGEON] Sala ${salaId} gerada e persistida: ${salaAtualDados.nome}`);
            }

            // Inicializa estados dos elementos que ainda não existem no mapa plano
            for (const elem of (salaAtualDados.elementos || [])) {
                const chave = `${salaId}:${elem.id}`;
                if (!(chave in elementosEstado)) {
                    elementosEstado[chave] = elem.estado_inicial;
                }
            }

            // Atualiza o header da UI com o nome da sala
            document.getElementById('modelo-span').innerText = salaAtualDados.nome ?? 'Motor Duplo (7B + 1.5B)';
        }

        /**
         * Constrói a string de contexto da sala atual para injetar em mensagemFinal.
         * Este contexto é a "verdade absoluta" que o narrador deve respeitar.
         */
        function construirContextoSala() {
            if (!salaAtualDados || !dungeonEsqueleto) return '';

            // Elementos com seu estado atual
            const elementosStr = (salaAtualDados.elementos || []).map(elem => {
                const chave  = `${salaAtualId}:${elem.id}`;
                const estado = elementosEstado[chave] ?? elem.estado_inicial;
                return `  ${elem.id}[${elem.tipo}]:${estado} — ${elem.descricao}`;
            }).join('\n');

            // Saídas com status de bloqueio
            const saidasArr = [];
            for (const [dir, vizinhoId] of Object.entries(salaAtualDados.conexoes || {})) {
                if (!vizinhoId) continue;

                const bloqueio = (dungeonEsqueleto.bloqueios || []).find(b =>
                    (b.de === salaAtualId && b.para === vizinhoId) ||
                    (b.de === vizinhoId   && b.para === salaAtualId)
                );

                let status = 'livre';
                if (bloqueio && !inventarioJogador.includes(bloqueio.chave)) {
                    status = `BLOQUEADA — requer "${bloqueio.chave}"`;
                }

                saidasArr.push(`${dir.toUpperCase()}→${vizinhoId} [${status}]`);
            }

            return `\n[SALA_ATUAL: ${salaAtualId} — ${salaAtualDados.nome}]` +
                   `\n[DESCRICAO_CANONICA: ${salaAtualDados.descricao_fixa}]` +
                   `\n[ELEMENTOS_DA_SALA:\n${elementosStr || '  (nenhum)'}]` +
                   `\n[SAIDAS: ${saidasArr.join(' | ') || 'nenhuma'}]`;
        }

        /**
         * Parseia as tags [ELEMENTOS_MUT:] e [MOVER:] emitidas pelo narrador.
         * Atualiza elementosEstado e inventárioJogador sincronamente.
         * Retorna o ID da sala de destino se houve movimento válido, ou null.
         */
        function parsearMutacoesSala(textoNarrador) {
            // 1. Elementos modificados
            const elemMatch = textoNarrador.match(/\[ELEMENTOS_MUT:\s*([^\]]+)\]/i);
            if (elemMatch && elemMatch[1].toLowerCase() !== 'nenhum') {
                const partes = elemMatch[1].split('|');
                for (const parte of partes) {
                    const colonIdx = parte.indexOf(':');
                    if (colonIdx === -1) continue;
                    const idElem     = parte.slice(0, colonIdx).trim();
                    const novoEstado = parte.slice(colonIdx + 1).trim();
                    if (!idElem || !novoEstado) continue;

                    const chave       = `${salaAtualId}:${idElem}`;
                    const estadoAtual = elementosEstado[chave];

                    // Guarda de irreversibilidade
                    if (estadoAtual === 'destruido' || estadoAtual === 'coletado') continue;

                    elementosEstado[chave] = novoEstado;
                    console.log(`[ELEMENTOS] ${chave}: ${estadoAtual} → ${novoEstado}`);

                    if (novoEstado === 'coletado' && !inventarioJogador.includes(idElem)) {
                        inventarioJogador.push(idElem);
                        console.log(`[INVENTÁRIO] +${idElem} | Total: [${inventarioJogador.join(', ')}]`);
                    }
                }
            }

            // 2. Movimento
            const moverMatch = textoNarrador.match(/\[MOVER:\s*([^\]]+)\]/i);
            if (!moverMatch) return null;

            const novaSalaId = moverMatch[1].trim();

            // Valida: sala existe no esqueleto?
            if (!dungeonEsqueleto?.salas.includes(novaSalaId)) {
                console.warn(`[MOVER] Sala inválida ignorada: "${novaSalaId}"`);
                return null;
            }

            // Valida: sala é vizinha direta?
            const conexoesDaSala = salaAtualDados?.conexoes || {};
            const ehVizinha = Object.values(conexoesDaSala).includes(novaSalaId);
            if (!ehVizinha) {
                console.warn(`[MOVER] "${novaSalaId}" não é vizinha de "${salaAtualId}" — ignorado.`);
                return null;
            }

            // Valida: caminho não está bloqueado?
            const bloqueio = (dungeonEsqueleto.bloqueios || []).find(b =>
                (b.de === salaAtualId && b.para === novaSalaId) ||
                (b.de === novaSalaId  && b.para === salaAtualId)
            );
            if (bloqueio && !inventarioJogador.includes(bloqueio.chave)) {
                console.warn(`[MOVER] Caminho bloqueado para "${novaSalaId}" — requer "${bloqueio.chave}".`);
                return null;
            }

            return novaSalaId;
        }

        /**
         * Aplica o movimento do jogador para uma nova sala.

        }

        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: mensagensPayload,
                        temperature: window._introGenerating ? 0.75 : 0.6,
                        max_tokens: maxTokens,
                        presence_penalty: 0.0,
                        frequency_penalty: 0.0,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader  = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') continue;
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr    = chunk.choices?.[0]?.finish_reason;
                            if (delta) { fullText += delta; if (onToken) onToken(fullText); }
                            if (fr && fr !== 'null') finishReason = fr;
                        } catch (parseErr) {}
                    }
                }
                return { text: fullText, finishReason };
            } catch (error) {
                throw error;
            }
        }

        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elemento, maxContinuacoes = 0) {
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];

            for (let tentativa = 0; tentativa <= maxContinuacoes; tentativa++) {
                if (tentativa > 0) {
                    msgsAtual = [
                        ...msgsAtual,
                        { role: 'assistant', content: textoCompleto },
                        { role: 'user', content: 'Continue a narração em português brasileiro.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
                        if (!primeiroTokenRecebido) primeiroTokenRecebido = true;
                        elemento.innerText = textoCompleto + parcial;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

                if (finishReason !== 'length') break;
            }
            parsearEstadoEntidades(textoCompleto);
            return textoCompleto;
        }

        // PROMPT_INTRO generalizado: a sala inicial é descrita via [DESCRICAO_CANONICA] injetado no contexto
        const PROMPT_INTRO = `Descreva a cena atual em 2-3 frases curtas, em segunda pessoa. Use APENAS os elementos presentes em [DESCRICAO_CANONICA] e [ELEMENTOS_DA_SALA]. Não invente nada. Termine perguntando o que eu faço.`;

        function buildEntityIndex(ssrJson) {
            entityIndex    = {};
            entidadeEmFoco = null;

            for (const entrada of (ssrJson?.npcs || [])) {
                const virgulaIdx = entrada.indexOf(',');
                if (virgulaIdx === -1) continue;
                const nome   = entrada.slice(0, virgulaIdx).trim().toLowerCase();
                const estado = entrada.slice(virgulaIdx + 1).trim().toLowerCase();
                entityIndex[nome] = estado;
            }

            const situacao = ssrJson?.situacao_atual?.toLowerCase() || '';
            for (const [nome, estado] of Object.entries(entityIndex)) {
                if (situacao.includes(nome)) { entidadeEmFoco = { nome, estado }; break; }
            }
            if (!entidadeEmFoco && Object.keys(entityIndex).length > 0) {
                const [nome, estado] = Object.entries(entityIndex)[0];
                entidadeEmFoco = { nome, estado };
            }
        }

        function resolverMicroContexto(acao) {
            const lower = acao.toLowerCase();
            for (const [nome, estado] of Object.entries(entityIndex)) {
                if (lower.includes(nome)) return `[${nome}: ${estado}]`;
            }
            if (entidadeEmFoco) {
                const todosPronomes = [...PRONOMES_FEMININOS, ...PRONOMES_MASCULINOS, ...PRONOMES_NEUTROS];
                const temPronome = todosPronomes.some(p => lower.includes(p));
                if (temPronome) return `[${entidadeEmFoco.nome}: ${entidadeEmFoco.estado}]`;
            }
            return '';
        }

        function resolverEstadoRelacionalNPC(entidade) {
            if (!entidade) return 'desconhecido';
            const estado = entidade.estado || '';
            if (/mort[ao]|cadáver|sem vida|desmaiou|inconsciente/.test(estado)) return 'morto';
            if (/hostil|agressiv|furios|raivos|ameaç|atacando/.test(estado))    return 'hostil';
            if (/aliado|amigo|confia|ajudando|parceiro/.test(estado))           return 'aliado';
            if (/apavorad|assustad|tremendo|submisos|rendid/.test(estado))      return 'submisso';
            return 'neutro';
        }

        function normalizarAcao(acao) {
            return acao
                .toLowerCase()
                .trim()
                .replace(/^(mestre|narrador|gm)[,:]?\s*/i, '')
                .replace(/^["'](.+)["']$/, '$1');
        }

        function classificarAcao(acaoOriginal) {
            const acao = normalizarAcao(acaoOriginal);

            const ehMeta = /^(me descreva|descreva|descrever|diga|me diga|detalhe|explique|me conte|conte|me mostr|mostr|narre)\b/.test(acao)
                || /^(como é|como s[aã]o|qual [ao]|quais|onde fica|o que [eé]|tem algo|existe|h[aá]|quantos)\b/.test(acao)
                || /^(me ajude|ajude|status|inventário|mapa)\b/.test(acao);
            if (ehMeta) return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'meta' };

            const ehPercepcao = /^(olh[ao]|observ|examin|chec[ao]|analiso|inspecion|vejo|noto|procuro|investigo|vasculh|escuto|ouço|sinto o cheiro|cheiro|toco|palpo|tento (ver|ouvir|identificar|perceber|notar|entender|descobrir como|descobrir o que))\b/.test(acao);
            if (ehPercepcao) return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'percepção' };

            const ehFisicoClaro = /\b(corro|fujo|salto|pulo|escalo|subo|desço|empurro|puxo|arrombo|forço|chuto|soco|ataco|golpeio|esfaqueio|disparo|arremesso|rolo|me jogo|me agacho|me esquivo|desarmo|prendo|amarro|rasteio|nado|mergulho|agarro|trepo|cotovelada|murro|estrangulo|derrubо|bato|agrido|luto|combato)\b/.test(acao);
            if (ehFisicoClaro) return { tipo: 'ARRISCADA', atributo: 'HABILIDADE', fonte: 'físico-claro' };

            const ehDemonstrativo = /^(mostro|mostrar|exibo|exibir|apresento|apresentar|entrego|ofereço|estendo)\b.+\bpara\b/.test(acao)
                || /^(mostro|mostrar|exibo|apresento)\b/.test(acao);
            if (ehDemonstrativo) return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'demonstrativo' };

            const estadoRelacional = entidadeEmFoco ? resolverEstadoRelacionalNPC(entidadeEmFoco) : null;

            if (!entidadeEmFoco || estadoRelacional === 'morto' || estadoRelacional === 'ausente') {
                return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'sem-alvo' };
            }

            const acaoAnteriorFoiViolenta = (_ultimoTipoAcao === 'ARRISCADA' && _ultimoAtributo === 'HABILIDADE');
            if (acaoAnteriorFoiViolenta) {
                return { tipo: 'ARRISCADA', atributo: 'CARISMA', fonte: 'contágio-violência' };
            }

            return null;
        }

        async function classificarComArbitro(acaoOriginal, entidade) {
            const estadoRelacional = resolverEstadoRelacionalNPC(entidade);

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO_JUIZ,
                        messages: [
                            {
                                role: 'system',
                                content: `Você analisa ações em jogos de RPG.
Classifique a ação em UMA categoria:

FISICA: esforço corporal direto sobre o ambiente ou NPC (golpear, empurrar, agarrar, correr, escalar, forçar objetos).
INFLUENCIA: tentar que o NPC faça, concorde ou reaja a algo — inclui qualquer pergunta ou proposta de natureza sexual ou íntima.
PASSIVA: obter informação factual neutra, observar, mover-se sem interagir com o NPC.

Retorne apenas o JSON.`
                            },
                            {
                                role: 'user',
                                content: `NPC: ${entidade.nome} (estado: ${estadoRelacional})\nAção: "${acaoOriginal}"`
                            }
                        ],
                        temperature: 0.0,
                        max_tokens: 15,
                        response_format: {
                            type: "json_schema",
                            json_schema: {
                                name: "arbitro_categorico",
                                strict: true,
                                schema: {
                                    type: "object",
                                    properties: {
                                        categoria: { type: "string", enum: ["FISICA", "INFLUENCIA", "PASSIVA"] }
                                    },
                                    required: ["categoria"],
                                    additionalProperties: false
                                }
                            }
                        }
                    })
                });

                const data = await response.json();
                const { categoria } = JSON.parse(data.choices[0].message.content);
                console.log(`[ÁRBITRO] categoria=${categoria} | estado=${estadoRelacional}`);

                if (categoria === 'PASSIVA')    return { tipo: 'TRIVIAL',   atributo: 'NENHUM',     fonte: 'árbitro-passivo' };
                if (categoria === 'FISICA')     return { tipo: 'ARRISCADA', atributo: 'HABILIDADE', fonte: 'árbitro-físico' };
                if (categoria === 'INFLUENCIA') return { tipo: 'ARRISCADA', atributo: 'CARISMA',    fonte: 'árbitro-influência' };

            } catch (e) {
                console.warn('[ÁRBITRO] Falhou, aplicando fallback conservador.', e);
                return { tipo: 'ARRISCADA', atributo: 'CARISMA', fonte: 'árbitro-fallback' };
            }
        }

        async function animarTextoTeste(texto) {
            const div = document.createElement('div');
            div.className = 'teste-reveal';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            for (const char of texto) {
                div.innerText += char;
                await new Promise(r => setTimeout(r, 40));
            }
        }

        function criarBotaoRolar() {
            return new Promise(resolve => {
                const btn = document.createElement('button');
                btn.id = 'rolar-btn';
                btn.innerText = '⚄ ROLAR DADO';
                chatBox.appendChild(btn);
                chatBox.scrollTop = chatBox.scrollHeight;
                btn.addEventListener('click', () => { btn.remove(); resolve(); }, { once: true });
            });
        }

        function mostrarResultadoDado(semente, atributo, valorAtributo, resultado) {
            const divDado = document.createElement('div');
            divDado.className = 'resultado-dado';
            divDado.innerText = `Rolagem: ${semente} vs ${atributo} ${valorAtributo}`;
            chatBox.appendChild(divDado);
            const divRes = document.createElement('div');
            divRes.className = resultado === 'SUCESSO' ? 'resultado-sucesso' : 'resultado-falha';
            divRes.innerText = resultado;
            chatBox.appendChild(divRes);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function parsearEstadoEntidades(textoNarrador) {
            const match = textoNarrador.match(/\[NPCS:\s*([^\]]+)\]/i);
            if (!match) {
                console.warn('[ENTIDADES] Tag [NPCS:] não encontrada na resposta. Mantendo estado anterior.');
                return;
            }

            const payload = match[1].trim();
            if (payload.toLowerCase() === 'nenhum') {
                entityIndex = {};
                entidadeEmFoco = null;
                return;
            }

            const entradas = payload.split('|');
            const novoIndex = {};

            for (const entrada of entradas) {
                const [nome, estado] = entrada.split(':').map(s => s.trim().toLowerCase());
                if (nome && estado) novoIndex[nome] = estado;
            }

            for (const [nome, estadoAntigo] of Object.entries(entityIndex)) {
                if (estadoAntigo === 'morto') novoIndex[nome] = 'morto';
            }

            entityIndex = novoIndex;

            const situacao = ssrJson?.situacao_atual?.toLowerCase() || '';
            let focoEncontrado = null;

            for (const [nome, estado] of Object.entries(entityIndex)) {
                if (situacao.includes(nome)) { focoEncontrado = { nome, estado }; break; }
            }

            entidadeEmFoco = focoEncontrado
                ?? (Object.keys(entityIndex).length > 0
                    ? { nome: Object.keys(entityIndex)[0], estado: Object.values(entityIndex)[0] }
                    : null);

            console.log('[ENTIDADES] Index atualizado:', entityIndex, '| Foco:', entidadeEmFoco);
        }

        // ============================================================
        // LOOP PRINCIPAL — enviar()
        // ============================================================
        window.enviar = async function(mensagemUsuario = null) {
            const isInitial = mensagemUsuario === null;
            if (!isInitial) turnosJogados++;

            let pergunta;
            if (isInitial) {
                pergunta = !resumoAtual
                    ? PROMPT_INTRO
                    : 'O jogo foi recarregado. Com base no resumo da história, narre rapidamente a cena atual (usando a regra padrão de frases curtas) e pergunte o que eu faço agora.';
            } else {
                pergunta = mensagemUsuario;
            }

            if (!isInitial) { adicionarMensagem(pergunta, 'user'); userInput.value = ''; }

            sendBtn.disabled  = true;
            userInput.disabled = true;

            const tempId = adicionarMensagem('', 'ai', true);
            const elementoDisplay = document.getElementById(tempId);

            let contadorAnim = 0;
            let indicePalavra = Math.floor(Math.random() * PALAVRAS_SOMBRIAS.length);
            let exibindoPensando = false;
            let ciclosPensando = 0;
            primeiroTokenRecebido = false;

            intervaloAnimacao = setInterval(() => {
                if (!primeiroTokenRecebido) {
                    if (contadorAnim % 8 === 0) { exibindoPensando = true; ciclosPensando = 0; }

                    let textoExibido = '';
                    if (exibindoPensando && ciclosPensando < 4) {
                        textoExibido = `pensando${'.'.repeat(ciclosPensando % 4)}`;
                        ciclosPensando++;
                        if (ciclosPensando >= 4) exibindoPensando = false;
                    } else {
                        const palavra = PALAVRAS_SOMBRIAS[indicePalavra % PALAVRAS_SOMBRIAS.length];
                        textoExibido  = `${palavra}${'.'.repeat((Math.floor(contadorAnim / 2) % 4))}`;
                        indicePalavra++;
                    }

                    elementoDisplay.innerText = textoExibido;
                    const opacidade = 0.4 + (Math.sin(Date.now() / 400) * 0.25);
                    elementoDisplay.style.opacity      = opacidade;
                    elementoDisplay.style.letterSpacing = '2px';
                    elementoDisplay.style.transition    = 'opacity 0.1s ease';
                    contadorAnim++;
                } else {
                    clearInterval(intervaloAnimacao);
                    elementoDisplay.style.opacity       = '1';
                    elementoDisplay.style.letterSpacing = 'normal';
                    elementoDisplay.style.transition    = '';
                    intervaloAnimacao = null;
                }
            }, 150);

            try {
                let mensagemFinal = pergunta;

                if (!isInitial) {
                    // --- CLASSIFICADOR DETERMINÍSTICO v3.0 ---
                    const classificacaoRaw = classificarAcao(pergunta);
                    let classificacao;

                    if (classificacaoRaw === null) {
                        const tempJuizId = adicionarMensagem('⚖️ Árbitro avaliando a ação...', 'system', true);
                        classificacao = await classificarComArbitro(pergunta, entidadeEmFoco);
                        const msgJuiz = document.getElementById(tempJuizId);
                        if (msgJuiz) msgJuiz.remove();
                    } else {
                        classificacao = classificacaoRaw;
                    }

                    console.log(`[CLASSIFICADOR v3] ${classificacao.fonte.toUpperCase()} →`, classificacao);
                    _ultimoTipoAcao = classificacao.tipo;
                    _ultimoAtributo  = classificacao.atributo;

                    const { tipo, atributo } = classificacao;
                    let resultado = null;
                    let danoBase  = 0;

                    if (tipo === 'ARRISCADA' && atributo !== 'NENHUM') {
                        await animarTextoTeste(`TESTE DE ${atributo}`);
                        await criarBotaoRolar();

                        const semente       = Math.floor(Math.random() * 20) + 1;
                        const valorAtributo = jogadorStats[atributo] ?? 0;
                        resultado = semente <= valorAtributo ? 'SUCESSO' : 'FALHA';
                        if (resultado === 'FALHA') {
                            danoBase = Math.max(1, Math.floor((semente - valorAtributo) / 2));
                        }
                        mostrarResultadoDado(semente, atributo, valorAtributo, resultado);
                        await new Promise(r => setTimeout(r, 600));
                    }

                    let diretrizConsequencia = "";
                    let diretrizSucesso = "A intenção do jogador se concretiza TOTALMENTE e sem ressalvas.";

                    if (atributo === 'HABILIDADE') {
                        if (resultado === 'FALHA') diretrizConsequencia = "A ação fracassa e o jogador sofre uma punição física visceral (ossos quebrados, carne rasgada, dano material).";
                    } else if (atributo === 'CARISMA') {
                        if (resultado === 'SUCESSO') diretrizSucesso = "A intenção do jogador se concretiza TOTALMENTE. ATENÇÃO: Se o contexto anterior envolver violência, o alvo obedece ao jogador por PURO TERROR ou submissão doentia, nunca por afeto. Narre a obediência forçada e a linguagem corporal de medo.";
                        if (resultado === 'FALHA')   diretrizConsequencia = "A tentativa social é totalmente rejeitada. O alvo demonstra repulsa ou fúria, quebrando a moral do jogador. É proibido narrar dano físico ao jogador neste caso, foque na humilhação social e hostilidade.";
                    } else if (atributo === 'SORTE') {
                        if (resultado === 'FALHA') diretrizConsequencia = "O azar se manifesta de forma impiedosa. Uma reviravolta cruel do ambiente pune o jogador.";
                    }

                    const contextoDecidido = tipo === 'TRIVIAL'
                        ? `[AÇÃO TRIVIAL: Avance a cena diretamente. Revele uma nova tensão ou detalhe sombrio sem mencionar testes. Termine com [DANO: 0]]`
                        : `[AÇÃO ARRISCADA — TESTE DE ${atributo}: ${resultado}. REGRAS VITAIS: Se SUCESSO, ${diretrizSucesso} Se FALHA, a intenção é TOTALMENTE NEGADA/REJEITADA e ${diretrizConsequencia} Narre o desfecho seco. Termine com [DANO: ${resultado === 'FALHA' ? danoBase : 0}]]`;

                    const npcsMortos = Object.entries(entityIndex)
                        .filter(([_, estado]) => estado === 'morto')
                        .map(([nome]) => nome)
                        .join(', ');

                    const alertaMortos = npcsMortos
                        ? `[MORTOS: ${npcsMortos} — cadáveres NÃO reagem, NÃO respiram, NÃO se movem. Ações sobre eles são interações com matéria inerte.]`
                        : '';

                    mensagemFinal += `\n${alertaMortos}\n${contextoDecidido}\n[RESPOSTA OBRIGATORIAMENTE EM PORTUGUÊS BRASILEIRO]`;
                }

                // --- INJEÇÃO DO CONTEXTO DE SALA (para todos os turnos) ---
                const contextoSala = construirContextoSala();
                if (contextoSala) mensagemFinal += contextoSala;

                mensagens.push({ role: 'user', content: mensagemFinal });

                const isIntro         = isInitial && !resumoAtual;
                const maxTokens       = isIntro ? 500 : 300;
                const maxContinuacoes = 1;

                if (isIntro) window._introGenerating = true;

                const respostaIA = await gerarRespostaComContinuacao(mensagens, maxTokens, elementoDisplay, maxContinuacoes);

                const danoMatch = respostaIA.match(/\[DANO:\s*(\d+)\]/i);

                // Limpeza de todas as tags de controle antes de exibir
                let respostaLimpa = respostaIA
                    .replace(/\[TESTE:[^\]]+\]/g, '')
                    .replace(/\[DANO:\s*\d+\]/gi, '')
                    .replace(/\[NPCS:[^\]]+\]/gi, '')
                    .replace(/\[ELEMENTOS_MUT:[^\]]+\]/gi, '')  // DUNGEON: limpa tag de mutação
                    .replace(/\[MOVER:[^\]]+\]/gi, '')           // DUNGEON: limpa tag de movimento
                    .trim();

                if (!isInitial && danoMatch && parseInt(danoMatch[1]) > 0) {
                    const div = document.createElement('div');
                    div.className = 'system-message';
                    div.innerHTML = `<em style="color:#e53935; font-weight:bold;">[FALHA NO TESTE: CONSEQUÊNCIA APLICADA]</em>`;
                    chatBox.appendChild(div);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                elementoDisplay.innerText = respostaLimpa;

                if (danoMatch && parseInt(danoMatch[1]) > 0) {
                    const valorDano = parseInt(danoMatch[1]);
                    energia -= valorDano;
                    document.getElementById('energia-span').innerText = `🩸 Energia: ${Math.max(0, energia)}/10`;
                    adicionarMensagem(`[O mundo cobra seu preço. Você perdeu ${valorDano} de Energia.]`, 'system');

                    if (energia <= 0) {
                        adicionarMensagem("💀 SEU CORPO CEDE. A ESCURIDÃO O CONSOME. FIM DA JORNADA.", 'system');
                        userInput.disabled = true;
                        sendBtn.disabled   = true;
                        await salvarEstadoJogador();
                        return;
                    }
                }

                if (isIntro) window._introGenerating = false;

                mensagens.push({ role: 'assistant', content: respostaIA });

                // --- DUNGEON: processa mutações de sala APÓS a resposta ---
                // Síncrono (parse de texto) + assíncrono (carregamento de nova sala se houve movimento)
                _pendingMoveId = parsearMutacoesSala(respostaIA);
                if (_pendingMoveId) {
                    // Desabilita input durante carregamento/geração da nova sala
                    sendBtn.disabled   = true;
                    userInput.disabled = true;
                    await aplicarMovimento(_pendingMoveId);
                    _pendingMoveId = null;
                }

                // Idle-time: salva e comprime em background
                setTimeout(() => {
                    salvarEstadoJogador().catch(e => console.error('Erro no salvamento background:', e));

                    if (mensagens.length > LIMITE_MENSAGENS && !window._compressaoEmAndamento) {
                        window._compressaoEmAndamento = true;
                        setTimeout(() => {
                            comprimirMemoria().catch(e => {
                                console.error('Erro na compressão background:', e);
                                window._compressaoEmAndamento = false;
                            });
                        }, 4000);
                    }
                }, 0);

                if (isInitial) { userInput.disabled = false; sendBtn.disabled = false; userInput.focus(); }

            } catch (error) {
                if (intervaloAnimacao) clearInterval(intervaloAnimacao);
                elementoDisplay.innerText = `❌ Erro: ${error.message}`;
                if (isInitial) { userInput.disabled = false; sendBtn.disabled = false; }
            } finally {
                if (!isInitial) { sendBtn.disabled = false; userInput.disabled = false; userInput.focus(); }
            }
        };

        window.onload = async () => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    uidAtual = user.uid;
                    await carregarDadosJogador(uidAtual);
                    window.enviar();
                } else {
                    window.location.href = "login.html";
                }
            });
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) window.enviar(userInput.value.trim());
        });
    </script>
</body>
