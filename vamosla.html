<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha - Motor Narrativo</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #local-atual { color: #ffaa00; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #3a3228; padding-bottom: 4px; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; }
        .narrator { color: #a13d3d; margin-bottom: 10px; }
        .player { color: #7a8c66; margin-bottom: 10px; }
        .system { color: #6b6b4a; margin-bottom: 10px; font-style: italic; font-size: 0.9em; }
        #progress-bar-container { width: 100%; background: #2a251e; height: 12px; margin-bottom: 10px; display: block; }
        #progress-bar { width: 0%; height: 100%; background: #5c2c2c; transition: width 0.3s; }
        input { width: 80%; padding: 10px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; }
        button { padding: 10px; cursor: pointer; background: #3a3228; color: #fff; border: none; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status">Iniciando...</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="local-atual">
        📍 Local: <span id="local-span">Carregando...</span>
    </div>
    
    <div id="chat-box"></div>
    
    <div id="controls">
        <input type="text" id="player-input" placeholder="Sua ação..." disabled>
        <button id="btn-enviar" onclick="enviarAcao()" disabled>AGIR</button>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const MY_MODEL_ID = "Qwen2.5-7B-Instruct-q4f16_1-MLC"; // ou "Llama-3.1-8B-Instruct-q4f16_1-MLC"

    const MUNDOS = [
       
        {
            nome: "Hospital Psiquiátrico Abandonado",
            resumo: "Você está no Hospital Colina Verde, fechado em 1995. Objetivo: encontrar arquivos médicos que provam sua inocência antes do amanhecer (4 horas). Ameaças: estrutura colapsando, gás de formaldeído, polícia chegando.",
            localizacaoInicial: "Recepção Principal, Térreo",
            itens: ["gravador de voz", "chave mestra quebrada", "foto polaroid desbotada"],
            elementos: ["Ala de isolamento no 2º andar", "Sala de cirurgia no 3º andar", "Arquivo médico no subsolo", "Capela no 1º andar", "Torre de observação no 5º andar"],
            documentoCompleto: `CENÁRIO: Hospital Psiquiátrico Colina Verde
Hospital de 5 andares no topo de colina, fechado há 28 anos. Ruína de corredores escuros e gritos nas paredes.

SITUAÇÃO INICIAL:
Você acorda na Recepção, térreo. Cabeça doendo. Você foi acusado injustamente. A prova de inocência está nos arquivos médicos do subsolo. Polícia chega em 4 horas.

ITENS INICIAIS:
- Gravador de voz (gravação parcial de terapia)
- Chave mestra quebrada (só abre térreo e 1º andar)
- Foto polaroid (paciente com seu rosto, mas não é você)

AMEAÇAS:
- Polícia em 4 horas
- Estrutura colapsando
- Gás de formaldeído no subsolo (alucinações)
- Sons de passos inexplicáveis
- Portas trancando sozinhas

ELEMENTOS ÚNICOS:
1. ALA ISOLAMENTO (2º Andar): Celas acolchoadas. Uma aberta com nome arranhado "Dr. Carvalho".
2. SALA CIRURGIA (3º Andar): Mesa com manchas. Diário médico sobre "procedimentos não autorizados".
3. ARQUIVO MÉDICO (Subsolo): Sala inundada. Arquivos 1980-1995. Precisa achar paciente da foto.
4. CAPELA (1º Andar): Bancos quebrados. Confessionário com sangue. "ELE AINDA ESTÁ AQUI" na parede.
5. TORRE (5º Andar): Vista da cidade. Pode ver luzes da polícia se aproximando.`
        },
        {
            nome: "Bunker Nuclear Abandonado",
            resumo: "Você está no Bunker Sigma-9, selado desde 1986 após vazamento radioativo. Objetivo: encontrar o código de descontaminação e escapar antes que o oxigênio acabe (3 horas). Ameaças: radiação, portas seladas, sistema de segurança hostil.",
            localizacaoInicial: "Câmara de Descontaminação, Nível 1",
            itens: ["contador geiger", "máscara de gás rachada", "cartão de acesso vermelho"],
            elementos: ["Sala de controle central", "Reator desativado no Nível 3", "Laboratório biológico", "Arsenal trancado", "Túnel de evacuação colapsado"],
            documentoCompleto: `CENÁRIO: Bunker Nuclear Sigma-9
Bunker militar subterrâneo de 4 níveis, selado há 37 anos após acidente. 80 metros de profundidade sob montanha remota.

SITUAÇÃO INICIAL:
Você acorda na Câmara de Descontaminação, Nível 1. Alarmes silenciosos piscam vermelho. Última memória: investigando instalação secreta quando porta selou atrás de você. Contador Geiger clica constantemente. Oxigênio para 3 horas.

ITENS INICIAIS:
- Contador Geiger (marca radiação moderada)
- Máscara de gás rachada (filtro vencido)
- Cartão de acesso vermelho (nível baixo)

AMEAÇAS:
- Oxigênio acabando em 3 horas
- Radiação em áreas específicas
- Sistema de segurança IA ainda ativo
- Portas seladas precisam códigos
- Temperatura caindo (sistema de aquecimento morto)

ELEMENTOS ÚNICOS:
1. SALA CONTROLE CENTRAL (Nível 2): Terminais ativos. Código de descontaminação está aqui. Precisa cartão azul.
2. REATOR (Nível 3): Desativado mas vazando. Núcleo exposto. Diário técnico sobre "Projeto Fênix".
3. LABORATÓRIO BIO (Nível 2): Tanques quebrados. Espécimes preservados. Anotações sobre experimentos humanos.
4. ARSENAL (Nível 1): Porta blindada trancada. Explosivos e armas dentro. Código está no reator.
5. TÚNEL EVACUAÇÃO (Nível 4): Parcialmente colapsado. Única saída real. Precisa explosivos para abrir.`
        }
    ];

    const MUNDO_ESCOLHIDO = MUNDOS[Math.floor(Math.random() * MUNDOS.length)];
    
    let engine;
    let chatHistory = [];
    let jogador = { habilidade: 10, carisma: 10, sorte: 10 };
    let documentoMestre = null;
    let elementosMundo = [];
    let locaisVisitados = [];
    let estadoJogo = {
        localizacao: "",
        itens: [],
        condicao: "saudável",
        ultimoEvento: ""
    };

    const PROMPT_BASE = `Você é um narrador direto de RPG de sobrevivência em português brasileiro.

REGRAS ABSOLUTAS:
1. Use português brasileiro correto.
2. Máximo 2 frases curtas (até 15 palavras cada), a menos que o jogador peça descrição detalhada (aí pode usar 3 frases, máximo 40 palavras).
3. Sempre termine com ponto final.
4. Mantenha coerência com inventário e localização atual.
5. **REGRA DE MOVIMENTO: SE a ação do jogador resultar em MUDANÇA DE LOCAL, você DEVE iniciar sua resposta com a tag exata [LOCAL: Nome do Novo Local].**  
   - Exemplo: se o jogador diz "entrar na sala de cirurgia", e isso muda o local, sua resposta deve começar com "[LOCAL: Sala de Cirurgia]".
   - Se a ação NÃO muda de local, NÃO use a tag.

EXEMPLOS:
Jogador: "entrar na sala de cirurgia"
Narrador: "[LOCAL: Sala de Cirurgia] Você empurra a porta enferrujada. O cheiro de podridão é forte."

Jogador: "examinar a mesa"
Narrador: "A mesa está manchada de sangue seco. Instrumentos cirúrgicos estão espalhados."`;

    function ehAcaoExploratoria(texto) {
        return /entrar|seguir|continuar|andar|avançar|prosseguir|ir|caminhar|mover|descer|subir/.test(texto.toLowerCase());
    }

    function ehPedidoDetalhado(texto) {
        return /detalh|descrev|expliq|como é|o que (tem|há|existe)|me (diga|fale|conte)/.test(texto.toLowerCase());
    }

    function gerarEvento() {
        const tipo = Math.random();
        if (tipo < 0.4) return "DESCOBERTA";
        if (tipo < 0.7) return "PERIGO";
        return "ATMOSFERA";
    }

    function analisarAcao(texto) {
        const textoLower = texto.toLowerCase();
        
        if (/escalar|saltar|equilibrar|decifrar|hackear|forçar|arrombar|nadar|correr|lutar|pular|subir|descer|esquivar|rolar|atacar/.test(textoLower)) {
            return { tipo: 'habilidade' };
        }
        
        if (/convencer|persuadir|intimidar|seduzir|negociar|mentir|enganar|subornar|ameaçar/.test(textoLower)) {
            return { tipo: 'carisma' };
        }
        
        if (/vasculhar|procurar|explorar|investigar|buscar|examinar|revistar|ouvir|farejar|iluminar|ver/.test(textoLower)) {
            return { tipo: 'sorte' };
        }
        
        return null;
    }

    function rolarTeste(tipo) {
        const dado = Math.floor(Math.random() * 20) + 1;
        const atributo = jogador[tipo];
        const dificuldade = 18;
        const resultado = dado + atributo;
        
        return {
            sucesso: resultado >= dificuldade,
            dado: dado,
            total: resultado
        };
    }

    function gerarSystemPrompt() {
        const resumoMundo = documentoMestre ? documentoMestre.resumo : "Mundo desconhecido";
        const elementos = elementosMundo.length > 0 ? `\nELEMENTOS: ${elementosMundo.join(", ")}` : "";
        const visitados = locaisVisitados.length > 1 ? `\nJÁ VISITOU: ${locaisVisitados.join(", ")}` : "";
        
        const estado = `MUNDO:
${resumoMundo}${elementos}${visitados}

ESTADO:
- Local: ${estadoJogo.localizacao}
- Inventário: ${estadoJogo.itens.join(", ") || "vazio"}
- Condição: ${estadoJogo.condicao}`;
        
        return `${PROMPT_BASE}\n\n${estado}`;
    }

    async function gerarDocumentoMestre() {
        addMsg("Preparando o mundo...", "system");
        
        try {
            documentoMestre = {
                completo: MUNDO_ESCOLHIDO.documentoCompleto,
                resumo: MUNDO_ESCOLHIDO.resumo
            };
            
            estadoJogo.localizacao = MUNDO_ESCOLHIDO.localizacaoInicial;
            document.getElementById('local-span').innerText = estadoJogo.localizacao; // Atualiza na tela
            estadoJogo.itens = [...MUNDO_ESCOLHIDO.itens];
            elementosMundo = [...MUNDO_ESCOLHIDO.elementos];
            locaisVisitados.push(MUNDO_ESCOLHIDO.localizacaoInicial);
            
            const resultIntro = await engine.chat.completions.create({
                messages: [
                    { role: "system", content: `Cenário:\n${MUNDO_ESCOLHIDO.documentoCompleto}\n\nEscreva abertura: local (${MUNDO_ESCOLHIDO.localizacaoInicial}) e sensação. 2 frases, 25 palavras.` },
                    { role: "user", content: "Cena inicial." }
                ],
                temperature: 0.6,
                max_tokens: 45,
                stop: ["\n\n", "Jogador:"]
            });

            let intro = resultIntro.choices[0].message.content.trim();
            
            const frasesCompletas = [];
            const frasesTemp = intro.split(/[.!?]/);

            for (let i = 0; i < frasesTemp.length - 1; i++) {
                if (frasesTemp[i].trim().length > 5) {
                    frasesCompletas.push(frasesTemp[i].trim());
                }
            }

            const ultimaFrase = frasesTemp[frasesTemp.length - 1].trim();
            if (ultimaFrase.length > 10 && !/[.!?]$/.test(intro)) {
                // Descarta
            } else if (ultimaFrase.length > 5) {
                frasesCompletas.push(ultimaFrase);
            }

            intro = frasesCompletas.join('. ');
            if (intro && !/[.!?]$/.test(intro)) {
                intro += '.';
            }

            addMsg(intro, "narrator");
            chatHistory.push({ role: "assistant", content: intro });
            estadoJogo.ultimoEvento = intro.substring(0, 60);

            console.log("=== MUNDO: " + MUNDO_ESCOLHIDO.nome + " ===");

        } catch (e) {
            addMsg("Falha ao carregar o mundo.", "system");
            console.error(e);
        }
    }

    async function init() {
        const status = document.getElementById("status");
        const pb = document.getElementById("progress-bar");

        try {
            status.innerText = "Despertando o Narrador...";
            
            engine = await CreateMLCEngine(MY_MODEL_ID, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    pb.style.width = `${report.progress * 100}%`;
                }
            });

            document.getElementById("progress-bar-container").style.display = "none";
            status.innerText = "Carregando o mundo...";

            await gerarDocumentoMestre();

            status.innerText = "O Pesadelo Começou.";
            document.getElementById("player-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus();

        } catch (err) {
            status.innerText = "ERRO CRÍTICO: " + err.message;
            console.error(err);
        }
    }

    window.enviarAcao = async () => {
        const input = document.getElementById("player-input");
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, "player");
        
        document.getElementById("btn-enviar").disabled = true;
        const tempId = addMsg("...", "narrator");

        const ehExploracao = ehAcaoExploratoria(text);
        const ehDetalhado = ehPedidoDetalhado(text);
        const teste = analisarAcao(text);
        let acaoCompleta = text;

        if (ehExploracao) {
            const tipoEvento = gerarEvento();
            acaoCompleta += `\n[EXPLORAÇÃO - ${tipoEvento}]`;
        }

        if (ehDetalhado) {
            acaoCompleta += `\n[DESCRIÇÃO DETALHADA - 3 frases, 40 palavras]`;
        }

        if (teste) {
            const resultado = rolarTeste(teste.tipo);
            acaoCompleta += resultado.sucesso 
                ? `\n[${teste.tipo.toUpperCase()}: SUCESSO]`
                : `\n[${teste.tipo.toUpperCase()}: FALHA]`;
        }

        chatHistory.push({ role: "user", content: acaoCompleta });
        input.value = "";

        try {
            const messages = [
                { role: "system", content: gerarSystemPrompt() },
                ...chatHistory.slice(-12)
            ];

            const result = await engine.chat.completions.create({ 
                messages: messages,
                temperature: ehExploracao ? 0.6 : 0.45,
                max_tokens: ehDetalhado ? 60 : 45,
                top_p: 0.82,
                frequency_penalty: 0.25,
                presence_penalty: 0.2,
                stop: ["\n\n", "Jogador:", ">", "\n>"]
            });

            let answer = result.choices[0].message.content.trim();
            
            console.log("🔍 Resposta BRUTA do modelo:", answer); // LOG

            // --- INJEÇÃO: RASTREADOR ESPACIAL ---
            const matchLocal = answer.match(/^\[LOCAL:\s*(.+?)\]/i);
            if (matchLocal) {
                console.log("✅ TAG LOCAL detectada:", matchLocal[1]); // LOG
                // Atualiza o estado do jogo com o novo local
                estadoJogo.localizacao = matchLocal[1].trim();
                document.getElementById('local-span').innerText = estadoJogo.localizacao; // Atualiza na tela
                
                // Registra nos locais visitados, se for novo
                if (!locaisVisitados.includes(estadoJogo.localizacao)) {
                    locaisVisitados.push(estadoJogo.localizacao);
                }
                
                // Remove a tag da resposta para o jogador não ver
                answer = answer.replace(/^\[LOCAL:\s*(.+?)\]\s*/i, '').trim();
                console.log("🧹 Resposta LIMPA (sem tag):", answer); // LOG
            }
            // ------------------------------------
            
            const frasesCompletas = [];
            const frasesTemp = answer.split(/[.!?]/);

            for (let i = 0; i < frasesTemp.length - 1; i++) {
                if (frasesTemp[i].trim().length > 5) {
                    frasesCompletas.push(frasesTemp[i].trim());
                }
            }

            const ultimaFrase = frasesTemp[frasesTemp.length - 1].trim();
            if (ultimaFrase.length > 10 && !/[.!?]$/.test(answer)) {
                // Descarta
            } else if (ultimaFrase.length > 5) {
                frasesCompletas.push(ultimaFrase);
            }

            answer = frasesCompletas.join('. ');
            if (answer && !/[.!?]$/.test(answer)) {
                answer += '.';
            }

            document.getElementById(tempId).innerText = answer;
            chatHistory.push({ role: "assistant", content: answer });
            
            estadoJogo.ultimoEvento = answer.substring(0, 60);

            if (chatHistory.length > 20) {
                chatHistory = chatHistory.slice(-20);
            }

        } catch (e) {
            document.getElementById(tempId).innerText = "[SISTEMA: O mundo vacilou. Tente novamente.]";
            console.error("Erro no motor:", e);
            chatHistory.pop();
        } finally {
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus(); 
        }
    };

    function addMsg(txt, cls) {
        const box = document.getElementById("chat-box");
        const div = document.createElement('div');
        div.className = cls;
        div.id = "msg-" + Date.now() + "-" + Math.random();
        div.innerText = (cls === 'player' ? "> " : "") + txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div.id;
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('player-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('btn-enviar').disabled) {
                enviarAcao();
            }
        });
    });

    init();
</script>

</body>
</html>
