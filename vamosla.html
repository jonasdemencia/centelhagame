<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha - Motor Narrativo</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; }
        .narrator { color: #a13d3d; margin-bottom: 10px; }
        .player { color: #7a8c66; margin-bottom: 10px; }
        .system { color: #6b6b4a; margin-bottom: 10px; font-style: italic; font-size: 0.9em; }
        #progress-bar-container { width: 100%; background: #2a251e; height: 12px; margin-bottom: 10px; display: block; }
        #progress-bar { width: 0%; height: 100%; background: #5c2c2c; transition: width 0.3s; }
        input { width: 80%; padding: 10px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; }
        button { padding: 10px; cursor: pointer; background: #3a3228; color: #fff; border: none; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status">Iniciando...</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="chat-box"></div>
    
    <div id="controls">
        <input type="text" id="player-input" placeholder="Sua ação..." disabled>
        <button id="btn-enviar" onclick="enviarAcao()" disabled>AGIR</button>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const MY_MODEL_ID = "Qwen2.5-7B-Instruct-q4f16_1-MLC";
    
    let engine;
    let chatHistory = [];
    let jogador = { habilidade: 10, carisma: 10, sorte: 10 };
    let documentoMestre = null; // A "bíblia" do jogo
    let estadoJogo = {
        localizacao: "",
        itens: [],
        condicao: "saudável",
        ultimoEvento: ""
    };

    const PROMPT_JOGO = `Você é um narrador preciso de RPG de sobrevivência. Responda APENAS o que foi perguntado.

REGRAS CRÍTICAS:
1. NUNCA invente eventos que não aconteceram
2. NUNCA adicione elementos que não estão no CONTEXTO DO MUNDO
3. Responda em EXATAMENTE 1-2 frases curtas e completas
4. SEMPRE termine com ponto final - NUNCA deixe frase incompleta
5. Máximo 25 palavras total

EXEMPLOS:
Jogador: "onde estou?"
Narrador: "Você está em uma caverna úmida. Paredes de pedra cercam você."

Jogador: "o que vejo?"
Narrador: "Rochas irregulares e poças escuras. Um túnel estreito à frente."`;

    function analisarAcao(texto) {
        const textoLower = texto.toLowerCase();
        
        if (/escalar|saltar|equilibrar|decifrar|hackear|forçar|arrombar|nadar|correr|lutar|pular|subir|descer|esquivar|rolar|atacar/.test(textoLower)) {
            return { tipo: 'habilidade' };
        }
        
        if (/convencer|persuadir|intimidar|seduzir|negociar|mentir|enganar|subornar|ameaçar/.test(textoLower)) {
            return { tipo: 'carisma' };
        }
        
        if (/vasculhar|procurar|explorar|investigar|buscar|examinar|revistar|ouvir|farejar|iluminar|ver/.test(textoLower)) {
            return { tipo: 'sorte' };
        }
        
        return null;
    }

    function rolarTeste(tipo) {
        const dado = Math.floor(Math.random() * 20) + 1;
        const atributo = jogador[tipo];
        const dificuldade = 18;
        const resultado = dado + atributo;
        
        return {
            sucesso: resultado >= dificuldade,
            dado: dado,
            total: resultado
        };
    }

    function gerarSystemPrompt() {
        const resumoMundo = documentoMestre ? documentoMestre.resumo : "Mundo desconhecido";
        const estado = `CONTEXTO DO MUNDO:
${resumoMundo}

ESTADO ATUAL DO JOGADOR:
- Local exato: ${estadoJogo.localizacao}
- Inventário: ${estadoJogo.itens.join(", ") || "vazio"}
- Condição: ${estadoJogo.condicao}
- Último evento: ${estadoJogo.ultimoEvento}`;
        
        return `${PROMPT_JOGO}\n\n${estado}`;
    }

    async function gerarDocumentoMestre() {
        addMsg("Tecendo o destino do mundo...", "system");
        
        try {
            const result = await engine.chat.completions.create({
                messages: [
                    { 
                        role: "system", 
                        content: `Você é um mestre de RPG criando um cenário de sobrevivência. Gere um documento estruturado com:

1. CENÁRIO: Onde o jogo acontece (floresta, ruínas, navio, deserto, cidade abandonada, etc)
2. SITUAÇÃO INICIAL: Como e onde o jogador acorda
3. ITENS INICIAIS: 2-3 itens que o jogador carrega
4. AMEAÇAS: Perigos do ambiente (clima, criaturas, armadilhas)
5. OBJETIVO IMPLÍCITO: O que o jogador precisa descobrir ou alcançar
6. ELEMENTOS ÚNICOS: 2-3 detalhes que tornam este mundo memorável

Seja criativo e específico. Use 150-200 palavras.` 
                    },
                    { role: "user", content: "Crie o mundo do jogo." }
                ],
                temperature: 0.95,
                max_tokens: 300,
                top_p: 0.95
            });

            const documentoCompleto = result.choices[0].message.content.trim();
            
            // Agora gera um RESUMO compacto para usar no jogo
            const resultResumo = await engine.chat.completions.create({
                messages: [
                    { role: "system", content: "Resuma o seguinte cenário de RPG em 80 palavras, mantendo: local, itens iniciais, ameaças principais e objetivo." },
                    { role: "user", content: documentoCompleto }
                ],
                temperature: 0.3,
                max_tokens: 120
            });

            const resumo = resultResumo.choices[0].message.content.trim();

            // Extrai informações estruturadas
            const itensMatch = documentoCompleto.match(/ITENS INICIAIS[:\s]+(.*?)(?=\n\d|\n[A-Z]|$)/is);
            const localMatch = documentoCompleto.match(/CENÁRIO[:\s]+(.*?)(?=\n\d|\n[A-Z]|$)/is);
            
            documentoMestre = {
                completo: documentoCompleto,
                resumo: resumo
            };

            // Extrai itens (simplificado)
            if (itensMatch) {
                const itensTexto = itensMatch[1].toLowerCase();
                estadoJogo.itens = itensTexto.match(/[a-záàâãéêíóôõúç\s]+/g)
                    ?.filter(i => i.trim().length > 3)
                    ?.slice(0, 3) || ["mãos vazias"];
            }

            // Extrai localização
            if (localMatch) {
                estadoJogo.localizacao = localMatch[1].trim().split('\n')[0].substring(0, 50);
            }

            // Gera a introdução narrativa baseada no documento
            const resultIntro = await engine.chat.completions.create({
                messages: [
                    { role: "system", content: `Baseado neste cenário:\n${documentoCompleto}\n\nEscreva APENAS a cena de abertura: onde o jogador acorda e o que sente. 2 frases completas, máximo 35 palavras.` },
                    { role: "user", content: "Descreva a cena inicial." }
                ],
                temperature: 0.7,
                max_tokens: 60,
                stop: ["\n\n", "Jogador:"]
            });

            let intro = resultIntro.choices[0].message.content.trim();
            
            // Remove frase incompleta
            const frases = intro.split(/[.!?]/);
            if (frases.length > 1 && frases[frases.length - 1].trim().length > 0 && frases[frases.length - 1].trim().length < 15) {
                frases.pop();
                intro = frases.join('.') + '.';
            }

            addMsg(intro, "narrator");
            chatHistory.push({ role: "assistant", content: intro });
            estadoJogo.ultimoEvento = intro.substring(0, 60);

            console.log("=== DOCUMENTO MESTRE ===");
            console.log(documentoCompleto);
            console.log("\n=== RESUMO ===");
            console.log(resumo);

        } catch (e) {
            addMsg("Falha ao tecer o destino. Começando em local genérico.", "system");
            documentoMestre = { 
                completo: "Mundo genérico de sobrevivência", 
                resumo: "Você está em um ambiente hostil e precisa sobreviver." 
            };
            estadoJogo.localizacao = "local desconhecido";
            estadoJogo.itens = ["mãos vazias"];
            console.error(e);
        }
    }

    async function init() {
        const status = document.getElementById("status");
        const pb = document.getElementById("progress-bar");

        try {
            status.innerText = "Despertando o Narrador...";
            
            engine = await CreateMLCEngine(MY_MODEL_ID, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    pb.style.width = `${report.progress * 100}%`;
                }
            });

            document.getElementById("progress-bar-container").style.display = "none";
            status.innerText = "Gerando o mundo... (pode demorar)";

            // FASE 1: Gera o documento mestre
            await gerarDocumentoMestre();

            status.innerText = "O Pesadelo Começou.";
            document.getElementById("player-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus();

        } catch (err) {
            status.innerText = "ERRO CRÍTICO: " + err.message;
            console.error(err);
        }
    }

    window.enviarAcao = async () => {
        const input = document.getElementById("player-input");
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, "player");
        
        document.getElementById("btn-enviar").disabled = true;
        const tempId = addMsg("...", "narrator");

        const teste = analisarAcao(text);
        let acaoCompleta = text;

        if (teste) {
            const resultado = rolarTeste(teste.tipo);
            const resultadoTexto = resultado.sucesso 
                ? `[TESTE ${teste.tipo.toUpperCase()}: SUCESSO]`
                : `[TESTE ${teste.tipo.toUpperCase()}: FALHA - consequência física]`;
            acaoCompleta = `${text}\n${resultadoTexto}`;
        }

        chatHistory.push({ role: "user", content: acaoCompleta });
        input.value = "";

        try {
            const messages = [
                { role: "system", content: gerarSystemPrompt() },
                ...chatHistory.slice(-12)
            ];

            const result = await engine.chat.completions.create({ 
                messages: messages,
                temperature: 0.5,
                max_tokens: 50,
                top_p: 0.85,
                frequency_penalty: 0.3,
                presence_penalty: 0.1,
                stop: ["\n\n", "Jogador:", ">", "\n>"]
            });

            let answer = result.choices[0].message.content.trim();
            
            // Remove frase incompleta
            const frases = answer.split(/[.!?]/);
            if (frases.length > 1 && frases[frases.length - 1].trim().length > 0 && frases[frases.length - 1].trim().length < 15) {
                frases.pop();
                answer = frases.join('.') + '.';
            }

            document.getElementById(tempId).innerText = answer;
            chatHistory.push({ role: "assistant", content: answer });
            
            estadoJogo.ultimoEvento = answer.substring(0, 60);

            if (chatHistory.length > 20) {
                chatHistory = chatHistory.slice(-20);
            }

        } catch (e) {
            document.getElementById(tempId).innerText = "[SISTEMA: O mundo vacilou. Tente novamente.]";
            console.error("Erro no motor:", e);
            chatHistory.pop();
        } finally {
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus(); 
        }
    };

    function addMsg(txt, cls) {
        const box = document.getElementById("chat-box");
        const div = document.createElement('div');
        div.className = cls;
        div.id = "msg-" + Date.now() + "-" + Math.random();
        div.innerText = (cls === 'player' ? "> " : "") + txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div.id;
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('player-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('btn-enviar').disabled) {
                enviarAcao();
            }
        });
    });

    init();
</script>

</body>
</html>
