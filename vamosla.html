        async function chamarGroq(messages, temperatura = 0.7, formato = { type: "json_object" }) {
    const response = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            messages: messages,
            temperature: temperatura,
            response_format: formato,
        }),
    });

    // Captura o body independente do status HTTP
    const data = await response.json();
    console.log('[Groq] Resposta raw do Worker:', JSON.stringify(data).slice(0, 400));

    if (!response.ok) {
        // Worker retornou HTTP 4xx/5xx — loga o body para diagnóstico
        throw new Error(`Erro no Worker [${response.status}]: ${JSON.stringify(data)}`);
    }

    // Groq retornou HTTP 200 mas com body de erro (ex: rate limit, token expirado)
    if (data.error) {
        throw new Error(`Erro da Groq API: ${data.error.message ?? JSON.stringify(data.error)}`);
    }

    // Valida shape mínimo antes de retornar
    if (!data.choices || !Array.isArray(data.choices) || data.choices.length === 0) {
        throw new Error(`Resposta da Groq sem 'choices': ${JSON.stringify(data).slice(0, 300)}`);
    }

    return data;
}

    const objetosDaZona = (dnaGlobal?.objetos_transzonais || []).filter(

                        temperature: window._introGenerating ? 0.4 : 0.4,
                        max_tokens: maxTokens,
                        presence_penalty: 0.0,
                        frequency_penalty: 0.0,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') continue;
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr = chunk.choices?.[0]?.finish_reason;

                            if (delta) {
                                fullText += delta;
                                if (onToken) onToken(fullText);
                            }
                            if (fr && fr !== 'null') finishReason = fr;
                        } catch (parseErr) {}
                    }
                }
                return { text: fullText, finishReason };
            } catch (error) {
                throw error;
            }
        }

function resolverEstadoRelacionalNPC(entidade) {
    if (!entidade) return 'desconhecido';
    const estado = entidade.estado || '';

    if (/mort[ao]|cadáver|sem vida|desmaiou|inconsciente/.test(estado)) return 'morto';
    if (/hostil|agressiv|furios|raivos|ameaç|atacando/.test(estado))     return 'hostil';
    if (/aliado|amigo|confia|ajudando|parceiro/.test(estado))            return 'aliado';
    if (/apavorad|assustad|tremendo|submisos|rendid/.test(estado))       return 'submisso';
    return 'neutro';
}

function parsearEstadoEntidades(textoNarrador) {
    const match = textoNarrador.match(/\[NPCS:\s*([^\]]+)\]/i);
    if (!match) {
        console.warn('[ENTIDADES] Tag [NPCS:] não encontrada na resposta. Mantendo estado anterior.');
        return;
    }

    const payload = match[1].trim();
    if (payload.toLowerCase() === 'nenhum') {
        entityIndex = {};
        entidadeEmFoco = null;
        console.log('[ENTIDADES] Nenhum NPC em cena. Index zerado.');
        return;
    }

    const entradas = payload.split('|');
    const novoIndex = {};

    for (const entrada of entradas) {
        const [nome, estado] = entrada.split(':').map(s => s.trim().toLowerCase());
        if (nome && estado) novoIndex[nome] = estado;
    }

    // --- GUARDA: estado "morto" é irreversível ---
    // Se um NPC já estava morto no índice anterior, mantém "morto" no novo índice.
    for (const [nome, estadoAntigo] of Object.entries(entityIndex)) {
        if (estadoAntigo === 'morto') {
            novoIndex[nome] = 'morto';
        }
    }

    entityIndex = novoIndex;

    const situacao = ssrJson?.situacao_atual?.toLowerCase() || '';
    let focoEncontrado = null;

    for (const [nome, estado] of Object.entries(entityIndex)) {
        if (situacao.includes(nome)) {
            focoEncontrado = { nome, estado };
            break;
        }
    }

    entidadeEmFoco = focoEncontrado
        ?? (Object.keys(entityIndex).length > 0
            ? { nome: Object.keys(entityIndex)[0], estado: Object.values(entityIndex)[0] }
            : null);

    console.log('[ENTIDADES] Index atualizado:', entityIndex, '| Foco:', entidadeEmFoco);
}

        instrucaoResultado = `O jogador testou ${atributo} e FALHOU. A ação foi executada de forma desajeitada, fora do ritmo ou pouco convincente. O resultado é ruim ou constrangedor, mas sem dano físico e sem reação hostil. Narre isso com brevidade.`;
    }
} else {

    if (resultado === 'SUCESSO') {

    }
}

FATOS A SEREM TRANSCRITOS: ${descricaoSala}${alertaMortos}${elementosInterativos}` // <-- Variável adicionada aqui!
