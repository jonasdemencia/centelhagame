<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha • Jogo Medieval Brutal (com testes visíveis)</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #local-atual { color: #ffaa00; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #3a3228; padding-bottom: 4px; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .user-message { color: #7a8c66; align-self: flex-end; background: #1e2a1a; padding: 6px 12px; border-radius: 12px 0 12px 12px; max-width: 80%; word-wrap: break-word; }
        .ai-message { color: #a13d3d; align-self: flex-start; background: #2a1a1a; padding: 6px 12px; border-radius: 0 12px 12px 12px; max-width: 80%; word-wrap: break-word; }
        .system-message { color: #6b6b4a; text-align: center; font-style: italic; font-size: 0.9em; margin: 5px 0; }
        #controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; font-family: inherit; font-size: 16px; }
        button { padding: 12px 20px; cursor: pointer; background: #3a3228; color: #fff; border: none; font-family: inherit; font-size: 16px; transition: 0.2s; }
        button:hover:not(:disabled) { background: #5a4a38; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="game-container">
       <div id="local-atual" style="display: flex; justify-content: space-between;">
           <span>⚔️ Reinos Desolados • <span id="modelo-span">qwen2.5-7b-instruct-abliterated-v2</span></span>
           <span id="energia-span" style="color: #a13d3d; font-weight: bold;">🩸 Energia: 10/10</span>
       </div>

        <div id="chat-box">
            <div class="system-message">⚔️ O narrador está preparando o cenário...</div>
        </div>

        <div id="controls">
            <input type="text" id="user-input" placeholder="Sua ação...">
            <button id="send-btn" onclick="enviar(document.getElementById('user-input').value.trim())">Agir</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ============================================================
        // Configuração do Firebase & Firestore
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC0XfvjonW2gd1eGAZX7NBYfPGMwI2siJw",
            authDomain: "centelhagame-9d511.firebaseapp.com",
            projectId: "centelhagame-9d511",
            storageBucket: "centelhagame-9d511.appspot.com",
            messagingSenderId: "700809803145",
            appId: "1:700809803145:web:bff4c6a751ec9389919d58"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const sessionId = "sessao_dev_01"; 

        // ============================================================
        // Configuração do LM Studio e Controle de Contexto
        // ============================================================
        const LM_URL = 'http://localhost:1234/v1/chat/completions';
        const MODELO = 'qwen2.5-7b-instruct-abliterated-v2';
        const LIMITE_MENSAGENS = 16;
        window._introGenerating = false;

        let turnosJogados = 0;
        let energia = 10;
        
        let precomputedJuizPromise = null;
        let precomputedJuizText = '';
        let juizDebounceTimer = null;

        let memoriaLonga = "";

        const jogadorStats = {
            HABILIDADE: 5,
            CARISMA: 3,
            SORTE: 4
        };

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // ============================================================
        // REATIVAÇÃO DO LISTENER DO JUIZ INVISÍVEL
        // ============================================================
        userInput.addEventListener('input', () => {
            const text = userInput.value.trim();
            if (text.length < 3) return; 
            
            clearTimeout(juizDebounceTimer);
            juizDebounceTimer = setTimeout(() => {
                if (precomputedJuizText !== text) {
                    console.debug('[JUIZ BACKGROUND] Avaliando intenção enquanto o jogador digita...');
                    precomputedJuizText = text;
                    precomputedJuizPromise = avaliarAcao(text);
                }
            }, 600); // Espera 600ms após o jogador parar de digitar
        });
        
        // Permite enviar com a tecla Enter
        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                enviar(userInput.value.trim());
            }
        });

        let mensagens = [
            {
                role: 'system',
                content: `Você é um motor narrativo de um RPG brutal e punitivo. Responda APENAS em Português Brasileiro CORRETO. Nunca escreva em outro idioma. Você NUNCA dá conselhos ao jogador, NUNCA dialoga com ele como um assistente e NUNCA repete as instruções do jogador.
REGRAS DE OURO:
- O Fio da Vida: Para ferir fisicamente ou psicologicamente o jogador fora de testes, você tem permissão OBRIGATÓRIA de adicionar no fim da sua resposta a tag [DANO: X] (onde X é de 1 a 10). Seja sádico e injusto, mas opere de forma lógica no dano.
- Tensão Psicológica: O verdadeiro horror está no que não é dito ou mostrado. Mostre as consequências (cadáveres, loucura, ruínas), atrase o monstro.
- Realismo Sujo: Evite adjetivos bonitos. Use verbos de ação e substantivos concretos. 
- Violência Física: Toda descrição de impacto físico DEVE, em um único parágrafo contínuo, 
cobrir obrigatoriamente: (1) o som exato do impacto, (2) a reação anatômica do corpo atingido 
— onde foi perfurado, como o tecido cedeu, como caiu — e (3) o estado final da cena. 
- EXECUÇÃO MANDATÓRIA: Se o jogador declarar uma ação violenta, você deve descrever o resultado FINAL. É estritamente proibido interromper a ação com eventos externos, hesitações ou diálogos. 
- PROSA FORENSE: Descreva o dano como um patologista. Foco em: rompimento de tecido, fratura óssea, fluidez de fluidos e o som seco da matéria cedendo.
- DESENVOLVIMENTO NARRATIVO: Faça o ambiente reagir. NPCs agem por conta própria. O tempo passa. Algo sempre muda (seguindo uma coerencia narrativa) entre uma ação e outra.
- OBJETIVIDADE DE JOGO: Trate cada local como um 'ponto de interesse' em um mapa de RPG clássico. Se o jogador investigar, forneça informações que ajudem a resolver o mistério central.
- MECÂNICA DE TESTES: Quando a instrução MECÂNICA disser SUCESSO, a ação do jogador FUNCIONOU. Descreva o sucesso com brutalidade. JAMAIS aplique [DANO] ao jogador num turno de SUCESSO declarado — isso viola a mecânica.`
            },
            {
                role: 'system',
                content: ''
            },
            {
                role: 'system',
                content: 'Resumo da jornada até agora: A aventura acabou de começar.'
            }
        ];

        let resumoAtual = "";

        // ============================================================
        // Funções de Inicialização e Firebase
        // ============================================================
        async function carregarSessao() {
            try {
                const docRef = doc(db, "sessoes", sessionId);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    if (docSnap.data().memoriaLonga) {
                        memoriaLonga = docSnap.data().memoriaLonga;
                        mensagens[1].content = `LORE PERMANENTE DO MUNDO (verdade absoluta — nunca contradiga nem altere):\n${memoriaLonga}`;
                    }
                    if (docSnap.data().resumo) {
                        resumoAtual = docSnap.data().resumo;
                        mensagens[2].content = `ESTADO ATUAL DO MUNDO (use como referência factual, não repita como narração):\n${resumoAtual}`;
                    }
                    if (docSnap.data().turnos !== undefined) {
                        turnosJogados = docSnap.data().turnos;
                    }
                    if (docSnap.data().energia !== undefined) {
                        energia = docSnap.data().energia;
                        document.getElementById('energia-span').innerText = `🩸 Energia: ${energia}/10`;
                    }
                }
            } catch (e) {
                console.error("Erro ao carregar do Firestore:", e);
            }
        }

        async function salvarResumoFirestore(novoResumo) {
            try {
                await setDoc(doc(db, "sessoes", sessionId), { 
                    resumo: novoResumo,
                    turnos: turnosJogados,
                    energia: energia
                }, { merge: true });
            } catch (e) {
                console.error("Erro ao salvar no Firestore:", e);
            }
        }

        // ============================================================
        // MEMÓRIA LONGA
        // ============================================================
        async function gerarMemoriaLonga(textoIntro) {
            if (memoriaLonga) return;

            const promptLore = [
                {
                    role: 'system',
                    content: 'Você é um extrator de lore. Dado o texto de introdução de um RPG, preencha os campos abaixo com dados factuais extraídos do texto. Zero prosa. Zero adjetivos literários. Apenas nomes e fatos secos.\n\nMUNDO: [nome do cenário/reino principal]\nAMEAÇA: [nome e natureza da ameaça principal]\nARQUÉTIPO: [arquétipo do jogador]\nMISSÃO: [objetivo concreto da missão]\nLOCALIZAÇÕES: [lista separada por vírgulas de TODOS os lugares nomeados: reinos, regiões, vilas, rios, montanhas, pântanos, locais específicos — apenas os nomes, sem descrição]\n\nResponda APENAS com os campos preenchidos, sem texto adicional.'
                },
                {
                    role: 'user',
                    content: `Texto da introdução:\n${textoIntro}\n\nGere a memória permanente agora.`
                }
            ];

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: promptLore,
                        temperature: 0.1,
                        max_tokens: 250
                    })
                });
                const data = await response.json();
                memoriaLonga = data.choices[0].message.content.trim();
                mensagens[1].content = `LORE PERMANENTE DO MUNDO (verdade absoluta — nunca contradiga nem altere):\n${memoriaLonga}`;
                await setDoc(doc(db, "sessoes", sessionId), { memoriaLonga }, { merge: true });
                console.debug('[MEMÓRIA LONGA] Gerada e salva:', memoriaLonga);
            } catch (e) {
                console.error('Erro ao gerar memória longa:', e);
            }
        }

        // ============================================================
        // Função do Diretor de Fases
        // ============================================================
        function obterDiretrizDeFase() {
            if (turnosJogados < 50) {
                return "FASE 1 - MISTÉRIO FUNCIONAL: Mantenha o ritmo lento. Cada descrição deve revelar uma PISTA de algo maior. Não force o perigo, force a CURIOSIDADE através de detalhes mecânicos (portas trancadas, símbolos incompletos). O perigo é apenas um sussurro, uma lenda ou um rastro perturbador no cenário. É ESTRITAMENTE PROIBIDO mostrar a ameaça principal. Foco no mistério e na exploração do infamiliar.";
            } else if (turnosJogados < 250) {
                return "FASE 2 - PARANOIA: Os sinais da ameaça são recentes. O ambiente reage a algo invisível (animais mortos, cheiro de podridão, NPCs aterrorizados). O perigo é iminente, mas ainda indireto.";
            } else if (turnosJogados < 450) {
                return "FASE 3 - PERSEGUIÇÃO: O jogador vê a ameaça de relance. Sobrevivência se torna o foco. O cerco está se fechando. Tensão alta, descreva o som e o impacto da ameaça no ambiente.";
            } else {
                return "FASE 4 - O CLÍMAX: O confronto direto, visceral e inevitável. Apostas máximas. Descreva a brutalidade do embate.";
            }
        }

        // ============================================================
        // Compressão de Memória
        // ============================================================
        const SSR_TEMPLATE = `LOCAL: [onde o jogador está agora]
NPCS: [lista de personagens encontrados e seu estado atual: nome/descrição, relação, vivo/morto/desconhecido]
ITENS: [itens carregados ou relevantes no cenário]
EVENTOS_CHAVE: [lista de fatos consumados, em ordem, sem atmosfera — apenas o que aconteceu]
SITUACAO_ATUAL: [uma frase: o que o jogador está fazendo ou diante de agora]
GANCHOS_ATIVOS: [pistas ou ameaças não resolvidas que devem ser lembradas]`;

        async function comprimirMemoria() {
            if (mensagens.length > LIMITE_MENSAGENS) {
                console.debug('[SSR] Iniciando compressão de memória em background...');
                
                const mensagensParaResumir = mensagens.splice(3, 10); 
                const textoExtraido = mensagensParaResumir
                    .map(m => `${m.role === 'user' ? 'JOGADOR' : 'NARRADOR'}: ${m.content}`)
                    .join('\n---\n');

                const promptResumo = [
                    { 
                        role: 'system', 
                        content: `Você é um extrator de estado de jogo. Sua única função é preencher o formulário abaixo com dados factuais extraídos dos eventos fornecidos. REGRAS ABSOLUTAS:
1. ZERO prosa, ZERO atmosfera, ZERO adjetivos literários.
2. Cada campo deve ser preenchido com fatos secos e objetivos.
3. Se o estado anterior já tiver um campo, ATUALIZE-O com as novas informações — não apague o que ainda é verdade.
4. Se não houver informação para um campo, escreva: [sem dados].
5. Responda APENAS com o formulário preenchido, sem nenhum texto adicional antes ou depois.

FORMULÁRIO:
${SSR_TEMPLATE}`
                    },
                    { 
                        role: 'user', 
                        content: `ESTADO ANTERIOR:\n${resumoAtual || '[início da aventura — sem estado anterior]'}\n\nNOVOS EVENTOS:\n${textoExtraido}\n\nPreencha o formulário de estado atualizado agora.`
                    }
                ];

                try {
                    const response = await fetch(LM_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: MODELO,
                            messages: promptResumo,
                            temperature: 0.1,
                            max_tokens: 350
                        })
                    });
                    
                    const data = await response.json();
                    resumoAtual = data.choices[0].message.content.trim();
                    
                    console.debug('[SSR] Estado estruturado gerado:\n' + resumoAtual);
                    
                    mensagens[2].content = `ESTADO ATUAL DO MUNDO (use como referência factual, não repita como narração):\n${resumoAtual}`;
                    await salvarResumoFirestore(resumoAtual);
                    
                } catch (error) {
                    console.error("Erro ao comprimir memória:", error);
                    mensagens.splice(3, 0, ...mensagensParaResumir); // Reverte se falhar
                }
            }
        }

        // ============================================================
        // Funções auxiliares Visuais
        // ============================================================
        function adicionarMensagem(texto, tipo, temporaria = false) {
            const div = document.createElement('div');
            div.className = tipo === 'user' ? 'user-message' : tipo === 'system' ? 'system-message' : 'ai-message';
            div.innerText = texto;
            if (temporaria) {
                div.id = 'temp-' + Date.now() + '-' + Math.random();
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.id;
        }

        // ============================================================
        // O Juiz Invisível
        // ============================================================
        async function avaliarAcao(acaoUsuario) {
            const promptJuiz = [
                { 
                    role: 'system', 
                    content: `Você é o Juiz de Intenção de um RPG. Analise a mensagem do jogador e classifique-a em dois eixos.
                    
EIXO 1 (POSTURA): 
- OBSERVACAO: O jogador está apenas olhando, perguntando detalhes, pedindo direções ou refletindo. 
- INTERACAO: O jogador está tentando agir sobre o mundo (abrir, pegar, mover, falar).

EIXO 2 (MECÂNICA — seja MUITO CONSERVADOR. Na dúvida, escolha NENHUM):
- HABILIDADE: ação física ou mental de alto risco real.
- CARISMA: convencer alguém hostil ou cético de algo importante; seduzir; intimidar com consequências.
- SORTE: situação de puro acaso onde o resultado é imprevisível e as apostas são altas.
- NENHUM: tudo o mais. Andar, observar, pegar objeto simples, falar trivialmente, explorar sem perigo claro.

REGRA DE OURO: Se a ação não envolver risco CONCRETO e IMEDIATO de falha com consequência séria, use NENHUM.

Responda APENAS no formato: POSTURA | MECÂNICA. Exemplo: OBSERVACAO | NENHUM` 
                },
                { role: 'user', content: acaoUsuario }
            ];

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: promptJuiz,
                        temperature: 0.2,
                        max_tokens: 20
                    })
                });
                const data = await response.json();
                const classificacao = data.choices[0].message.content.trim().toUpperCase();
                
                const partes = classificacao.split('|');
                if (partes.length === 2) {
                    const postura = partes[0].trim();
                    const mecanica = partes[1].trim();
                    if (['OBSERVACAO', 'INTERACAO'].includes(postura) && 
                        ['HABILIDADE', 'CARISMA', 'SORTE', 'NENHUM'].includes(mecanica)) {
                        return classificacao; 
                    }
                }
                return 'OBSERVACAO | NENHUM';
            } catch (error) {
                console.error('Erro no juiz:', error);
                return 'OBSERVACAO | NENHUM';
            }
        }

        // ============================================================
        // Motor de Regras
        // ============================================================
        function rolarTeste(atributo) {
            if (atributo === 'NENHUM' || !jogadorStats[atributo]) return null;
            const rolagem = Math.floor(Math.random() * 10) + 1;
            return rolagem <= jogadorStats[atributo] ? 'SUCESSO' : 'FALHA';
        }

        // ============================================================
        // Streaming SSE
        // ============================================================
        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: mensagensPayload,
                        temperature: window._introGenerating ? 0.8 : 0.6,
                        max_tokens: maxTokens,
                        presence_penalty: 0.3,
                        frequency_penalty: 0.3,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') continue;
                        
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr = chunk.choices?.[0]?.finish_reason;

                            if (delta) {
                                fullText += delta;
                                if (onToken) onToken(fullText);
                            }
                            if (fr && fr !== 'null') {
                                finishReason = fr;
                            }
                        } catch (parseErr) {
                            console.error('[LLM STREAM] Erro ao parsear chunk:', parseErr);
                        }
                    }
                }

                return { text: fullText, finishReason };
            } catch (error) {
                console.error('[LLM STREAM] Falha:', error);
                throw error;
            }
        }

        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elemento, maxContinuacoes = 0) {
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];

            for (let tentativa = 0; tentativa <= maxContinuacoes; tentativa++) {
                if (tentativa > 0) {
                    msgsAtual = [
                        ...msgsAtual,
                        { role: 'assistant', content: textoCompleto },
                        { role: 'user', content: 'Continue.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
                        elemento.innerText = textoCompleto + parcial;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

                if (finishReason !== 'length') break;
            }

            return textoCompleto;
        }

        // ============================================================
        // Pré-aquecimento do KV Cache
        // ============================================================
        async function preAquecerCache() {
            try {
                const contextoPreaecido = [
                    ...mensagens,
                    { role: 'user', content: '...' }
                ];
                
                await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: contextoPreaecido,
                        max_tokens: 1,
                        temperature: 0.1,
                        stream: false
                    })
                });
                console.debug('[PRÉ-AQUECIMENTO] KV Cache carregado para o próximo turno.');
            } catch (e) {
                console.debug('[PRÉ-AQUECIMENTO] Erro (ignorado):', e.message);
            }
        }

        const PROMPT_INTRO = `Esta é a introdução da aventura. Escreva em exatamente 5 parágrafos. NÃO use títulos ou marcadores — apenas prosa corrida. Apresente os seguintes elementos de forma entrelaçada:

1 — Apresente o cenário com nome próprio. Mostre as particularidades e mistérios do mundo. 
2 — Apresente quem é o jogador. Um arquétipo claro. Sua razão para agir. Sem nome próprio. Sem emoções descritas.
3 — Apresente a AMEAÇA. o antagonista, acontecimento perturbador ou força maligna. Dê um nome. Localize-o. Deixe claro que outros tentaram e falharam. Não explique a origem — preserve o mistério.
4 — Apresente a MISSÃO E AS APOSTAS: o que o jogador precisa fazer (um objetivo concreto e tangível). O que acontece se falhar — para o jogador e para o mundo ao redor.
5 — Apresente onde o jogador está agora (um lugar físico específico). Termine com uma circunstância que obrigue o jogador a agir.

MANTENHA: segunda pessoa ("você"), frases curtas, detalhes sensoriais concretos, zero emoções descritas, zero adjetivos empilhados.

IMPORTANTE: Ao final da resposta, adicione uma linha com a tag [LORE:] seguida dos dados no formato:
MUNDO: [nome]
AMEAÇA: [nome e natureza]
ARQUÉTIPO: [arquétipo do jogador]
MISSÃO: [objetivo concreto]
LOCALIZAÇÕES: [lista separada por vírgulas]

A tag deve ser a última coisa, em uma linha separada. Não adicione explicações.`;

        // ============================================================
        // Função principal de envio (RESTRUTURADA PARA PERFORMANCE)
        // ============================================================
        window.enviar = async function(mensagemUsuario = null) {
            const isInitial = mensagemUsuario === null;
            
            if (!isInitial) turnosJogados++;

            let pergunta = isInitial ? 
                (!resumoAtual ? PROMPT_INTRO : 'O jogo foi recarregado. Com base no resumo da história, narre rapidamente a cena atual (usando a regra padrão de frases curtas) e pergunte o que eu faço agora.') 
                : mensagemUsuario;

            if (!isInitial) {
                adicionarMensagem(pergunta, 'user');
                userInput.value = '';
            }

            sendBtn.disabled = true;
            userInput.disabled = true;

            const tempId = adicionarMensagem('...', 'ai', true);
            const elementoDisplay = document.getElementById(tempId);

            try {
                // A COMPRESSÃO FOI MOVIDA PARA O FINAL (BACKGROUND)

                let mensagemParaNarrador = pergunta;

                if (!isInitial) {
                    const faseAtual = obterDiretrizDeFase();
                    const diretrizes = `\n\n[DIRETRIZES DE DIREÇÃO]: \n1. ESTADO DO JOGO: ${faseAtual}\n2. REGRA DE ESTILO: Máximo 6 frases. Frases secas, mantenha o tom sombrio e direto. Segunda pessoa do singular.\n3. TENSÃO: Não use clichês emocionais. Construa medo pelo que FALTA ou pelo que está QUEBRADO no ambiente. Mostre, não conte. Oculte informações do jogador.`;

                    mensagemParaNarrador += diretrizes;

                    let classificacaoCompleta;
                    
                    // Aproveita o resultado do Juiz se o jogador não mudou a frase de última hora
                    if (precomputedJuizPromise && precomputedJuizText === pergunta) {
                        classificacaoCompleta = await precomputedJuizPromise;
                        console.debug('[JUIZ] Resultado pré-computado aproveitado:', classificacaoCompleta);
                        precomputedJuizPromise = null;
                        precomputedJuizText = '';
                    } else {
                        console.debug('[JUIZ] Calculando na hora (não houve tempo para background)...');
                        classificacaoCompleta = await avaliarAcao(pergunta);
                    }
                    
                    const [postura, tipoAcao] = classificacaoCompleta.split(' | ');

                    let resultadoTeste = null;
                    if (['HABILIDADE', 'CARISMA', 'SORTE'].includes(tipoAcao)) {
                        resultadoTeste = rolarTeste(tipoAcao);
                    }

                    // Bloco corrigido de rolagem de dados
                    if (resultadoTeste) {
                        adicionarMensagem(`🎲 Teste de ${tipoAcao}: ${resultadoTeste}`, 'system');
                        mensagemParaNarrador += `\n[MECÂNICA]: O jogador realizou um teste de ${tipoAcao} e o resultado foi ${resultadoTeste}. Descreva o resultado final da ação com brutalidade (em caso de sucesso) ou com severa punição (em caso de falha), obedecendo estritamente as regras de ouro.`;
                    }
                }

                mensagens.push({ role: 'user', content: mensagemParaNarrador });
                window._introGenerating = isInitial;

                // GERA A NARRATIVA IMEDIATAMENTE
                const textoResposta = await gerarRespostaComContinuacao(mensagens, isInitial ? 800 : 350, elementoDisplay, 1);
                
                elementoDisplay.removeAttribute('id');
                mensagens.push({ role: 'assistant', content: textoResposta });

                // ==========================================
                // TAREFAS DE BACKGROUND (Não travam a interface)
                // ==========================================
                setTimeout(async () => {
                    if (isInitial && !memoriaLonga) await gerarMemoriaLonga(textoResposta);
                    await comprimirMemoria(); // Só roda agora, após a narrativa
                    await preAquecerCache();  // Joga o contexto na VRAM do Qwen
                }, 100);

            } catch (error) {
                console.error("Erro no fluxo do jogo:", error);
                adicionarMensagem("As engrenagens do mundo travaram. A conexão psíquica com o modelo foi perdida.", "system");
            } finally {
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
                window._introGenerating = false;
            }
        };

        // Inicia o jogo se não houver dados
        window.onload = async () => {
            await carregarSessao();
            if (mensagens.length === 3) {
                enviar(null); // Roda a intro
            }
        };

    </script>
</body>
</html>
