        async function chamarGroq(messages, temperatura = 0.7, formato = { type: "json_object" }) {
    const response = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            messages: messages,
            temperature: temperatura,
            response_format: formato,
        }),
    });

    // Captura o body independente do status HTTP
    const data = await response.json();
    console.log('[Groq] Resposta raw do Worker:', JSON.stringify(data).slice(0, 400));

    if (!response.ok) {
        // Worker retornou HTTP 4xx/5xx — loga o body para diagnóstico
        throw new Error(`Erro no Worker [${response.status}]: ${JSON.stringify(data)}`);
    }

    // Groq retornou HTTP 200 mas com body de erro (ex: rate limit, token expirado)
    if (data.error) {
        throw new Error(`Erro da Groq API: ${data.error.message ?? JSON.stringify(data.error)}`);
    }

    // Valida shape mínimo antes de retornar
    if (!data.choices || !Array.isArray(data.choices) || data.choices.length === 0) {
        throw new Error(`Resposta da Groq sem 'choices': ${JSON.stringify(data).slice(0, 300)}`);
    }

    return data;
}

async function gerarGrafoGroq(cenarioTema) {

    const sementeCaos = Math.random().toString(36).substring(2, 10);
    const timestamp   = Date.now();
    const variaveisDeHorror = [
        "Sons úmidos e claustrofobia corporal",
        "Decadência arquitetônica e poeira sufocante",
        "Objetos religiosos profanados e silêncio absoluto",
        "Iluminação bruxuleante e sombras móveis",
        "Frio extremo, geada sobre ossos e metal congelado",
        "Cheiro de decomposição doce e insetos rastejantes",
        "Ecos distantes e a sensação de ser observado"
    ];
    const tomSorteado = variaveisDeHorror[Math.floor(Math.random() * variaveisDeHorror.length)];

    // ============================================================
    // FASE 1 — DNA NARRATIVO
    // O modelo pensa na estrutura completa ANTES de escrever salas.
    // ============================================================
    const promptDNA = `[ID: ${sementeCaos}-${timestamp}] [TOM: ${tomSorteado}]

Você é Steve Jackson projetando uma aventura solo antes de escrever uma única sala.
Tema: "${cenarioTema}"

Construa o ESQUELETO narrativo de uma aventura de 25 seções. Nenhuma prosa ainda — apenas arquitetura.

Retorne APENAS este JSON:
{
  "ameaca_central": "o que ameaça o jogador neste lugar e por quê",
  "condicao_vitoria": "o que o jogador precisa fazer ou descobrir para sobreviver",
  "objetos_chave": [
    { "nome": "nome do objeto", "sala_origem": N, "sala_uso": N, "consequencia": "o que muda quando usado" },
    { "nome": "...", "sala_origem": N, "sala_uso": N, "consequencia": "..." },
    { "nome": "...", "sala_origem": N, "sala_uso": N, "consequencia": "..." }
  ],
  "revelacoes": [
    { "sala": N, "conteudo": "o que o jogador descobre aqui que muda sua compreensão do lugar" },
    { "sala": N, "conteudo": "..." },
    { "sala": N, "conteudo": "..." },
    { "sala": N, "conteudo": "..." },
    { "sala": N, "conteudo": "..." }
  ],
  "becos_sem_saida": [N, N, N],
  "atalhos_secretos": [ { "de": N, "para": N, "condicao": "o que o jogador precisa ter feito antes" } ],
  "arco": {
    "ato1_estabelecimento": "o que o jogador aprende nas salas 1-8",
    "ato2_complicacao": "o que vira de cabeça para baixo nas salas 9-18",
    "ato3_climax": "como tudo converge nas salas 19-25"
  }
}`;

    // ============================================================
    // FASE 2 — GERAÇÃO DAS 25 SALAS COM DNA COMO CONTEXTO
    // ============================================================
    const promptSalas = (dna) => `[ID: ${sementeCaos}-${timestamp}] [TOM: ${tomSorteado}]

Você é Steve Jackson escrevendo a aventura "${cenarioTema}".
Você tem o esqueleto completo. Agora construa as 25 salas.

ESQUELETO DA AVENTURA:
${JSON.stringify(dna, null, 2)}

REGRAS DE JACKSON (invioláveis):

1. OPÇÕES COM PESO: cada opção deve implicar uma consequência clara. O jogador deve sentir que escolher errado custa algo. Nunca crie opções intercambiáveis.

2. PROIBIÇÕES ABSOLUTAS nas opções (se aparecerem, você falhou):
   - "Procurar por mais informações"
   - "Desistir e voltar"
   - "Explorar a sala"
   - "Investigar o local"
   - Qualquer opção que comece com "Procurar por" sem nomear o objeto exato

3. ESPECIFICIDADE: nomeie o elemento físico exato. "Forçar a grade enferrujada com o ombro" não "Ir para o corredor".

4. COERÊNCIA TEXTO→OPÇÃO: cada elemento físico nas opções DEVE aparecer mencionado no texto_logico. O texto é a justificativa sensorial das escolhas.

5. OBJETOS-CHAVE: nas salas de origem, o objeto deve aparecer no texto de forma encontrável mas não óbvia. Na sala de uso, a opção que usa o objeto deve existir como uma das escolhas.

6. REVELAÇÕES: nas salas marcadas, o texto_logico deve conter a revelação de forma visceral e concreta.

7. BECOS SEM SAÍDA: salas marcadas como becos devem ter no máximo 2 saídas, ambas com risco claro implícito.

8. TOPOLOGIA: crie caminhos não lineares. IDs de destino podem ser menores que o ID atual (backtracking com propósito). Máximo de destino: 25.

Retorne APENAS o JSON:
{
  "1": { "texto_logico": "descrição seca e forense", "opcoes": [{ "texto": "ação específica com peso", "destino": N }] },
  "2": { ... },
  ...
  "25": { ... }
}`;

    // ============================================================
    // FASE 3 — INSPEÇÃO EDITORIAL JACKSON
    // Um editor brutal que descarta qualquer fraqueza estrutural.
    // ============================================================
    const promptJackson = (dna, mapaRaw) => `Você é o editor de Steve Jackson. Sua única função: identificar salas fracas e corrigi-las.

CRITÉRIOS DE FALHA — corrija imediatamente qualquer sala que contenha:
- Opções genéricas ("Procurar por mais informações", "Desistir e voltar", "Explorar", "Investigar o local")
- Duas ou mais opções com estrutura verbal idêntica ("Examinar X", "Examinar Y", "Examinar Z")
- texto_logico que não menciona os elementos referenciados nas opções
- Opções com destinos que não fazem sentido narrativo dado o contexto da sala

DNA original para referência:
${JSON.stringify(dna, null, 2)}

MAPA A REVISAR:
${JSON.stringify(mapaRaw, null, 2)}

Retorne o mapa COMPLETO. Salas aprovadas: mantenha intactas. Salas reprovadas: reescreva apenas as partes fracas.
Retorne APENAS o JSON no mesmo formato.`;

    try {
        // --- FASE 1 ---
        const id1 = adicionarMensagem("⚙️ Fase 1/3 — Forjando o DNA narrativo...", "system", true);
        const dataDNA = await chamarGroq(
            [{ role: "user", content: promptDNA }],

        const dna = JSON.parse(dataDNA.choices[0].message.content);

        // --- FASE 3 ---

            [{ role: "user", content: promptJackson(dna, mapaRaw) }],

        const mapaFinal = JSON.parse(dataFinal.choices[0].message.content);

    } catch (error) {
        console.error("Erro na geração do mapa:", error);
        adicionarMensagem(`❌ Falha na geração. (${error.message})`, "system");
    }
}

        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: mensagensPayload,
                        temperature: window._introGenerating ? 0.4 : 0.4,
                        max_tokens: maxTokens,
                        presence_penalty: 0.0,
                        frequency_penalty: 0.0,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') continue;
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr = chunk.choices?.[0]?.finish_reason;

                            if (delta) {
                                fullText += delta;
                                if (onToken) onToken(fullText);
                            }
                            if (fr && fr !== 'null') finishReason = fr;
                        } catch (parseErr) {}
                    }
                }
                return { text: fullText, finishReason };
            } catch (error) {
                throw error;
            }
        }

                        { role: 'assistant', content: textoCompleto },
                        { role: 'user', content: 'Continue a narração em português brasileiro.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
    if (!primeiroTokenRecebido) {
        primeiroTokenRecebido = true;
    }
    elemento.innerText = textoCompleto + parcial;
    chatBox.scrollTop = chatBox.scrollHeight;
}
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

        function buildEntityIndex(ssrJson) {

                const virgulaIdx = entrada.indexOf(',');

                const nome   = entrada.slice(0, virgulaIdx).trim().toLowerCase();

            const situacao = ssrJson?.situacao_atual?.toLowerCase() || '';
            for (const [nome, estado] of Object.entries(entityIndex)) {
                if (situacao.includes(nome)) {
                    entidadeEmFoco = { nome, estado };

            }
            if (!entidadeEmFoco && Object.keys(entityIndex).length > 0) {

                if (temPronome) return `[${entidadeEmFoco.nome}: ${entidadeEmFoco.estado}]`;
            }
            return '';
        }

        // --- RESOLVEDOR DE ESTADO RELACIONAL ---
function resolverEstadoRelacionalNPC(entidade) {
    if (!entidade) return 'desconhecido';
    const estado = entidade.estado || '';

    if (/mort[ao]|cadáver|sem vida|desmaiou|inconsciente/.test(estado)) return 'morto';
    if (/hostil|agressiv|furios|raivos|ameaç|atacando/.test(estado))     return 'hostil';
    if (/aliado|amigo|confia|ajudando|parceiro/.test(estado))            return 'aliado';
    if (/apavorad|assustad|tremendo|submisos|rendid/.test(estado))       return 'submisso';
    return 'neutro';
}

// --- NORMALIZADOR DE INPUT ---
function normalizarAcao(acao) {
    return acao
        .toLowerCase()
        .trim()
        .replace(/^(mestre|narrador|gm)[,:]?\s*/i, '')
        .replace(/^["'](.+)["']$/, '$1');
}

function classificarAcao(acaoOriginal) {
    // Prefixo de sistema → sempre LIVRE, sem teste
    if (acaoOriginal.startsWith('[AÇÃO DE SISTEMA]')) {
        return { tipo: 'LIVRE', atributo: 'NENHUM', fonte: 'sistema' };
    }

    const acao = normalizarAcao(acaoOriginal);

    // Metalinguagem: perguntas ao narrador, pedidos de status/mapa → LIVRE
    const ehMeta = /^(me descreva|descreva|diga|me diga|explique|me conte|conte|narre|como é|como s[aã]o|qual|quais|onde fica|o que [eé]|tem algo|existe|h[aá]|quantos|me ajude|ajude|status|inventário|mapa)\b/.test(acao);
    if (ehMeta) return { tipo: 'LIVRE', atributo: 'NENHUM', fonte: 'meta' };

    // NPC morto em foco → ação sobre matéria inerte é LIVRE
    const estadoRelacional = entidadeEmFoco ? resolverEstadoRelacionalNPC(entidadeEmFoco) : null;
    if (estadoRelacional === 'morto') {
        return { tipo: 'LIVRE', atributo: 'NENHUM', fonte: 'sem-alvo' };
    }

    // Tudo mais → árbitro 1.5B decide com exemplos concretos
    return null;
}

// --- PARSER DE ESTADO DE ENTIDADES (roda após CADA resposta do narrador) ---
function parsearEstadoEntidades(textoNarrador) {
    const match = textoNarrador.match(/\[NPCS:\s*([^\]]+)\]/i);
    if (!match) {
        console.warn('[ENTIDADES] Tag [NPCS:] não encontrada na resposta. Mantendo estado anterior.');
        return;
    }

    const payload = match[1].trim();
    if (payload.toLowerCase() === 'nenhum') {
        entityIndex = {};
        entidadeEmFoco = null;
        console.log('[ENTIDADES] Nenhum NPC em cena. Index zerado.');
        return;
    }

    const entradas = payload.split('|');
    const novoIndex = {};

    for (const entrada of entradas) {
        const [nome, estado] = entrada.split(':').map(s => s.trim().toLowerCase());
        if (nome && estado) novoIndex[nome] = estado;
    }

    // --- GUARDA: estado "morto" é irreversível ---
    // Se um NPC já estava morto no índice anterior, mantém "morto" no novo índice.
    for (const [nome, estadoAntigo] of Object.entries(entityIndex)) {
        if (estadoAntigo === 'morto') {
            novoIndex[nome] = 'morto';
        }
    }

    entityIndex = novoIndex;

    const situacao = ssrJson?.situacao_atual?.toLowerCase() || '';
    let focoEncontrado = null;

    for (const [nome, estado] of Object.entries(entityIndex)) {
        if (situacao.includes(nome)) {
            focoEncontrado = { nome, estado };
            break;
        }
    }

    entidadeEmFoco = focoEncontrado
        ?? (Object.keys(entityIndex).length > 0
            ? { nome: Object.keys(entityIndex)[0], estado: Object.values(entityIndex)[0] }
            : null);

    console.log('[ENTIDADES] Index atualizado:', entityIndex, '| Foco:', entidadeEmFoco);
}

        window.enviar = async function(mensagemUsuario = null) {
