<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha • Jogo Medieval Brutal (com testes visíveis)</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #local-atual { color: #ffaa00; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #3a3228; padding-bottom: 4px; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .user-message { color: #7a8c66; align-self: flex-end; background: #1e2a1a; padding: 6px 12px; border-radius: 12px 0 12px 12px; max-width: 80%; word-wrap: break-word; }
        .ai-message { color: #a13d3d; align-self: flex-start; background: #2a1a1a; padding: 6px 12px; border-radius: 0 12px 12px 12px; max-width: 80%; word-wrap: break-word; }
        .system-message { color: #6b6b4a; text-align: center; font-style: italic; font-size: 0.9em; margin: 5px 0; }
        #controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; font-family: inherit; font-size: 16px; }
        button { padding: 12px 20px; cursor: pointer; background: #3a3228; color: #fff; border: none; font-family: inherit; font-size: 16px; transition: 0.2s; }
        button:hover:not(:disabled) { background: #5a4a38; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="local-atual">
            ⚔️ Reinos Desolados • <span id="modelo-span">qwen2.5-7b-instruct-abliterated-v2</span>
        </div>

        <div id="chat-box">
            <div class="system-message">⚔️ O narrador está preparando o cenário...</div>
        </div>

        <div id="controls">
            <input type="text" id="user-input" placeholder="Sua ação..." disabled>
            <button id="send-btn" onclick="enviar(document.getElementById('user-input').value.trim())" disabled>Agir</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ============================================================
        // Configuração do Firebase & Firestore
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC0XfvjonW2gd1eGAZX7NBYfPGMwI2siJw",
            authDomain: "centelhagame-9d511.firebaseapp.com",
            projectId: "centelhagame-9d511",
            storageBucket: "centelhagame-9d511.appspot.com",
            messagingSenderId: "700809803145",
            appId: "1:700809803145:web:bff4c6a751ec9389919d58"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const sessionId = "sessao_dev_01"; 

        // ============================================================
        // Configuração do LM Studio e Controle de Contexto
        // ============================================================
        const LM_URL = 'http://localhost:1234/v1/chat/completions';
        const MODELO = 'qwen2.5-7b-instruct-abliterated-v2';
        const LIMITE_MENSAGENS = 24;
        window._introGenerating = false;

        let turnosJogados = 0;

        const jogadorStats = {
            HABILIDADE: 5,
            CARISMA: 3,
            SORTE: 4
        };

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let mensagens = [
            {
                role: 'system',
                content: `Você é um motor narrativo de um RPG de fantasia brutal e punitiva. Responda APENAS em Português Brasileiro CORRETO. Nunca escreva em outro idioma.
REGRAS DE OURO:
- Tensão Psicológica: O verdadeiro horror está no que não é dito ou mostrado. Mostre as consequências (cadáveres, loucura, ruínas), atrase o monstro.
- Realismo Sujo: Evite adjetivos bonitos. Use verbos de ação e substantivos concretos (barro, sangue coagulado, ferrugem, silêncio sufocante).
- Imparcialidade Cruel: Nunca decida o que o jogador sente (ex: "Você sente medo"). Apenas descreva o ambiente hostil com frieza.
- Mecânica: Nunca resolva um obstáculo pelo jogador.`
            },
            {
                role: 'system',
                content: 'Resumo da jornada até agora: A aventura acabou de começar.'
            }
        ];

        let resumoAtual = "";

        // ============================================================
        // Funções de Inicialização e Firebase
        // ============================================================
        async function carregarSessao() {
            try {
                const docRef = doc(db, "sessoes", sessionId);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    if (docSnap.data().resumo) {
                        resumoAtual = docSnap.data().resumo;
                        mensagens[1].content = `Resumo da jornada até agora: ${resumoAtual}`;
                    }
                    if (docSnap.data().turnos !== undefined) {
                        turnosJogados = docSnap.data().turnos;
                    }
                }
            } catch (e) {
                console.error("Erro ao carregar do Firestore:", e);
            }
        }

        async function salvarResumoFirestore(novoResumo) {
            try {
                await setDoc(doc(db, "sessoes", sessionId), { 
                    resumo: novoResumo,
                    turnos: turnosJogados 
                }, { merge: true });
            } catch (e) {
                console.error("Erro ao salvar no Firestore:", e);
            }
        }

        // ============================================================
        // Função do Diretor de Fases
        // ============================================================
        function obterDiretrizDeFase() {
            if (turnosJogados < 50) {
                return "FASE 1 - RASTROS: O perigo é apenas um sussurro ou rastro perturbador. É PROIBIDO mostrar a ameaça principal. Foco no mistério e na estranheza do ambiente.";
            } else if (turnosJogados < 250) {
                return "FASE 2 - PARANOIA: Os sinais da ameaça são recentes. O ambiente reage a algo invisível. O perigo é iminente, mas ainda indireto.";
            } else if (turnosJogados < 450) {
                return "FASE 3 - PERSEGUIÇÃO: O jogador vê a ameaça de relance. Sobrevivência é o foco. O cerco está se fechando.";
            } else {
                return "FASE 4 - CLÍMAX: Confronto direto, visceral e inevitável. Apostas máximas.";
            }
        }

        // ============================================================
        // Funções de Compressão de Memória — Structured State Representation (SSR)
        // ============================================================
        const SSR_TEMPLATE = `LOCAL: [onde o jogador está agora]
NPCS: [lista de personagens encontrados e seu estado atual: nome/descrição, relação, vivo/morto/desconhecido]
ITENS: [itens carregados ou relevantes no cenário]
EVENTOS_CHAVE: [lista de fatos consumados, em ordem, sem atmosfera — apenas o que aconteceu]
SITUACAO_ATUAL: [uma frase: o que o jogador está fazendo ou diante de agora]
GANCHOS_ATIVOS: [pistas ou ameaças não resolvidas que devem ser lembradas]`;

        async function comprimirMemoria() {
            if (mensagens.length > LIMITE_MENSAGENS) {
                adicionarMensagem('⚙️ As engrenagens do destino giram. Consolidando memórias...', 'system');
                
                const mensagensParaResumir = mensagens.splice(2, 6); 
                const textoExtraido = mensagensParaResumir
                    .map(m => `${m.role === 'user' ? 'JOGADOR' : 'NARRADOR'}: ${m.content}`)
                    .join('\n---\n');

                const promptResumo = [
                    { 
                        role: 'system', 
                        content: `Você é um extrator de estado de jogo. Sua única função é preencher o formulário abaixo com dados factuais extraídos dos eventos fornecidos. REGRAS ABSOLUTAS:
1. ZERO prosa, ZERO atmosfera, ZERO adjetivos literários.
2. Cada campo deve ser preenchido com fatos secos e objetivos.
3. Se o estado anterior já tiver um campo, ATUALIZE-O com as novas informações — não apague o que ainda é verdade.
4. Se não houver informação para um campo, escreva: [sem dados].
5. Responda APENAS com o formulário preenchido, sem nenhum texto adicional antes ou depois.

FORMULÁRIO:
${SSR_TEMPLATE}`
                    },
                    { 
                        role: 'user', 
                        content: `ESTADO ANTERIOR:\n${resumoAtual || '[início da aventura — sem estado anterior]'}\n\nNOVOS EVENTOS:\n${textoExtraido}\n\nPreencha o formulário de estado atualizado agora.`
                    }
                ];

                try {
                    const response = await fetch(LM_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: MODELO,
                            messages: promptResumo,
                            temperature: 0.1,
                            max_tokens: 350
                        })
                    });
                    
                    const data = await response.json();
                    const novoSSR = data.choices[0].message.content.trim();
                    
                    console.debug('[SSR] Estado estruturado gerado:\n' + novoSSR);
                    
                    resumoAtual = novoSSR;
                    mensagens[1].content = `ESTADO ATUAL DO MUNDO (use como referência factual, não repita como narração):\n${resumoAtual}`;
                    await salvarResumoFirestore(resumoAtual);
                    
                } catch (error) {
                    console.error("Erro ao comprimir memória:", error);
                    mensagens.splice(2, 0, ...mensagensParaResumir); 
                }
            }
        }

        // ============================================================
        // Funções auxiliares Visuais
        // ============================================================
        function adicionarMensagem(texto, tipo, temporaria = false) {
            const div = document.createElement('div');
            div.className = tipo === 'user' ? 'user-message' : tipo === 'system' ? 'system-message' : 'ai-message';
            div.innerText = texto;
            if (temporaria) {
                div.id = 'temp-' + Date.now() + '-' + Math.random();
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.id;
        }

        // ============================================================
        // Função 1: O Juiz Invisível
        // ============================================================
        async function avaliarAcao(acaoUsuario) {
            const promptJuiz = [
                { 
                    role: 'system', 
                    content: `Você é um classificador de ações de RPG. Analise a mensagem do jogador e decida se ela representa uma ação que exige teste de atributo ou apenas uma pergunta descritiva. Categorias: HABILIDADE, CARISMA, SORTE, NENHUM. Responda APENAS com a categoria em maiúsculas. NÃO adicione explicações.` 
                },
                { role: 'user', content: acaoUsuario }
            ];

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: promptJuiz,
                        temperature: 0.2,
                        max_tokens: 10
                    })
                });
                const data = await response.json();
                const classificacao = data.choices[0].message.content.trim().toUpperCase();
                
                if (['HABILIDADE', 'CARISMA', 'SORTE', 'NENHUM'].includes(classificacao)) {
                    return classificacao;
                }
                return 'NENHUM';
            } catch (error) {
                console.error('Erro no juiz:', error);
                return 'NENHUM';
            }
        }

        // ============================================================
        // Função 2: Motor de Regras
        // ============================================================
        function rolarTeste(atributo) {
            if (atributo === 'NENHUM' || !jogadorStats[atributo]) return null;
            const rolagem = Math.floor(Math.random() * 10) + 1;
            return rolagem <= jogadorStats[atributo] ? 'SUCESSO' : 'FALHA';
        }

        // ============================================================
        // Streaming SSE com loop de auto-continuação
        // ============================================================
        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            console.log("🔥 Temperatura usada:", window._introGenerating ? 0.95 : 0.55);
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: mensagensPayload,
                        temperature: window._introGenerating ? 0.95 : 0.55,
                        max_tokens: maxTokens,
                        presence_penalty: window._introGenerating ? 0.9 : 0.3,
                        frequency_penalty: window._introGenerating ? 0.9 : 0.3,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') continue;
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr = chunk.choices?.[0]?.finish_reason;
                            if (delta) {
                                fullText += delta;
                                if (onToken) onToken(fullText);
                            }
                            if (fr && fr !== 'null') finishReason = fr;
                            if (chunk.error) console.error('[LLM STREAM] Erro no chunk:', chunk.error);
                        } catch (parseErr) {
                            console.error('[LLM STREAM] Erro ao parsear chunk:', parseErr);
                        }
                    }
                }

                console.debug(`[LLM STREAM] Concluído. ~${fullText.split(' ').length} palavras. finish_reason: "${finishReason}"`);
                return { text: fullText, finishReason };
            } catch (error) {
                console.error('[LLM STREAM] Falha:', error);
                throw error;
            }
        }

        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elemento, maxContinuacoes = 0) {
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];

            for (let tentativa = 0; tentativa <= maxContinuacoes; tentativa++) {
                if (tentativa > 0) {
                    msgsAtual = [
                        ...msgsAtual,
                        { role: 'assistant', content: textoCompleto },
                        { role: 'user', content: 'Continue.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
                        elemento.innerText = textoCompleto + parcial;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

                if (finishReason !== 'length') break;
            }

            return textoCompleto;
        }

        // ============================================================
        // PROMPT DE INTRODUÇÃO
        //
        // Filosofia: nenhum conteúdo é prescrito. O modelo recebe:
        //
        //   1. SEMENTE ABSTRATA — um número que não indexa lista alguma.
        //      É apresentado como "frequência" da sessão — âncora
        //      psicológica que sinaliza singularidade irrepetível.
        //
        //   2. INSTRUÇÕES DE PROCESSO — perguntas que o modelo responde
        //      internamente antes de escrever. Isso ativa deliberação
        //      criativa em vez de geração por média estatística.
        //
        //   3. PROIBIÇÕES (não prescrições) — o que NÃO fazer. Uma
        //      proibição é aberta (infinitas alternativas); uma prescrição
        //      é fechada (N alternativas). Proibir padrões comuns empurra
        //      o modelo para fora da sua distribuição central sem ditar
        //      destino. Cada sessão a lista de proibições rotaciona,
        //      bloqueando fatias diferentes da média.
        //
        //   4. RESTRIÇÕES FORMAIS — controlam a forma do texto, não o
        //      conteúdo. Criam pressão criativa sem reduzir o espaço
        //      semântico disponível.
        // ============================================================
        const PROMPT_INTRO = (() => {
            const seed = Math.floor(Math.random() * 999983);

            // Proibições rotatórias — cada grupo bloqueia uma fatia
            // diferente da distribuição média do modelo.
            // O grupo é selecionado pela semente, sem hard-coding de conteúdo.
            const gruposDeProibicoes = [
                // Grupo A — bloqueia clichês de fantasia épica
                `— Nenhum castelo, masmorra, dungeon ou calabouço genérico.
— Nenhum herói que acorda com uma profecia ou missão sagrada.
— Nenhuma taverna, pousada ou cidade murada como ponto de partida.
— Nenhum "mal antigo" sem rosto, forma ou comportamento concreto.
— Nenhum protagonista que sabe exatamente quem é e o que deve fazer.`,

                // Grupo B — bloqueia clichês de horror e suspense
                `— Nenhuma mansão, casa abandonada ou cemitério.
— Nenhuma névoa inexplicável como recurso de atmosfera.
— Nenhum monstro que aparece no escuro sem ter sido estabelecido antes.
— Nenhum protagonista que "desperta" ou "não se lembra de como chegou aqui".
— Nenhuma vila isolada com moradores desconfiados como abertura.`,

                // Grupo C — bloqueia clichês de ficção científica pulp
                `— Nenhuma nave em colapso como ponto de partida.
— Nenhum despertar em câmara criogênica ou cápsula de emergência.
— Nenhuma IA ou computador como primeiro elemento de cena.
— Nenhuma missão de resgate em estação espacial abandonada.
— Nenhum protagonista que é o único sobrevivente de algo.`,

                // Grupo D — bloqueia clichês de aventura de ação
                `— Nenhum protagonista em perseguição ou fuga no início.
— Nenhuma missão recebida de um empregador, rei, ou mentor.
— Nenhum mapa, artefato ou objeto sagrado como MacGuffin inicial.
— Nenhuma batalha, duelo ou confronto físico nos dois primeiros parágrafos.
— Nenhum grupo de companheiros: o protagonista começa sozinho e sem aliados óbvios.`,

                // Grupo E — bloqueia clichês de aventura política e espionagem
                `— Nenhuma conspiração revelada por um informante no início.
— Nenhum protagonista disfarçado cuja cobertura está prestes a ser descoberta.
— Nenhuma organização secreta como contexto imediato.
— Nenhum assassinato político como gatilho inicial.
— Nenhum documento, mapa ou código como primeiro objeto do cenário.`
            ];

            const idxGrupo = seed % gruposDeProibicoes.length;
            const proibicoes = gruposDeProibicoes[idxGrupo];

            console.debug(`[INTRO] Seed: ${seed} | Grupo de proibições: ${idxGrupo}`);

            return `FREQUÊNCIA DESTA SESSÃO: ${seed}

Você é um escritor de ficção de aventura interativa. Sua reputação foi construída sobre uma única recusa: nunca começar duas histórias da mesma forma. Esta sessão tem uma frequência única — use-a como âncora. O que você escrever agora existe apenas uma vez.

PROCESSO INTERNO — responda a estas perguntas mentalmente antes de escrever. Não as escreva. Não as mencione:
→ Qual é a coisa mais inesperada que poderia acontecer na primeira frase desta aventura?
→ O protagonista sabe onde está? Sabe quem é? Tem um corpo intacto?
→ O perigo é visível, invisível, social, físico, ambiental, cósmico — ou algo que não tem nome ainda?
→ Qual detalhe sensorial concreto e específico (não genérico) abre esta história?
→ Qual é a estrutura narrativa desta abertura — clássica, em fragmentos, em segunda cena, como documento encontrado, como voz que vem de fora?

PROIBIÇÕES DESTA SESSÃO — estas escolhas estão bloqueadas:
${proibicoes}

RESTRIÇÕES DE FORMA — obrigatórias:
— A primeira frase NÃO começa com a palavra "Você".
— Cada parágrafo contém exatamente um detalhe sensorial concreto: textura, cheiro, temperatura, som ou sabor — nunca uma emoção descrita.
— O protagonista não tem nome próprio.
— A ameaça ou crise não precisa ser nomeada nem completamente compreendida no início.
— O quinto parágrafo termina com uma circunstância que torna a inação impossível — não uma pergunta, mas uma situação.

Escreva 5 parágrafos de prosa corrida. Zero títulos. Zero marcadores. Zero meta-comentários. Segunda pessoa ("você"). Frases curtas e secas.`;
        })();

        // ============================================================
        // Função principal de envio
        // ============================================================
        window.enviar = async function(mensagemUsuario = null) {
            const isInitial = mensagemUsuario === null;
            
            if (!isInitial) turnosJogados++;

            let pergunta;
            if (isInitial) {
                if (!resumoAtual) {
                    pergunta = PROMPT_INTRO;
                } else {
                    pergunta = 'O jogo foi recarregado. Com base no resumo da história, narre rapidamente a cena atual (usando a regra padrão de frases curtas) e pergunte o que eu faço agora.';
                }
            } else {
                pergunta = mensagemUsuario;
            }

            if (!isInitial) {
                adicionarMensagem(pergunta, 'user');
                userInput.value = '';
            }

            sendBtn.disabled = true;
            userInput.disabled = true;

            const tempId = adicionarMensagem('...', 'ai', true);
            const elementoDisplay = document.getElementById(tempId);

            try {
                await comprimirMemoria();

                let mensagemParaNarrador = pergunta;

                if (!isInitial) {
                    const faseAtual = obterDiretrizDeFase();

                    mensagemParaNarrador += `\n\n[DIRETRIZES]:
1. FASE: ${faseAtual}
2. ESTILO: Máximo 4 frases. Secas, curtas. Segunda pessoa do singular.
3. TENSÃO: Construa medo pelo que FALTA ou pelo que está QUEBRADO. Mostre — não conte. Oculte informação do jogador.`;

                    const tipoAcao = await avaliarAcao(pergunta);
                    const resultadoTeste = rolarTeste(tipoAcao);

                    if (resultadoTeste) {
                        adicionarMensagem(`[Teste de ${tipoAcao}: ${resultadoTeste}]`, 'system');
                        
                        let logicaFisica = '';
                        if (resultadoTeste === 'FALHA') {
                            const consequenciasPorAtributo = {
                                HABILIDADE: [
                                    'Ação FALHOU CRITICAMENTE. O jogador errou o movimento e sofreu DANO FÍSICO. Descreva o ferimento com crueza.',
                                    'Ação FALHOU. O corpo do jogador cedeu no momento decisivo. Descreva a dor física e a posição vulnerável em que ficou.',
                                    'Ação FALHOU. A falta de destreza custou caro. Descreva um erro mecânico com consequências físicas imediatas.'
                                ],
                                CARISMA: [
                                    'Ação FALHOU. O jogador disse a coisa errada. O interlocutor reagiu com HOSTILIDADE ABERTA — descreva a rejeição humilhante, o silêncio cortante ou a ameaça que surgiu.',
                                    'Ação FALHOU. O jogador foi ignorado ou escarnecido. Descreva a frieza do outro personagem, talvez acompanhada de riso ou desprezo. A situação social piorou.',
                                    'Ação FALHOU. A abordagem irritou o interlocutor. Descreva como ele se fechou, virou as costas ou sinalizou que a conversa acabou — de forma ameaçadora ou humilhante.'
                                ],
                                SORTE: [
                                    'Ação FALHOU. O destino foi cruel: descreva uma consequência mortal ou quase letal para o azar do jogador.',
                                ]
                            };

                            const lista = consequenciasPorAtributo[tipoAcao] || consequenciasPorAtributo['HABILIDADE'];
                            logicaFisica = lista[Math.floor(Math.random() * lista.length)];
                        }

                        mensagemParaNarrador += `\nMECÂNICA: Teste de ${tipoAcao} = ${resultadoTeste}. DIRETRIZ OBRIGATÓRIA: ${logicaFisica}`;
                    }
                }

                mensagens.push({ role: 'user', content: mensagemParaNarrador });

                const isIntro = (isInitial && !resumoAtual);
                const maxTokens       = isIntro ? 1000 : 200;
                const maxContinuacoes = isIntro ?    1 :   1;

                if (isIntro) window._introGenerating = true;

                const respostaIA = await gerarRespostaComContinuacao(mensagens, maxTokens, elementoDisplay, maxContinuacoes);

                if (isIntro) window._introGenerating = false;

                mensagens.push({ role: 'assistant', content: respostaIA });

                await salvarResumoFirestore(resumoAtual);

                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }

            } catch (error) {
                elementoDisplay.innerText = `❌ Erro: ${error.message}`;
                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                }
            } finally {
                if (!isInitial) {
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }
        };

        // ============================================================
        // Inicialização
        // ============================================================
        window.onload = async () => {
            await carregarSessao();
            window.enviar(); 
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                window.enviar(userInput.value.trim());
            }
        });
    </script>
</body>
</html>
