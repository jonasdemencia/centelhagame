<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha • Jogo Medieval Brutal (Teste com Dado Manual)</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; position: relative; }
        #local-atual { color: #ffaa00; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #3a3228; padding-bottom: 4px; display: flex; justify-content: space-between; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .user-message { color: #7a8c66; align-self: flex-end; background: #1e2a1a; padding: 6px 12px; border-radius: 12px 0 12px 12px; max-width: 80%; word-wrap: break-word; }
        .ai-message { color: #a13d3d; align-self: flex-start; background: #2a1a1a; padding: 6px 12px; border-radius: 0 12px 12px 12px; max-width: 80%; word-wrap: break-word; }
        .system-message { color: #6b6b4a; text-align: center; font-style: italic; font-size: 0.9em; margin: 5px 0; }
        #controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; font-family: inherit; font-size: 16px; }
        button { padding: 12px 20px; cursor: pointer; background: #3a3228; color: #fff; border: none; font-family: inherit; font-size: 16px; transition: 0.2s; }
        button:hover:not(:disabled) { background: #5a4a38; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Modal do dado */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e1c18;
            border: 4px solid #6a4a2a;
            padding: 30px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #e0c080;
            box-shadow: 8px 8px 0 #000;
            max-width: 400px;
        }
        .dice-button {
            background: #6a4a2a;
            font-size: 2rem;
            padding: 15px 30px;
            margin: 20px;
            border: none;
            color: #f0e0a0;
            cursor: pointer;
            font-weight: bold;
        }
        .dice-button:hover { background: #8a623a; }
        .dice-result {
            font-size: 1.2rem;
            margin-top: 15px;
            color: #c0a060;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="local-atual">
            <span>⚔️ Reinos Desolados • <span id="modelo-span">qwen2.5-7b-instruct-abliterated-v2</span></span>
            <span id="energia-span" style="color: #a13d3d; font-weight: bold;">🩸 Energia: 10/10</span>
        </div>

        <div id="chat-box">
            <div class="system-message">⚔️ O narrador está preparando o cenário...</div>
        </div>

        <div id="controls">
            <input type="text" id="user-input" placeholder="Sua ação..." disabled>
            <button id="send-btn" onclick="enviar()" disabled>Agir</button>
        </div>
    </div>

    <!-- Modal de rolagem de dado -->
    <div id="diceModal" class="modal">
        <div class="modal-content">
            <div>🎲 TESTE DE <span id="teste-atributo">???</span> 🎲</div>
            <button id="rollDiceBtn" class="dice-button">ROLAR DADO (d10)</button>
            <div id="diceResult" class="dice-result"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC0XfvjonW2gd1eGAZX7NBYfPGMwI2siJw",
            authDomain: "centelhagame-9d511.firebaseapp.com",
            projectId: "centelhagame-9d511",
            storageBucket: "centelhagame-9d511.appspot.com",
            messagingSenderId: "700809803145",
            appId: "1:700809803145:web:bff4c6a751ec9389919d58"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const sessionId = "sessao_dev_01"; 
        const LM_URL = 'http://localhost:1234/v1/chat/completions';
        const MODELO = 'qwen2.5-7b-instruct-abliterated-v2';
        const LIMITE_MENSAGENS = 9;
        window._introGenerating = false;

        let turnosJogados = 0;
        let energia = 10;
        let memoriaLonga = "";
        
        const jogadorStats = {
            HABILIDADE: 5,
            CARISMA: 5,
            SORTE: 4
        };

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let aguardandoTeste = false;
        let testePendente = { atributo: null, mensagemOriginal: null, elementoId: null };

        // Estrutura de mensagens
        let mensagens = [
            { role: 'system', content: `Você é um mestre de RPG brutal e realista. Responda APENAS em Português Brasileiro CORRETO.

REGRAS DE NARRATIVA:
- Tensão Psicológica, prosa forense para dano.
- Se o jogador fizer algo arriscado e não trivial, você DEVE exigir um teste de HABILIDADE, CARISMA ou SORTE.
- Para exigir o teste, escreva no final da sua mensagem exatamente assim: [TESTE_REQUERIDO: Atributo] onde Atributo é HABILIDADE, CARISMA ou SORTE.
- NÃO faça você mesmo a rolagem. O sistema mostrará uma janela para o jogador rolar.
- Após o jogador rolar, ele enviará [RESULTADO_TESTE: atributo | rolagem: X | sucesso: SIM/NAO]. Então você narrará o resultado conforme o sucesso ou falha, aplicando dano coerente se falhar.
- NUNCA narre o sucesso se o teste falhou. Interrompa a ação.
- Descreva dano como patologista.
- Use segunda pessoa, frases curtas.
- Só emita UM pedido de teste por mensagem.` },
            { role: 'system', content: '' },  // slot memoriaLonga
            { role: 'system', content: 'Resumo da jornada até agora: A aventura acabou de começar.' }
        ];
        let resumoAtual = "";

        // ========== Funções auxiliares ==========
        function adicionarMensagem(texto, tipo, temporaria = false) {
            const div = document.createElement('div');
            div.className = tipo === 'user' ? 'user-message' : tipo === 'system' ? 'system-message' : 'ai-message';
            div.innerText = texto;
            if (temporaria) div.id = 'temp-' + Date.now() + '-' + Math.random();
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.id;
        }

        function removerMensagemTemporaria(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        async function salvarEstadoFirestore() {
            try {
                await setDoc(doc(db, "sessoes", sessionId), { 
                    resumo: resumoAtual,
                    turnos: turnosJogados,
                    energia: energia,
                    memoriaLonga: memoriaLonga
                }, { merge: true });
            } catch (e) { console.error("Erro ao salvar:", e); }
        }

        async function carregarSessao() {
            try {
                const docRef = doc(db, "sessoes", sessionId);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    if (docSnap.data().memoriaLonga) {
                        memoriaLonga = docSnap.data().memoriaLonga;
                        mensagens[1].content = `LORE PERMANENTE DO MUNDO (verdade absoluta):\n${memoriaLonga}`;
                    }
                    if (docSnap.data().resumo) {
                        resumoAtual = docSnap.data().resumo;
                        mensagens[2].content = `Resumo da jornada: ${resumoAtual}`;
                    }
                    if (docSnap.data().turnos !== undefined) turnosJogados = docSnap.data().turnos;
                    if (docSnap.data().energia !== undefined) {
                        energia = docSnap.data().energia;
                        document.getElementById('energia-span').innerText = `🩸 Energia: ${energia}/10`;
                    }
                }
            } catch (e) { console.error("Erro ao carregar:", e); }
        }

        async function gerarMemoriaLonga(textoIntro) {
            if (memoriaLonga) return;
            const promptLore = [
                { role: 'system', content: 'Você é um extrator de lore. Extraia MUNDO, AMEAÇA, ARQUÉTIPO, MISSÃO, LOCALIZAÇÕES do texto. Responda só com campos.' },
                { role: 'user', content: `Texto:\n${textoIntro}` }
            ];
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: MODELO, messages: promptLore, temperature: 0.1, max_tokens: 250 })
                });
                const data = await response.json();
                memoriaLonga = data.choices[0].message.content.trim();
                mensagens[1].content = `LORE PERMANENTE DO MUNDO:\n${memoriaLonga}`;
                await setDoc(doc(db, "sessoes", sessionId), { memoriaLonga }, { merge: true });
            } catch (e) { console.error('Erro gerar memória:', e); }
        }

        async function comprimirMemoria() {
            if (mensagens.length > LIMITE_MENSAGENS) {
                const mensagensParaResumir = mensagens.splice(3, 6);
                const textoExtraido = mensagensParaResumir.map(m => `${m.role === 'user' ? 'JOGADOR' : 'NARRADOR'}: ${m.content}`).join('\n---\n');
                const promptResumo = [
                    { role: 'system', content: `Extraia estado factual: LOCAL, NPCS, ITENS, EVENTOS_CHAVE, SITUACAO_ATUAL, GANCHOS_ATIVOS.` },
                    { role: 'user', content: `Estado anterior:\n${resumoAtual || 'início'}\n\nEventos:\n${textoExtraido}` }
                ];
                try {
                    const response = await fetch(LM_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ model: MODELO, messages: promptResumo, temperature: 0.3, max_tokens: 350 })
                    });
                    const data = await response.json();
                    resumoAtual = data.choices[0].message.content.trim();
                    mensagens[2].content = `ESTADO ATUAL:\n${resumoAtual}`;
                    await salvarEstadoFirestore();
                } catch (error) { console.error("Erro compressão:", error); mensagens.splice(3, 0, ...mensagensParaResumir); }
            }
        }

        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            const response = await fetch(LM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: MODELO,
                    messages: mensagensPayload,
                    temperature: window._introGenerating ? 0.75 : 0.4,
                    max_tokens: maxTokens,
                    stream: true
                })
            });
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '', fullText = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const jsonStr = line.slice(6).trim();
                    if (jsonStr === '[DONE]') continue;
                    try {
                        const chunk = JSON.parse(jsonStr);
                        const delta = chunk.choices?.[0]?.delta?.content || '';
                        if (delta) {
                            fullText += delta;
                            if (onToken) onToken(fullText);
                        }
                    } catch (e) { console.error('Parse error', e); }
                }
            }
            return fullText;
        }

        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elementoDisplay, maxContinuacoes = 1) {
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];
            for (let tentativa = 0; tentativa <= maxContinuacoes; tentativa++) {
                if (tentativa > 0) {
                    msgsAtual.push({ role: 'assistant', content: textoCompleto }, { role: 'user', content: 'Continue a narração em português brasileiro.' });
                }
                const text = await chamarLLMStream(msgsAtual, maxTokens, (parcial) => {
                    elementoDisplay.innerText = textoCompleto + parcial;
                    chatBox.scrollTop = chatBox.scrollHeight;
                });
                textoCompleto += text;
                elementoDisplay.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;
                if (!text.includes('length')) break;
            }
            return textoCompleto;
        }

        // ========== Dado Modal ==========
        function mostrarModalTeste(atributo, mensagemOriginalId, respostaOriginal) {
            aguardandoTeste = true;
            testePendente = { atributo, mensagemOriginal: respostaOriginal, elementoId: mensagemOriginalId };
            const modal = document.getElementById('diceModal');
            const spanAtributo = document.getElementById('teste-atributo');
            spanAtributo.innerText = atributo;
            document.getElementById('diceResult').innerHTML = '';
            modal.style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('diceModal').style.display = 'none';
            aguardandoTeste = false;
            testePendente = null;
        }

        async function finalizarTeste(rolagem, sucesso) {
            const { atributo, elementoId, mensagemOriginal } = testePendente;
            fecharModal();
            
            // Remove a mensagem temporária e coloca a versão sem marcador
            removerMensagemTemporaria(elementoId);
            const textoLimpo = mensagemOriginal.replace(/\[TESTE_REQUERIDO:\s*\w+\]/i, '').trim();
            adicionarMensagem(textoLimpo, 'ai');
            mensagens.push({ role: 'assistant', content: textoLimpo });
            
            // Exibe resultado do teste como sistema
            const resultadoStr = sucesso ? "✅ Sucesso!" : "❌ Falha!";
            adicionarMensagem(`🎲 Teste de ${atributo}: rolou ${rolagem} (atributo ${jogadorStats[atributo]}). ${resultadoStr}`, 'system');
            
            // Prepara nova mensagem de usuário com resultado
            const msgTeste = `[RESULTADO_TESTE: ${atributo} | rolagem: ${rolagem} | sucesso: ${suesso ? "SIM" : "NAO"}]`;
            
            // Adiciona essa mensagem e chama novamente a IA para continuar
            mensagens.push({ role: 'user', content: msgTeste });
            
            // Reativa controles e chama enviar novamente (mas sem incrementar turno)
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
            
            // Chama a continuação (mesmo fluxo de enviar, mas sem incrementar turno)
            await continuarAposTeste();
        }
        
        async function continuarAposTeste() {
            const tempId = adicionarMensagem('...', 'ai', true);
            const elementoDisplay = document.getElementById(tempId);
            try {
                await comprimirMemoria();
                const respostaIA = await gerarRespostaComContinuacao(mensagens, 300, elementoDisplay, 1);
                
                // Remove possível marcador residual
                const respostaLimpa = respostaIA.replace(/\[TESTE_REQUERIDO:\s*\w+\]/i, '').trim();
                elementoDisplay.innerText = respostaLimpa;
                mensagens.push({ role: 'assistant', content: respostaLimpa });
                
                // Verifica dano implícito (fallback)
                const danoMatch = respostaIA.match(/dano:\s*(\d+)/i);
                if (danoMatch) {
                    const dano = parseInt(danoMatch[1]);
                    if (dano > 0) {
                        energia -= dano;
                        document.getElementById('energia-span').innerText = `🩸 Energia: ${Math.max(0, energia)}/10`;
                        adicionarMensagem(`[Você perdeu ${dano} de Energia.]`, 'system');
                        if (energia <= 0) {
                            adicionarMensagem("💀 SEU CORPO CEDE. FIM.", 'system');
                            userInput.disabled = true; sendBtn.disabled = true;
                            return;
                        }
                    }
                }
                await salvarEstadoFirestore();
            } catch (err) {
                elementoDisplay.innerText = `❌ Erro: ${err.message}`;
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
        
        // ========== Função principal de envio ==========
        window.enviar = async function(mensagemUsuario = null) {
            if (aguardandoTeste) return; // evita múltiplas ações
            
            const isInitial = mensagemUsuario === null;
            if (!isInitial) {
                turnosJogados++;
                adicionarMensagem(mensagemUsuario, 'user');
                userInput.value = '';
            }
            
            sendBtn.disabled = true;
            userInput.disabled = true;
            
            const tempId = adicionarMensagem('...', 'ai', true);
            const elementoDisplay = document.getElementById(tempId);
            
            try {
                await comprimirMemoria();
                
                let pergunta = mensagemUsuario;
                if (isInitial) {
                    pergunta = !resumoAtual ? 
                        "Descreva em 3 frases curtas a seguinte cena: Você está numa sala de pedra. Há uma mesa, um espelho rachado e uma vela quase apagada. Uma mulher jovem e bela de cabelos escuros está de frente para você. O que você faz?" 
                        : "O jogo foi recarregado. Narre rapidamente a cena atual e pergunte o que faço.";
                }
                
                mensagens.push({ role: 'user', content: pergunta });
                
                const isIntro = (isInitial && !resumoAtual);
                const maxTokens = isIntro ? 500 : 300;
                const maxContinuacoes = 1;
                if (isIntro) window._introGenerating = true;
                
                const respostaIA = await gerarRespostaComContinuacao(mensagens, maxTokens, elementoDisplay, maxContinuacoes);
                if (isIntro) window._introGenerating = false;
                
                // Verifica se há pedido de teste
                const testeMatch = respostaIA.match(/\[TESTE_REQUERIDO:\s*(\w+)\]/i);
                if (testeMatch && !isInitial) { // só interrompe se não for a intro
                    const atributo = testeMatch[1].toUpperCase();
                    // Mostra modal e guarda contexto
                    mostrarModalTeste(atributo, tempId, respostaIA);
                    // Não adiciona a mensagem final ainda, aguarda o teste
                    return; // para aqui, não prossegue
                }
                
                // Sem teste: finaliza normalmente
                const respostaLimpa = respostaIA.replace(/\[TESTE_REQUERIDO:\s*\w+\]/i, '').trim();
                elementoDisplay.innerText = respostaLimpa;
                mensagens.push({ role: 'assistant', content: respostaLimpa });
                
                // Possível dano direto (fallback)
                const danoMatch = respostaIA.match(/dano:\s*(\d+)/i);
                if (danoMatch) {
                    const dano = parseInt(danoMatch[1]);
                    if (dano > 0) {
                        energia -= dano;
                        document.getElementById('energia-span').innerText = `🩸 Energia: ${Math.max(0, energia)}/10`;
                        adicionarMensagem(`[Você perdeu ${dano} de Energia.]`, 'system');
                        if (energia <= 0) {
                            adicionarMensagem("💀 SEU CORPO CEDE. FIM.", 'system');
                            userInput.disabled = true; sendBtn.disabled = true;
                            return;
                        }
                    }
                }
                
                if (isInitial) {
                    gerarMemoriaLonga(respostaIA);
                }
                
                await salvarEstadoFirestore();
                
            } catch (error) {
                elementoDisplay.innerText = `❌ Erro: ${error.message}`;
            } finally {
                if (!aguardandoTeste) {
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }
        };
        
        // ========== Configurar botão do dado ==========
        document.getElementById('rollDiceBtn').addEventListener('click', () => {
            if (!testePendente) return;
            const atributo = testePendente.atributo;
            const valorAtributo = jogadorStats[atributo];
            const rolagem = Math.floor(Math.random() * 10) + 1;
            const sucesso = rolagem <= valorAtributo;
            document.getElementById('diceResult').innerHTML = `🎲 Resultado: ${rolagem} (precisa ≤ ${valorAtributo})<br>${sucesso ? "✨ SUCESSO!" : "💀 FALHA!"}`;
            document.getElementById('rollDiceBtn').disabled = true;
            setTimeout(() => finalizarTeste(rolagem, sucesso), 1500);
        });
        
        // ========== Inicialização ==========
        window.onload = async () => {
            await carregarSessao();
            window.enviar();
        };
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled && !aguardandoTeste) {
                window.enviar(userInput.value.trim());
            }
        });
    </script>
</body>
</html>
