required: ["local", "npcs", "situacao_atual"],

                    console.warn("â ïž [MemĂłria] JSON truncado. Tentando protocolo de recuperaĂ§ĂŁo de emergĂȘncia...", parseError);
                    
                    // VĂĄlvula de Escape 1: Tenta fechar chaves e aspas automaticamente

                            // Fecha as estruturas do schema

        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: mensagensPayload,
                        temperature: window._introGenerating ? 0.75 : 0.6,
                        max_tokens: maxTokens,
                        presence_penalty: 0.0,
                        frequency_penalty: 0.0,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') continue;
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr = chunk.choices?.[0]?.finish_reason;

                            if (delta) {
                                fullText += delta;
                                if (onToken) onToken(fullText);
                            }
                            if (fr && fr !== 'null') finishReason = fr;
                        } catch (parseErr) {}
                    }
                }
                return { text: fullText, finishReason };
            } catch (error) {
                throw error;
            }
        }

        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elemento, maxContinuacoes = 0) {
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];

            for (let tentativa = 0; tentativa <= maxContinuacoes; tentativa++) {
                if (tentativa > 0) {
                    msgsAtual = [
                        ...msgsAtual,
                        { role: 'assistant', content: textoCompleto },
                        { role: 'user', content: 'Continue a narraĂ§ĂŁo em portuguĂȘs brasileiro.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
    if (!primeiroTokenRecebido) {
        primeiroTokenRecebido = true;
    }
    elemento.innerText = textoCompleto + parcial;
    chatBox.scrollTop = chatBox.scrollHeight;
}
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

                if (finishReason !== 'length') break;
            }
            return textoCompleto;
        }

        const PROMPT_INTRO = `Descreva em 3 frases curtas a seguinte cena, em segunda pessoa: VocĂȘ estĂĄ numa sala de pedra. HĂĄ uma mesa, um espelho e uma vela quase apagada. Uma mulher jovem e bela de cabelos claros estĂĄ de frente para vocĂȘ. O que vocĂȘ faz?`;

        function buildEntityIndex(ssrJson) {
            entityIndex = {};
            entidadeEmFoco = null;

            for (const entrada of (ssrJson?.npcs || [])) {
                const virgulaIdx = entrada.indexOf(',');
                if (virgulaIdx === -1) continue;
                const nome   = entrada.slice(0, virgulaIdx).trim().toLowerCase();
                const estado = entrada.slice(virgulaIdx + 1).trim().toLowerCase();
                entityIndex[nome] = estado;
            }

            const situacao = ssrJson?.situacao_atual?.toLowerCase() || '';
            for (const [nome, estado] of Object.entries(entityIndex)) {
                if (situacao.includes(nome)) {
                    entidadeEmFoco = { nome, estado };
                    break;
                }
            }
            if (!entidadeEmFoco && Object.keys(entityIndex).length > 0) {
                const [nome, estado] = Object.entries(entityIndex)[0];
                entidadeEmFoco = { nome, estado };
            }
        }

        function resolverMicroContexto(acao) {
            const lower = acao.toLowerCase();
            for (const [nome, estado] of Object.entries(entityIndex)) {
                if (lower.includes(nome)) return `[${nome}: ${estado}]`;
            }
            if (entidadeEmFoco) {
                const todosPronomes = [...PRONOMES_FEMININOS, ...PRONOMES_MASCULINOS, ...PRONOMES_NEUTROS];
                const temPronome = todosPronomes.some(p => lower.includes(p));
                if (temPronome) return `[${entidadeEmFoco.nome}: ${entidadeEmFoco.estado}]`;
            }
            return '';
        }

        async function classificarAcaoLLM(acaoUsuario) {
    const microContexto = resolverMicroContexto(acaoUsuario);
    
    // 1. ExtraĂ­mos o histĂłrico puro de intenĂ§Ă”es, ignorando a prosa do narrador.
    const acoesJogador = mensagens.filter(m => m.role === 'user');
    const acaoAnterior = acoesJogador.length > 1 ? acoesJogador[acoesJogador.length - 1].content : "Nenhuma";

    // 2. Montamos um prompt cirĂșrgico e seco para o 1.5B processar instantaneamente.
    const promptFinal = `AĂĂO ANTERIOR DO JOGADOR: "${acaoAnterior}"
MICRO-CONTEXTO DO ALVO: ${microContexto || "[Nenhum/Desconhecido]"}
AĂĂO ATUAL DO JOGADOR: "${acaoUsuario}"`;

    const response = await fetch(LM_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            model: MODELO_JUIZ,
            messages: [
                {
                    role: 'system',
                    content: `VocĂȘ Ă© um classificador de aĂ§Ă”es de RPG. 
Classifique a aĂ§ĂŁo ATUAL do jogador em EXATAMENTE um tipo e um atributo.

TIPO:
- TRIVIAL (sem risco de falha): observar, caminhar, conversar amigavelmente com aliados.
- ARRISCADA (risco de rejeiĂ§ĂŁo, hostilidade ou fracasso): atacar, fugir, dar ordens a um alvo ferido/hostil, seduzir, extrair informaĂ§Ă”es.

REGRAS DE CONTEXTO:
Se a "AĂĂO ANTERIOR" foi agressiva ou invasiva contra o alvo, QUALQUER diĂĄlogo ou pedido social subsequente torna-se ARRISCADO e DEVE OBRIGATORIAMENTE testar CARISMA (IntimidaĂ§ĂŁo/CoerĂ§ĂŁo). Jamais teste HABILIDADE para aĂ§Ă”es de fala.

ATRIBUTO (apenas se ARRISCADA):
- HABILIDADE: aĂ§Ă”es fĂ­sicas, combate, furtividade, destreza.
- CARISMA: persuasĂŁo, seduĂ§ĂŁo, engano, coerĂ§ĂŁo, aproximaĂ§ĂŁo Ă­ntima, ordens.
- SORTE: roletas, eventos caĂłticos, apostas, tentativas.
- NENHUM: se TRIVIAL.`
                },
                {
                    role: 'user',
                    content: promptFinal
                }
            ],
            temperature: 0.0,
                    max_tokens: 30,
                    response_format: {
                        type: "json_schema",
                        json_schema: {
                            name: "classificacao_acao",
                            strict: true,
                            schema: {
                                type: "object",
                                properties: {
                                    tipo: { type: "string", enum: ["TRIVIAL", "ARRISCADA"] },
                                    atributo: { type: "string", enum: ["HABILIDADE", "CARISMA", "SORTE", "NENHUM"] }
                                },
                                required: ["tipo", "atributo"],
                                additionalProperties: false
                            }
                        }
                    }
                })
            });
            const data = await response.json();
const raw = data.choices[0].message.content;
console.log('[JUIZ RAW]', raw);
return JSON.parse(raw);
        }

        async function animarTextoTeste(texto) {
            const div = document.createElement('div');
            div.className = 'teste-reveal';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            for (const char of texto) {
                div.innerText += char;
                await new Promise(r => setTimeout(r, 40));
            }
        }

        function criarBotaoRolar() {
            return new Promise(resolve => {
                const btn = document.createElement('button');
                btn.id = 'rolar-btn';
                btn.innerText = 'â ROLAR DADO';
                chatBox.appendChild(btn);
                chatBox.scrollTop = chatBox.scrollHeight;
                btn.addEventListener('click', () => { btn.remove(); resolve(); }, { once: true });
            });
        }

        function mostrarResultadoDado(semente, atributo, valorAtributo, resultado) {
            const divDado = document.createElement('div');
            divDado.className = 'resultado-dado';
            divDado.innerText = `Rolagem: ${semente} vs ${atributo} ${valorAtributo}`;
            chatBox.appendChild(divDado);
            const divRes = document.createElement('div');
            divRes.className = resultado === 'SUCESSO' ? 'resultado-sucesso' : 'resultado-falha';
            divRes.innerText = resultado;
            chatBox.appendChild(divRes);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
      
        window.enviar = async function(mensagemUsuario = null) {
            const isInitial = mensagemUsuario === null;
            
            if (!isInitial) {
                turnosJogados++;
            }

            let pergunta;
            if (isInitial) {
                if (!resumoAtual) {
                    pergunta = PROMPT_INTRO;
                } else {
                    pergunta = 'O jogo foi recarregado. Com base no resumo da histĂłria, narre rapidamente a cena atual (usando a regra padrĂŁo de frases curtas) e pergunte o que eu faĂ§o agora.';
                }
            } else {
                pergunta = mensagemUsuario;
            }

            if (!isInitial) {
                adicionarMensagem(pergunta, 'user');
                userInput.value = '';
            }

            sendBtn.disabled = true;
            userInput.disabled = true;

            const tempId = adicionarMensagem('', 'ai', true);
const elementoDisplay = document.getElementById(tempId);

// Inicia a animaĂ§ĂŁo de palavras sombrias
let contadorAnim = 0;
let indicePalavra = Math.floor(Math.random() * PALAVRAS_SOMBRIAS.length);
let exibindoPensando = false;
let ciclosPensando = 0;
primeiroTokenRecebido = false;

intervaloAnimacao = setInterval(() => {
    if (!primeiroTokenRecebido) {
        // A cada ~1.2 segundos (8 ciclos de 150ms), alterna para "pensando..." por 3 ciclos
        if (contadorAnim % 8 === 0) {
            exibindoPensando = true;
            ciclosPensando = 0;
        }
        
        let textoExibido = '';
        if (exibindoPensando && ciclosPensando < 4) {
            // Exibe "pensando..." com reticĂȘncias variĂĄveis
            const pontos = '.'.repeat(ciclosPensando % 4);
            textoExibido = `pensando${pontos}`;
            ciclosPensando++;
            if (ciclosPensando >= 4) exibindoPensando = false;
        } else {
            // Exibe palavra sombria
            const palavra = PALAVRAS_SOMBRIAS[indicePalavra % PALAVRAS_SOMBRIAS.length];
            const pontos = '.'.repeat((Math.floor(contadorAnim / 2) % 4));
            textoExibido = `${palavra}${pontos}`;
            indicePalavra++;
        }
        
        elementoDisplay.innerText = textoExibido;
        
        // PulsaĂ§ĂŁo suave (opacidade entre 0.4 e 0.9)
        const opacidade = 0.4 + (Math.sin(Date.now() / 400) * 0.25);
        elementoDisplay.style.opacity = opacidade;
        elementoDisplay.style.letterSpacing = '2px';
        elementoDisplay.style.transition = 'opacity 0.1s ease';
        
        contadorAnim++;
    } else {
        clearInterval(intervaloAnimacao);
        elementoDisplay.style.opacity = '1';
        elementoDisplay.style.letterSpacing = 'normal';
        elementoDisplay.style.transition = '';
        intervaloAnimacao = null;
    }
}, 150);

            try {
                let mensagemFinal = pergunta;

                if (!isInitial) {
                    // --- NOVO: FILTRO DE TRIVIALIDADE (CURTO-CIRCUITO) ---
                    const verbosTriviais = /^(olhar|observar|examinar|esperar|checar|investigar|procurar|ouvir|cheirar|analisar)\b/i;
                    const acaoLower = pergunta.toLowerCase().trim();

                    const inimigoVivo = entidadeEmFoco && !['morta', 'morto', 'inconsciente', 'destruĂ­da', 'destruĂ­do'].some(est => entidadeEmFoco.estado.includes(est));

                    // Adicionamos uma detecĂ§ĂŁo de fala explĂ­cita
const verboFala = /^(digo|falo|grito|peĂ§o|ordeno|pergunto)[:\s]/i;
const acaoFisicaDireta = /\b(atacar|golpear|socar|chutar|esfaquear|enforcar|morder|atirar|arremessar|arrancar|cortar|ferir|matar|puxar|empurrar|escalar|roubar|furtar|fugir|correr|esquivar|rancar|cravar|estrangular|apunhalar)\b/i;
const acaoSocialDireta = /\b(seduzir|convencer|persuadir|manipular|mentir|pedir|enganar|intimidar|ameaĂ§ar|ordenar|subornar|lisonjear|me conte|me diga|revele|confesse|extrair|chantagear)\b/i;

let classificacao;

// 1Âș Filtro: Se comeĂ§ou falando ou usou verbos sociais puros, Ă© persuasĂŁo/coerĂ§ĂŁo
if (verboFala.test(acaoLower) || acaoSocialDireta.test(acaoLower)) {
    classificacao = { tipo: 'ARRISCADA', atributo: 'CARISMA' };
    console.log('[PRĂ-CLASSIFICADOR] CARISMA (DiĂĄlogo detectado)');
} 
// 2Âș Filtro: AĂ§Ă”es fĂ­sicas diretas (agora nĂŁo vĂŁo roubar aĂ§Ă”es de diĂĄlogo)
else if (acaoFisicaDireta.test(acaoLower)) {
    classificacao = { tipo: 'ARRISCADA', atributo: 'HABILIDADE' };
    console.log('[PRĂ-CLASSIFICADOR] HABILIDADE');
} 
// 3Âș Filtro: AĂ§Ă”es de sorte
else if (acaoSorteDireta.test(acaoLower)) {
    classificacao = { tipo: 'ARRISCADA', atributo: 'SORTE' };
    console.log('[PRĂ-CLASSIFICADOR] SORTE');
} 
// 4Âș Filtro: Trivial
else if (verbosTriviais.test(acaoLower) && !inimigoVivo) {
    classificacao = { tipo: 'TRIVIAL', atributo: 'NENHUM' };
    console.log('[PRĂ-CLASSIFICADOR] TRIVIAL');
} 
// Se nada capturar, chama o Juiz invisĂ­vel (1.5B)
else {
    const tempJuizId = adicionarMensagem('âïž O Juiz avalia...', 'system', true);
    classificacao = await classificarAcaoLLM(pergunta);
    const msgJuiz = document.getElementById(tempJuizId);
    if (msgJuiz) msgJuiz.remove();
}
                    // -----------------------------------------------------

                    const { tipo, atributo } = classificacao;

                    let resultado = null;
                    let danoBase = 0;

                    if (tipo === 'ARRISCADA' && atributo !== 'NENHUM') {
                        await animarTextoTeste(`TESTE DE ${atributo}`);
                        await criarBotaoRolar();

                        const semente = Math.floor(Math.random() * 20) + 1;
                        const valorAtributo = jogadorStats[atributo] ?? 0;
                        resultado = semente <= valorAtributo ? 'SUCESSO' : 'FALHA';
                        if (resultado === 'FALHA') {
                            danoBase = Math.max(1, Math.floor((semente - valorAtributo) / 2));
                        }

                        mostrarResultadoDado(semente, atributo, valorAtributo, resultado);
                        await new Promise(r => setTimeout(r, 600)); // Pequena pausa dramĂĄtica
                    }

                    // --- INĂCIO DO NOVO CONTEXTO DINĂMICO ---
let diretrizConsequencia = "";
let diretrizSucesso = "A intenĂ§ĂŁo do jogador se concretiza TOTALMENTE e sem ressalvas.";

if (atributo === 'HABILIDADE') {
    if (resultado === 'FALHA') diretrizConsequencia = "A aĂ§ĂŁo fracassa e o jogador sofre uma puniĂ§ĂŁo fĂ­sica visceral (ossos quebrados, carne rasgada, dano material).";
} else if (atributo === 'CARISMA') {
    if (resultado === 'SUCESSO') diretrizSucesso = "A intenĂ§ĂŁo do jogador se concretiza TOTALMENTE. ATENĂĂO: Se o contexto anterior envolver violĂȘncia, o alvo obedece ao jogador por PURO TERROR ou submissĂŁo doentia, nunca por afeto. Narre a obediĂȘncia forĂ§ada e a linguagem corporal de medo.";
    if (resultado === 'FALHA') diretrizConsequencia = "A tentativa social Ă© totalmente rejeitada. O alvo demonstra repulsa ou fĂșria, quebrando a moral do jogador. Ă proibido narrar dano fĂ­sico ao jogador neste caso, foque na humilhaĂ§ĂŁo social e hostilidade.";
} else if (atributo === 'SORTE') {
    if (resultado === 'FALHA') diretrizConsequencia = "O azar se manifesta de forma impiedosa. Uma reviravolta cruel do ambiente pune o jogador.";
}

const contextoDecidido = tipo === 'TRIVIAL'
    ? `[AĂĂO TRIVIAL: Avance a cena diretamente. Revele uma nova tensĂŁo ou detalhe sombrio sem mencionar testes. Termine com [DANO: 0]]`
    : `[AĂĂO ARRISCADA â TESTE DE ${atributo}: ${resultado}. REGRAS VITAIS: Se SUCESSO, ${diretrizSucesso} Se FALHA, a intenĂ§ĂŁo Ă© TOTALMENTE NEGADA/REJEITADA e ${diretrizConsequencia} Narre o desfecho seco. Termine com [DANO: ${resultado === 'FALHA' ? danoBase : 0}]]`;
// --- FIM DO NOVO CONTEXTO DINĂMICO ---

                    mensagemFinal += `\n${contextoDecidido}\n[RESPOSTA OBRIGATORIAMENTE EM PORTUGUĂS BRASILEIRO]`;
                }

                mensagens.push({ role: 'user', content: mensagemFinal });

                const isIntro = (isInitial && !resumoAtual);
                const maxTokens       = isIntro ? 500 : 300;
                const maxContinuacoes = isIntro ?    1 :   1;

                if (isIntro) window._introGenerating = true;

                const respostaIA = await gerarRespostaComContinuacao(mensagens, maxTokens, elementoDisplay, maxContinuacoes);

                const danoMatch = respostaIA.match(/\[DANO:\s*(\d+)\]/i);

                let respostaLimpa = respostaIA;
                if (respostaLimpa.includes('[TESTE:')) {
                    respostaLimpa = respostaLimpa.replace(/\[TESTE:[^\]]+\]/g, '').trim();
                }

                if (!isInitial && danoMatch && parseInt(danoMatch[1]) > 0) {
                    const div = document.createElement('div');
                    div.className = 'system-message';
                    div.innerHTML = `<em style="color:#e53935; font-weight:bold;">[FALHA NO TESTE: CONSEQUĂNCIA APLICADA]</em>`;
                    chatBox.appendChild(div);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                elementoDisplay.innerText = respostaLimpa;

                if (danoMatch && parseInt(danoMatch[1]) > 0) {
                    const valorDano = parseInt(danoMatch[1]);
                    energia -= valorDano;
                    document.getElementById('energia-span').innerText = `đ©ž Energia: ${Math.max(0, energia)}/10`;
                    adicionarMensagem(`[O mundo cobra seu preĂ§o. VocĂȘ perdeu ${valorDano} de Energia.]`, 'system');

                    if (energia <= 0) {
                        adicionarMensagem("đ SEU CORPO CEDE. A ESCURIDĂO O CONSOME. FIM DA JORNADA.", 'system');
                        userInput.disabled = true;
                        sendBtn.disabled = true;
                        await salvarEstadoJogador();
                        return;
                    }
                }

                if (isIntro) window._introGenerating = false;

                mensagens.push({ role: 'assistant', content: respostaIA });

                // O NOVO GATILHO: IDLE-TIME PROCESSING
                setTimeout(() => {
                    salvarEstadoJogador().catch(e => console.error('Erro no salvamento background:', e));
                    
                    if (mensagens.length > LIMITE_MENSAGENS && !window._compressaoEmAndamento) {
                        window._compressaoEmAndamento = true;
                        
                        // Atrasa a requisiĂ§ĂŁo pesada em 4 segundos para ocorrer no tempo ocioso
                        setTimeout(() => {
                            comprimirMemoria().catch(e => {
                                console.error('Erro na compressĂŁo background:', e);
                                window._compressaoEmAndamento = false;
                            });
                        }, 4000); 
                    }
                }, 0);

                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }

            } catch (error) {
                if (intervaloAnimacao) clearInterval(intervaloAnimacao);
                elementoDisplay.innerText = `â Erro: ${error.message}`;
                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                }
            } finally {
                if (!isInitial) {
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }
        };

        window.onload = async () => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    uidAtual = user.uid;
                    await carregarDadosJogador(uidAtual);
                    window.enviar();
                } else {
                    window.location.href = "login.html";
                }
            });
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                window.enviar(userInput.value.trim());
            }
        });
    </script>
