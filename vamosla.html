}

};
await updateDoc(doc(db, "players", uidAtual), dadosAtualizados);
            } catch (e) {
                console.error("Erro ao salvar estado do jogador:", e);
            }
        }

        async function gerarMemoriaLonga(textoIntro) {
            if (memoriaLonga) return;
            const promptLore = [
                {
                    role: 'system',
                    content: 'Você é um extrator de lore. Dado o texto de introdução de um RPG, preencha os campos abaixo com dados factuais extraídos do texto. Zero prosa. Zero adjetivos literários. Apenas nomes e fatos secos.\n\nMUNDO: [nome do cenário/reino principal]\nAMEAÇA: [nome e natureza da ameaça principal]\nARQUÉTIPO: [arquétipo do jogador]\nMISSÃO: [objetivo concreto da missão]\nLOCALIZAÇÕES: [lista separada por vírgulas de TODOS os lugares nomeados: reinos, regiões, vilas, rios, montanhas, pântanos, locais específicos — apenas os nomes, sem descrição]\n\nResponda APENAS com os campos preenchidos, sem texto adicional.'
                },
                {
                    role: 'user',
                    content: `Texto da introdução:\n${textoIntro}\n\nGere a memória permanente agora.`
                }
            ];

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: promptLore,
                        temperature: 0.1,
                        max_tokens: 250
                    })
                });
                const data = await response.json();
                memoriaLonga = data.choices[0].message.content.trim();
                mensagens[1].content = `LORE PERMANENTE DO MUNDO (verdade absoluta — nunca contradiga nem altere):\n${memoriaLonga}`;
                if (uidAtual) {
                    await setDoc(doc(db, "players", uidAtual), { memoriaLonga }, { merge: true });
                }
            } catch (e) {
                console.error('Erro ao gerar memória longa:', e);
            }
        }

        function obterDiretrizDeFase() {
            if (turnosJogados < 10) return "FASE 1 - RASTROS (Lentidão): O perigo é apenas um sussurro, uma lenda ou um rastro perturbador no cenário. É ESTRITAMENTE PROIBIDO mostrar a ameaça principal. Foco no mistério e na exploração do infamiliar.";
            else if (turnosJogados < 25) return "FASE 2 - PARANOIA: Os sinais da ameaça são recentes. O ambiente reage a algo invisível (animais mortos, cheiro de podridão, NPCs aterrorizados). O perigo é iminente, mas ainda indireto.";
            else if (turnosJogados < 45) return "FASE 3 - PERSEGUIÇÃO: O jogador vê a ameaça de relance. Sobrevivência se torna o foco. O cerco está se fechando. Tensão alta, descreva o som e o impacto da ameaça no ambiente.";
            else return "FASE 4 - O CLÍMAX: O confronto direto, visceral e inevitável. Apostas máximas. Descreva a brutalidade do embate.";
        }

        const SSR_TEMPLATE = `LOCAL: [onde o jogador está agora]\nNPCS: [lista de personagens encontrados e seu estado atual]\nITENS: [itens carregados ou relevantes no cenário]\nEVENTOS_CHAVE: [lista de fatos consumados]\nSITUACAO_ATUAL: [uma frase: o que o jogador está fazendo ou diante de agora]\nGANCHOS_ATIVOS: [pistas ou ameaças não resolvidas que devem ser lembradas]`;

       async function comprimirMemoria() {
            if (mensagens.length <= LIMITE_MENSAGENS) return;

            const fatosParaComprimir = mensagens.slice(3, 9)
                .filter(m => m.content && m.content.trim() !== "")
                .map(m => `${m.role === 'user' ? 'JOGADOR' : 'NARRADOR'}: ${m.content}`)
                .join('\n');

           // Prompt otimizado para PERFORMANCE: Remove a carga de gerenciar eventos
            const promptSimplificado = [
                {
                    role: 'system',
                    content: "Você é um terminal analítico. Atualize os estados físicos e psicológicos com base nos eventos. REGRAS:\n1. Foque no estado atual dos NPCs (ex: ferido, apavorado, confiante).\n2. Atualize o local se houver mudança.\n3. Retorne estritamente o JSON solicitado."
                },
                {
                    role: 'user',
                    content: `ESTADO ANTERIOR:\n${resumoAtual || 'Início'}\n\nEVENTOS PARA PROCESSAR:\n${fatosParaComprimir}`
                }
            ];

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO_JUIZ,
                        messages: promptSimplificado,
                        temperature: 0.0,
                        max_tokens: 300,
                        response_format: {
                            type: "json_schema",
                            json_schema: {
                                name: "extrator_fatos",
                                strict: true,
                                schema: {
                                    type: "object",
                                    properties: {
    local: { type: "string" },
    npcs: { type: "array", items: { type: "string" } },
    situacao_atual: { type: "string" }
},
required: ["local", "npcs", "situacao_atual"],
                                    additionalProperties: false
                                }
                            }
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`LM Studio HTTP Error: ${await response.text()}`);
                }

                const data = await response.json();
                let textoJson = data.choices[0].message.content;
                let jsonObj;

                try {
                    // Tenta o parse normal
                    jsonObj = JSON.parse(textoJson);
                } catch (parseError) {
                    console.warn("⚠️ [Memória] JSON truncado. Tentando protocolo de recuperação de emergência...", parseError);
                    
                    // Válvula de Escape 1: Tenta fechar chaves e aspas automaticamente
                    try {
                        let fixedJson = textoJson.trim();
                        if (!fixedJson.endsWith('}')) {
                            // Se a última string ficou aberta, fecha ela
                            if ((fixedJson.match(/"/g) || []).length % 2 !== 0) fixedJson += '"';
                            // Fecha as estruturas do schema
                            fixedJson += ']}}'; 
                            // Limpa vírgulas sobrando antes de chaves (erro comum de truncamento)
                            fixedJson = fixedJson.replace(/,\s*([\]}])/g, '$1');
                        }
                        jsonObj = JSON.parse(fixedJson);
                        console.log("✅ [Memória] JSON recuperado com sucesso!");
                    } catch (fatalError) {
                        // Válvula de Escape 2: Destrói o loop para salvar o PC
                        console.error("❌ [Memória] JSON irrecuperável. Aplicando amnésia forçada para não travar o jogo.", textoJson);
                        mensagens.splice(3, 6); // Força a exclusão do histórico engarrafado
                        return; // Aborta esta compressão específica
                    }
                }
                
               // --- INÍCIO DA MEMÓRIA CRONOLÓGICA (VIA JAVASCRIPT) ---
                // Em vez de pedir para a IA resumir, o código puxa cirurgicamente as últimas ações do jogador
                const acoesRecentes = mensagens
                    .filter(m => m.role === 'user' && !m.content.includes('Descreva em 3 frases'))
                    .slice(-3)
                    .map(m => {
                        // Remove qualquer instrução de teste [AÇÃO ARRISCADA...] que o código injetou na string
                        let acaoMuda = m.content.split('\n[')[0].trim();
                        // Trunca em 45 caracteres para economizar tokens
                        return acaoMuda.length > 45 ? acaoMuda.substring(0, 42) + "..." : acaoMuda;
                    });

                jsonObj.eventos_chave = acoesRecentes.length > 0 ? acoesRecentes : ["A jornada começou"];
                // --- FIM DA MEMÓRIA CRONOLÓGICA ---

                buildEntityIndex(jsonObj);   
                ssrJson = jsonObj;

                resumoAtual = `LOCAL: ${jsonObj.local}\nNPCS: ${jsonObj.npcs.join(' | ')}\nEVENTOS: ${jsonObj.eventos_chave.join(' ➔ ')}\nSITUAÇÃO: ${jsonObj.situacao_atual}`;
                mensagens[2].content = `ESTADO ATUAL DO MUNDO:\n${resumoAtual}`;
                
                // Limpeza oficial pós-sucesso
                mensagens.splice(3, 6);
                console.log("💾 [Memória] Motor 1.5B comprimiu o histórico com sucesso.");
                
                salvarEstadoJogador().catch(e => console.error("Erro no salvamento pós-compressão:", e));
            } catch (error) {
                console.error("Erro geral na rede/compressão:", error);
            } finally {
                window._compressaoEmAndamento = false;
            }
        }
        
        function adicionarMensagem(texto, tipo, temporaria = false) {
            const div = document.createElement('div');
            div.className = tipo === 'user' ? 'user-message' : tipo === 'system' ? 'system-message' : 'ai-message';
            div.innerText = texto;
            if (temporaria) {
                div.id = 'temp-' + Date.now() + '-' + Math.random();
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.id;
        }

        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: mensagensPayload,
                        temperature: window._introGenerating ? 0.75 : 0.6,
                        max_tokens: maxTokens,
                        presence_penalty: 0.0,
                        frequency_penalty: 0.0,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') continue;
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr = chunk.choices?.[0]?.finish_reason;

                            if (delta) {
                                fullText += delta;
                                if (onToken) onToken(fullText);
                            }
                            if (fr && fr !== 'null') finishReason = fr;
                        } catch (parseErr) {}
                    }
                }
                return { text: fullText, finishReason };
            } catch (error) {
                throw error;
            }
        }

        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elemento, maxContinuacoes = 0) {
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];

            for (let tentativa = 0; tentativa <= maxContinuacoes; tentativa++) {
                if (tentativa > 0) {
                    msgsAtual = [
                        ...msgsAtual,
                        { role: 'assistant', content: textoCompleto },
                        { role: 'user', content: 'Continue a narração em português brasileiro.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
    if (!primeiroTokenRecebido) {
        primeiroTokenRecebido = true;
    }
    elemento.innerText = textoCompleto + parcial;
    chatBox.scrollTop = chatBox.scrollHeight;
}
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

                if (finishReason !== 'length') break;
            }
            return textoCompleto;
        }

        const PROMPT_INTRO = `Descreva em 3 frases curtas a seguinte cena, em segunda pessoa: Você está trancado numa sala de pedra. Voce precisa descobrir uma maneira de sair. Uma mulher jovem e bela de cabelos claros está de frente para você. O que você faz?`;

        function buildEntityIndex(ssrJson) {
            entityIndex = {};
            entidadeEmFoco = null;

            for (const entrada of (ssrJson?.npcs || [])) {
                const virgulaIdx = entrada.indexOf(',');
                if (virgulaIdx === -1) continue;
                const nome   = entrada.slice(0, virgulaIdx).trim().toLowerCase();
                const estado = entrada.slice(virgulaIdx + 1).trim().toLowerCase();
                entityIndex[nome] = estado;
            }

            const situacao = ssrJson?.situacao_atual?.toLowerCase() || '';
            for (const [nome, estado] of Object.entries(entityIndex)) {
                if (situacao.includes(nome)) {
                    entidadeEmFoco = { nome, estado };
                    break;
                }
            }
            if (!entidadeEmFoco && Object.keys(entityIndex).length > 0) {
                const [nome, estado] = Object.entries(entityIndex)[0];
                entidadeEmFoco = { nome, estado };
            }
        }

        function resolverMicroContexto(acao) {
            const lower = acao.toLowerCase();
            for (const [nome, estado] of Object.entries(entityIndex)) {
                if (lower.includes(nome)) return `[${nome}: ${estado}]`;
            }
            if (entidadeEmFoco) {
                const todosPronomes = [...PRONOMES_FEMININOS, ...PRONOMES_MASCULINOS, ...PRONOMES_NEUTROS];
                const temPronome = todosPronomes.some(p => lower.includes(p));
                if (temPronome) return `[${entidadeEmFoco.nome}: ${entidadeEmFoco.estado}]`;
            }
            return '';
        }

        async function classificarAcaoLLM(acaoUsuario) {
    const microContexto = resolverMicroContexto(acaoUsuario);
    
    // 1. Extraímos o histórico puro de intenções, ignorando a prosa do narrador.
    const acoesJogador = mensagens.filter(m => m.role === 'user');
    const acaoAnterior = acoesJogador.length > 1 ? acoesJogador[acoesJogador.length - 1].content : "Nenhuma";

    // 2. Montamos um prompt cirúrgico e seco para o 1.5B processar instantaneamente.
    const promptFinal = `AÇÃO ANTERIOR DO JOGADOR: "${acaoAnterior}"
MICRO-CONTEXTO DO ALVO: ${microContexto || "[Nenhum/Desconhecido]"}
AÇÃO ATUAL DO JOGADOR: "${acaoUsuario}"`;

    const response = await fetch(LM_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            model: MODELO_JUIZ,
            messages: [
                {
                    role: 'system',
                    content: `Você é um classificador de ações de RPG. 
Classifique a ação ATUAL do jogador em EXATAMENTE um tipo e um atributo.

TIPO:
- TRIVIAL (sem risco de falha): observar, caminhar, conversar amigavelmente com aliados.
- ARRISCADA (risco de rejeição, hostilidade ou fracasso): atacar, fugir, dar ordens a um alvo ferido/hostil, seduzir, extrair informações.

REGRAS DE CONTEXTO:
Se a "AÇÃO ANTERIOR" foi agressiva ou invasiva contra o NPC, QUALQUER diálogo subsequente com esse NPC torna-se ARRISCADO e DEVE OBRIGATORIAMENTE testar CARISMA (Intimidação/Coerção). Jamais teste HABILIDADE para ações de fala.

ATRIBUTO (apenas se ARRISCADA):
- HABILIDADE: APENAS esforço físico motor (correr, saltar, forçar portas, lutar, furtividade).
- CARISMA: APENAS quando o jogador tenta convencer, enganar, intimidar ou seduzir um NPC que tenha vontade própria. 
- SORTE: roletas, eventos caóticos, apostas, tentativas.
- NENHUM: se TRIVIAL.
- ATENÇÃO: Se o jogador está apenas perguntando algo AO NARRADOR ou olhando o cenário, é TRIVIAL.`
                },
                {
                    role: 'user',
                    content: promptFinal
                }
            ],
            temperature: 0.0,
                    max_tokens: 30,
                    response_format: {
                        type: "json_schema",
                        json_schema: {
                            name: "classificacao_acao",
                            strict: true,
                            schema: {
                                type: "object",
                                properties: {
                                    tipo: { type: "string", enum: ["TRIVIAL", "ARRISCADA"] },
                                    atributo: { type: "string", enum: ["HABILIDADE", "CARISMA", "SORTE", "NENHUM"] }
                                },
                                required: ["tipo", "atributo"],
                                additionalProperties: false
                            }
                        }
                    }
                })
            });
            const data = await response.json();
const raw = data.choices[0].message.content;
console.log('[JUIZ RAW]', raw);
return JSON.parse(raw);
        }

        async function animarTextoTeste(texto) {
            const div = document.createElement('div');
            div.className = 'teste-reveal';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            for (const char of texto) {
                div.innerText += char;
                await new Promise(r => setTimeout(r, 40));
            }
        }

        function criarBotaoRolar() {
            return new Promise(resolve => {
                const btn = document.createElement('button');
                btn.id = 'rolar-btn';
                btn.innerText = '⚄ ROLAR DADO';
                chatBox.appendChild(btn);
                chatBox.scrollTop = chatBox.scrollHeight;
                btn.addEventListener('click', () => { btn.remove(); resolve(); }, { once: true });
            });
        }

        function mostrarResultadoDado(semente, atributo, valorAtributo, resultado) {
            const divDado = document.createElement('div');
            divDado.className = 'resultado-dado';
            divDado.innerText = `Rolagem: ${semente} vs ${atributo} ${valorAtributo}`;
            chatBox.appendChild(divDado);
            const divRes = document.createElement('div');
            divRes.className = resultado === 'SUCESSO' ? 'resultado-sucesso' : 'resultado-falha';
            divRes.innerText = resultado;
            chatBox.appendChild(divRes);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
      
        window.enviar = async function(mensagemUsuario = null) {
            const isInitial = mensagemUsuario === null;
            
            if (!isInitial) {
                turnosJogados++;
            }

            let pergunta;
            if (isInitial) {
                if (!resumoAtual) {
                    pergunta = PROMPT_INTRO;
                } else {
                    pergunta = 'O jogo foi recarregado. Com base no resumo da história, narre rapidamente a cena atual (usando a regra padrão de frases curtas) e pergunte o que eu faço agora.';
                }
            } else {
                pergunta = mensagemUsuario;
            }

            if (!isInitial) {
                adicionarMensagem(pergunta, 'user');
                userInput.value = '';
            }

            sendBtn.disabled = true;
            userInput.disabled = true;

            const tempId = adicionarMensagem('', 'ai', true);
const elementoDisplay = document.getElementById(tempId);

// Inicia a animação de palavras sombrias
let contadorAnim = 0;
let indicePalavra = Math.floor(Math.random() * PALAVRAS_SOMBRIAS.length);
let exibindoPensando = false;
let ciclosPensando = 0;
primeiroTokenRecebido = false;

intervaloAnimacao = setInterval(() => {
    if (!primeiroTokenRecebido) {
        // A cada ~1.2 segundos (8 ciclos de 150ms), alterna para "pensando..." por 3 ciclos
        if (contadorAnim % 8 === 0) {
            exibindoPensando = true;
            ciclosPensando = 0;
        }
        
        let textoExibido = '';
        if (exibindoPensando && ciclosPensando < 4) {
            // Exibe "pensando..." com reticências variáveis
            const pontos = '.'.repeat(ciclosPensando % 4);
            textoExibido = `pensando${pontos}`;
            ciclosPensando++;
            if (ciclosPensando >= 4) exibindoPensando = false;
        } else {
            // Exibe palavra sombria
            const palavra = PALAVRAS_SOMBRIAS[indicePalavra % PALAVRAS_SOMBRIAS.length];
            const pontos = '.'.repeat((Math.floor(contadorAnim / 2) % 4));
            textoExibido = `${palavra}${pontos}`;
            indicePalavra++;
        }
        
        elementoDisplay.innerText = textoExibido;
        
        // Pulsação suave (opacidade entre 0.4 e 0.9)
        const opacidade = 0.4 + (Math.sin(Date.now() / 400) * 0.25);
        elementoDisplay.style.opacity = opacidade;
        elementoDisplay.style.letterSpacing = '2px';
        elementoDisplay.style.transition = 'opacity 0.1s ease';
        
        contadorAnim++;
    } else {
        clearInterval(intervaloAnimacao);
        elementoDisplay.style.opacity = '1';
        elementoDisplay.style.letterSpacing = 'normal';
        elementoDisplay.style.transition = '';
        intervaloAnimacao = null;
    }
}, 150);

            try {
                let mensagemFinal = pergunta;

                if (!isInitial) {
    // --- FILTRO DE INTENÇÃO (CURTO-CIRCUITO) ---
    const acaoLower = pergunta.toLowerCase().trim();

    // DECLARAÇÃO DA VARIÁVEL (fora de qualquer bloco interno)
    let classificacao;

    // 1. Exploração pura: perguntas sobre o cenário, observação, investigação
    const ehExploracaoPura = /^(me descreva|descreva|olhar|observar|examinar|checar|onde|tem|existe|quais|analisar|investigar|procurar|ouvir|subir|trepar|içar|pendurar|agarrar|equilibrar|pular|saltar|correr|fugir|descer|forçar|arrombar|romper|cair|escorregar|levantar|cheirar)\b/i.test(acaoLower);

    // 2. Pergunta metalinguística (fora do personagem): termina com "?" e não é fala explícita, e não há alvo claro (entidadeEmFoco)
    const ehMeta = /\?$/.test(acaoLower) && !/^(digo|falo|pergunto|grito|peço|ordeno)/i.test(acaoLower) && !entidadeEmFoco;

    // Se for exploração ou meta, já classificamos como TRIVIAL (sem teste)
    if (ehExploracaoPura || ehMeta) {
        classificacao = { tipo: 'TRIVIAL', atributo: 'NENHUM' };
        console.log('[PRÉ-CLASSIFICADOR] TRIVIAL (exploração ou metalinguagem)');
    } else {
        // --- SE NÃO FOR EXPLORAÇÃO, APLICAMOS OS FILTROS NORMAIS (combate, social, etc.) ---
        const verboFala = /^(digo|falo|grito|peço|ordeno|pergunto)[:\s]/i;
        const acaoFisicaDireta = /\b(atacar|golpear|socar|chutar|esfaquear|enforcar|morder|atirar|arremessar|arrancar|cortar|ferir|matar|puxar|empurrar|escalar|roubar|furtar|fugir|correr|esquivar|rancar|cravar|estrangular|apunhalar)\b/i;
        const acaoSocialDireta = /\b(seduzir|convencer|persuadir|manipular|mentir|pedir|enganar|intimidar|ameaçar|ordenar|subornar|lisonjear|me conte|me diga|revele|confesse|extrair|chantagear)\b/i;
        const acaoSorteDireta = /\b(apostar|arriscar|improvisar|torcer|rezar|tentar a sorte)\b/i;
        const verbosTriviais = /^(olhar|observar|examinar|esperar|checar|investigar|procurar|ouvir|cheirar)\b/i; // sem os de exploração já tratados

        const inimigoVivo = entidadeEmFoco && !['morta', 'morto', 'inconsciente', 'destruída', 'destruído'].some(est => entidadeEmFoco.estado.includes(est));

        // 1º Filtro: fala explícita ou social
        if (verboFala.test(acaoLower) || acaoSocialDireta.test(acaoLower)) {
            classificacao = { tipo: 'ARRISCADA', atributo: 'CARISMA' };
            console.log('[PRÉ-CLASSIFICADOR] CARISMA (diálogo)');
        }
        // 2º Filtro: ações físicas
        else if (acaoFisicaDireta.test(acaoLower)) {
            classificacao = { tipo: 'ARRISCADA', atributo: 'HABILIDADE' };
            console.log('[PRÉ-CLASSIFICADOR] HABILIDADE');
        }
        // 3º Filtro: sorte
        else if (acaoSorteDireta.test(acaoLower)) {
            classificacao = { tipo: 'ARRISCADA', atributo: 'SORTE' };
            console.log('[PRÉ-CLASSIFICADOR] SORTE');
        }
        // 4º Filtro: triviais (observar, etc. – mas não os de exploração já tratados)
        else if (verbosTriviais.test(acaoLower) && !inimigoVivo) {
            classificacao = { tipo: 'TRIVIAL', atributo: 'NENHUM' };
            console.log('[PRÉ-CLASSIFICADOR] TRIVIAL');
        }
        // Se nada capturar, chama o Juiz (1.5B)
        else {
            const tempJuizId = adicionarMensagem('⚖️ O Juiz avalia...', 'system', true);
            classificacao = await classificarAcaoLLM(pergunta);
            const msgJuiz = document.getElementById(tempJuizId);
            if (msgJuiz) msgJuiz.remove();
        }
    }

    // Agora classificacao está definida em todos os caminhos
    const { tipo, atributo } = classificacao;

                    let resultado = null;
                    let danoBase = 0;

                    if (tipo === 'ARRISCADA' && atributo !== 'NENHUM') {
                        await animarTextoTeste(`TESTE DE ${atributo}`);
                        await criarBotaoRolar();

                        const semente = Math.floor(Math.random() * 20) + 1;
                        const valorAtributo = jogadorStats[atributo] ?? 0;
                        resultado = semente <= valorAtributo ? 'SUCESSO' : 'FALHA';
                        if (resultado === 'FALHA') {
                            danoBase = Math.max(1, Math.floor((semente - valorAtributo) / 2));
                        }

                        mostrarResultadoDado(semente, atributo, valorAtributo, resultado);
                        await new Promise(r => setTimeout(r, 600)); // Pequena pausa dramática
                    }

                    // --- INÍCIO DO NOVO CONTEXTO DINÂMICO ---
let diretrizConsequencia = "";
let diretrizSucesso = "A intenção do jogador se concretiza TOTALMENTE e sem ressalvas.";

if (atributo === 'HABILIDADE') {
    if (resultado === 'FALHA') diretrizConsequencia = "A ação fracassa e o jogador sofre uma punição física visceral (ossos quebrados, carne rasgada, dano material).";
} else if (atributo === 'CARISMA') {
    if (resultado === 'SUCESSO') diretrizSucesso = "A intenção do jogador se concretiza TOTALMENTE. ATENÇÃO: Se o contexto anterior envolver violência, o alvo obedece ao jogador por PURO TERROR ou submissão doentia, nunca por afeto. Narre a obediência forçada e a linguagem corporal de medo.";
    if (resultado === 'FALHA') diretrizConsequencia = "A tentativa social é totalmente rejeitada. O alvo demonstra repulsa ou fúria, quebrando a moral do jogador. É proibido narrar dano físico ao jogador neste caso, foque na humilhação social e hostilidade.";
} else if (atributo === 'SORTE') {
    if (resultado === 'FALHA') diretrizConsequencia = "O azar se manifesta de forma impiedosa. Uma reviravolta cruel do ambiente pune o jogador.";
}

const contextoDecidido = tipo === 'TRIVIAL'
    ? `[AÇÃO TRIVIAL: Avance a cena diretamente. Revele uma nova tensão ou detalhe sombrio sem mencionar testes. Termine com [DANO: 0]]`
    : `[AÇÃO ARRISCADA — TESTE DE ${atributo}: ${resultado}. REGRAS VITAIS: Se SUCESSO, ${diretrizSucesso} Se FALHA, a intenção é TOTALMENTE NEGADA/REJEITADA e ${diretrizConsequencia} Narre o desfecho seco. Termine com [DANO: ${resultado === 'FALHA' ? danoBase : 0}]]`;
// --- FIM DO NOVO CONTEXTO DINÂMICO ---

                    mensagemFinal += `\n${contextoDecidido}\n[RESPOSTA OBRIGATORIAMENTE EM PORTUGUÊS BRASILEIRO]`;
                }

                mensagens.push({ role: 'user', content: mensagemFinal });

                const isIntro = (isInitial && !resumoAtual);
                const maxTokens       = isIntro ? 500 : 300;
                const maxContinuacoes = isIntro ?    1 :   1;

                if (isIntro) window._introGenerating = true;

                const respostaIA = await gerarRespostaComContinuacao(mensagens, maxTokens, elementoDisplay, maxContinuacoes);

                const danoMatch = respostaIA.match(/\[DANO:\s*(\d+)\]/i);

                let respostaLimpa = respostaIA;
                if (respostaLimpa.includes('[TESTE:')) {
                    respostaLimpa = respostaLimpa.replace(/\[TESTE:[^\]]+\]/g, '').trim();
                }

                if (!isInitial && danoMatch && parseInt(danoMatch[1]) > 0) {
                    const div = document.createElement('div');
                    div.className = 'system-message';
                    div.innerHTML = `<em style="color:#e53935; font-weight:bold;">[FALHA NO TESTE: CONSEQUÊNCIA APLICADA]</em>`;
                    chatBox.appendChild(div);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                elementoDisplay.innerText = respostaLimpa;

                if (danoMatch && parseInt(danoMatch[1]) > 0) {
                    const valorDano = parseInt(danoMatch[1]);
                    energia -= valorDano;
                    document.getElementById('energia-span').innerText = `🩸 Energia: ${Math.max(0, energia)}/10`;
                    adicionarMensagem(`[O mundo cobra seu preço. Você perdeu ${valorDano} de Energia.]`, 'system');

                    if (energia <= 0) {
                        adicionarMensagem("💀 SEU CORPO CEDE. A ESCURIDÃO O CONSOME. FIM DA JORNADA.", 'system');
                        userInput.disabled = true;
                        sendBtn.disabled = true;
                        await salvarEstadoJogador();
                        return;
                    }
                }

                if (isIntro) window._introGenerating = false;

                mensagens.push({ role: 'assistant', content: respostaIA });

                // O NOVO GATILHO: IDLE-TIME PROCESSING
                setTimeout(() => {
                    salvarEstadoJogador().catch(e => console.error('Erro no salvamento background:', e));
                    
                    if (mensagens.length > LIMITE_MENSAGENS && !window._compressaoEmAndamento) {
                        window._compressaoEmAndamento = true;
                        
                        // Atrasa a requisição pesada em 4 segundos para ocorrer no tempo ocioso
                        setTimeout(() => {
                            comprimirMemoria().catch(e => {
                                console.error('Erro na compressão background:', e);
                                window._compressaoEmAndamento = false;
                            });
                        }, 4000); 
                    }
                }, 0);

                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }

            } catch (error) {
                if (intervaloAnimacao) clearInterval(intervaloAnimacao);
                elementoDisplay.innerText = `❌ Erro: ${error.message}`;
                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                }
            } finally {
                if (!isInitial) {
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }
        };

        window.onload = async () => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    uidAtual = user.uid;
                    await carregarDadosJogador(uidAtual);
                    window.enviar();
                } else {
                    window.location.href = "login.html";
                }
            });
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                window.enviar(userInput.value.trim());
            }
        });
    </script>
</body>
