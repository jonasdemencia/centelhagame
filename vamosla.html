<!DOCTYPE html>
<html>
<head>
    <title>Chat com modelo local</title>
</head>
<body>
    <h1>Converse com o modelo</h1>
    <input type="text" id="pergunta" placeholder="Digite sua pergunta">
    <button onclick="enviar()">Enviar</button>
    <div id="resposta"></div>

    <script>
    async function enviar() {
        const pergunta = document.getElementById('pergunta').value;
        const respostaDiv = document.getElementById('resposta');
        respostaDiv.textContent = 'Carregando...';

        try {
            const response = await fetch('http://localhost:1234/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'llama-3.2-3b-instruct-uncensored',
                    messages: [{ role: 'user', content: pergunta }],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            respostaDiv.textContent = data.choices[0].message.content;

            // Opcional: salvar no Firestore (precisa de SDK do Firebase no front-end)
            // Isso exigiria configurar o Firebase no lado do cliente (com regras de segurança)

        } catch (error) {
            respostaDiv.textContent = 'Erro: ' + error.message;
        }
    }
    </script>
</body>
</html>
