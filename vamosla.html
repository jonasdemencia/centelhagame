<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha - Motor Narrativo</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; }
        .narrator { color: #a13d3d; margin-bottom: 10px; }
        .player { color: #7a8c66; margin-bottom: 10px; }
        #progress-bar-container { width: 100%; background: #2a251e; height: 12px; margin-bottom: 10px; display: block; }
        #progress-bar { width: 0%; height: 100%; background: #5c2c2c; transition: width 0.3s; }
        input { width: 80%; padding: 10px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; }
        button { padding: 10px; cursor: pointer; background: #3a3228; color: #fff; border: none; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status">Iniciando...</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="chat-box"></div>
    
    <div id="controls">
        <input type="text" id="player-input" placeholder="Sua ação..." disabled>
        <button id="btn-enviar" onclick="enviarAcao()" disabled>AGIR</button>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const MY_MODEL_ID = "Qwen2.5-7B-Instruct-q4f16_1-MLC";
    
    const systemPrompt = `Você é o Narrador conciso de um jogo de sobrevivência em português brasileiro. Nunca quebre o personagem.

FILOSOFIA NARRATIVA:
- O mundo tem segredos que o jogador ainda não descobriu
- Ocasionalmente termine respostas com elemento que provoca curiosidade

ESTRUTURA (2-3 linhas):
- Responda a ação do jogador
- Se o jogador fizer múltiplas ações, resuma os resultados
- Ocasionalmente revele algo que puxa a narrativa (som distante, objeto parcialmente visível, mudança no ambiente)

REGRAS:
- Consistência total
- Física realista
- Lembre do inventário do jogador
- Português correto`;

    
    let engine;
    let chatHistory = [];

    async function init() {
        const status = document.getElementById("status");
        const pb = document.getElementById("progress-bar");

        try {
            status.innerText = "Despertando o Narrador...";
            
            engine = await CreateMLCEngine(MY_MODEL_ID, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    pb.style.width = `${report.progress * 100}%`;
                }
            });

            document.getElementById("progress-bar-container").style.display = "none";
            status.innerText = "O Pesadelo Começou.";
            document.getElementById("player-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            
            addMsg("Você acorda com o gosto de ferro na boca. O frio corta sua pele como navalha.", "narrator");

        } catch (err) {
            status.innerText = "ERRO CRÍTICO: " + err.message;
            console.error(err);
        }
    }

    window.enviarAcao = async () => {
        const input = document.getElementById("player-input");
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, "player");
        chatHistory.push({ role: "user", content: text });
        input.value = "";
        
        document.getElementById("btn-enviar").disabled = true;
        const tempId = addMsg("...", "narrator");

        // 1. O Diretor Invisível: Tabela de injeções dinâmicas
        const injecoesSutis = [
            "Concentre-se apenas na ação imediata.",
            "Descreva sutilmente uma mudança na temperatura ou na iluminação do ambiente.",
            "Mencione um som abafado, distante ou irreconhecível vindo de outra direção.",
            "Faça o jogador notar um detalhe peculiar, enferrujado ou velho no cenário que não tinha visto antes.",
            "Concentre-se apenas na ação imediata.", // Repetido para diminuir a frequência do mistério
            "Use um tom levemente perturbador, como se algo estivesse observando a cena de longe."
        ];
        
        // Sorteia uma diretriz para este turno específico
        const diretrizAtual = injecoesSutis[Math.floor(Math.random() * injecoesSutis.length)];

        // O novo prompt funde o sistema base, a injeção do turno e a técnica de Chain-of-Thought
        const dynamicSystemPrompt = `${systemPrompt}
        
DIRETRIZ SECRETA PARA ESTE TURNO: ${diretrizAtual}

INSTRUÇÃO DE FORMATO OBRIGATÓRIA:
Antes de responder, você DEVE escrever seu raciocínio dentro de tags <pensamento> e </pensamento>. Pense sobre a física, o que revelar e como aplicar a diretriz secreta. Só depois escreva a narrativa final que o jogador lerá.`;

        try {
            const messages = [
                { role: "system", content: dynamicSystemPrompt },
                ...chatHistory.slice(-10)
            ];

            const result = await engine.chat.completions.create({ 
                messages: messages,
                temperature: 0.72, // Aumentado para mais criatividade
                max_tokens: 250,   // Aumentado para acomodar a tag de <pensamento>
                top_p: 0.9,
                frequency_penalty: 0.4,
                presence_penalty: 0.75, // CRUCIAL: Força o modelo a falar de coisas novas no cenário
                repetition_penalty: 1.05
            });

            let answer = result.choices[0].message.content;

            // 2. Limpeza do Chain-of-Thought: Esconde o raciocínio do jogador
            const pensamentoRegex = /<pensamento>[\s\S]*?<\/pensamento>\n*/g;
            let textoVisivel = answer.replace(pensamentoRegex, "").trim();

            // Fallback caso o modelo não tenha usado a tag corretamente ou a resposta tenha ficado vazia
            if (!textoVisivel) textoVisivel = answer;

            // Verifica se foi cortada (agora validando o texto limpo)
            const lastChar = textoVisivel.slice(-1);
            const isIncomplete = !['.', '!', '?', '"'].includes(lastChar);

            if (isIncomplete) {
                // ... (seu código de continuação original se mantém aqui, apenas atualize 'answer' para 'textoVisivel') ...
                const continuation = await engine.chat.completions.create({
                    messages: [
                        { role: "system", content: "Complete esta frase em português. Escreva apenas o final que falta." },
                        { role: "user", content: textoVisivel }
                    ],
                    temperature: 0.4,
                    max_tokens: 40,
                    top_p: 0.9
                });
                
                const fullAnswer = textoVisivel + continuation.choices[0].message.content;
                document.getElementById(tempId).innerText = fullAnswer;
                chatHistory.push({ role: "assistant", content: fullAnswer }); // Mantemos só a parte limpa no histórico
            } else {
                document.getElementById(tempId).innerText = textoVisivel;
                chatHistory.push({ role: "assistant", content: textoVisivel }); // Oculta o pensamento da memória de longo prazo
            }

        } catch (e) {
            document.getElementById(tempId).innerText = "[ERRO: " + e.message + "]";
            console.error("Erro detalhado:", e);
        } finally {
            document.getElementById("btn-enviar").disabled = false;
            // Retorna o foco para o input para fluidez no gameplay
            document.getElementById("player-input").focus(); 
        }
    };

    function addMsg(txt, cls) {
        const box = document.getElementById("chat-box");
        const div = document.createElement('div');
        div.className = cls;
        div.id = "msg-" + Date.now();
        div.innerText = (cls === 'player' ? "> " : "") + txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;

    // Debug: log quantas mensagens existem
    console.log("Total de mensagens no chat:", box.children.length);
        
        return div.id;
    }

    init();
</script>

</body>
</html>
