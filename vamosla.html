<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha • Jogo Medieval Brutal (com testes visíveis)</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #local-atual { color: #ffaa00; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #3a3228; padding-bottom: 4px; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .user-message { color: #7a8c66; align-self: flex-end; background: #1e2a1a; padding: 6px 12px; border-radius: 12px 0 12px 12px; max-width: 80%; word-wrap: break-word; }
        .ai-message { color: #a13d3d; align-self: flex-start; background: #2a1a1a; padding: 6px 12px; border-radius: 0 12px 12px 12px; max-width: 80%; word-wrap: break-word; }
        .system-message { color: #6b6b4a; text-align: center; font-style: italic; font-size: 0.9em; margin: 5px 0; }
        #controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; font-family: inherit; font-size: 16px; }
        button { padding: 12px 20px; cursor: pointer; background: #3a3228; color: #fff; border: none; font-family: inherit; font-size: 16px; transition: 0.2s; }
        button:hover:not(:disabled) { background: #5a4a38; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="local-atual">
            ⚔️ Reinos Desolados • <span id="modelo-span">llama-3.2-3b-instruct-uncensored</span>
        </div>

        <div id="chat-box">
            <div class="system-message">⚔️ O narrador está preparando o cenário...</div>
        </div>

        <div id="controls">
            <input type="text" id="user-input" placeholder="Sua ação..." disabled>
            <button id="send-btn" onclick="enviar(document.getElementById('user-input').value.trim())" disabled>Agir</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ============================================================
        // Configuração do Firebase & Firestore
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC0XfvjonW2gd1eGAZX7NBYfPGMwI2siJw",
            authDomain: "centelhagame-9d511.firebaseapp.com",
            projectId: "centelhagame-9d511",
            storageBucket: "centelhagame-9d511.appspot.com",
            messagingSenderId: "700809803145",
            appId: "1:700809803145:web:bff4c6a751ec9389919d58"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // ID fixo para desenvolvimento local (pode ser dinâmico depois)
        const sessionId = "sessao_dev_01"; 

        // ============================================================
        // Configuração do LM Studio e Controle de Contexto
        // ============================================================
        const LM_URL = 'http://localhost:1234/v1/chat/completions';
        const MODELO = 'llama-3.2-3b-instruct-uncensored'; 
        const LIMITE_MENSAGENS = 12; // Quando chegar aqui, resume e limpa a memória antiga

        const jogadorStats = {
            HABILIDADE: 5,
            CARISMA: 3,
            SORTE: 4
        };

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Estrutura de memória: [0] Regras, [1] Resumo da História, [2...] Turnos
        let mensagens = [
            {
                role: 'system',
                content: `Você é o motor narrativo de um RPG de fantasia sombria. Escreva em Português Brasileiro literário, cru e direto.

CRAFT NARRATIVO — REGRAS DE OURO:
1. MOSTRE, NÃO CONTE. Nunca diga o que o jogador sente ou pensa. Descreva apenas o que os sentidos captam: cheiro, textura, som, temperatura, visão. Errado: "você sente medo". Certo: "suas mãos não param de tremer".
2. ANCORAGEM SENSORIAL. Cada beat narrativo deve conter ao menos um detalhe físico concreto e específico — nunca genérico. Errado: "o lugar era assustador". Certo: "o chão range sob um único prego solto".
3. LEI DE CHEKHOV. Só introduza um elemento (objeto, pessoa, som) se ele puder ser relevante depois. Nunca insira detalhes decorativos que desaparecem sem rastro.
4. FÍSICA INABALÁVEL. Consequências devem ser estritamente proporcionais à causa. Falha de CARISMA gera rejeição social — não explosão. Falha de HABILIDADE gera tropeço — não catástrofe. Nunca exagere além do que a física permitiria.
5. MISTÉRIO POR OMISSÃO. O que não é mostrado é mais poderoso que o que é explicado. Revele parcialmente. Deixe lacunas intencionais que convidem à investigação. Nunca explique a origem de algo misterioso na mesma cena em que aparece.
6. TENSÃO ABERTA. Cada resposta termina com algo instável — visível, audível ou tangível — que exige decisão. Nunca feche todos os ganchos numa mesma resposta.
7. AGÊNCIA ABSOLUTA. NUNCA decida o que o personagem faz, sente, pensa ou decide. Você narra o mundo. O jogador narra a si mesmo.
8. MÁXIMO 3 FRASES por turno normal. Telegráfico. Sem adornos. Sem metalinguagem. Sem conselhos éticos.`
            },
            {
                role: 'system',
                content: 'Resumo da jornada até agora: A aventura acabou de começar.'
            }
        ];

        let resumoAtual = "";

        // ============================================================
        // Funções de Inicialização e Firebase
        // ============================================================
        async function carregarSessao() {
            try {
                const docRef = doc(db, "sessoes", sessionId);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists() && docSnap.data().resumo) {
                    resumoAtual = docSnap.data().resumo;
                    mensagens[1].content = `Resumo da jornada até agora: ${resumoAtual}`;
                    console.log("Sessão recuperada do Firestore.");
                }
            } catch (e) {
                console.error("Erro ao carregar do Firestore:", e);
            }
        }

        async function salvarResumoFirestore(novoResumo) {
            try {
                await setDoc(doc(db, "sessoes", sessionId), { resumo: novoResumo }, { merge: true });
            } catch (e) {
                console.error("Erro ao salvar no Firestore:", e);
            }
        }

        // ============================================================
        // Funções de Compressão de Memória — Structured State Representation (SSR)
        // ============================================================

        // Template vazio do estado estruturado. É o "esqueleto" que o modelo preenche.
        // Campos são fixos para garantir que o narrador sempre tenha os dados que precisa.
        const SSR_TEMPLATE = `LOCAL: [onde o jogador está agora]
NPCS: [lista de personagens encontrados e seu estado atual: nome/descrição, relação, vivo/morto/desconhecido]
ITENS: [itens carregados ou relevantes no cenário]
EVENTOS_CHAVE: [lista de fatos consumados, em ordem, sem atmosfera — apenas o que aconteceu]
SITUACAO_ATUAL: [uma frase: o que o jogador está fazendo ou diante de agora]
GANCHOS_ATIVOS: [pistas ou ameaças não resolvidas que devem ser lembradas]`;

        async function comprimirMemoria() {
            if (mensagens.length > LIMITE_MENSAGENS) {
                adicionarMensagem('⚙️ As engrenagens do destino giram. Consolidando memórias...', 'system');
                
                const mensagensParaResumir = mensagens.splice(2, 6); 
                const textoExtraido = mensagensParaResumir
                    .map(m => `${m.role === 'user' ? 'JOGADOR' : 'NARRADOR'}: ${m.content}`)
                    .join('\n---\n');

                // Prompt SSR: instrui o modelo a agir como extrator de estado, não narrador.
                // Temperature 0.1 para máxima consistência e fidelidade factual.
                const promptResumo = [
                    { 
                        role: 'system', 
                        content: `Você é um extrator de estado de jogo. Sua única função é preencher o formulário abaixo com dados factuais extraídos dos eventos fornecidos. REGRAS ABSOLUTAS:
1. ZERO prosa, ZERO atmosfera, ZERO adjetivos literários.
2. Cada campo deve ser preenchido com fatos secos e objetivos.
3. Se o estado anterior já tiver um campo, ATUALIZE-O com as novas informações — não apague o que ainda é verdade.
4. Se não houver informação para um campo, escreva: [sem dados].
5. Responda APENAS com o formulário preenchido, sem nenhum texto adicional antes ou depois.

FORMULÁRIO:
${SSR_TEMPLATE}`
                    },
                    { 
                        role: 'user', 
                        content: `ESTADO ANTERIOR:\n${resumoAtual || '[início da aventura — sem estado anterior]'}\n\nNOVOS EVENTOS:\n${textoExtraido}\n\nPreencha o formulário de estado atualizado agora.`
                    }
                ];

                try {
                    const response = await fetch(LM_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: MODELO,
                            messages: promptResumo,
                            temperature: 0.1,   // baixíssima para fidelidade factual máxima
                            max_tokens: 350
                        })
                    });
                    
                    const data = await response.json();
                    const novoSSR = data.choices[0].message.content.trim();
                    
                    console.debug('[SSR] Estado estruturado gerado:\n' + novoSSR);
                    
                    resumoAtual = novoSSR;
                    
                    // Injeta o SSR como bloco de dados — não como narrativa.
                    // O narrador lê esses campos como "fatos do mundo", não como história.
                    mensagens[1].content = `ESTADO ATUAL DO MUNDO (use como referência factual, não repita como narração):\n${resumoAtual}`;
                    await salvarResumoFirestore(resumoAtual);
                    
                } catch (error) {
                    console.error("Erro ao comprimir memória:", error);
                    mensagens.splice(2, 0, ...mensagensParaResumir); 
                }
            }
        }

        // ============================================================
        // Funções auxiliares Visuais
        // ============================================================
        function adicionarMensagem(texto, tipo, temporaria = false) {
            const div = document.createElement('div');
            div.className = tipo === 'user' ? 'user-message' : tipo === 'system' ? 'system-message' : 'ai-message';
            div.innerText = texto;
            if (temporaria) {
                div.id = 'temp-' + Date.now() + '-' + Math.random();
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.id;
        }

        // ============================================================
        // Função 1: O Juiz Invisível
        // ============================================================
        async function avaliarAcao(acaoUsuario) {
            const promptJuiz = [
                { 
                    role: 'system', 
                    content: `Você é um classificador de ações de RPG. Analise a mensagem do jogador e decida se ela representa uma ação que exige teste de atributo ou apenas uma pergunta descritiva. Categorias: HABILIDADE, CARISMA, SORTE, NENHUM. Responda APENAS com a categoria em maiúsculas. NÃO adicione explicações.` 
                },
                { role: 'user', content: acaoUsuario }
            ];

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: promptJuiz,
                        temperature: 0.2,
                        max_tokens: 10
                    })
                });
                const data = await response.json();
                const classificacao = data.choices[0].message.content.trim().toUpperCase();
                
                if (['HABILIDADE', 'CARISMA', 'SORTE', 'NENHUM'].includes(classificacao)) {
                    return classificacao;
                }
                return 'NENHUM';
            } catch (error) {
                console.error('Erro no juiz:', error);
                return 'NENHUM';
            }
        }

        // ============================================================
        // Função 2: Motor de Regras
        // ============================================================
        function rolarTeste(atributo) {
            if (atributo === 'NENHUM' || !jogadorStats[atributo]) return null;
            const rolagem = Math.floor(Math.random() * 10) + 1;
            return rolagem <= jogadorStats[atributo] ? 'SUCESSO' : 'FALHA';
        }

        // ============================================================
        // NOVO: Streaming SSE com loop de auto-continuação
        // ============================================================

        /**
         * Faz uma chamada ao LM Studio com stream: true.
         * Lê os chunks SSE e chama onToken(textoAcumulado) a cada token.
         * Retorna { text: string, finishReason: string }.
         */
        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            const response = await fetch(LM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: MODELO,
                    messages: mensagensPayload,
                    temperature: 0.6,
                    max_tokens: maxTokens,
                    presence_penalty: 0.3,
                    frequency_penalty: 0.3,
                    stream: true
                })
            });

            if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let fullText = '';
            let finishReason = null;

            console.debug('[LLM STREAM] Iniciando leitura de chunks SSE...');

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // mantém linha incompleta no buffer

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const jsonStr = line.slice(6).trim();
                    if (jsonStr === '[DONE]') {
                        console.debug('[LLM STREAM] Sinal [DONE] recebido.');
                        continue;
                    }
                    try {
                        const chunk = JSON.parse(jsonStr);
                        const delta = chunk.choices?.[0]?.delta?.content || '';
                        const fr = chunk.choices?.[0]?.finish_reason;
                        if (delta) {
                            fullText += delta;
                            if (onToken) onToken(fullText);
                        }
                        if (fr && fr !== 'null') {
                            finishReason = fr;
                            console.debug(`[LLM STREAM] finish_reason recebido: "${finishReason}"`);
                        }
                    } catch (parseErr) {
                        // chunk malformado — ignora silenciosamente
                    }
                }
            }

            console.debug(`[LLM STREAM] Geração concluída. Tokens gerados: ~${fullText.split(' ').length} palavras. finish_reason final: "${finishReason}"`);
            return { text: fullText, finishReason };
        }

        /**
         * Chama o LLM com streaming e, se finish_reason === "length",
         * dispara automaticamente turnos de continuação até o modelo
         * encerrar naturalmente ou atingir MAX_CONTINUACOES.
         *
         * @param {Array}    mensagensPayload  - Histórico completo de mensagens
         * @param {number}   maxTokens         - Limite de tokens por chamada
         * @param {HTMLElement} elemento       - Elemento do DOM onde o texto vai sendo exibido
         * @returns {string} Texto completo gerado
         */
        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elemento) {
            const MAX_CONTINUACOES = 4;
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];

            for (let tentativa = 0; tentativa <= MAX_CONTINUACOES; tentativa++) {
                if (tentativa > 0) {
                    console.debug(`[CONTINUAÇÃO ${tentativa}] finish_reason=length detectado. Enviando turno de continuação...`);
                    // Injeta o texto parcial como turno do assistente e pede que continue
                    msgsAtual = [
                        ...msgsAtual,
                        { role: 'assistant', content: textoCompleto },
                        { role: 'user', content: 'Continue.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
                        // Exibe em tempo real: texto anterior + tokens chegando agora
                        elemento.innerText = textoCompleto + parcial;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

                if (finishReason !== 'length') {
                    console.debug(`[GERAÇÃO] Encerrado naturalmente (finish_reason="${finishReason}") após ${tentativa} continuação(ões).`);
                    break;
                }

                if (tentativa === MAX_CONTINUACOES) {
                    console.warn(`[GERAÇÃO] Atingido limite de ${MAX_CONTINUACOES} continuações. Encerrando.`);
                }
            }

            return textoCompleto;
        }

        // ============================================================
        // Função principal de envio
        // ============================================================
        window.enviar = async function(mensagemUsuario = null) {
            const isInitial = mensagemUsuario === null;
            
            let pergunta;
            if (isInitial) {
                if (!resumoAtual) {
                    pergunta = 'EXCEÇÃO TEMPORÁRIA À REGRA: Esta é a introdução do jogo. Escreva uma abertura longa, atmosférica e densa (mínimo de 3 parágrafos), estabelecendo o tom sombrio bem ao estilo do livro-jogo "A Mansão Infernal" (House of Hell) de Steve Jackson. Descreva os arredores macabros, o sentimento de isolamento e o perigo iminente. Apenas nesta resposta, IGNORE a regra de "3 frases curtas". Termine a longa descrição colocando o jogador diante de uma situação que exige escolha.';
                } else {
                    pergunta = 'O jogo foi recarregado. Com base no resumo da história, narre rapidamente a cena atual (usando a regra padrão de frases curtas) e pergunte o que eu faço agora.';
                }
            } else {
                pergunta = mensagemUsuario;
            }

            if (!isInitial) {
                adicionarMensagem(pergunta, 'user');
                userInput.value = '';
            }

            sendBtn.disabled = true;
            userInput.disabled = true;

            const tempId = adicionarMensagem('...', 'ai', true);
            const elementoDisplay = document.getElementById(tempId);

            try {
                await comprimirMemoria();

                let mensagemParaNarrador = pergunta;

                if (!isInitial) {
                    const tipoAcao = await avaliarAcao(pergunta);
                    const resultadoTeste = rolarTeste(tipoAcao);
                    
                    // DIRETRIZ DE TURNO — reforça o craft a cada chamada
                    mensagemParaNarrador += `\n\nDIRETRIZ DESTE TURNO:
- Beat narrativo: AÇÃO do jogador → CONSEQUÊNCIA física proporcional → NOVA TENSÃO aberta.
- Use 1 detalhe sensorial concreto (cheiro, textura, som, temperatura). Nada genérico.
- Termine com algo no mundo que exige decisão — nunca com o estado interno do personagem.
- Máximo 3 frases. Sem metalinguagem. Sem adornos.`;

                    // MOTOR LÓGICO DE CONSEQUÊNCIAS — proporcionalidade explícita por atributo
                    if (resultadoTeste) {
                        adicionarMensagem(`[Teste de ${tipoAcao}: ${resultadoTeste}]`, 'system');
                        
                        const logicaFisica = {
                            SUCESSO: {
                                HABILIDADE: 'A ação física foi executada com precisão. O resultado é tangível e imediato.',
                                CARISMA:    'A abordagem social funcionou. A reação do outro personagem é crível e proporcional.',
                                SORTE:      'Um fator externo favoreceu o jogador de forma sutil — não milagrosa.'
                            },
                            FALHA: {
                                HABILIDADE: 'A ação física falhou de forma crível — tropeço, escorregão, objeto que cai. Nada catastrófico.',
                                CARISMA:    'A abordagem social foi mal recebida. O outro personagem reage com frieza, desconfiança ou irritação — não violência.',
                                SORTE:      'Um fator externo atrapalhou de forma sutil — um barulho, uma sombra, um objeto fora do lugar.'
                            }
                        }[resultadoTeste]?.[tipoAcao] ?? (
                            resultadoTeste === 'FALHA'
                                ? 'A ação falhou de forma crível e proporcional. Sem exagero.'
                                : 'A ação teve sucesso de forma tangível e proporcional.'
                        );
                            
                        mensagemParaNarrador += `\nMECÂNICA: Teste de ${tipoAcao} = ${resultadoTeste}. LÓGICA: ${logicaFisica}`;
                    }
                }

                mensagens.push({ role: 'user', content: mensagemParaNarrador });

                const maxTokens = (isInitial && !resumoAtual) ? 300 : 120;

                // ── SUBSTITUIÇÃO: fetch simples → streaming com auto-continuação ──
                const respostaIA = await gerarRespostaComContinuacao(mensagens, maxTokens, elementoDisplay);

                mensagens.push({ role: 'assistant', content: respostaIA });

                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }

            } catch (error) {
                elementoDisplay.innerText = `❌ Erro: ${error.message}`;
                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                }
            } finally {
                if (!isInitial) {
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }
        };

        // ============================================================
        // Inicialização
        // ============================================================
        window.onload = async () => {
            await carregarSessao();
            window.enviar(); 
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                window.enviar(userInput.value.trim());
            }
        });
    </script>
</body>
</html>
