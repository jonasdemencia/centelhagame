<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    // Llama-3.2-3B é conhecido por ser mais "falante" e criativo que o Qwen em RPGs
    const MY_MODEL_ID = "Llama-3.2-3B-Instruct-q4f16_1-MLC";
    
    // NOVO PROMPT: Damos a ela o poder de CRIAR e a estética PS1 Horror
    const systemPrompt = `Você é o Mestre Narrador de um jogo de horror de sobrevivência estilo PS1 (Resident Evil/Silent Hill). 
    REGRAS CRÍTICAS:
    1. Você tem autoridade total: se o jogador perguntar algo que não foi definido (idade, clima, ferimentos), VOCÊ INVENTA na hora de forma cruel.
    2. Estética: Descrições viscerais, melancólicas e curtas. 
    3. Idioma: Sempre Português do Brasil.
    4. Responda em no máximo 3 linhas. 
    5. Nunca admita que você é uma IA. Você é a voz da floresta.`;
    
    let engine;
    let chatHistory = [{ role: "system", content: systemPrompt }];

    async function init() {
        const status = document.getElementById("status");
        const pb = document.getElementById("progress-bar");

        try {
            if (!navigator.gpu) throw new Error("WebGPU não detectado.");

            status.innerText = "Despertando o Narrador...";
            
            engine = await CreateMLCEngine(MY_MODEL_ID, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    const progress = report.progress * 100;
                    pb.style.width = `${progress}%`;
                }
            });

            document.getElementById("progress-bar-container").style.display = "none";
            status.innerText = "O Pesadelo Começou.";
            document.getElementById("player-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            
            addMsg("Você acorda com o gosto de ferro na boca. O frio corta sua pele como navalhas. Onde você está?", "narrator");

        } catch (err) {
            status.innerText = "Erro: " + err.message;
            console.error(err);
        }
    }

    window.enviarAcao = async () => {
        const input = document.getElementById("player-input");
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, "player");
        chatHistory.push({ role: "user", content: text });
        input.value = "";
        
        document.getElementById("btn-enviar").disabled = true;
        const tempId = addMsg("...", "narrator");

        try {
            const result = await engine.chat.completions.create({ 
                messages: chatHistory,
                temperature: 0.9, // Aumentamos a temperatura para mais criatividade
                max_tokens: 150 
            });

            const answer = result.choices[0].message.content;
            document.getElementById(tempId).innerText = answer;
            chatHistory.push({ role: "assistant", content: answer });

        } catch (e) {
            document.getElementById(tempId).innerText = "[A conexão com a realidade falhou]";
        } finally {
            document.getElementById("btn-enviar").disabled = false;
        }
    };

    function addMsg(txt, cls) {
        const box = document.getElementById("chat-box");
        const div = document.createElement('div');
        div.className = cls;
        div.id = "msg-" + Date.now();
        div.innerText = (cls === 'player' ? "> " : "") + txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div.id;
    }

    init();
</script>
