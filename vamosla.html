        const SSR_TEMPLATE = `LOCAL: [onde o jogador está agora]\nNPCS: [lista de personagens encontrados e seu estado atual]\nITENS: [itens carregados ou relevantes no cenário]\nEVENTOS_CHAVE: [lista de fatos consumados]\nSITUACAO_ATUAL: [uma frase: o que o jogador está fazendo ou diante de agora]\nGANCHOS_ATIVOS: [pistas ou ameaças não resolvidas que devem ser lembradas]`;

       async function comprimirMemoria() {
            if (mensagens.length <= LIMITE_MENSAGENS) return;

            const fatosParaComprimir = mensagens.slice(3, 9)
                .filter(m => m.content && m.content.trim() !== "")
                .map(m => `${m.role === 'user' ? 'JOGADOR' : 'NARRADOR'}: ${m.content}`)
                .join('\n');

           // Prompt otimizado para PERFORMANCE: Remove a carga de gerenciar eventos
            const promptSimplificado = [
                {
                    role: 'system',
                    content: "Você é um terminal analítico. Atualize os estados físicos e psicológicos com base nos eventos. REGRAS:\n1. Foque no estado atual dos NPCs (ex: ferido, apavorado, confiante).\n2. Atualize o local se houver mudança.\n3. Retorne estritamente o JSON solicitado."
                },
                {
                    role: 'user',
                    content: `ESTADO ANTERIOR:\n${resumoAtual || 'Início'}\n\nEVENTOS PARA PROCESSAR:\n${fatosParaComprimir}`
                }
            ];

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO_JUIZ,
                        messages: promptSimplificado,
                        temperature: 0.0,
                        max_tokens: 300,
                        response_format: {
                            type: "json_schema",
                            json_schema: {
                                name: "extrator_fatos",
                                strict: true,
                                schema: {
                                    type: "object",
                                    properties: {
    local: { type: "string" },
    npcs: { type: "array", items: { type: "string" } },
    situacao_atual: { type: "string" }
},
required: ["local", "npcs", "situacao_atual"],
                                    additionalProperties: false
                                }
                            }
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`LM Studio HTTP Error: ${await response.text()}`);
                }

                const data = await response.json();
                let textoJson = data.choices[0].message.content;
                let jsonObj;

                try {
                    // Tenta o parse normal
                    jsonObj = JSON.parse(textoJson);
                } catch (parseError) {
                    console.warn("⚠️ [Memória] JSON truncado. Tentando protocolo de recuperação de emergência...", parseError);
                    
                    // Válvula de Escape 1: Tenta fechar chaves e aspas automaticamente
                    try {
                        let fixedJson = textoJson.trim();
                        if (!fixedJson.endsWith('}')) {
                            // Se a última string ficou aberta, fecha ela
                            if ((fixedJson.match(/"/g) || []).length % 2 !== 0) fixedJson += '"';
                            // Fecha as estruturas do schema
                            fixedJson += ']}}'; 
                            // Limpa vírgulas sobrando antes de chaves (erro comum de truncamento)
                            fixedJson = fixedJson.replace(/,\s*([\]}])/g, '$1');
                        }
                        jsonObj = JSON.parse(fixedJson);
                        console.log("✅ [Memória] JSON recuperado com sucesso!");
                    } catch (fatalError) {
                        // Válvula de Escape 2: Destrói o loop para salvar o PC
                        console.error("❌ [Memória] JSON irrecuperável. Aplicando amnésia forçada para não travar o jogo.", textoJson);
                        mensagens.splice(3, 6); // Força a exclusão do histórico engarrafado
                        return; // Aborta esta compressão específica
                    }
                }
                
               // --- INÍCIO DA MEMÓRIA CRONOLÓGICA (VIA JAVASCRIPT) ---
                // Em vez de pedir para a IA resumir, o código puxa cirurgicamente as últimas ações do jogador
                const acoesRecentes = mensagens
                    .filter(m => m.role === 'user' && !m.content.includes('Descreva em 3 frases'))
                    .slice(-3)
                    .map(m => {
                        // Remove qualquer instrução de teste [AÇÃO ARRISCADA...] que o código injetou na string
                        let acaoMuda = m.content.split('\n[')[0].trim();
                        // Trunca em 45 caracteres para economizar tokens
                        return acaoMuda.length > 45 ? acaoMuda.substring(0, 42) + "..." : acaoMuda;
                    });

                jsonObj.eventos_chave = acoesRecentes.length > 0 ? acoesRecentes : ["A jornada começou"];
                // --- FIM DA MEMÓRIA CRONOLÓGICA ---

                buildEntityIndex(jsonObj);   
                ssrJson = jsonObj;

                resumoAtual = `LOCAL: ${jsonObj.local}\nNPCS: ${jsonObj.npcs.join(' | ')}\nEVENTOS: ${jsonObj.eventos_chave.join(' ➔ ')}\nSITUAÇÃO: ${jsonObj.situacao_atual}`;
                mensagens[2].content = `ESTADO ATUAL DO MUNDO:\n${resumoAtual}`;
                
                // Limpeza oficial pós-sucesso
                mensagens.splice(3, 6);
                console.log("💾 [Memória] Motor 1.5B comprimiu o histórico com sucesso.");
                
                salvarEstadoJogador().catch(e => console.error("Erro no salvamento pós-compressão:", e));
            } catch (error) {
                console.error("Erro geral na rede/compressão:", error);
            } finally {
                window._compressaoEmAndamento = false;
            }
        }
        
        function adicionarMensagem(texto, tipo, temporaria = false) {

            div.innerText = texto;
            if (temporaria) {

            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.id;

        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: mensagensPayload,
                        temperature: window._introGenerating ? 0.75 : 0.6,
                        max_tokens: maxTokens,
                        presence_penalty: 0.0,
                        frequency_penalty: 0.0,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') continue;
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr = chunk.choices?.[0]?.finish_reason;

                            if (delta) {
                                fullText += delta;
                                if (onToken) onToken(fullText);
                            }
                            if (fr && fr !== 'null') finishReason = fr;
                        } catch (parseErr) {}
                    }
                }
                return { text: fullText, finishReason };
            } catch (error) {
                throw error;
            }
        }

        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elemento, maxContinuacoes = 0) {
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];

            for (let tentativa = 0; tentativa <= maxContinuacoes; tentativa++) {
                if (tentativa > 0) {
                    msgsAtual = [
                        ...msgsAtual,
                        { role: 'assistant', content: textoCompleto },
                        { role: 'user', content: 'Continue a narração em português brasileiro.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
    if (!primeiroTokenRecebido) {
        primeiroTokenRecebido = true;
    }
    elemento.innerText = textoCompleto + parcial;
    chatBox.scrollTop = chatBox.scrollHeight;
}
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

                if (finishReason !== 'length') break;
            }
            // --- PARSER DE ENTIDADES (após a resposta completa) ---
            parsearEstadoEntidades(textoCompleto);
            return textoCompleto;

        // --- RESOLVEDOR DE ESTADO RELACIONAL ---
function resolverEstadoRelacionalNPC(entidade) {
    if (!entidade) return 'desconhecido';
    const estado = entidade.estado || '';

    if (/mort[ao]|cadáver|sem vida|desmaiou|inconsciente/.test(estado)) return 'morto';
    if (/hostil|agressiv|furios|raivos|ameaç|atacando/.test(estado))     return 'hostil';
    if (/aliado|amigo|confia|ajudando|parceiro/.test(estado))            return 'aliado';
    if (/apavorad|assustad|tremendo|submisos|rendid/.test(estado))       return 'submisso';
    return 'neutro';
}

// --- NORMALIZADOR DE INPUT ---
function normalizarAcao(acao) {
    return acao
        .toLowerCase()
        .trim()
        .replace(/^(mestre|narrador|gm)[,:]?\s*/i, '')
        .replace(/^["'](.+)["']$/, '$1');
}

// --- CLASSIFICADOR PRINCIPAL (puramente determinístico) ---
function classificarAcao(acaoOriginal) {
    const acao = normalizarAcao(acaoOriginal);

    // CAMADA 0: METALINGUAGEM (sempre TRIVIAL)
    const ehMeta = /^(me descreva|descreva|descrever|diga|me diga|detalhe|explique|me conte|conte|me mostr|mostr|narre)\b/.test(acao)
        || /^(como é|como s[aã]o|qual [ao]|quais|onde fica|o que [eé]|tem algo|existe|h[aá]|quantos)\b/.test(acao)
        || /^(me ajude|ajude|status|inventário|mapa)\b/.test(acao);
    if (ehMeta) return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'meta' };

    // CAMADA 1: PERCEPÇÃO PASSIVA (sempre TRIVIAL)
    const ehPercepcao = /^(olh[ao]|observ|examin|chec[ao]|analiso|inspecion|vejo|noto|procuro|investigo|vasculh|escuto|ouço|sinto o cheiro|cheiro|toco|palpo|tento (ver|ouvir|identificar|perceber|notar|entender|descobrir como|descobrir o que))\b/.test(acao);
    if (ehPercepcao) return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'percepção' };

    // CAMADA 2: AÇÕES FÍSICAS (HABILIDADE)
    const ehFisico = /\b(corro|fujo|salto|pulo|escalo|subo|desço|empurro|puxo|arrombo|forço|chuto|soco|ataco|golpeio|esfaqueio|disparo|lanço|arremesso|rolo|me jogo|me agacho|me escondo|me esquivo|desarmo|prendo|amarro|desvio|rasteio|nado|mergulho|trepo|agarro|aperto)\b/.test(acao);
    if (ehFisico) return { tipo: 'ARRISCADA', atributo: 'HABILIDADE', fonte: 'físico' };

    // CAMADA 2.5: AÇÃO DEMONSTRATIVA (mostrar/exibir algo para alguém)
    const ehDemonstrativo = /^(mostro|mostrar|exibo|exibir|apresento|apresentar|entrego|ofereço|estendo)\b.+\bpara\b/.test(acao)
        || /^(mostro|mostrar|exibo|apresento)\b/.test(acao);
    if (ehDemonstrativo) {
        return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'demonstrativo' };
    }

    // CAMADA 3: AÇÕES SOCIAIS (CARISMA ou TRIVIAL com sistema de pesos)
    const ehFalaDireta = /^(digo|falo|grito|sussurro|pergunto|respondo|indago|proponho|ofereço|imploro|rogo|ameaço|intimido|seduz|convenço|nego|discuto|discurso|chamo|chamo por|chamar)\b/.test(acao)
        || acaoOriginal.trim().startsWith('"') || acaoOriginal.trim().startsWith("'");

    // --- VERBOS DE INFLUÊNCIA DIRETA ---
    const ehInfluencia = /\b(convencer|persuadir|intimidar|seduzir|enganar|mentir|negociar|blefar|chantagear|coagir|ameaçar|impressionar|agradar|humilhar|flertar|insinuar|assediar)\b/.test(acao);

    // --- PROPOSIÇÃO ÍNTIMA ---
    const ehProposicaoIntima = /\b(beijar|me beij|me toqu|me acarici|transar|fazer sexo|me chupar|mamar|me mamar|me dar|se despir|tirar a roupa|abaixar|vir aqui|vem aqui|quer fazer|dá para|pode fazer|quero que você)\b/.test(acao);

    // --- NOVAS CAMADAS DE DETECÇÃO ---
    // 1. Influência indireta (perguntas educadas, sugestões)
    const ehInfluenciaIndireta = /\b(você (poderia|pode|deveria|não deveria)? (me ajudar|me deixar|me dar|me mostrar|me contar|me dizer|me entregar|me informar|me permitir|me favorecer|me considerar))\b/i.test(acao)
        || /^(será que|se você|caso você|quem sabe você) (.+)\?$/i.test(acao)
        || /^([^?!.]+)\?$/.test(acao) && /\b(por favor|pf|pfv|please)\b/i.test(acao);

    // 2. Urgência / desespero
    const ehUrgencia = /(por favor){2,}|pelo amor de deus|urgente|rápido|depressa|não tenho tempo|vida ou morte|me salve|socorro/i.test(acao);

    // 3. Ordem direta / tom imperativo
    const ehOrdemDireta = /^(ordeno|mando|exijo|determino|exijo que|quero que|faça isso|pare|ande|vá|fique|cala a boca|silêncio|obedeça|submeta-se|ajoelhe-se)\b/i.test(acao);

    // 4. Engano / falsa identidade / pretexto
    const ehEngano = /\b(sou o|sou um|sou a|represento|venho em nome de|fui enviado por|estou aqui a mando de|meu nome é|sou conhecido como)\b/i.test(acao)
        || /\b(acredite|confie em mim|pode confiar|pode acreditar|juro por|garanto que|prometo que)\b/i.test(acao);

    // 5. Manipulação emocional (bajulação / insulto)
    const ehManipulacaoEmocional = /\b(lindo|gostoso|bonito|forte|corajoso|valente|sábio|inteligente|poderoso)\b/i.test(acao)
        || /\b(covarde|fraco|medroso|imbecil|idiota|inútil|fracassado|cretino|canalha|vil)\b/i.test(acao)
        || /\b(grande (guerreiro|herói|mago|líder|rei|senhor))\b/i.test(acao);

    // Se não for uma fala direta, nem nada social, sai da camada 3 (será tratado depois)
    if (!ehFalaDireta && !ehInfluencia && !ehProposicaoIntima && !ehInfluenciaIndireta && !ehUrgencia && !ehOrdemDireta && !ehEngano && !ehManipulacaoEmocional) {
        // Não é ação social aparente – pula para as próximas camadas
    } else {
        // É uma ação social (fala ou influência)
        if (!entidadeEmFoco) return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'fala-sem-alvo' };
        const estadoRelacional = resolverEstadoRelacionalNPC(entidadeEmFoco);
        if (estadoRelacional === 'morto') return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'fala-morto' };

        // Regra de contágio: se ação anterior foi violenta, qualquer fala agora é CARISMA
        const acaoAnteriorFoiViolenta = (_ultimoTipoAcao === 'ARRISCADA' && _ultimoAtributo === 'HABILIDADE');
        if (acaoAnteriorFoiViolenta) {
            return { tipo: 'ARRISCADA', atributo: 'CARISMA', fonte: 'fala-pós-violência' };
        }

        // --- SISTEMA DE PESOS PARA INTENÇÃO SOCIAL ---
        let scoreSocial = 0;
        if (ehInfluencia) scoreSocial += 3;
        if (ehProposicaoIntima) scoreSocial += 3;
        if (ehInfluenciaIndireta) scoreSocial += 2;
        if (ehUrgencia) scoreSocial += 1;
        if (ehOrdemDireta) scoreSocial += 2;
        if (ehEngano) scoreSocial += 2;
        if (ehManipulacaoEmocional) scoreSocial += 1;

        // Proposição íntima sempre exige teste (independente do score)
        if (ehProposicaoIntima) {
            return { tipo: 'ARRISCADA', atributo: 'CARISMA', fonte: 'proposição-íntima' };
        }

        // Se score = 0 e é apenas uma fala direta (sem influência), pode ser trivial
        if (scoreSocial === 0 && ehFalaDireta && !ehInfluencia) {
            // Conversa informacional com neutro/aliado = trivial
            if (estadoRelacional === 'aliado' || estadoRelacional === 'neutro') {
                return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'fala-neutra' };
            }
            // Se estiver hostil ou submisso, mesmo uma pergunta inocente exige teste
            if (estadoRelacional === 'hostil' || estadoRelacional === 'submisso') {
                return { tipo: 'ARRISCADA', atributo: 'CARISMA', fonte: 'fala-hostil-submisso' };
            }
        }

        // Score >= 1: precisa avaliar se há resistência real
        if (scoreSocial >= 1) {
            const temResistencia = (estadoRelacional === 'hostil' || estadoRelacional === 'submisso');
            if (scoreSocial >= 3 || temResistencia) {
                return { tipo: 'ARRISCADA', atributo: 'CARISMA', fonte: 'social-score-alto' };
            } else {
                // score 1 ou 2 e aliado/neutro -> pode ser trivial
                return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'social-score-baixo' };
            }
        }

        // Fallback (não deveria chegar aqui)
        return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'social-default' };
    }

    // CAMADA 4: SORTE
    const ehSorte = /\b(aposto|jogo|arrisca|tento a sorte|rolo|dou sorte|torço|rezo|cruzo os dedos|confio no destino)\b/.test(acao);
    if (ehSorte) return { tipo: 'ARRISCADA', atributo: 'SORTE', fonte: 'sorte' };

    // CAMADA 5: DEFAULT INTELIGENTE (antes de cair no árbitro)
    if (/^tento\b/.test(acao) && entidadeEmFoco && resolverEstadoRelacionalNPC(entidadeEmFoco) !== 'morto')
        return { tipo: 'ARRISCADA', atributo: 'HABILIDADE', fonte: 'default-tento' };

    if (!entidadeEmFoco || resolverEstadoRelacionalNPC(entidadeEmFoco) === 'morto')
        return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'default-sem-alvo' };

    // --- CAMADA 6: ÁRBITRO 1.5B (apenas casos ambíguos com NPC vivo) ---
    return { async: true };
}

// --- FUNÇÃO DO ÁRBITRO (chama o 1.5B apenas quando necessário) ---
async function classificarComArbitro(acaoOriginal, entidade) {
    const estadoRelacional = resolverEstadoRelacionalNPC(entidade);
    const contexto = `NPC: ${entidade.nome} (${estadoRelacional}). AÇÃO ANTERIOR: ${_ultimoAtributo !== 'NENHUM' ? _ultimoAtributo : 'nenhuma'}`;

    try {
        const response = await fetch(LM_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: MODELO_JUIZ,
                messages: [
                    {
                        role: 'system',
                        content: `Classifique a ação do jogador em UMA categoria:
FISICA: esforço corporal direto (atacar, correr, escalar, forçar, empurrar).
SOCIAL: comunicação com intenção de influenciar o NPC (convencer, ameaçar, seduzir, enganar, questionar com pressão).
PASSIVA: observação, movimento sem risco, ação sobre o ambiente sem NPC envolvido.

Retorne apenas o JSON. Nada mais.`
                    },
                    { role: 'user', content: `CONTEXTO: ${contexto}\nAÇÃO: "${acaoOriginal}"` }
                ],
                temperature: 0.0,
                max_tokens: 20,
                response_format: {
                    type: "json_schema",
                    json_schema: {
                        name: "arbitro",
                        strict: true,
                        schema: {
                            type: "object",
                            properties: {
                                categoria: { type: "string", enum: ["FISICA", "SOCIAL", "PASSIVA"] }
                            },
                            required: ["categoria"],
                            additionalProperties: false
                        }
                    }
                }
            })
        });
        const data = await response.json();
        const { categoria } = JSON.parse(data.choices[0].message.content);

        if (categoria === 'PASSIVA') return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'árbitro-passiva' };
        if (categoria === 'FISICA')  return { tipo: 'ARRISCADA', atributo: 'HABILIDADE', fonte: 'árbitro-física' };
        if (categoria === 'SOCIAL') {
            const semResistencia = (estadoRelacional === 'aliado' || estadoRelacional === 'neutro') && _ultimoAtributo !== 'HABILIDADE';
            return semResistencia
                ? { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'árbitro-social-neutra' }
                : { tipo: 'ARRISCADA', atributo: 'CARISMA', fonte: 'árbitro-social-carisma' };
        }
    } catch (e) {
        console.warn('[ÁRBITRO] Falhou, aplicando fallback conservador.', e);
    }
    return { tipo: 'ARRISCADA', atributo: 'CARISMA', fonte: 'árbitro-fallback' };
}

// --- PARSER DE ESTADO DE ENTIDADES (roda após CADA resposta do narrador) ---
function parsearEstadoEntidades(textoNarrador) {
    const match = textoNarrador.match(/\[NPCS:\s*([^\]]+)\]/i);
    if (!match) {
        console.warn('[ENTIDADES] Tag [NPCS:] não encontrada na resposta. Mantendo estado anterior.');
        return;
    }

    const payload = match[1].trim();
    if (payload.toLowerCase() === 'nenhum') {
        entityIndex = {};
        entidadeEmFoco = null;
        console.log('[ENTIDADES] Nenhum NPC em cena. Index zerado.');
        return;
    }

    const entradas = payload.split('|');
    const novoIndex = {};

    for (const entrada of entradas) {
        const [nome, estado] = entrada.split(':').map(s => s.trim().toLowerCase());
        if (nome && estado) novoIndex[nome] = estado;
    }

    entityIndex = novoIndex;

    const situacao = ssrJson?.situacao_atual?.toLowerCase() || '';
    let focoEncontrado = null;

    for (const [nome, estado] of Object.entries(entityIndex)) {
        if (situacao.includes(nome)) {
            focoEncontrado = { nome, estado };
            break;
        }
    }

    entidadeEmFoco = focoEncontrado
        ?? (Object.keys(entityIndex).length > 0
            ? { nome: Object.keys(entityIndex)[0], estado: Object.values(entityIndex)[0] }
            : null);

    console.log('[ENTIDADES] Index atualizado:', entityIndex, '| Foco:', entidadeEmFoco);
}

    if (msgJuiz) msgJuiz.remove();
} else {
    classificacao = classificacaoRaw;
}

console.log(`[CLASSIFICADOR v3] ${classificacao.fonte.toUpperCase()} →`, classificacao);

// Atualiza estado persistente ANTES de processar o resultado
_ultimoTipoAcao = classificacao.tipo;
_ultimoAtributo = classificacao.atributo;

const { tipo, atributo } = classificacao;

                    let resultado = null;
                    let danoBase = 0;

                    if (tipo === 'ARRISCADA' && atributo !== 'NENHUM') {
                        await animarTextoTeste(`TESTE DE ${atributo}`);
                        await criarBotaoRolar();

                        const semente = Math.floor(Math.random() * 20) + 1;
                        const valorAtributo = jogadorStats[atributo] ?? 0;
                        resultado = semente <= valorAtributo ? 'SUCESSO' : 'FALHA';
                        if (resultado === 'FALHA') {
                            danoBase = Math.max(1, Math.floor((semente - valorAtributo) / 2));
                        }

                        mostrarResultadoDado(semente, atributo, valorAtributo, resultado);
                        await new Promise(r => setTimeout(r, 600)); // Pequena pausa dramática
                    }

                    // --- INÍCIO DO NOVO CONTEXTO DINÂMICO ---
let diretrizConsequencia = "";
let diretrizSucesso = "A intenção do jogador se concretiza TOTALMENTE e sem ressalvas.";

if (atributo === 'HABILIDADE') {
    if (resultado === 'FALHA') diretrizConsequencia = "A ação fracassa e o jogador sofre uma punição física visceral (ossos quebrados, carne rasgada, dano material).";
} else if (atributo === 'CARISMA') {
    if (resultado === 'SUCESSO') diretrizSucesso = "A intenção do jogador se concretiza TOTALMENTE. ATENÇÃO: Se o contexto anterior envolver violência, o alvo obedece ao jogador por PURO TERROR ou submissão doentia, nunca por afeto. Narre a obediência forçada e a linguagem corporal de medo.";
    if (resultado === 'FALHA') diretrizConsequencia = "A tentativa social é totalmente rejeitada. O alvo demonstra repulsa ou fúria, quebrando a moral do jogador. É proibido narrar dano físico ao jogador neste caso, foque na humilhação social e hostilidade.";
} else if (atributo === 'SORTE') {
    if (resultado === 'FALHA') diretrizConsequencia = "O azar se manifesta de forma impiedosa. Uma reviravolta cruel do ambiente pune o jogador.";
}

const contextoDecidido = tipo === 'TRIVIAL'
    ? `[AÇÃO TRIVIAL: Avance a cena diretamente. Revele uma nova tensão ou detalhe sombrio sem mencionar testes. Termine com [DANO: 0]]`
    : `[AÇÃO ARRISCADA — TESTE DE ${atributo}: ${resultado}. REGRAS VITAIS: Se SUCESSO, ${diretrizSucesso} Se FALHA, a intenção é TOTALMENTE NEGADA/REJEITADA e ${diretrizConsequencia} Narre o desfecho seco. Termine com [DANO: ${resultado === 'FALHA' ? danoBase : 0}]]`;
// --- FIM DO NOVO CONTEXTO DINÂMICO ---

                    mensagemFinal += `\n${contextoDecidido}\n[RESPOSTA OBRIGATORIAMENTE EM PORTUGUÊS BRASILEIRO]`;
                }

                mensagens.push({ role: 'user', content: mensagemFinal });

                const isIntro = (isInitial && !resumoAtual);
                const maxTokens       = isIntro ? 500 : 300;
                const maxContinuacoes = isIntro ?    1 :   1;

                if (isIntro) window._introGenerating = true;

                const respostaIA = await gerarRespostaComContinuacao(mensagens, maxTokens, elementoDisplay, maxContinuacoes);

                const danoMatch = respostaIA.match(/\[DANO:\s*(\d+)\]/i);

                let respostaLimpa = respostaIA
    .replace(/\[TESTE:[^\]]+\]/g, '')
    .replace(/\[DANO:\s*\d+\]/gi, '')
    .replace(/\[NPCS:[^\]]+\]/gi, '')
    .trim();

                if (!isInitial && danoMatch && parseInt(danoMatch[1]) > 0) {
                    const div = document.createElement('div');
                    div.className = 'system-message';
                    div.innerHTML = `<em style="color:#e53935; font-weight:bold;">[FALHA NO TESTE: CONSEQUÊNCIA APLICADA]</em>`;
                    chatBox.appendChild(div);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                elementoDisplay.innerText = respostaLimpa;

                if (danoMatch && parseInt(danoMatch[1]) > 0) {
                    const valorDano = parseInt(danoMatch[1]);
                    energia -= valorDano;
                    document.getElementById('energia-span').innerText = `🩸 Energia: ${Math.max(0, energia)}/10`;
                    adicionarMensagem(`[O mundo cobra seu preço. Você perdeu ${valorDano} de Energia.]`, 'system');

                    if (energia <= 0) {
                        adicionarMensagem("💀 SEU CORPO CEDE. A ESCURIDÃO O CONSOME. FIM DA JORNADA.", 'system');
                        userInput.disabled = true;
                        sendBtn.disabled = true;
                        await salvarEstadoJogador();
                        return;
                    }
                }

                if (isIntro) window._introGenerating = false;

                mensagens.push({ role: 'assistant', content: respostaIA });

                // O NOVO GATILHO: IDLE-TIME PROCESSING
                setTimeout(() => {
                    salvarEstadoJogador().catch(e => console.error('Erro no salvamento background:', e));
                    
                    if (mensagens.length > LIMITE_MENSAGENS && !window._compressaoEmAndamento) {
                        window._compressaoEmAndamento = true;
                        
                        // Atrasa a requisição pesada em 4 segundos para ocorrer no tempo ocioso
                        setTimeout(() => {
                            comprimirMemoria().catch(e => {
                                console.error('Erro na compressão background:', e);
                                window._compressaoEmAndamento = false;
                            });
                        }, 4000); 
                    }
                }, 0);

                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }

            } catch (error) {
                if (intervaloAnimacao) clearInterval(intervaloAnimacao);
                elementoDisplay.innerText = `❌ Erro: ${error.message}`;
                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                }
            } finally {
                if (!isInitial) {
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }
        };

        window.onload = async () => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    uidAtual = user.uid;
                    await carregarDadosJogador(uidAtual);
                    window.enviar();
                } else {
                    window.location.href = "login.html";
                }
            });
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                window.enviar(userInput.value.trim());
            }
        });
    </script>
</body>
</html>
