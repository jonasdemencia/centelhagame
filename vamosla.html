<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha - Motor Narrativo</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; }
        .narrator { color: #a13d3d; margin-bottom: 10px; }
        .player { color: #7a8c66; margin-bottom: 10px; }
        #progress-bar-container { width: 100%; background: #2a251e; height: 12px; margin-bottom: 10px; display: block; }
        #progress-bar { width: 0%; height: 100%; background: #5c2c2c; transition: width 0.3s; }
        input { width: 80%; padding: 10px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; }
        button { padding: 10px; cursor: pointer; background: #3a3228; color: #fff; border: none; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status">Iniciando...</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="chat-box"></div>
    
    <div id="controls">
        <input type="text" id="player-input" placeholder="Sua ação..." disabled>
        <button id="btn-enviar" onclick="enviarAcao()" disabled>AGIR</button>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const MY_MODEL_ID = "Qwen2.5-7B-Instruct-q4f16_1-MLC";
    
    let engine;
    let chatHistory = [];
    let jogador = { habilidade: 10, carisma: 10, sorte: 10 };
    let estadoJogo = {
        localizacao: "caverna escura",
        itens: ["espada enferrujada", "escudo de couro", "lanterna acesa"],
        condicao: "saudável"
    };

    // PROMPT FIXO - Definido uma vez, com exemplos concretos
    const SYSTEM_PROMPT = `Você é um narrador de RPG de sobrevivência. Responda em 2-3 frases curtas e impactantes.

REGRAS:
- Use verbos fortes e concretos
- Foque em sensações físicas: dor, frio, sons, cheiros
- Evite adjetivos decorativos
- Máximo de 50 palavras

EXEMPLOS:
Jogador: "escalar a parede rochosa"
Narrador: "Suas mãos escorregam na pedra úmida. Você despenca. O impacto quebra algo no seu braço esquerdo."

Jogador: "convencer o guarda a me deixar passar"
Narrador: "O guarda ri da sua cara. Ele cospe no chão e aperta o cabo da espada."

Jogador: "procurar por armadilhas"
Narrador: "Você nota fios quase invisíveis cruzando o corredor. Atrás deles, buracos na parede gotejam algo verde."`;

    function analisarAcao(texto) {
        const textoLower = texto.toLowerCase();
        
        if (/escalar|saltar|equilibrar|decifrar|hackear|forçar|arrombar|nadar|correr|lutar|pular|subir|descer|esquivar|rolar/.test(textoLower)) {
            return { tipo: 'habilidade' };
        }
        
        if (/convencer|persuadir|intimidar|seduzir|negociar|mentir|enganar|subornar|ameaçar/.test(textoLower)) {
            return { tipo: 'carisma' };
        }
        
        if (/vasculhar|procurar|explorar|investigar|buscar|examinar|revistar|ouvir|farejar/.test(textoLower)) {
            return { tipo: 'sorte' };
        }
        
        return null;
    }

    function rolarTeste(tipo) {
        const dado = Math.floor(Math.random() * 20) + 1;
        const atributo = jogador[tipo];
        const dificuldade = 18;
        const resultado = dado + atributo;
        
        return {
            sucesso: resultado >= dificuldade,
            dado: dado,
            total: resultado
        };
    }

    function gerarContextoEstado() {
        return `[ESTADO ATUAL: Local=${estadoJogo.localizacao} | Itens=${estadoJogo.itens.join(", ")} | Condição=${estadoJogo.condicao}]`;
    }

    async function init() {
        const status = document.getElementById("status");
        const pb = document.getElementById("progress-bar");

        try {
            status.innerText = "Despertando o Narrador...";
            
            engine = await CreateMLCEngine(MY_MODEL_ID, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    pb.style.width = `${report.progress * 100}%`;
                }
            });

            document.getElementById("progress-bar-container").style.display = "none";
            status.innerText = "O Pesadelo Começou.";
            document.getElementById("player-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            
            const introMsg = "Você acorda com o gosto de ferro na boca. O frio corta sua pele como navalha.";
            addMsg(introMsg, "narrator");
            
            // Adiciona intro ao histórico
            chatHistory.push({ role: "assistant", content: introMsg });

        } catch (err) {
            status.innerText = "ERRO CRÍTICO: " + err.message;
            console.error(err);
        }
    }

    window.enviarAcao = async () => {
        const input = document.getElementById("player-input");
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, "player");
        
        document.getElementById("btn-enviar").disabled = true;
        const tempId = addMsg("...", "narrator");

        // Adiciona ação do jogador ao histórico
        chatHistory.push({ role: "user", content: text });

        // Analisa se precisa de teste
        const teste = analisarAcao(text);
        let resultadoMensagem = null;

        if (teste) {
            const resultado = rolarTeste(teste.tipo);
            // Cria mensagem de sistema SEPARADA com o resultado
            resultadoMensagem = {
                role: "system",
                content: resultado.sucesso 
                    ? `RESULTADO: SUCESSO na ação de ${teste.tipo.toUpperCase()}. Permita progresso mas mantenha tensão.`
                    : `RESULTADO: FALHA na ação de ${teste.tipo.toUpperCase()}. Aplique consequência física imediata: dano, ferimento ou piora da situação.`
            };
        }

        input.value = "";

        try {
            // Monta mensagens: system fixo + contexto de estado + histórico recente + resultado do teste
            const messages = [
                { role: "system", content: SYSTEM_PROMPT },
                { role: "system", content: gerarContextoEstado() },
                ...chatHistory.slice(-10), // Últimas 10 mensagens (5 turnos)
            ];

            // Adiciona resultado do teste se houver
            if (resultadoMensagem) {
                messages.push(resultadoMensagem);
            }

            const result = await engine.chat.completions.create({ 
                messages: messages,
                temperature: 0.75,         // ⬆️ Aumentado para criatividade
                max_tokens: 60,            // Mantido baixo para eficiência
                top_p: 0.9,                // ⬆️ Mais opções criativas
                frequency_penalty: 0.0,    // Zerado
                presence_penalty: 0.0      // Zerado
            });

            const answer = result.choices[0].message.content.trim();

            document.getElementById(tempId).innerText = answer;
            chatHistory.push({ role: "assistant", content: answer });

            // Limita histórico total para economizar memória (mantém últimas 16 mensagens = 8 turnos)
            if (chatHistory.length > 16) {
                chatHistory = chatHistory.slice(-16);
            }

        } catch (e) {
            document.getElementById(tempId).innerText = "[SISTEMA: O mundo vacilou. Tente novamente.]";
            console.error("Erro no motor:", e);
            chatHistory.pop(); // Remove última entrada em caso de erro
        } finally {
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus(); 
        }
    };

    function addMsg(txt, cls) {
        const box = document.getElementById("chat-box");
        const div = document.createElement('div');
        div.className = cls;
        div.id = "msg-" + Date.now() + "-" + Math.random();
        div.innerText = (cls === 'player' ? "> " : "") + txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        
        return div.id;
    }

    // Permite enviar com Enter
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('player-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('btn-enviar').disabled) {
                enviarAcao();
            }
        });
    });

    init();
</script>

</body>
</html>
