<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha - Motor Narrativo</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; }
        .narrator { color: #a13d3d; margin-bottom: 10px; }
        .player { color: #7a8c66; margin-bottom: 10px; }
        .system { color: #6b6b4a; margin-bottom: 10px; font-style: italic; font-size: 0.9em; }
        #progress-bar-container { width: 100%; background: #2a251e; height: 12px; margin-bottom: 10px; display: block; }
        #progress-bar { width: 0%; height: 100%; background: #5c2c2c; transition: width 0.3s; }
        input { width: 80%; padding: 10px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; }
        button { padding: 10px; cursor: pointer; background: #3a3228; color: #fff; border: none; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status">Iniciando...</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="chat-box"></div>
    
    <div id="controls">
        <input type="text" id="player-input" placeholder="Sua ação..." disabled>
        <button id="btn-enviar" onclick="enviarAcao()" disabled>AGIR</button>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const MY_MODEL_ID = "Qwen2.5-7B-Instruct-q4f16_1-MLC";

    const MUNDOS = [
        {
            nome: "Cargueiro MV Teseu",
            resumo: "Você está no cargueiro MV Teseu, à deriva no Atlântico Sul. A tripulação desapareceu. Você tem 3 dias de água potável. Objetivo: descobrir o que aconteceu e enviar SOS pela ponte de comando. Ameaças: tempestade se aproximando, carga desconhecida no porão vazando gás, motor morto.",
            localizacaoInicial: "Camarote 7, Convés B",
            itens: ["canivete enferrujado", "isqueiro zippo", "mapa náutico rasgado"],
            elementos: ["Ponte de comando trancada", "Porão com containers vazando gás verde", "Sala de máquinas alagada", "Cozinha com comida ainda quente", "Bote salva-vidas faltando"],
            locais: ["Camarote 7 (Convés B)", "Corredor Convés B", "Porão Inferior", "Sala de Máquinas", "Cozinha (Convés Superior)", "Alojamento Marinheiros", "Armazém Suprimentos", "Convés A", "Ponte de Comando"],
            documentoCompleto: `CENÁRIO: Cargueiro de Carga MV Teseu
Um navio cargueiro de 180 metros à deriva no Atlântico Sul, a 400km da costa brasileira. Construído em 1987, transportava containers da China para Santos. Agora está morto na água, motores silenciosos, sem tripulação visível.

SITUAÇÃO INICIAL:
Você acorda no Camarote 7 do Convés B. Sua cabeça sangra. A última memória: um estrondo metálico e gritos abafados. O navio balança violentamente - tempestade chegando. Você não lembra como chegou aqui. Não há ninguém. O silêncio é perturbador, quebrado apenas pelo ranger do metal e ondas batendo no casco.

ITENS INICIAIS:
- Canivete enferrujado: encontrado no bolso, não é seu
- Isqueiro Zippo: gravado "Capitão Voss 1992"
- Mapa náutico rasgado: mostra rota até "Ponto de Encontro X" marcado a lápis

AMEAÇAS:
- Tempestade tropical se aproximando (6-8 horas até impacto total)
- Containers no porão vazando gás verde desconhecido (causa tontura e alucinações)
- Motor principal morto, navio à deriva em direção a recifes
- Água potável: apenas 3 dias nos tanques de emergência
- Algo grande se movendo no porão inferior

OBJETIVO IMPLÍCITO:
Descobrir o que aconteceu com as 14 pessoas da tripulação. Reativar o rádio de emergência na ponte de comando para enviar SOS. Sobreviver à tempestade que se aproxima. Decidir: investigar a carga suspeita ou fugir no bote salva-vidas restante.

ELEMENTOS ÚNICOS:
1. PONTE DE COMANDO (Convés A): Porta trancada por dentro. Rádio de emergência lá dentro. Janelas mostram cadeira do capitão virada para o mar.
2. PORÃO INFERIOR: 47 containers empilhados. Container 23-B está aberto, vazando gás verde. Marcas de arranhões nas paredes metálicas. Algo se move entre as sombras.
3. SALA DE MÁQUINAS: Parcialmente alagada (1 metro de água salgada). Motor principal sabotado - cabos cortados propositalmente. Caixa de ferramentas flutuando.
4. COZINHA/REFEITÓRIO: Panelas no fogão ainda mornas. Pratos com comida pela metade. Cadeiras derrubadas. Faca de cozinha cravada na mesa. Nenhum sinal de luta.
5. BOTE SALVA-VIDAS: Dos 4 botes, apenas 1 permanece. Os outros foram ejetados recentemente (cabos cortados). O bote restante tem capacidade para 2 pessoas e suprimentos para 5 dias.

PISTAS ESCONDIDAS:
- Diário do capitão no camarote principal (Convés A)
- Manifesto de carga falso na sala de rádio
- Pegadas molhadas que não são suas levando ao porão
- Sangue seco na escada entre Convés B e C`
        },
        {
            nome: "Estação Subterrânea Abandonada",
            resumo: "Você está na Estação Metro-7, abandonada há 15 anos após um acidente. Objetivo: encontrar a saída antes que as baterias da lanterna acabem (2 horas). Ameaças: túneis colapsados, água contaminada subindo, criaturas nos trilhos, ar rarefeito.",
            localizacaoInicial: "Plataforma Central, Nível -2",
            itens: ["lanterna de mão", "barra de ferro", "bilhete de metrô antigo"],
            elementos: ["Sala de controle trancada", "Túnel norte colapsado", "Reservatório de água contaminada", "Oficina de manutenção", "Escada de emergência bloqueada"],
            locais: ["Plataforma Central (Nível -2)", "Túnel Sul", "Túnel Norte", "Sala de Controle", "Oficina de Manutenção", "Reservatório", "Escadaria Emergência", "Nível -3 (Trilhos)", "Sala Elétrica"],
            documentoCompleto: `CENÁRIO: Estação Metro-7 Abandonada
Uma estação de metrô subterrânea a 40 metros de profundidade, abandonada desde 2008 após um desabamento que matou 23 pessoas. Localizada sob o centro da cidade, agora é um labirinto de concreto rachado, água escura e escuridão absoluta.

SITUAÇÃO INICIAL:
Você acorda na Plataforma Central do Nível -2. Sua lanterna está acesa, mas a bateria marca 30%. A última memória: você estava explorando ruínas urbanas quando o chão cedeu. Agora está preso aqui embaixo. O ar é pesado e úmido. Você ouve água pingando e algo se movendo nos trilhos abaixo.

ITENS INICIAIS:
- Lanterna de mão: bateria em 30%, dura aproximadamente 2 horas
- Barra de ferro: encontrada ao seu lado, enferrujada mas sólida
- Bilhete de metrô antigo: datado de 12/09/2008, último dia de operação

AMEAÇAS:
- Bateria da lanterna acabando (2 horas até escuridão total)
- Água contaminada subindo lentamente dos níveis inferiores
- Ar rarefeito - quanto mais fundo, menos oxigênio
- Criaturas nos trilhos (ratos gigantes ou algo pior)
- Estrutura instável - risco de novos desabamentos

OBJETIVO IMPLÍCITO:
Encontrar a saída de emergência antes que a lanterna apague. Descobrir o que realmente aconteceu em 2008. Evitar o que vive nos túneis. Subir para a superfície antes que a água suba demais.

ELEMENTOS ÚNICOS:
1. SALA DE CONTROLE (Nível -2): Porta de metal trancada. Dentro há mapas da estação e o sistema de ventilação de emergência.
2. TÚNEL NORTE: Parcialmente colapsado. Passagem estreita entre escombros leva ao Nível -1 (mais próximo da superfície).
3. OFICINA DE MANUTENÇÃO: Ferramentas enferrujadas, uniformes de funcionários, e um diário de engenheiro com anotações estranhas sobre "sons nos túneis".
4. RESERVATÓRIO: Tanque de água subterrâneo agora contaminado e transbordando. Algo grande nada lá dentro.
5. ESCADA DE EMERGÊNCIA: Bloqueada por destroços no Nível -1. Precisa ser desobstruída para alcançar a superfície.

PISTAS ESCONDIDAS:
- Mapa da estação na sala de controle mostra rota alternativa
- Diário do engenheiro menciona "Túnel de Serviço Secreto"
- Marcas de arranhões nas paredes não são de ferramentas
- Esqueletos nos trilhos têm marcas de mordidas`
        }
    ];

    const MUNDO_ESCOLHIDO = MUNDOS[Math.floor(Math.random() * MUNDOS.length)];
    
    let engine;
    let chatHistory = [];
    let jogador = { habilidade: 10, carisma: 10, sorte: 10 };
    let documentoMestre = null;
    let elementosMundo = [];
    let locaisDisponiveis = [];
    let locaisVisitados = [];
    let estadoJogo = {
        localizacao: "",
        itens: [],
        condicao: "saudável",
        ultimoEvento: ""
    };

    const PROMPT_BASE = `Você é um narrador direto de RPG de sobrevivência em português brasileiro.

REGRAS OBRIGATÓRIAS:
1. Use português brasileiro correto e simples
2. MÁXIMO 2 frases curtas (15 palavras cada)
3. Em ações exploratórias, adicione 1 descoberta, perigo ou detalhe
4. Use elementos do CONTEXTO DO MUNDO
5. SEMPRE termine com ponto final completo
6. Mantenha coerência com a localização atual do jogador

EXEMPLOS:
Jogador: "entrar no porão"
Narrador: "Você desce ao porão escuro. Gás verde escapa do Container 23-B."

Jogador: "continuar"
Narrador: "Você avança entre containers. Algo grande range nas sombras."

Jogador: "examinar sala"
Narrador: "A sala está revirada. Sangue seco mancha o chão."`;

    function ehAcaoExploratoria(texto) {
        return /entrar|seguir|continuar|andar|avançar|prosseguir|ir|caminhar|mover|descer|subir/.test(texto.toLowerCase());
    }

    function atualizarLocalizacao(resposta) {
        const respostaLower = resposta.toLowerCase();
        for (const local of locaisDisponiveis) {
            const localLower = local.toLowerCase();
            const palavrasChave = localLower.split(/[\s,()]+/).filter(p => p.length > 4);
            
            for (const palavra of palavrasChave) {
                if (respostaLower.includes(palavra)) {
                    if (!locaisVisitados.includes(local)) {
                        locaisVisitados.push(local);
                    }
                    estadoJogo.localizacao = local;
                    return;
                }
            }
        }
    }

    function gerarEvento() {
        const tipo = Math.random();
        if (tipo < 0.4) return "DESCOBERTA";
        if (tipo < 0.7) return "PERIGO";
        return "ATMOSFERA";
    }

    function analisarAcao(texto) {
        const textoLower = texto.toLowerCase();
        
        if (/escalar|saltar|equilibrar|decifrar|hackear|forçar|arrombar|nadar|correr|lutar|pular|subir|descer|esquivar|rolar|atacar/.test(textoLower)) {
            return { tipo: 'habilidade' };
        }
        
        if (/convencer|persuadir|intimidar|seduzir|negociar|mentir|enganar|subornar|ameaçar/.test(textoLower)) {
            return { tipo: 'carisma' };
        }
        
        if (/vasculhar|procurar|explorar|investigar|buscar|examinar|revistar|ouvir|farejar|iluminar|ver/.test(textoLower)) {
            return { tipo: 'sorte' };
        }
        
        return null;
    }

    function rolarTeste(tipo) {
        const dado = Math.floor(Math.random() * 20) + 1;
        const atributo = jogador[tipo];
        const dificuldade = 18;
        const resultado = dado + atributo;
        
        return {
            sucesso: resultado >= dificuldade,
            dado: dado,
            total: resultado
        };
    }

    function gerarSystemPrompt() {
        const resumoMundo = documentoMestre ? documentoMestre.resumo : "Mundo desconhecido";
        const elementos = elementosMundo.length > 0 ? `\nELEMENTOS DISPONÍVEIS: ${elementosMundo.join(", ")}` : "";
        const visitados = locaisVisitados.length > 0 ? `\nLOCAIS JÁ VISITADOS: ${locaisVisitados.join(", ")}` : "";
        
        const estado = `CONTEXTO DO MUNDO:
${resumoMundo}${elementos}${visitados}

ESTADO ATUAL:
- Local EXATO onde jogador está AGORA: ${estadoJogo.localizacao}
- Inventário: ${estadoJogo.itens.join(", ") || "vazio"}
- Condição: ${estadoJogo.condicao}
- Último evento: ${estadoJogo.ultimoEvento}`;
        
        return `${PROMPT_BASE}\n\n${estado}`;
    }

    async function gerarDocumentoMestre() {
        addMsg("Preparando o mundo...", "system");
        
        try {
            documentoMestre = {
                completo: MUNDO_ESCOLHIDO.documentoCompleto,
                resumo: MUNDO_ESCOLHIDO.resumo
            };
            
            estadoJogo.localizacao = MUNDO_ESCOLHIDO.localizacaoInicial;
            estadoJogo.itens = [...MUNDO_ESCOLHIDO.itens];
            elementosMundo = [...MUNDO_ESCOLHIDO.elementos];
            locaisDisponiveis = [...MUNDO_ESCOLHIDO.locais];
            locaisVisitados.push(MUNDO_ESCOLHIDO.localizacaoInicial);
            
            const resultIntro = await engine.chat.completions.create({
                messages: [
                    { role: "system", content: `Baseado neste cenário:\n${MUNDO_ESCOLHIDO.documentoCompleto}\n\nEscreva a cena de abertura: local (${MUNDO_ESCOLHIDO.localizacaoInicial}) e sensação física. Use português brasileiro simples. 2 frases curtas, máximo 25 palavras TOTAL.` },
                    { role: "user", content: "Descreva a cena inicial." }
                ],
                temperature: 0.6,
                max_tokens: 45,
                stop: ["\n\n", "Jogador:", "Você se"]
            });

            let intro = resultIntro.choices[0].message.content.trim();
            
            const frasesCompletas = [];
            const frasesTemp = intro.split(/[.!?]/);

            for (let i = 0; i < frasesTemp.length - 1; i++) {
                if (frasesTemp[i].trim().length > 5) {
                    frasesCompletas.push(frasesTemp[i].trim());
                }
            }

            const ultimaFrase = frasesTemp[frasesTemp.length - 1].trim();
            if (ultimaFrase.length > 10 && !/[.!?]$/.test(intro)) {
                // Descarta frase incompleta
            } else if (ultimaFrase.length > 5) {
                frasesCompletas.push(ultimaFrase);
            }

            intro = frasesCompletas.join('. ');
            if (intro && !/[.!?]$/.test(intro)) {
                intro += '.';
            }

            addMsg(intro, "narrator");
            chatHistory.push({ role: "assistant", content: intro });
            estadoJogo.ultimoEvento = intro.substring(0, 60);

            console.log("=== MUNDO CARREGADO ===");
            console.log(MUNDO_ESCOLHIDO.nome);
            console.log("\n=== ELEMENTOS DISPONÍVEIS ===");
            console.log(elementosMundo);

        } catch (e) {
            addMsg("Falha ao carregar o mundo.", "system");
            console.error(e);
        }
    }

    async function init() {
        const status = document.getElementById("status");
        const pb = document.getElementById("progress-bar");

        try {
            status.innerText = "Despertando o Narrador...";
            
            engine = await CreateMLCEngine(MY_MODEL_ID, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    pb.style.width = `${report.progress * 100}%`;
                }
            });

            document.getElementById("progress-bar-container").style.display = "none";
            status.innerText = "Carregando o mundo...";

            await gerarDocumentoMestre();

            status.innerText = "O Pesadelo Começou.";
            document.getElementById("player-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus();

        } catch (err) {
            status.innerText = "ERRO CRÍTICO: " + err.message;
            console.error(err);
        }
    }

    window.enviarAcao = async () => {
        const input = document.getElementById("player-input");
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, "player");
        
        document.getElementById("btn-enviar").disabled = true;
        const tempId = addMsg("...", "narrator");

        const ehExploracao = ehAcaoExploratoria(text);
        const teste = analisarAcao(text);
        let acaoCompleta = text;

        if (ehExploracao) {
            const tipoEvento = gerarEvento();
            acaoCompleta += `\n[AÇÃO EXPLORATÓRIA - Gere um ${tipoEvento}]`;
        }

        if (teste) {
            const resultado = rolarTeste(teste.tipo);
            const resultadoTexto = resultado.sucesso 
                ? `[TESTE ${teste.tipo.toUpperCase()}: SUCESSO]`
                : `[TESTE ${teste.tipo.toUpperCase()}: FALHA - consequência física]`;
            acaoCompleta += `\n${resultadoTexto}`;
        }

        chatHistory.push({ role: "user", content: acaoCompleta });
        input.value = "";

        try {
            const messages = [
                { role: "system", content: gerarSystemPrompt() },
                ...chatHistory.slice(-12)
            ];

            const result = await engine.chat.completions.create({ 
                messages: messages,
                temperature: ehExploracao ? 0.65 : 0.48,
                max_tokens: 45,
                top_p: 0.82,
                frequency_penalty: 0.25,
                presence_penalty: 0.2,
                stop: ["\n\n", "Jogador:", ">", "\n>", "...", " -"]
            });

            let answer = result.choices[0].message.content.trim();

            // Pós-processamento
            const frasesCompletas = [];
            const frasesTemp = answer.split(/[.!?]/);

            for (let i = 0; i < frasesTemp.length - 1; i++) {
                if (frasesTemp[i].trim().length > 5) {
                    frasesCompletas.push(frasesTemp[i].trim());
                }
            }

            const ultimaFrase = frasesTemp[frasesTemp.length - 1].trim();
            if (ultimaFrase.length > 10 && !/[.!?]$/.test(answer)) {
                // Descarta frase incompleta
            } else if (ultimaFrase.length > 5) {
                frasesCompletas.push(ultimaFrase);
            }

            answer = frasesCompletas.join('. ');
            if (answer && !/[.!?]$/.test(answer)) {
                answer += '.';
            }

            // Atualiza localização baseado na resposta
            atualizarLocalizacao(answer);

            document.getElementById(tempId).innerText = answer;
            chatHistory.push({ role: "assistant", content: answer });
            
            estadoJogo.ultimoEvento = answer.substring(0, 60);

            if (chatHistory.length > 20) {
                chatHistory = chatHistory.slice(-20);
            }

        } catch (e) {
            document.getElementById(tempId).innerText = "[SISTEMA: O mundo vacilou. Tente novamente.]";
            console.error("Erro no motor:", e);
            chatHistory.pop();
        } finally {
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus(); 
        }
    };

    function addMsg(txt, cls) {
        const box = document.getElementById("chat-box");
        const div = document.createElement('div');
        div.className = cls;
        div.id = "msg-" + Date.now() + "-" + Math.random();
        div.innerText = (cls === 'player' ? "> " : "") + txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div.id;
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('player-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('btn-enviar').disabled) {
                enviarAcao();
            }
        });
    });

    init();
</script>

</body>
</html>
