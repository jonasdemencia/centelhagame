<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

        .ai-message { color: #a13d3d; align-self: flex-start; background: #2a1a1a; padding: 6px 12px; border-radius: 0 12px 12px 12px; max-width: 80%; word-wrap: break-word; }
        .system-message { color: #6b6b4a; text-align: center; font-style: italic; font-size: 0.9em; margin: 5px 0; }
        #controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; font-family: inherit; font-size: 16px; }
        button { padding: 12px 20px; cursor: pointer; background: #3a3228; color: #fff; border: none; font-family: inherit; font-size: 16px; transition: 0.2s; }
        button:hover:not(:disabled) { background: #5a4a38; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .teste-reveal { color: #4caf50; font-style: italic; font-weight: bold; text-align: center; letter-spacing: 2px; margin: 10px 0; }
        .resultado-dado { color: #b5a68b; text-align: center; font-style: italic; margin: 4px 0; font-size: 0.9em; }
        .resultado-sucesso { color: #4caf50; font-weight: bold; text-align: center; letter-spacing: 3px; margin: 4px 0; }
        .resultado-falha { color: #e53935; font-weight: bold; text-align: center; letter-spacing: 3px; margin: 4px 0; }
        #rolar-btn { display: block; margin: 10px auto; padding: 10px 28px; background: #1a2e12; color: #4caf50; border: 1px solid #4caf50; font-family: inherit; font-size: 15px; font-style: italic; letter-spacing: 1px; cursor: pointer; transition: 0.2s; }
        #rolar-btn:hover { background: #253d19; }
    </style>
</head>
<body>
    <div id="game-container">
       <div id="local-atual" style="display: flex; justify-content: space-between;">
    <span>⚔️ Reinos Desolados • <span id="modelo-span">qwen2.5-7b-instruct-abliterated-v2</span></span>
<span id="energia-span" style="color: #a13d3d; font-weight: bold;">🩸 Energia: 10/10</span>
       </div>

        <div id="chat-box">

    <script type="module">
        // ============================================================

        // ============================================================
        // Configuração do Firebase & Firestore
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC0XfvjonW2gd1eGAZX7NBYfPGMwI2siJw",
            authDomain: "centelhagame-9d511.firebaseapp.com",
            projectId: "centelhagame-9d511",

        // ============================================================
        // Configuração do LM Studio e Controle de Contexto

        const LM_URL = 'http://localhost:1234/v1/chat/completions';
        const MODELO = 'qwen2.5-7b-instruct-abliterated-v2';
        const LIMITE_MENSAGENS = 11;
        window._introGenerating = false;

        let turnosJogados = 0;
        let energia = 0; // O valor real virá do Firestore
        let uidAtual = null; // UID do jogador autenticado

        // ── MEMÓRIA LONGA ─────────────────────────────────────────
        let memoriaLonga = "";
        // ──────────────────────────────────────────────────────────

        let jogadorStats = {
            HABILIDADE: 0,
            CARISMA: 0,

        };

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Estrutura de memória (igual ao original)
        let mensagens = [
            {
                role: 'system',
                content: `Você é um mestre de RPG brutal e realista. Responda APENAS em Português Brasileiro CORRETO, NUNCA em outros idiomas. Você NUNCA repete as instruções do jogador.

NARRATIVA:
- Tensão Psicológica: o horror está no que não é mostrado. Mostre consequências (cadáveres, ruínas, loucura). Atrase o monstro.
- Prosa Forense: descreva dano como patologista — rompimento de tecido, fratura, fluidos, o som seco da matéria cedendo.

REGRAS DE SAÍDA:
- [AÇÃO TRIVIAL]: narre diretamente. Zero menção a teste. Termine com [DANO: 0].
- [AÇÃO ARRISCADA — TESTE DE X: SUCESSO]: a intenção do jogador se concretiza TOTALMENTE. Se a ação é violenta, aplique Prosa Forense sem piedade. Termine com [DANO: 0].
- [AÇÃO ARRISCADA — TESTE DE X: FALHA]: o jogador fracassa e sofre a consequência. NUNCA narre a ação dando certo. Termine com [DANO: N] onde N é o valor informado nos metadados.
- NUNCA mencione semente, atributos ou cálculos na narração.[ID_IDIOMA: pt-BR]`
            },
            // [1] — Slot da memória longa
            { role: 'system', content: '' },
            // [2] — SSR de curto prazo
            { role: 'system', content: 'Resumo da jornada até agora: A aventura acabou de começar.' }
        ];

        let resumoAtual = "";

        // ============================================================
        // Função para carregar dados do jogador (coleção players)
        // ============================================================
        async function carregarDadosJogador(uid) {
            try {
                const docRef = doc(db, "players", uid);
                const docSnap = await getDoc(docRef);
                console.log('[Firestore] Documento players carregado:', docSnap.exists() ? docSnap.data() : 'não existe');

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    console.log('[Firestore] Dados brutos:', data);
                    console.log('[Firestore] energy.total:', data?.energy?.total);
                    console.log('[Firestore] skill.total:', data?.skill?.total);
                    console.log('[Firestore] charisma.total:', data?.charisma?.total);
                    console.log('[Firestore] luck.total:', data?.luck?.total);

                    // Carrega memória longa
                    if (data.memoriaLonga) {
                        memoriaLonga = data.memoriaLonga;
                        mensagens[1].content = `LORE PERMANENTE DO MUNDO (verdade absoluta — nunca contradiga nem altere):\n${memoriaLonga}`;
                    }
                    // Carrega resumo
                    if (data.resumo) {
                        resumoAtual = data.resumo;
                        mensagens[2].content = `Resumo da jornada até agora: ${resumoAtual}`;
                    }
                    
                    if (data.turnos !== undefined) {
                        turnosJogados = data.turnos;
                    }
                    
                    // Energia
                    if (data?.energy?.total !== undefined) {
                        energia = data.energy.total;
                        document.getElementById('energia-span').innerText = `🩸 Energia: ${energia}/10`;
                        console.log('[Jogador] Energia carregada:', energia);
                    } else if (data.energia !== undefined) {
                        energia = data.energia;
                        document.getElementById('energia-span').innerText = `🩸 Energia: ${energia}/10`;
                        console.log('[Jogador] Energia carregada (fallback):', energia);
                    }

                    // Atributos
                    if (data?.skill?.total !== undefined) {
                        jogadorStats.HABILIDADE = data.skill.total;
                    }
                    if (data?.charisma?.total !== undefined) {
                        jogadorStats.CARISMA = data.charisma.total;
                    }
                    if (data?.luck?.total !== undefined) {
                        jogadorStats.SORTE = data.luck.total;
                    }
                    console.log('[Jogador] Atributos após carregamento:', jogadorStats);
                } else {
                    console.log('[Firestore] Jogador não encontrado. Criando documento padrão...');
                    // Cria documento padrão
                    const dadosPadrao = {
                        energy: { total: 40, initial: 40 },
                        skill: { total: 5 },
                        charisma: { total: 5 },
                        luck: { total: 4 },
                        turnos: 0,
                        resumo: "",
                        memoriaLonga: ""
                    };
                    await setDoc(doc(db, "players", uid), dadosPadrao, { merge: true });
                    // Recarrega os dados padrão
                    await carregarDadosJogador(uid);
                }
            } catch (e) {
                console.error("Erro ao carregar do Firestore:", e);
            }
        }

        // ============================================================
        // Função para salvar estado do jogador (coleção players)
        // ============================================================
        async function salvarEstadoJogador() {
            if (!uidAtual) return;
            try {
                const dadosAtualizados = {
                    turnos: turnosJogados,
                    resumo: resumoAtual,
                    energia: energia,               // fallback
                    "energy.total": energia,
                    memoriaLonga: memoriaLonga,
                    "skill.total": jogadorStats.HABILIDADE,
                    "charisma.total": jogadorStats.CARISMA,
                    "luck.total": jogadorStats.SORTE
                };
                console.log('[Firestore] Salvando estado do jogador:', dadosAtualizados);
                await setDoc(doc(db, "players", uidAtual), dadosAtualizados, { merge: true });
                console.log('[Firestore] Estado salvo com sucesso.');
            } catch (e) {
                console.error("Erro ao salvar estado do jogador:", e);
            }
        }

        // ============================================================
        // MEMÓRIA LONGA — gerada uma única vez após a intro
        // ============================================================
        async function gerarMemoriaLonga(textoIntro) {
            if (memoriaLonga) return;

            const promptLore = [
                {
                    role: 'system',
                    content: 'Você é um extrator de lore. Dado o texto de introdução de um RPG, preencha os campos abaixo com dados factuais extraídos do texto. Zero prosa. Zero adjetivos literários. Apenas nomes e fatos secos.\n\nMUNDO: [nome do cenário/reino principal]\nAMEAÇA: [nome e natureza da ameaça principal]\nARQUÉTIPO: [arquétipo do jogador]\nMISSÃO: [objetivo concreto da missão]\nLOCALIZAÇÕES: [lista separada por vírgulas de TODOS os lugares nomeados: reinos, regiões, vilas, rios, montanhas, pântanos, locais específicos — apenas os nomes, sem descrição]\n\nResponda APENAS com os campos preenchidos, sem texto adicional.'
                },
                {
                    role: 'user',
                    content: `Texto da introdução:\n${textoIntro}\n\nGere a memória permanente agora.`
                }
            ];

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: promptLore,
                        temperature: 0.1,
                        max_tokens: 250
                    })
                });
                const data = await response.json();
                memoriaLonga = data.choices[0].message.content.trim();
                mensagens[1].content = `LORE PERMANENTE DO MUNDO (verdade absoluta — nunca contradiga nem altere):\n${memoriaLonga}`;
                // Salva no documento do jogador
                if (uidAtual) {
                    await setDoc(doc(db, "players", uidAtual), { memoriaLonga }, { merge: true });
                }
                console.debug('[MEMÓRIA LONGA] Gerada e salva:', memoriaLonga);
            } catch (e) {
                console.error('Erro ao gerar memória longa:', e);
            }
        }

        // ============================================================
        // Função do Diretor de Fases (inalterada)
        // ============================================================
        function obterDiretrizDeFase() {
            if (turnosJogados < 50) {
                return "FASE 1 - RASTROS (Lentidão): O perigo é apenas um sussurro, uma lenda ou um rastro perturbador no cenário. É ESTRITAMENTE PROIBIDO mostrar a ameaça principal. Foco no mistério e na exploração do infamiliar.";
            } else if (turnosJogados < 250) {
                return "FASE 2 - PARANOIA: Os sinais da ameaça são recentes. O ambiente reage a algo invisível (animais mortos, cheiro de podridão, NPCs aterrorizados). O perigo é iminente, mas ainda indireto.";
            } else if (turnosJogados < 450) {
                return "FASE 3 - PERSEGUIÇÃO: O jogador vê a ameaça de relance. Sobrevivência se torna o foco. O cerco está se fechando. Tensão alta, descreva o som e o impacto da ameaça no ambiente.";
            } else {
                return "FASE 4 - O CLÍMAX: O confronto direto, visceral e inevitável. Apostas máximas. Descreva a brutalidade do embate.";
            }
        }

        // ============================================================
        // Funções de Compressão de Memória — SSR
        // ============================================================
        const SSR_TEMPLATE = `LOCAL: [onde o jogador está agora]
NPCS: [lista de personagens encontrados e seu estado atual: nome/descrição, relação, vivo/morto/desconhecido]
ITENS: [itens carregados ou relevantes no cenário]
EVENTOS_CHAVE: [lista de fatos consumados, em ordem, sem atmosfera — apenas o que aconteceu]
SITUACAO_ATUAL: [uma frase: o que o jogador está fazendo ou diante de agora]
GANCHOS_ATIVOS: [pistas ou ameaças não resolvidas que devem ser lembradas]`;

        async function comprimirMemoria() {
    if (mensagens.length > LIMITE_MENSAGENS) {
        console.log('⚙️ Iniciando compressão de memória em background...');

        const mensagensParaResumir = mensagens.splice(3, 6);
        const textoExtraido = mensagensParaResumir
            .map(m => `${m.role === 'user' ? 'JOGADOR' : 'NARRADOR'}: ${m.content}`)
            .join('\n---\n');

        const promptResumo = [
            {
                role: 'system',
                content: `Você é um sistema de log de banco de dados. Extraia fatos das interações e retorne APENAS um JSON.
REGRAS:
1. EVENTOS_CHAVE deve ser um array de strings extremamente curtas (máximo 7 palavras por evento).
2. Escreva como um boletim de ocorrência policial.
3. Combine o "ESTADO ANTERIOR" com os "NOVOS EVENTOS" para criar o novo estado.

EXEMPLO DE EVENTO_CHAVE:
Entrada: "O jogador estende a mão com uma pedra. A jovem sorri docemente, inclina a cabeça e engole a pedra."
Saída correta: "Jogador fez a jovem engolir uma pedra."`
            },
            {
                role: 'user',
                content: `ESTADO ANTERIOR:\n${resumoAtual || 'Nenhum'}\n\nNOVOS EVENTOS:\n${textoExtraido}`
            }
        ];

        try {
            const response = await fetch(LM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: MODELO,
                    messages: promptResumo,
                    temperature: 0.1,
                    max_tokens: 400,
                    response_format: {
                        type: "json_schema",
                        json_schema: {
                            name: "extrator_memoria",
                            strict: true,
                            schema: {
                                type: "object",
                                properties: {
                                    local: { type: "string" },
                                    npcs: {
                                        type: "array",
                                        items: { type: "string", description: "Nome e estado atual (ex: Maria, viva)" }
                                    },
                                    itens_conhecidos: {
                                        type: "array",
                                        items: { type: "string" }
                                    },
                                    eventos_chave: {
                                        type: "array",
                                        items: { type: "string", description: "Ação direta de causa e efeito. Max 7 palavras." }
                                    },
                                    situacao_atual: { type: "string" }
                                },
                                required: ["local", "npcs", "itens_conhecidos", "eventos_chave", "situacao_atual"],
                                additionalProperties: false
                            }
                        }
                    }
                })
            });

            if (!response.ok) {
                const errBody = await response.text();
                throw new Error(`HTTP ${response.status}: ${errBody}`);
            }
            const data = await response.json();
            if (!data.choices?.[0]?.message?.content) {
                throw new Error('Resposta inválida do servidor de compressão');
            }
            const jsonObj = JSON.parse(data.choices[0].message.content);

            // Reconstrói o texto que o narrador vai usar
            resumoAtual = `LOCAL: ${jsonObj.local}
NPCS: ${jsonObj.npcs.join(' | ')}
ITENS: ${jsonObj.itens_conhecidos.join(' | ')}
EVENTOS: ${jsonObj.eventos_chave.join(' ➔ ')}
SITUAÇÃO: ${jsonObj.situacao_atual}`;

            mensagens[2].content = `ESTADO ATUAL DO MUNDO:\n${resumoAtual}`;
            console.debug('[SSR] Memória comprimida com sucesso (Background):\n' + resumoAtual);

            // Salva no Firestore em background
            salvarEstadoJogador().catch(e => console.error(e));
        } catch (error) {
            console.error("Erro ao comprimir memória (Background):", error);
            // Recupera as mensagens removidas para não perder história
            mensagens.splice(3, 0, ...mensagensParaResumir);
        }
    }
}

        // ============================================================
        // Funções auxiliares Visuais (inalteradas)
        // ============================================================
        function adicionarMensagem(texto, tipo, temporaria = false) {
            const div = document.createElement('div');
            div.className = tipo === 'user' ? 'user-message' : tipo === 'system' ? 'system-message' : 'ai-message';
            div.innerText = texto;
            if (temporaria) {
                div.id = 'temp-' + Date.now() + '-' + Math.random();
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.id;
        }

        // ============================================================
        // Streaming SSE com loop de auto-continuação (inalterado)
        // ============================================================
        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
            console.log("🔥 Temperatura usada:", window._introGenerating ? 0.75 : 0.6);
            try {
                const response = await fetch(LM_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: MODELO,
                        messages: mensagensPayload,
                        temperature: window._introGenerating ? 0.75 : 0.6,
                        max_tokens: maxTokens,
                        presence_penalty: 0.3,
                        frequency_penalty: 0.3,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                let finishReason = null;

                console.debug('[LLM STREAM] Iniciando leitura de chunks SSE...');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        console.debug('[LLM STREAM] Leitor finalizado (done=true)');
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]') {
                            console.debug('[LLM STREAM] Sinal [DONE] recebido.');
                            continue;
                        }
                        try {
                            const chunk = JSON.parse(jsonStr);
                            const delta = chunk.choices?.[0]?.delta?.content || '';
                            const fr = chunk.choices?.[0]?.finish_reason;

                            if (fr && fr !== 'null') {
                                console.debug(`[LLM STREAM] finish_reason recebido: "${fr}"`);
                            } else if (fr === 'null') {
                                console.debug('[LLM STREAM] finish_reason = null (ignorado)');
                            }

                            if (delta) {
                                fullText += delta;
                                if (onToken) onToken(fullText);
                            }
                            if (fr && fr !== 'null') {
                                finishReason = fr;
                            }

                            if (chunk.error) {
                                console.error('[LLM STREAM] Erro no chunk:', chunk.error);
                            }
                        } catch (parseErr) {
                            console.error('[LLM STREAM] Erro ao parsear chunk:', parseErr, 'Linha:', line);
                        }
                    }
                }

                console.debug(`[LLM STREAM] Geração concluída. Tokens gerados: ~${fullText.split(' ').length} palavras. finish_reason final: "${finishReason}"`);
                return { text: fullText, finishReason };
            } catch (error) {
                console.error('[LLM STREAM] Falha na requisição fetch:', error);
                throw error;
            }
        }

        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elemento, maxContinuacoes = 0) {
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];

            for (let tentativa = 0; tentativa <= maxContinuacoes; tentativa++) {
                if (tentativa > 0) {
                    console.debug(`[CONTINUAÇÃO ${tentativa}/${maxContinuacoes}] finish_reason=length. Enviando extensão...`);
                    msgsAtual = [
                        ...msgsAtual,
                        { role: 'assistant', content: textoCompleto },
                        { role: 'user', content: 'Continue a narração em português brasileiro.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
                        elemento.innerText = textoCompleto + parcial;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

                if (finishReason !== 'length') {
                    console.debug(`[GERAÇÃO] Encerrado naturalmente (finish_reason="${finishReason}") na tentativa ${tentativa}.`);
                    break;
                }

                if (tentativa === maxContinuacoes) {
                    console.debug(`[GERAÇÃO] Limite de ${maxContinuacoes} continuação(ões) atingido. Encerrando.`);
                }
            }

            return textoCompleto;
        }

        // ============================================================
        // Prompt de introdução (inalterado)
        // ============================================================
        const PROMPT_INTRO = `Descreva em 3 frases curtas a seguinte cena, em segunda pessoa: Você está numa sala de pedra. Há uma mesa, um espelho rachado e uma vela quase apagada. Uma mulher jovem e bela de cabelos escuros está de frente para você. O que você faz?`;

        // ============================================================
        // Função de classificação de ação (inalterada)
        // ============================================================
        async function classificarAcaoLLM(acaoUsuario) {
            const response = await fetch(LM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: MODELO,
                    messages: [
                        {
                            role: 'system',
                            content: `Você é um classificador de ações de RPG. 
Classifique a ação do jogador em EXATAMENTE um tipo e um atributo.

TIPO:
- TRIVIAL: observar, perguntar, dialogar, cumprimentar, esperar, examinar sem risco
- ARRISCADA: atacar, fugir, mentir, seduzir, roubar, escalar, enganar, ameaçar, qualquer ação com consequência física ou social

ATRIBUTO (apenas se ARRISCADA):
- HABILIDADE: ações físicas, combate, furtividade, destreza
- CARISMA: persuasão, sedução, engano, liderança, intimidação social
- SORTE: apostas, eventos caóticos, azar puro
- NENHUM: se TRIVIAL`
                        },
                        {
                            role: 'user',
                            content: `Ação do jogador: "${acaoUsuario}"`
                        }
                    ],
                    temperature: 0.0,
                    max_tokens: 30,
                    response_format: {
                        type: "json_schema",
                        json_schema: {
                            name: "classificacao_acao",
                            strict: true,
                            schema: {
                                type: "object",
                                properties: {
                                    tipo: { type: "string", enum: ["TRIVIAL", "ARRISCADA"] },
                                    atributo: { type: "string", enum: ["HABILIDADE", "CARISMA", "SORTE", "NENHUM"] }
                                },
                                required: ["tipo", "atributo"],
                                additionalProperties: false
                            }
                        }
                    }
                })
            });
            const data = await response.json();
            return JSON.parse(data.choices[0].message.content);
        }

        // ============================================================
        // Funções de interface de rolagem (inalteradas)
        // ============================================================
        async function animarTextoTeste(texto) {
            const div = document.createElement('div');
            div.className = 'teste-reveal';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            for (const char of texto) {
                div.innerText += char;
                await new Promise(r => setTimeout(r, 40));
            }
        }

        function criarBotaoRolar() {
            return new Promise(resolve => {
                const btn = document.createElement('button');
                btn.id = 'rolar-btn';
                btn.innerText = '⚄ ROLAR DADO';
                chatBox.appendChild(btn);
                chatBox.scrollTop = chatBox.scrollHeight;
                btn.addEventListener('click', () => { btn.remove(); resolve(); }, { once: true });
            });
        }

        function mostrarResultadoDado(semente, atributo, valorAtributo, resultado) {
            const divDado = document.createElement('div');
            divDado.className = 'resultado-dado';
            divDado.innerText = `Rolagem: ${semente} vs ${atributo} ${valorAtributo}`;
            chatBox.appendChild(divDado);
            const divRes = document.createElement('div');
            divRes.className = resultado === 'SUCESSO' ? 'resultado-sucesso' : 'resultado-falha';
            divRes.innerText = resultado;
            chatBox.appendChild(divRes);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
      
        // ============================================================
        // Função principal de envio (apenas trocamos salvarResumoFirestore por salvarEstadoJogador)
        // ============================================================
        window.enviar = async function(mensagemUsuario = null) {
            const isInitial = mensagemUsuario === null;
            
            if (!isInitial) {
                turnosJogados++;
            }

            let pergunta;
            if (isInitial) {
                if (!resumoAtual) {
                    pergunta = PROMPT_INTRO;
                } else {
                    pergunta = 'O jogo foi recarregado. Com base no resumo da história, narre rapidamente a cena atual (usando a regra padrão de frases curtas) e pergunte o que eu faço agora.';
                }
            } else {
                pergunta = mensagemUsuario;
            }

            if (!isInitial) {
                adicionarMensagem(pergunta, 'user');
                userInput.value = '';
            }

            sendBtn.disabled = true;
            userInput.disabled = true;

            const tempId = adicionarMensagem('...', 'ai', true);
            const elementoDisplay = document.getElementById(tempId);

            try {

                let mensagemFinal = pergunta;

                if (!isInitial) {
                    const classificacao = await classificarAcaoLLM(pergunta);
                    const { tipo, atributo } = classificacao;

                    let resultado = null;
                    let danoBase = 0;

                    if (tipo === 'ARRISCADA' && atributo !== 'NENHUM') {
                        console.log('[Teste] Atributo:', atributo, 'Valor:', jogadorStats[atributo]);
                        await animarTextoTeste(`TESTE DE ${atributo}`);
                        await criarBotaoRolar();

                        const semente = Math.floor(Math.random() * 20) + 1;
                        const valorAtributo = jogadorStats[atributo] ?? 0;
                        resultado = semente <= valorAtributo ? 'SUCESSO' : 'FALHA';
                        if (resultado === 'FALHA') {
                            danoBase = Math.max(1, Math.floor((semente - valorAtributo) / 2));
                        }

                        mostrarResultadoDado(semente, atributo, valorAtributo, resultado);
                        await new Promise(r => setTimeout(r, 600));
                    }

                    const contextoDecidido = tipo === 'TRIVIAL'
                        ? `[AÇÃO TRIVIAL — narre diretamente sem mencionar teste. Termine com [DANO: 0]]`
                        : `[AÇÃO ARRISCADA — TESTE DE ${atributo}: ${resultado}. Dano mínimo se falha: ${danoBase}. Narre a cena. Termine com [DANO: ${resultado === 'FALHA' ? danoBase : 0}]]`;

                    mensagemFinal += `\n${contextoDecidido}\n[RESPOSTA OBRIGATORIAMENTE EM PORTUGUÊS BRASILEIRO]`;
                }

                mensagens.push({ role: 'user', content: mensagemFinal });

                const isIntro = (isInitial && !resumoAtual);
                const maxTokens       = isIntro ? 500 : 250;
                const maxContinuacoes = isIntro ?    1 :   1;

                console.debug(`[ENVIO] isIntro=${isIntro} | maxTokens=${maxTokens} | maxContinuacoes=${maxContinuacoes}`);

                if (isIntro) window._introGenerating = true;

                const respostaIA = await gerarRespostaComContinuacao(mensagens, maxTokens, elementoDisplay, maxContinuacoes);

                const danoMatch = respostaIA.match(/\[DANO:\s*(\d+)\]/i);

                let respostaLimpa = respostaIA;
                if (respostaLimpa.includes('[TESTE:')) {
                    respostaLimpa = respostaLimpa.replace(/\[TESTE:[^\]]+\]/g, '').trim();
                }

                if (!isInitial && danoMatch && parseInt(danoMatch[1]) > 0) {
                    const div = document.createElement('div');
                    div.className = 'system-message';
                    div.innerHTML = `<em style="color:#e53935; font-weight:bold;">[FALHA NO TESTE: CONSEQUÊNCIA APLICADA]</em>`;
                    chatBox.appendChild(div);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                elementoDisplay.innerText = respostaLimpa;

                if (isIntro) {
                    gerarMemoriaLonga(respostaIA);
                }

                if (danoMatch && parseInt(danoMatch[1]) > 0) {
                    const valorDano = parseInt(danoMatch[1]);
                    energia -= valorDano;
                    document.getElementById('energia-span').innerText = `🩸 Energia: ${Math.max(0, energia)}/10`;
                    adicionarMensagem(`[O mundo cobra seu preço. Você perdeu ${valorDano} de Energia.]`, 'system');

                    if (energia <= 0) {
                        adicionarMensagem("💀 SEU CORPO CEDE. A ESCURIDÃO O CONSOME. FIM DA JORNADA.", 'system');
                        userInput.disabled = true;
                        sendBtn.disabled = true;
                        await salvarEstadoJogador();
                        return;
                    }
                }

                if (isIntro) window._introGenerating = false;

                               mensagens.push({ role: 'assistant', content: respostaIA });

                // Dispara salvamento e compressão em segundo plano (sem await)
                setTimeout(() => {
                    // Salva o estado (energia, turnos, etc.)
                    salvarEstadoJogador().catch(e => console.error('Erro no salvamento background:', e));
                    // Se a memória ultrapassou o limite, comprime também em background
                    if (mensagens.length > LIMITE_MENSAGENS) {
                        comprimirMemoria().catch(e => console.error('Erro na compressão background:', e));
                    }
                }, 0);

                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }

            } catch (error) {
                elementoDisplay.innerText = `❌ Erro: ${error.message}`;
                if (isInitial) {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                }
            } finally {
                if (!isInitial) {
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }
        };

        // ============================================================
        // Inicialização com autenticação
        // ============================================================
        window.onload = async () => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    uidAtual = user.uid;
                    console.log("Usuário autenticado:", uidAtual);
                    await carregarDadosJogador(uidAtual);
                    console.log('[Inicialização] Energia atual:', energia);
                    console.log('[Inicialização] Atributos atuais:', jogadorStats);
                    window.enviar();
                } else {
                    console.warn("Usuário não autenticado. Redirecionando para login...");
                    window.location.href = "login.html";
                }
            });
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                window.enviar(userInput.value.trim());
            }
        });
    </script>
</body>
</html>
