<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Centelha - Motor Narrativo</title>
    <style>
        body { background: #1a1a14; color: #b5a68b; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 650px; background: #141311; padding: 20px; border: 4px solid #3a3228; box-shadow: 6px 6px 0px #000; }
        #chat-box { height: 300px; overflow-y: auto; border: 2px inset #2a251e; padding: 15px; background: #0d0c0a; margin-bottom: 15px; }
        .narrator { color: #a13d3d; margin-bottom: 10px; }
        .player { color: #7a8c66; margin-bottom: 10px; }
        #progress-bar-container { width: 100%; background: #2a251e; height: 12px; margin-bottom: 10px; display: block; }
        #progress-bar { width: 0%; height: 100%; background: #5c2c2c; transition: width 0.3s; }
        input { width: 80%; padding: 10px; background: #1a1815; border: 1px solid #3a3228; color: #d1c5b4; }
        button { padding: 10px; cursor: pointer; background: #3a3228; color: #fff; border: none; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status">Iniciando...</div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="chat-box"></div>
    
    <div id="controls">
        <input type="text" id="player-input" placeholder="Sua ação..." disabled>
        <button id="btn-enviar" onclick="enviarAcao()" disabled>AGIR</button>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const MY_MODEL_ID = "Qwen2.5-7B-Instruct-q4f16_1-MLC";
    
    let engine;
    let chatHistory = [];
    let jogador = { habilidade: 10, carisma: 10, sorte: 10 };

    function analisarAcao(texto) {
    const textoLower = texto.toLowerCase();
    
    if (/escalar|saltar|equilibrar|decifrar|hackear|forçar|arrombar|nadar|correr|lutar|pular|subir|descer/.test(textoLower)) {
        return { tipo: 'HABILIDADE' };
    }
    
    if (/convencer|persuadir|intimidar|seduzir|negociar|mentir|enganar|subornar/.test(textoLower)) {
        return { tipo: 'CARISMA' };
    }
    
    if (/vasculhar|procurar|explorar|investigar|buscar|examinar|revistar/.test(textoLower)) {
        return { tipo: 'SORTE' };
    }
    
    return null;
}

    function rolarTeste(tipo) {
        const dado = Math.floor(Math.random() * 20) + 1;
        const atributo = jogador[tipo.toLowerCase()];
        const dificuldade = 12;
        const resultado = dado + atributo;
        
        return {
            sucesso: resultado >= dificuldade,
            dado: dado,
            total: resultado
        };
    }

    async function init() {
        const status = document.getElementById("status");
        const pb = document.getElementById("progress-bar");

        try {
            status.innerText = "Despertando o Narrador...";
            
            engine = await CreateMLCEngine(MY_MODEL_ID, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    pb.style.width = `${report.progress * 100}%`;
                }
            });

            document.getElementById("progress-bar-container").style.display = "none";
            status.innerText = "O Pesadelo Começou.";
            document.getElementById("player-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            
            addMsg("Você acorda com o gosto de ferro na boca. O frio corta sua pele como navalha.", "narrator");

        } catch (err) {
            status.innerText = "ERRO CRÍTICO: " + err.message;
            console.error(err);
        }
    }

    window.enviarAcao = async () => {
        const input = document.getElementById("player-input");
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, "player");
        chatHistory.push({ role: "user", content: text });
        input.value = "";
        
        document.getElementById("btn-enviar").disabled = true;
        const tempId = addMsg("...", "narrator");

        // Analisa se precisa de teste
        const teste = analisarAcao(text);
console.log("Resultado da análise:", teste);

if (teste) {
    console.log("TESTE DETECTADO:", teste.tipo);
    const resultado = rolarTeste(teste.tipo);
    console.log("Resultado do dado:", resultado);
    const mensagemTeste = resultado.sucesso 
        ? `[O jogador conseguiu no teste de ${teste.tipo}]`
        : `[O jogador falhou no teste de ${teste.tipo}]`;
    
    chatHistory.push({ role: "user", content: mensagemTeste });
}


        // INJEÇÕES SENSORIAIS CRUAS (Sem emoções, apenas física e ambiente)
        const injecoesSutis = [
            "Foque estritamente na ação imediata de forma seca.",
            "Mencione um cheiro metálico, de mofo ou poeira levantando com o movimento.",
            "Descreva a textura de algo próximo (áspero, enferrujado, úmido).",
            "Mencione a iluminação: uma sombra que se alonga ou uma luz que pisca sutilmente.",
            "Foque estritamente na ação imediata de forma seca.",
            "Descreva um som físico leve: madeira rangendo, vento passando por uma fresta, gotejamento."
        ];
        
        const diretrizAtual = injecoesSutis[Math.floor(Math.random() * injecoesSutis.length)];

        // NOVO PROMPT
        const dynamicSystemPrompt = `Você é o motor narrativo de um jogo de sobrevivência em português brasileiro correto. Nunca quebre o personagem. 

REGRA DE OURO:
- O mundo tem segredos que o jogador ainda não descobriu
- Use gramática portuguesa correta
- Consistência total com eventos anteriores
- Física realista
- PROIBIDO usar adjetivos de emoção ou conclusão (ex: não use "assustador", "misterioso", "estranho", "terrível").
- Descreva apenas o que pode ser VISTO, OUVIDO, TOCADO ou CHEIRADO. 
- Seja seco, cru e direto. Deixe o jogador tirar suas próprias conclusões sobre o perigo.

ESTRUTURA:
1. Resolva a ação do jogador logicamente.
2. Integre sutilmente este elemento ambiental na cena: [ ${diretrizAtual} ]
3. Responda em no máximo 3 frases curtas.`;

        try {
            const messages = [
                { role: "system", content: dynamicSystemPrompt },
                ...chatHistory.slice(-8)
            ];

            const result = await engine.chat.completions.create({ 
                messages: messages,
                temperature: 0.65,
                max_tokens: 150,
                top_p: 0.85,
                frequency_penalty: 0.3,
                presence_penalty: 0.4,
                repetition_penalty: 1.1
            });

            const answer = result.choices[0].message.content.trim();

            // Verifica se foi cortada
            const lastChar = answer.slice(-1);
            const isIncomplete = !['.', '!', '?', '"'].includes(lastChar);

            if (isIncomplete) {
                const continuation = await engine.chat.completions.create({
                    messages: [
                        { role: "system", content: "Complete esta frase de forma seca. Escreva apenas o final." },
                        { role: "user", content: answer }
                    ],
                    temperature: 0.4,
                    max_tokens: 30,
                    top_p: 0.9
                });
                
                const fullAnswer = answer + continuation.choices[0].message.content;
                document.getElementById(tempId).innerText = fullAnswer;
                chatHistory.push({ role: "assistant", content: fullAnswer }); 
            } else {
                document.getElementById(tempId).innerText = answer;
                chatHistory.push({ role: "assistant", content: answer }); 
            }

        } catch (e) {
            document.getElementById(tempId).innerText = "[ERRO: " + e.message + "]";
            console.error("Erro detalhado:", e);
        } finally {
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("player-input").focus(); 
        }
    };

    function addMsg(txt, cls) {
        const box = document.getElementById("chat-box");
        const div = document.createElement('div');
        div.className = cls;
        div.id = "msg-" + Date.now();
        div.innerText = (cls === 'player' ? "> " : "") + txt;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;

    // Debug: log quantas mensagens existem
    console.log("Total de mensagens no chat:", box.children.length);
        
        return div.id;
    }

    init();
</script>

</body>
</html>
