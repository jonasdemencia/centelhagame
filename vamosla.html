    <style>

    <script type="module">

        const firebaseConfig = {

        // ============================================================

        const cacheSalas = {}; // RAM Cache para transições instantâneas

        const PRONOMES_MASCULINOS = ['ele', 'dele', 'nele', 'a ele', 'seu', 'o homem', 'o corpo dele'];

        const chatBox = document.getElementById('chat-box');

        const PALAVRAS_SOMBRIAS = [
            'ψυχή', 'σκότος', 'αἷμα', 'θάνατος', 'φόβος',
            'νύξ', 'ἄβυσσος', 'δαίμων', 'πῦρ', 'σάρξ',
            'λόγος', 'ἀρχή', 'χάος', 'κόσμος', 'ἀλήθεια',
            'εἵμαρμένη', 'κατάρα', 'φάντασμα', 'νέκρος', 'ὀργή',
            'SANGUIS', 'TENEBRAE', 'ANIMA', 'MORS', 'UMBRA',
            'DOLOR', 'FATUM', 'MALUM', 'IGNIS', 'SPIRITUS',
            'INFERNUM', 'CAEDIS', 'CRUOR', 'SEPULCRUM', 'DAMNATIO',
            'OBSCURUS', 'PERDITIO', 'IRACUNDIA', 'GEHENNA', 'PESTIS',
            'ܡܘܬܐ', 'ܢܘܪܐ', 'ܪܘܚܐ', 'ܚܫܘܟܐ', 'ܕܡܐ',
            'ܫܐܕܐ', 'ܓܗܢܐ', 'ܚܛܝܬܐ', 'ܕܚܠܬܐ', 'ܐܒܕܢܐ',
            'מָוֶת', 'חֹשֶׁךְ', 'צֵל', 'רוּחַ', 'נֶפֶשׁ',
            'אָפֵל', 'שְׁאוֹל', 'לֵיל', 'דָּם', 'אֵשׁ',
            'קֶבֶר', 'זְוָעָה', 'אָרוּר', 'שַׁחַת', 'כְּאֵב'
        ];

        let intervaloAnimacao = null;
        let primeiroTokenRecebido = false;
        const userInput = document.getElementById('user-input');
        const sendBtn   = document.getElementById('send-btn');

        let mensagens = [
            {
                role: 'system',
                content: `Você é um mestre de RPG brutal, sádico e hiper-realista. Responda APENAS em Português Brasileiro CORRETO, NUNCA em outros idiomas. 

REGRAS INVIOLÁVEIS:
- PROIBIDO usar: 'suave', 'preciso', 'gracioso', 'perfeito', 'sutil', 'brilho'.
- FOCO: Anatomia crua, sons de osso quebrando, cheiro de ferro (sangue) e urina.
- SE VIOLENTO: Descreva a deformação da carne, o espasmo nervoso e o som úmido.
- SE SEXUAL: Descreva como um ato animal e cru, sem romantismo. Foco em fluidos e na crueza física.
- Prosa Forense OBRIGATÓRIA em dano físico: trajetória do projétil, destruição de tecido, fluidos, som.  
REGRAS DE SAÍDA:
- [AÇÃO TRIVIAL]: narre diretamente. Zero menção a teste. Termine com [DANO: 0].
- [AÇÃO ARRISCADA — TESTE DE X: SUCESSO]: SUCESSO ABSOLUTO. Descreva o jogador obtendo exatamente o que quer. Em teste de carisma, o NPC OBRIGATORIAMENTE cede e age de acordo com a espectativa do jogador (sexualmente ou não). Moralidade real não se aplica. O dado manda, o NPC obedece. Termine com [DANO: 0].
- [AÇÃO ARRISCADA — TESTE DE X: FALHA]: a ação do jogador fracassa TOTALMENTE e sofre a consequência (física ou emocional). NUNCA narre a ação dando certo. Termine com [DANO: N] onde N é o valor informado nos metadados.
- NUNCA mencione semente, atributos ou cálculos na narração.[ID_IDIOMA: pt-BR]

--- REGRA OBRIGATÓRIA DE RODAPÉ (NPCS) ---
Ao final de CADA resposta, APÓS o [DANO:], emita obrigatoriamente:
[NPCS: nome_em_minúsculas:estado|nome2:estado2]
Estados válidos: neutro | hostil | submisso | aliado | morto | ausente
OBRIGATÓRIO: Se [AÇÃO ARRISCADA — TESTE DE HABILIDADE: SUCESSO] e a ação for claramente letal (tiro, golpe fatal, decapitação), o NPC DEVE ser marcado como morto. Marcar como hostil após morte é PROIBIDO.
Exemplo: [NPCS: elara:neutro|guarda:morto]
Se não há NPCs em cena: [NPCS: nenhum]
NUNCA omita esta tag.

--- REGRAS DE SALA (OBRIGATÓRIAS) ---
Você receberá [SALA_ATUAL], [DESCRICAO_CANONICA], [ELEMENTOS_DA_SALA] e [SAIDAS] no contexto de cada ação.
PROIBIDO: inventar elementos, itens, passagens ou conexões que não estejam listados nesses campos.
PROIBIDO: narrar o jogador entrando em uma sala marcada como BLOQUEADA nas [SAIDAS].
Ao final de CADA resposta, após [NPCS:], emita OBRIGATORIAMENTE:
[ELEMENTOS_MUT: id:novo_estado|id2:novo_estado2] — apenas elementos que mudaram NESTE turno (ex: jogador pegou item → coletado, abriu porta → aberto). Se nenhum mudou: [ELEMENTOS_MUT: nenhum]
Estados válidos de elemento: presente | coletado | usado | aberto | fechado | trancado | ativado | destruido
[MOVER: sala_id] — SOMENTE se o jogador se deslocou com SUCESSO para outra sala. A sala_id deve ser EXATAMENTE o ID listado em [SAIDAS]. Se não houve deslocamento: OMITA esta tag completamente.
IRREVERSÍVEL: estados "coletado" e "destruido" nunca retrocedem. NUNCA ressuscite um elemento destruído ou coletado.`
            },
            { role: 'system', content: '' },
            { role: 'system', content: 'Resumo da jornada até agora: A aventura acabou de começar.' }
        ];

        let resumoAtual = "";

        // ============================================================
        // DUNGEON SYSTEM — FUNÇÕES
        // ============================================================

        function validarGrafo(esq) {
            const { salas, conexoes, bloqueios, itens_chave, sala_inicio, sala_fim } = esq;
            if (!salas || !sala_inicio || !sala_fim) return false;
            if (!salas.includes(sala_inicio) || !salas.includes(sala_fim)) return false;

            const adj = {};
            salas.forEach(s => { adj[s] = new Set(); });
            (conexoes || []).forEach(c => {
                if (adj[c.a] && adj[c.b]) { adj[c.a].add(c.b); adj[c.b].add(c.a); }
            });

            const vis = new Set([sala_inicio]);
            const fila = [sala_inicio];
            while (fila.length) {
                const cur = fila.shift();
                for (const viz of adj[cur]) {
                    if (!vis.has(viz)) { vis.add(viz); fila.push(viz); }
                }
            }
            if (vis.size !== salas.length) return false;

            const itemIds = new Set((itens_chave || []).map(i => i.id));
            for (const b of (bloqueios || [])) {
                if (!itemIds.has(b.chave)) return false;
                const item = itens_chave.find(i => i.id === b.chave);
                if (item && item.sala === b.de) return false;
            }
            return true;
        }

        function gerarEsqueletoFallback(n) {
            const salas = Array.from({ length: n }, (_, i) => `s${i + 1}`);
            const conexoes = salas.slice(0, -1).map((s, i) => ({ a: s, b: salas[i + 1] }));
            return {
                tema: "Masmorra de pedra negra e silêncio opressivo",
                salas,
                conexoes,
                bloqueios: [{ de: "s2", para: "s3", chave: "chave_enferrujada" }],
                itens_chave: [{ id: "chave_enferrujada", sala: "s1" }],
                sala_inicio: "s1",
                sala_fim: `s${n}`
            };
        }

        async function gerarDungeon() {
            adicionarMensagem('⚙️ Arquiteto das trevas forjando o dungeon...', 'system');

            const numBloqueios = Math.max(1, Math.floor(NUM_SALAS / 3));
            let esqueleto = null;
            let tentativas = 0;

            while (!esqueleto && tentativas < 3) {
                tentativas++;
                try {
                    const response = await fetch(LM_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: MODELO,
                            messages: [
                                {
                                    role: 'system',
                                    content: `Você é um arquiteto de masmorras sombrias e brutais. Gere APENAS o esqueleto lógico — zero prosa, apenas estrutura JSON.

REGRAS ABSOLUTAS:
1. IDs de salas: use exatamente "s1", "s2", ..., "s${NUM_SALAS}" — nada mais.
2. Todas as salas devem ser conectadas (grafo totalmente conectado).
3. Cada conexão é bidirecional — liste-a UMA ÚNICA VEZ com {a, b}.
4. sala_inicio sempre acessível sem itens. sala_fim requer progressão.
5. Cada item_chave.sala deve ser diferente de qualquer bloqueio que esse item desbloqueie.
6. IDs de chaves: strings descritivas minúsculas sem espaços (ex: "chave_bronze", "olho_de_vidro").
7. Retorne APENAS o JSON. Sem texto adicional.`
                                },
                                {
                                    role: 'user',
                                    content: `Crie um esqueleto para uma masmorra de EXATAMENTE ${NUM_SALAS} salas.
Tema livre e original — sombrio, medieval, brutal.
Inclua exatamente ${numBloqueios} bloqueios com chaves distintas.
Garanta que sala_fim (s${NUM_SALAS}) só seja alcançável após resolver os bloqueios.`
                                }
                            ],
                            temperature: 0.25,
                            max_tokens: Math.max(600, NUM_SALAS * 60),
                            response_format: {
                                type: "json_schema",
                                json_schema: {
                                    name: "esqueleto_dungeon",
                                    strict: true,
                                    schema: {
                                        type: "object",
                                        properties: {
                                            tema: { type: "string" },
                                            salas: { type: "array", items: { type: "string" } },
                                            conexoes: {
                                                type: "array",
                                                items: { type: "object", properties: { a: { type: "string" }, b: { type: "string" } }, required: ["a", "b"], additionalProperties: false }
                                            },
                                            bloqueios: {
                                                type: "array",
                                                items: { type: "object", properties: { de: { type: "string" }, para: { type: "string" }, chave: { type: "string" } }, required: ["de", "para", "chave"], additionalProperties: false }
                                            },
                                            itens_chave: {
                                                type: "array",
                                                items: { type: "object", properties: { id: { type: "string" }, sala: { type: "string" } }, required: ["id", "sala"], additionalProperties: false }
                                            },
                                            sala_inicio: { type: "string" },
                                            sala_fim: { type: "string" }
                                        },
                                        required: ["tema", "salas", "conexoes", "bloqueios", "itens_chave", "sala_inicio", "sala_fim"],
                                        additionalProperties: false
                                    }
                                }
                            }
                        })
                    });

                    const data = await response.json();
                    const parsed = JSON.parse(data.choices[0].message.content);
                    if (validarGrafo(parsed)) esqueleto = parsed;
                } catch (e) {
                    console.warn(`[DUNGEON] Tentativa ${tentativas} falhou com erro:`, e);
                }
            }

            if (!esqueleto) esqueleto = gerarEsqueletoFallback(NUM_SALAS);

            dungeonEsqueleto  = esqueleto;
            dungeonTema       = esqueleto.tema;
            salaAtualId       = esqueleto.sala_inicio;
            elementosEstado   = {};
            inventarioJogador = [];

            await updateDoc(doc(db, "players", uidAtual), {
                "dungeon.esqueleto":      esqueleto,
                "dungeon.tema":           dungeonTema,
                "dungeon.salaAtual":      salaAtualId,
                "dungeon.elementosEstado": {},
                "dungeon.inventario":     []
            });

            await carregarSala(salaAtualId);
            adicionarMensagem(`▶ ${salaAtualDados?.nome ?? salaAtualId}`, 'system');
        }

        async function gerarConteudoSala(salaId) {
            const itensNaSala     = (dungeonEsqueleto.itens_chave || []).filter(i => i.sala === salaId);
            const bloqueiosRelac  = (dungeonEsqueleto.bloqueios   || []).filter(b => b.de === salaId || b.para === salaId);
            const ehFim           = salaId === dungeonEsqueleto.sala_fim;
            const ehInicio        = salaId === dungeonEsqueleto.sala_inicio;
            const vizinhos = (dungeonEsqueleto.conexoes || []).filter(c => c.a === salaId || c.b === salaId).map(c => c.a === salaId ? c.b : c.a);

            const contextoLogico = [
                `SALA: ${salaId} de ${NUM_SALAS}`,
                `TEMA DO DUNGEON: ${dungeonTema}`,
                `PAPEL: ${ehInicio ? 'sala inicial' : ehFim ? 'sala final' : 'sala intermediária'}`,
                `VIZINHOS DIRETOS: ${vizinhos.join(', ') || 'nenhum'}`,
                `ITENS QUE DEVEM EXISTIR AQUI: ${itensNaSala.map(i => i.id).join(', ') || 'nenhum'}`,
                `BLOQUEIOS RELACIONADOS: ${bloqueiosRelac.map(b => `${b.de}→${b.para} requer "${b.chave}"`).join(' | ') || 'nenhum'}`
            ].join('\n');

            const response = await fetch(LM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: MODELO,
                    messages: [
                        { role: 'system', content: `Você é um designer de dungeons sombrios e criativos. Crie o conteúdo de uma sala de RPG medieval brutal.\nREGRAS:\n- descricao_fixa: 2-3 frases sensoriais.\n- Mantenha id e tipos EXATOS fornecidos.\n- Retorne APENAS o JSON.` },
                        { role: 'user', content: contextoLogico }
                    ],
                    temperature: 0.72,
                    max_tokens: 700,
                    response_format: {
                        type: "json_schema",
                        json_schema: {
                            name: "conteudo_sala",
                            strict: true,
                            schema: {
                                type: "object",
                                properties: {
                                    nome: { type: "string" },
                                    descricao_fixa: { type: "string" },
                                    elementos: { type: "array", items: { type: "object", properties: { id: { type: "string" }, tipo: { type: "string", enum: ["passagem", "item", "mecanismo", "npc", "armadilha"] }, descricao: { type: "string" }, estado_inicial: { type: "string" } }, required: ["id", "tipo", "descricao", "estado_inicial"], additionalProperties: false } },
                                    conexoes: { type: "object", properties: { norte: { type: "string" }, sul: { type: "string" }, leste: { type: "string" }, oeste: { type: "string" } }, required: ["norte", "sul", "leste", "oeste"], additionalProperties: false }
                                },
                                required: ["nome", "descricao_fixa", "elementos", "conexoes"],
                                additionalProperties: false
                            }
                        }
                    }
                })
            });

            const data = await response.json();
            return JSON.parse(data.choices[0].message.content);
        }

        // [AJUSTE: ACELERAÇÃO] Pré-geração assíncrona oculta
        function preCarregarVizinhos(conexoes) {
            if (!conexoes) return;
            for (const vizinhoId of Object.values(conexoes)) {
                if (!vizinhoId || geracaoSalasPromises[vizinhoId]) continue;
                
                // Aguarda 3 segundos para a UI e a CPU relaxarem antes de solicitar o vizinho
                setTimeout(() => {
                    if (geracaoSalasPromises[vizinhoId]) return;
                    geracaoSalasPromises[vizinhoId] = (async () => {
                        try {
                            const salaRef = doc(db, "players", uidAtual, "salas", vizinhoId);
                            const salaSnap = await getDoc(salaRef);
                            if (salaSnap.exists()) {
                                const data = salaSnap.data();
                                cacheSalas[vizinhoId] = data;
                                return data;
                            } else {
                                const data = await gerarConteudoSala(vizinhoId);
                                await setDoc(salaRef, data);
                                cacheSalas[vizinhoId] = data;
                                return data;
                            }
                        } catch (e) {
                            delete geracaoSalasPromises[vizinhoId];
                        }
                    })();
                }, 3000);
            }
        }

        // [AJUSTE: ACELERAÇÃO] Carregamento rápido via Cache / Promises
        async function carregarSala(salaId) {
            if (!geracaoSalasPromises[salaId]) {
                geracaoSalasPromises[salaId] = (async () => {
                    const salaRef  = doc(db, "players", uidAtual, "salas", salaId);
                    const salaSnap = await getDoc(salaRef);
                    if (salaSnap.exists()) return salaSnap.data();
                    
                    const data = await gerarConteudoSala(salaId);
                    await setDoc(salaRef, data);
                    return data;
                })();
            }

            salaAtualDados = await geracaoSalasPromises[salaId];
            cacheSalas[salaId] = salaAtualDados;

            for (const elem of (salaAtualDados.elementos || [])) {
                const chave = `${salaId}:${elem.id}`;
                if (!(chave in elementosEstado)) {
                    elementosEstado[chave] = elem.estado_inicial;
                }
            }

            document.getElementById('modelo-span').innerText = salaAtualDados.nome ?? 'Motor Duplo (7B + 1.5B)';

            // Dispara pré-geração silenciosa dos próximos aposentos
            preCarregarVizinhos(salaAtualDados.conexoes);
        }

        // [AJUSTE: PERSISTÊNCIA REAL] Vincula NPCs mortos e itens abandonados permanentemente na sala
        function construirContextoSala() {
            if (!salaAtualDados || !dungeonEsqueleto) return '';

            const nativosSet = new Set();
            let elementosStr = (salaAtualDados.elementos || []).map(elem => {
                nativosSet.add(elem.id);
                const chave  = `${salaAtualId}:${elem.id}`;
                const estado = elementosEstado[chave] ?? elem.estado_inicial;
                return `  ${elem.id}[${elem.tipo}]:${estado} — ${elem.descricao}`;
            }).join('\n');

            // Vasculha tudo que foi largado ou morto na sala e expõe como parte do cenário
            for (const [chave, estado] of Object.entries(elementosEstado)) {
                if (chave.startsWith(`${salaAtualId}:`)) {
                    const idOriginal = chave.replace(`${salaAtualId}:`, '');
                    if (!nativosSet.has(idOriginal)) {
                        const tipo = idOriginal.startsWith('npc_') ? 'npc' : 'dinamico';
                        const nomeReal = idOriginal.replace('npc_', '');
                        elementosStr += `\n  ${nomeReal}[${tipo}]:${estado}`;
                    }
                }
            }

            const saidasArr = [];
            for (const [dir, vizinhoId] of Object.entries(salaAtualDados.conexoes || {})) {
                if (!vizinhoId) continue;
                const bloqueio = (dungeonEsqueleto.bloqueios || []).find(b =>
                    (b.de === salaAtualId && b.para === vizinhoId) ||
                    (b.de === vizinhoId   && b.para === salaAtualId)
                );
                let status = 'livre';
                if (bloqueio && !inventarioJogador.includes(bloqueio.chave)) {
                    status = `BLOQUEADA — requer "${bloqueio.chave}"`;
                }
                saidasArr.push(`${dir.toUpperCase()}→${vizinhoId} [${status}]`);
            }

            return `\n[SALA_ATUAL: ${salaAtualId} — ${salaAtualDados.nome}]` +
                   `\n[DESCRICAO_CANONICA: ${salaAtualDados.descricao_fixa}]` +
                   `\n[ELEMENTOS_DA_SALA:\n${elementosStr || '  (nenhum)'}]` +
                   `\n[SAIDAS: ${saidasArr.join(' | ') || 'nenhuma'}]`;
        }

        function parsearMutacoesSala(textoNarrador) {
            const elemMatch = textoNarrador.match(/\[ELEMENTOS_MUT:\s*([^\]]+)\]/i);
            if (elemMatch && elemMatch[1].toLowerCase() !== 'nenhum') {
                const partes = elemMatch[1].split('|');
                for (const parte of partes) {
                    const colonIdx = parte.indexOf(':');
                    if (colonIdx === -1) continue;
                    const idElem     = parte.slice(0, colonIdx).trim();
                    const novoEstado = parte.slice(colonIdx + 1).trim();
                    if (!idElem || !novoEstado) continue;

                    const chave       = `${salaAtualId}:${idElem}`;
                    const estadoAtual = elementosEstado[chave];

                    if (estadoAtual === 'destruido' || estadoAtual === 'coletado') continue;
                    elementosEstado[chave] = novoEstado;

                    if (novoEstado === 'coletado' && !inventarioJogador.includes(idElem)) {
                        inventarioJogador.push(idElem);
                    }
                }
            }

            const moverMatch = textoNarrador.match(/\[MOVER:\s*([^\]]+)\]/i);
            if (!moverMatch) return null;
            const novaSalaId = moverMatch[1].trim();
            if (!dungeonEsqueleto?.salas.includes(novaSalaId)) return null;

            const conexoesDaSala = salaAtualDados?.conexoes || {};
            if (!Object.values(conexoesDaSala).includes(novaSalaId)) return null;

            const bloqueio = (dungeonEsqueleto.bloqueios || []).find(b => (b.de === salaAtualId && b.para === novaSalaId) || (b.de === novaSalaId  && b.para === salaAtualId));
            if (bloqueio && !inventarioJogador.includes(bloqueio.chave)) return null;

            return novaSalaId;
        }

        // [AJUSTE: PERSISTÊNCIA REAL] Desconecta o jogador dos NPCs quando muda de sala
        async function aplicarMovimento(novaSalaId) {
            const salaAnterior = salaAtualId;
            salaAtualId    = novaSalaId;
            salaAtualDados = null; 

            // Amnésia geográfica: limpa o foco para os cadáveres não te seguirem para o próximo aposento
            entityIndex = {};
            entidadeEmFoco = null;
            if (ssrJson && ssrJson.npcs) {
                ssrJson.npcs = [];
            }

            try {
                await carregarSala(novaSalaId);
                adicionarMensagem(`▶ ${salaAtualDados?.nome ?? novaSalaId}`, 'system');

                await updateDoc(doc(db, "players", uidAtual), {
                    "dungeon.salaAtual": novaSalaId
                });
            } catch (e) {
                salaAtualId = salaAnterior; 
            }
        }

        // ============================================================
        // FUNÇÕES EXISTENTES
        // ============================================================

        async function carregarDadosJogador(uid) {
            try {
                const docRef  = doc(db, "players", uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.resumo) { resumoAtual = data.resumo; mensagens[2].content = `Resumo: ${resumoAtual}`; }
                    if (data.ssrJson) { ssrJson = data.ssrJson; buildEntityIndex(ssrJson); }
                    if (data.turnos !== undefined) turnosJogados = data.turnos;
                    if (data?.energy?.total !== undefined) { energia = data.energy.total; document.getElementById('energia-span').innerText = `🩸 Energia: ${energia}/10`; }
                    if (data?.skill?.total    !== undefined) jogadorStats.HABILIDADE = data.skill.total;
                    if (data?.charisma?.total !== undefined) jogadorStats.CARISMA    = data.charisma.total;
                    if (data?.luck?.total     !== undefined) jogadorStats.SORTE      = data.luck.total;

                    if (data.dungeon?.esqueleto) {
                        dungeonEsqueleto  = data.dungeon.esqueleto;
                        dungeonTema       = data.dungeon.tema      ?? "";
                        salaAtualId       = data.dungeon.salaAtual ?? dungeonEsqueleto.sala_inicio;
                        elementosEstado   = data.dungeon.elementosEstado ?? {};
                        inventarioJogador = data.dungeon.inventario       ?? [];
                        await carregarSala(salaAtualId);
                    } else {
                        await gerarDungeon();
                    }
                } else {
                    const dadosPadrao = { energy: { total: 40, initial: 40 }, skill: { total: 5 }, charisma: { total: 5 }, luck: { total: 4 }, turnos: 0, resumo: "", memoriaLonga: "" };
                    await setDoc(doc(db, "players", uid), dadosPadrao, { merge: true });
                    await carregarDadosJogador(uid);
                }
            } catch (e) { console.error(e); }
        }

        async function salvarEstadoJogador() {
            if (!uidAtual) return;
            try {
                const dadosAtualizados = {
                    turnos: turnosJogados, resumo: resumoAtual, memoriaLonga: memoriaLonga, "energy.total": energia, "skill.total": jogadorStats.HABILIDADE, "charisma.total": jogadorStats.CARISMA, "luck.total": jogadorStats.SORTE, ssrJson: ssrJson,
                    "dungeon.salaAtual": salaAtualId, "dungeon.elementosEstado": elementosEstado, "dungeon.inventario": inventarioJogador
                };
                await updateDoc(doc(db, "players", uidAtual), dadosAtualizados);
            } catch (e) {}
        }

        async function comprimirMemoria() {
            if (mensagens.length <= LIMITE_MENSAGENS) return;
            const fatos = mensagens.slice(3, 9).filter(m => m.content && m.content.trim() !== "").map(m => `${m.role === 'user' ? 'JOGADOR' : 'NARRADOR'}: ${m.content}`).join('\n');
            const p = [{ role: 'system', content: "Você é um terminal analítico. Atualize os estados físicos e psicológicos. Retorne JSON." }, { role: 'user', content: `ESTADO ANTERIOR:\n${resumoAtual}\n\nEVENTOS:\n${fatos}` }];

            try {
                const response = await fetch(LM_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: MODELO_JUIZ, messages: p, temperature: 0.0, max_tokens: 300, response_format: { type: "json_schema", json_schema: { name: "extrator", strict: true, schema: { type: "object", properties: { local: { type: "string" }, npcs: { type: "array", items: { type: "string" } }, situacao_atual: { type: "string" } }, required: ["local", "npcs", "situacao_atual"], additionalProperties: false } } } })
                });

                const data = await response.json();
                let jsonObj = JSON.parse(data.choices[0].message.content);
                const acoesRecentes = mensagens.filter(m => m.role === 'user' && !m.content.includes('Descreva em')).slice(-3).map(m => m.content.split('\n[')[0].trim().substring(0, 42));
                jsonObj.eventos_chave = acoesRecentes.length > 0 ? acoesRecentes : ["A jornada começou"];

                buildEntityIndex(jsonObj);
                ssrJson = jsonObj;
                resumoAtual = `LOCAL: ${jsonObj.local}\nNPCS: ${jsonObj.npcs.join(' | ')}\nEVENTOS: ${jsonObj.eventos_chave.join(' ➔ ')}\nSITUAÇÃO: ${jsonObj.situacao_atual}`;
                mensagens[2].content = `ESTADO ATUAL DO MUNDO:\n${resumoAtual}`;
                mensagens.splice(3, 6);
                salvarEstadoJogador();
            } catch (error) { } finally { window._compressaoEmAndamento = false; }
        }

        function adicionarMensagem(texto, tipo, temporaria = false) {
            const div = document.createElement('div');
            div.className = tipo === 'user' ? 'user-message' : tipo === 'system' ? 'system-message' : 'ai-message';
            div.innerText = texto;
            if (temporaria) div.id = 'temp-' + Date.now() + '-' + Math.random();
            chatBox.appendChild(div); chatBox.scrollTop = chatBox.scrollHeight;
            return div.id;
        }

        async function chamarLLMStream(msgs, tokens, onToken) {
            const response = await fetch(LM_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model: MODELO, messages: msgs, temperature: window._introGenerating ? 0.75 : 0.6, max_tokens: tokens, stream: true }) });
            const reader  = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '', fullText = '', finishReason = null;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n'); buffer = lines.pop();
                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const jsonStr = line.slice(6).trim();
                    if (jsonStr === '[DONE]') continue;
                    try {
                        const chunk = JSON.parse(jsonStr);
                        const delta = chunk.choices?.[0]?.delta?.content || '';
                        const fr    = chunk.choices?.[0]?.finish_reason;
                        if (delta) { fullText += delta; if (onToken) onToken(fullText); }
                        if (fr && fr !== 'null') finishReason = fr;
                    } catch (e) {}
                }
            }
            return { text: fullText, finishReason };
        }

        async function gerarRespostaComContinuacao(msgs, tokens, elemento) {
            let textoCompleto = '';
            const { text } = await chamarLLMStream(msgs, tokens, (parcial) => {
                primeiroTokenRecebido = true;
                elemento.innerText = parcial;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
            textoCompleto += text;
            parsearEstadoEntidades(textoCompleto);
            return textoCompleto;
        }

        const PROMPT_INTRO = `Descreva a cena atual em 2-3 frases curtas, em segunda pessoa. Use APENAS os elementos presentes em [DESCRICAO_CANONICA] e [ELEMENTOS_DA_SALA]. Não invente nada. Termine perguntando o que eu faço.`;

        function buildEntityIndex(ssrJson) {
            entityIndex = {}; entidadeEmFoco = null;
            for (const entrada of (ssrJson?.npcs || [])) {
                const vIdx = entrada.indexOf(','); if (vIdx === -1) continue;
                entityIndex[entrada.slice(0, vIdx).trim().toLowerCase()] = entrada.slice(vIdx + 1).trim().toLowerCase();
            }
        }

        function resolverEstadoRelacionalNPC(ent) {
            if (!ent) return 'desconhecido';
            if (/mort[ao]|cadáver|sem vida/.test(ent.estado)) return 'morto';
            if (/hostil|agressiv/.test(ent.estado)) return 'hostil';
            if (/aliado|amigo/.test(ent.estado)) return 'aliado';
            if (/apavorad|submiss/.test(ent.estado)) return 'submisso';
            return 'neutro';
        }

        function classificarAcao(acaoOriginal) {
            const acao = acaoOriginal.toLowerCase().trim();
            if (/^(me descreva|descreva|como é|olh[ao])\b/.test(acao)) return { tipo: 'TRIVIAL', atributo: 'NENHUM', fonte: 'meta' };
            if (/\b(corro|fujo|chuto|soco|ataco)\b/.test(acao)) return { tipo: 'ARRISCADA', atributo: 'HABILIDADE', fonte: 'físico-claro' };
            return null;
        }

        async function classificarComArbitro(acaoOriginal, entidade) {
            const estado = resolverEstadoRelacionalNPC(entidade);
            try {
                const r = await fetch(LM_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: MODELO_JUIZ, messages: [{ role: 'system', content: `Classifique a ação em: FISICA, INFLUENCIA ou PASSIVA. Retorne apenas JSON.` }, { role: 'user', content: `NPC: ${entidade?.nome} (${estado})\nAção: "${acaoOriginal}"` }], temperature: 0.0, max_tokens: 15, response_format: { type: "json_schema", json_schema: { name: "arb", strict: true, schema: { type: "object", properties: { categoria: { type: "string", enum: ["FISICA", "INFLUENCIA", "PASSIVA"] } }, required: ["categoria"], additionalProperties: false } } } })
                });
                const { categoria } = JSON.parse((await r.json()).choices[0].message.content);
                if (categoria === 'PASSIVA') return { tipo: 'TRIVIAL', atributo: 'NENHUM' };
                if (categoria === 'FISICA') return { tipo: 'ARRISCADA', atributo: 'HABILIDADE' };
                return { tipo: 'ARRISCADA', atributo: 'CARISMA' };
            } catch (e) { return { tipo: 'ARRISCADA', atributo: 'CARISMA' }; }
        }

        async function animarTextoTeste(texto) {
            const div = document.createElement('div'); div.className = 'teste-reveal'; chatBox.appendChild(div);
            for (const char of texto) { div.innerText += char; await new Promise(r => setTimeout(r, 40)); }
        }

        function criarBotaoRolar() { return new Promise(res => { const btn = document.createElement('button'); btn.id = 'rolar-btn'; btn.innerText = '⚄ ROLAR DADO'; chatBox.appendChild(btn); btn.addEventListener('click', () => { btn.remove(); res(); }, { once: true }); }); }
        
        function mostrarResultadoDado(s, a, v, r) {
            const d1 = document.createElement('div'); d1.className = 'resultado-dado'; d1.innerText = `Rolagem: ${s} vs ${a} ${v}`; chatBox.appendChild(d1);
            const d2 = document.createElement('div'); d2.className = r === 'SUCESSO' ? 'resultado-sucesso' : 'resultado-falha'; d2.innerText = r; chatBox.appendChild(d2);
        }

        // [AJUSTE: PERSISTÊNCIA REAL] Adiciona os NPCs encontrados permanentemente no "chão" daquela sala para salvar
        function parsearEstadoEntidades(textoNarrador) {
            const match = textoNarrador.match(/\[NPCS:\s*([^\]]+)\]/i);
            if (!match) return;

            const payload = match[1].trim();
            if (payload.toLowerCase() === 'nenhum') { entityIndex = {}; entidadeEmFoco = null; return; }

            const entradas = payload.split('|');
            const novoIndex = {};

            for (const entrada of entradas) {
                const [nome, estado] = entrada.split(':').map(s => s.trim().toLowerCase());
                if (nome && estado) {
                    novoIndex[nome] = estado;
                    // Persiste o NPC na sala atual
                    if (salaAtualId) elementosEstado[`${salaAtualId}:npc_${nome}`] = estado;
                }
            }

            for (const [nome, estAntigo] of Object.entries(entityIndex)) {
                if (estAntigo === 'morto') {
                    novoIndex[nome] = 'morto';
                    if (salaAtualId) elementosEstado[`${salaAtualId}:npc_${nome}`] = 'morto';
                }
            }
            entityIndex = novoIndex;
        }

        window.enviar = async function(mensagemUsuario = null) {
            const isInitial = mensagemUsuario === null;
            if (!isInitial) turnosJogados++;
            let pergunta = isInitial ? (!resumoAtual ? PROMPT_INTRO : 'O jogo foi recarregado. Narre a cena atual.') : mensagemUsuario;
            if (!isInitial) { adicionarMensagem(pergunta, 'user'); userInput.value = ''; }

            sendBtn.disabled = true; userInput.disabled = true;
            const tempId = adicionarMensagem('', 'ai', true);
            const elDisp = document.getElementById(tempId);

            let cAnim = 0; let iPalavra = 0; primeiroTokenRecebido = false;
            intervaloAnimacao = setInterval(() => {
                if (!primeiroTokenRecebido) {
                    elDisp.innerText = PALAVRAS_SOMBRIAS[iPalavra % PALAVRAS_SOMBRIAS.length] + '.'.repeat((Math.floor(cAnim / 2) % 4));
                    elDisp.style.opacity = 0.4 + (Math.sin(Date.now() / 400) * 0.25);
                    cAnim++; iPalavra++;
                } else {
                    clearInterval(intervaloAnimacao); elDisp.style.opacity = '1';
                }
            }, 150);

            try {
                let msgFinal = pergunta;

                if (!isInitial) {
                    let classif = classificarAcao(pergunta) || await classificarComArbitro(pergunta, entidadeEmFoco);
                    let { tipo, atributo } = classif;
                    let res = null, dano = 0;

                    if (tipo === 'ARRISCADA' && atributo !== 'NENHUM') {
                        await animarTextoTeste(`TESTE DE ${atributo}`); await criarBotaoRolar();
                        const semente = Math.floor(Math.random() * 20) + 1; const val = jogadorStats[atributo] ?? 0;
                        res = semente <= val ? 'SUCESSO' : 'FALHA';
                        if (res === 'FALHA') dano = Math.max(1, Math.floor((semente - val) / 2));
                        mostrarResultadoDado(semente, atributo, val, res);
                        await new Promise(r => setTimeout(r, 600));
                    }
                    
                    msgFinal += tipo === 'TRIVIAL' ? `\n[AÇÃO TRIVIAL: Termine com [DANO: 0]]` : `\n[TESTE DE ${atributo}: ${res}. Termine com [DANO: ${dano}]]`;
                }

                msgFinal += construirContextoSala();
                mensagens.push({ role: 'user', content: msgFinal });
                if (isInitial && !resumoAtual) window._introGenerating = true;

                const respIA = await gerarRespostaComContinuacao(mensagens, isInitial ? 500 : 300, elDisp);
                const danoMatch = respIA.match(/\[DANO:\s*(\d+)\]/i);
                
                elDisp.innerText = respIA.replace(/\[TESTE:[^\]]+\]/g, '').replace(/\[DANO:\s*\d+\]/gi, '').replace(/\[NPCS:[^\]]+\]/gi, '').replace(/\[ELEMENTOS_MUT:[^\]]+\]/gi, '').replace(/\[MOVER:[^\]]+\]/gi, '').trim();

                if (danoMatch && parseInt(danoMatch[1]) > 0) {
                    energia -= parseInt(danoMatch[1]);
                    document.getElementById('energia-span').innerText = `🩸 Energia: ${Math.max(0, energia)}/10`;
                }

                window._introGenerating = false;
                mensagens.push({ role: 'assistant', content: respIA });

                _pendingMoveId = parsearMutacoesSala(respIA);
                if (_pendingMoveId) {
                    sendBtn.disabled = true; userInput.disabled = true;
                    await aplicarMovimento(_pendingMoveId);
                    _pendingMoveId = null;
                }

                setTimeout(() => { salvarEstadoJogador(); if (mensagens.length > LIMITE_MENSAGENS) comprimirMemoria(); }, 0);
            } catch (e) {
                if (intervaloAnimacao) clearInterval(intervaloAnimacao); elDisp.innerText = `❌ Erro: ${e.message}`;
            } finally {
                sendBtn.disabled = false; userInput.disabled = false; userInput.focus();
            }
        };

        window.onload = async () => {
            onAuthStateChanged(auth, async (user) => {
                if (user) { uidAtual = user.uid; await carregarDadosJogador(uidAtual); window.enviar(); } 
                else { window.location.href = "login.html"; }
            });
        };

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !sendBtn.disabled) window.enviar(userInput.value.trim()); });
    </script>
