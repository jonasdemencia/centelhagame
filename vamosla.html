        // ============================================================

        function adicionarMensagem(texto, tipo, temporaria = false) {

            if (atributo === 'NENHUM' || !jogadorStats[atributo]) return null;
            const rolagem = Math.floor(Math.random() * 10) + 1;
            return rolagem <= jogadorStats[atributo] ? 'SUCESSO' : 'FALHA';

        // ============================================================
        // Streaming SSE com loop de auto-continuação
        // ============================================================
        async function chamarLLMStream(mensagensPayload, maxTokens, onToken) {
    console.log("🔥 Temperatura usada:", window._introGenerating ? 0.75 : 0.6);
    try {
        const response = await fetch(LM_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: MODELO,
                messages: mensagensPayload,
                temperature: window._introGenerating ? 0.75 : 0.4,
                max_tokens: maxTokens,
                presence_penalty: 0.3,
                frequency_penalty: 0.3,
                stream: true
            })
        });

        if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';
        let finishReason = null;

        console.debug('[LLM STREAM] Iniciando leitura de chunks SSE...');

        while (true) {
            const { done, value } = await reader.read();
            if (done) {
                console.debug('[LLM STREAM] Leitor finalizado (done=true)');
                break;
            }

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const jsonStr = line.slice(6).trim();
                if (jsonStr === '[DONE]') {
                    console.debug('[LLM STREAM] Sinal [DONE] recebido.');
                    continue;
                }
                try {
                    const chunk = JSON.parse(jsonStr);
                    const delta = chunk.choices?.[0]?.delta?.content || '';
                    const fr = chunk.choices?.[0]?.finish_reason;

                    if (fr && fr !== 'null') {
                        console.debug(`[LLM STREAM] finish_reason recebido: "${fr}"`);
                    } else if (fr === 'null') {
                        console.debug('[LLM STREAM] finish_reason = null (ignorado)');
                    }

                    if (delta) {
                        fullText += delta;
                        if (onToken) onToken(fullText);
                    }
                    if (fr && fr !== 'null') {
                        finishReason = fr;
                    }

                    if (chunk.error) {
                        console.error('[LLM STREAM] Erro no chunk:', chunk.error);
                    }
                } catch (parseErr) {
                    console.error('[LLM STREAM] Erro ao parsear chunk:', parseErr, 'Linha:', line);
                }
            }
        }

        console.debug(`[LLM STREAM] Geração concluída. Tokens gerados: ~${fullText.split(' ').length} palavras. finish_reason final: "${finishReason}"`);
        return { text: fullText, finishReason };
    } catch (error) {
        console.error('[LLM STREAM] Falha na requisição fetch:', error);
        throw error;
    }
}

        async function gerarRespostaComContinuacao(mensagensPayload, maxTokens, elemento, maxContinuacoes = 0) {
            let textoCompleto = '';
            let msgsAtual = [...mensagensPayload];

            for (let tentativa = 0; tentativa <= maxContinuacoes; tentativa++) {
                if (tentativa > 0) {
                    console.debug(`[CONTINUAÇÃO ${tentativa}/${maxContinuacoes}] finish_reason=length. Enviando extensão...`);
                    msgsAtual = [
                        ...msgsAtual,
                        { role: 'assistant', content: textoCompleto },
{ role: 'user', content: 'Continue a narração em português brasileiro.' }
                    ];
                }

                const { text, finishReason } = await chamarLLMStream(
                    msgsAtual,
                    maxTokens,
                    (parcial) => {
                        elemento.innerText = textoCompleto + parcial;
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                );

                textoCompleto += text;
                elemento.innerText = textoCompleto;
                chatBox.scrollTop = chatBox.scrollHeight;

                if (finishReason !== 'length') {
                    console.debug(`[GERAÇÃO] Encerrado naturalmente (finish_reason="${finishReason}") na tentativa ${tentativa}.`);
                    break;
                }

                if (tentativa === maxContinuacoes) {
                    console.debug(`[GERAÇÃO] Limite de ${maxContinuacoes} continuação(ões) atingido. Encerrando.`);
                }
            }

            return textoCompleto;
        }

       // SE NÃO FOR A INTRODUÇÃO, APENAS GERA A SEMENTE E OS ATRIBUTOS
if (!isInitial) {

    // Metadados crus: atributos do jogador + a rolagem
    const metadados = `\n[SISTEMA - ATRIBUTOS: HAB(${jogadorStats.HABILIDADE}), CAR(${jogadorStats.CARISMA}), SOR(${jogadorStats.SORTE}) | ROLAGEM D10: ${semente}]`;

    mensagemFinal += `${metadados}\n[RESPOSTA OBRIGATORIAMENTE EM PORTUGUÊS BRASILEIRO]`;
}

mensagens.push({ role: 'user', content: mensagemFinal });

        const isIntro = (isInitial && !resumoAtual);
        const maxTokens       = isIntro ? 500 : 250;
        const maxContinuacoes = isIntro ?    1 :   1;

        console.debug(`[ENVIO] isIntro=${isIntro} | maxTokens=${maxTokens} | maxContinuacoes=${maxContinuacoes}`);

        if (isIntro) window._introGenerating = true;

        const respostaIA = await gerarRespostaComContinuacao(mensagens, maxTokens, elementoDisplay, maxContinuacoes);

        // 1. O JS caça o bloco gerado pelo LLM para entender o que aconteceu
        const resolucaoMatch = respostaIA.match(/\[RESOLUCAO\s*\|\s*(.*?)\]/i);
        let respostaLimpa = respostaIA;
        let valorDano = 0;
        let infoTeste = "";

        if (resolucaoMatch) {
            // Remove o bloco da narração final que vai pra tela
            respostaLimpa = respostaIA.replace(resolucaoMatch[0], '').trim();
            
            const detalhes = resolucaoMatch[1]; 
            
            // Tenta extrair o Dano desse bloco
            const danoMatch = detalhes.match(/Dano:\s*(\d+)/i);
            if (danoMatch) valorDano = parseInt(danoMatch[1]);

            // Verifica se houve falha no texto extraído
            const isFalha = detalhes.toUpperCase().includes('FALHA');

            // Formata o aviso para o jogador saber o que foi testado (apenas se não for ação trivial)
            if (!detalhes.toUpperCase().includes('TRIVIAL')) {
                 const corTeste = isFalha ? '#e53935' : '#7a8c66';
                 infoTeste = `<div style="background: #1a1815; border-left: 3px solid ${corTeste}; padding: 8px; margin-bottom: 10px; font-size: 0.85em; color: #b5a68b; font-family: monospace;">
                    🎲 <strong>TESTE DE SISTEMA:</strong> ${detalhes.replace(/\|/g, '•')}
                 </div><br>`;
            }
        } else {
            // Fallback de segurança caso o modelo falhe no formato
            const fallbackDano = respostaIA.match(/\[DANO:\s*(\d+)\]/i);
            if (fallbackDano) valorDano = parseInt(fallbackDano[1]);
            respostaLimpa = respostaIA.replace(/\[DANO:\s*\d+\]/i, '').trim();
        }

        // 2. Atualiza a tela com a narração limpa, precedida pela informação do teste (Usando innerHTML em vez de innerText)
        elementoDisplay.innerHTML = infoTeste + respostaLimpa;

        // 3. Gera memória longa logo após a intro (Mantido do seu original)
        if (isIntro) {
            gerarMemoriaLonga(respostaIA); 
        }

        // 4. Processa o dano mecânico no HUD
        if (valorDano > 0) {
            energia -= valorDano;
            document.getElementById('energia-span').innerText = `🩸 Energia: ${Math.max(0, energia)}/10`;
            adicionarMensagem(`[O mundo cobra seu preço. Você perdeu ${valorDano} de Energia.]`, 'system');

            if (energia <= 0) {
                adicionarMensagem("💀 SEU CORPO CEDE. A ESCURIDÃO O CONSOME. FIM DA JORNADA.", 'system');
                userInput.disabled = true;
                sendBtn.disabled = true;
                await salvarResumoFirestore(resumoAtual);
                return;
            }
        }

        if (isIntro) window._introGenerating = false;

        // 5. Salva APENAS a resposta limpa na memória da IA (Isso é crucial)
        mensagens.push({ role: 'assistant', content: respostaLimpa });

        await salvarResumoFirestore(resumoAtual);

        if (isInitial) {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

    } catch (error) {
        elementoDisplay.innerText = `❌ Erro: ${error.message}`;
        if (isInitial) {
            userInput.disabled = false;
            sendBtn.disabled = false;
        }
    } finally {
        if (!isInitial) {
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    }
};

        // ============================================================
        // Inicialização
        // ============================================================
        window.onload = async () => {
            await carregarSessao();
            window.enviar(); 
        };

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                window.enviar(userInput.value.trim());
            }
        });
    </script>
</body>
</html>
