<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevasca Infinita - Biomas Textuais (Retro‑Realista)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Canvas com pixelização forçada */
        canvas {
            display: block;
            width: 100vw !important;
            height: 100vh !important;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        #instructions {
            text-align: center;
            cursor: pointer;
        }
        h1 { font-size: 2.5rem; font-weight: 300; letter-spacing: 2px; }
        p { color: #aaaaaa; font-size: 1.1rem; }
        
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            z-index: 5;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
            max-width: 400px;
        }
        #hud h2 { margin: 0 0 5px 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
        #hud p { margin: 0; font-size: 0.9rem; line-height: 1.4; }
        #loading { color: #88ccff; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div id="blocker">
        <div id="instructions">
            <h1>O INVERNO ETERNO</h1>
            <p>Clique para iniciar</p>
            <p style="font-size: 0.9rem; margin-top: 20px;">Use W, A, S, D para caminhar. A cada 200 passos, uma nova fronteira de conhecimento é cruzada.</p>
        </div>
    </div>

    <div id="hud">
        <div id="loading">Atravessando fronteira textual...</div>
        <h2 id="wiki-title">Conectando...</h2>
        <p id="wiki-stats">Aguardando dados estruturais.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ==========================================
        // CONFIGURAÇÃO PIXELIZAÇÃO
        // ==========================================
        const FATOR_PIXEL = 3; // quanto maior, mais pixelado

        // ==========================================
        // 1. SISTEMA DETERMINÍSTICO E ANÁLISE DE TEXTO
        // ==========================================
        function cyrb53(str, seed = 0) {
            let h1 = 0xdeadbeef ^ seed, h2 = 0x41c6ce57 ^ seed;
            for (let i = 0, ch; i < str.length; i++) {
                ch = str.charCodeAt(i);
                h1 = Math.imul(h1 ^ ch, 2654435761);
                h2 = Math.imul(h2 ^ ch, 1597334677);
            }
            h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
            h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
            return 4294967296 * (2097151 & h2) + (h1 >>> 0);
        }

        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        function calculateEntropy(text) {
            const len = text.length;
            const frequencies = {};
            for (let i = 0; i < len; i++) {
                const char = text[i];
                frequencies[char] = (frequencies[char] || 0) + 1;
            }
            let entropy = 0;
            for (const char in frequencies) {
                const p = frequencies[char] / len;
                entropy -= p * Math.log2(p);
            }
            return entropy;
        }

        // ==========================================
        // 2. PARÂMETROS DO BIOMA
        // ==========================================
        const biomeParams = {
            targetAmplitute: 1.5,
            currentAmplitude: 1.5,
            targetRoughness: 0.1,
            currentRoughness: 0.1,
            targetFogDensity: 0.04,
            currentFogDensity: 0.04,
            seed: 12345
        };

        let currentArticleCenter = new THREE.Vector2(0, 0);
        let currentLinks = [];
        const BIOME_RADIUS = 200;

        // ==========================================
        // 3. INTEGRAÇÃO WIKIPEDIA API
        // ==========================================
        async function fetchWikiArticle(title = "Inverno") {
            document.getElementById('loading').style.display = 'block';
            
            const url = `https://pt.wikipedia.org/w/api.php?action=query&prop=extracts|links&exintro=true&explaintext=true&pllimit=50&format=json&origin=*&titles=${encodeURIComponent(title)}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                const page = pages[pageId];

                if (!page || pageId == -1) return fetchWikiArticle("Frio");

                const text = page.extract || page.title;
                currentLinks = page.links ? page.links.map(l => l.title) : ["Gelo"];

                const length = text.length;
                const entropy = calculateEntropy(text);
                const wordFreq = text.split(/\s+/).length / length;

                biomeParams.targetAmplitute = 0.5 + ((length % 1000) / 1000) * 3.5;
                biomeParams.targetRoughness = 0.02 + ((entropy % 5) / 5) * 0.13;
                biomeParams.targetFogDensity = 0.01 + (wordFreq * 0.5);
                biomeParams.seed = cyrb53(page.title);

                document.getElementById('wiki-title').innerText = page.title;
                document.getElementById('wiki-stats').innerText = `Entropia (Aspereza): ${entropy.toFixed(2)}\nTamanho (Elevação): ${length} bytes\nFronteiras disponíveis: ${currentLinks.length}`;
                
            } catch (e) {
                console.error("Erro ao buscar Wiki:", e);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // ==========================================
        // CENA E RENDERIZADOR (PIXELIZADOS)
        // ==========================================
        const scene = new THREE.Scene();
        const fogColor = new THREE.Color(0x9caebb);
        scene.background = fogColor;
        scene.fog = new THREE.FogExp2(fogColor, biomeParams.currentFogDensity);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        
        // Renderizador SEM antialiasing
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        // Resolução reduzida
        renderer.setSize(window.innerWidth / FATOR_PIXEL, window.innerHeight / FATOR_PIXEL, false);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        // Iluminação
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xdfe9f5, 1.5);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.set(512, 512);
        scene.add(directionalLight);

        // ==========================================
        // TERRENO (com flat shading, sem bump)
        // ==========================================
        const terrainSize = 150;
        const terrainSegments = 100;
        const terrainGeometry = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSegments, terrainSegments);
        terrainGeometry.rotateX(-Math.PI / 2);
        
        const terrainMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.8,
            metalness: 0.1,
            flatShading: true 
        });
        const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
        terrain.receiveShadow = true;
        scene.add(terrain);

        function getElevation(x, z) {
            const r = biomeParams.currentRoughness;
            const a = biomeParams.currentAmplitude;
            const sOffset = (biomeParams.seed % 1000); 
            
            return (Math.sin((x + sOffset) * r) * a) + 
                   (Math.cos((z + sOffset) * r) * a) + 
                   (Math.sin((x + sOffset) * (r*0.3) + (z + sOffset) * (r*0.4)) * (a * 1.5));
        }

        // ==========================================
        // NEVE (partículas com textura pixelada)
        // ==========================================
        function criarTexturaFlocoPixelada() {
            const t = 16; // textura bem pequena
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = t;
            const ctx = canvas.getContext('2d');
            // Desenha um círculo branco simples com bordas duras
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(t/2, t/2, t/2 - 1, 0, Math.PI*2);
            ctx.fill();
            const textura = new THREE.CanvasTexture(canvas);
            textura.magFilter = THREE.NearestFilter;
            textura.minFilter = THREE.NearestFilter;
            return textura;
        }

        const particleCount = 20000;
        const snowGeometry = new THREE.BufferGeometry();
        const snowPositions = new Float32Array(particleCount * 3);
        const snowVelocities = [];

        for (let i = 0; i < particleCount; i++) {
            snowPositions[i * 3] = (Math.random() - 0.5) * 50;    
            snowPositions[i * 3 + 1] = Math.random() * 40;        
            snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 50; 
            snowVelocities.push({
                x: (Math.random() - 0.5) * 0.05,
                y: (Math.random() * 0.05) + 0.1,
                z: (Math.random() - 0.5) * 0.05
            });
        }
        snowGeometry.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));

        const snowMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.15,
            map: criarTexturaFlocoPixelada(),
            transparent: true,
            opacity: 0.8,
            depthWrite: false
        });
        const snowParticles = new THREE.Points(snowGeometry, snowMaterial);
        snowParticles.frustumCulled = false;
        scene.add(snowParticles);

        // ==========================================
        // SISTEMA DE PEGADAS (sprites pixelados)
        // ==========================================
        function criarTexturaPegada() {
            const t = 16;
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = t;
            const ctx = canvas.getContext('2d');
            // Mancha alongada simulando pegada na neve (cor um pouco mais escura)
            ctx.fillStyle = '#d0dbe5'; // cinza claro azulado
            ctx.beginPath();
            ctx.ellipse(t/2, t/2, t/3, t/4, 0, 0, Math.PI*2);
            ctx.fill();
            const textura = new THREE.CanvasTexture(canvas);
            textura.magFilter = THREE.NearestFilter;
            textura.minFilter = THREE.NearestFilter;
            return textura;
        }

        const pegadas = [];
        const MAX_PEGADAS = 100;
        const PEGADA_DURACAO = 8; // segundos
        const DISTANCIA_ENTRE_PEGADAS = 0.8;

        let ultimaPosicaoPegada = new THREE.Vector3();
        let distanciaAcumulada = 0;

        function adicionarPegada(posicao) {
            // Cria sprite com textura pixelada
            const material = new THREE.SpriteMaterial({
                map: criarTexturaPegada(),
                transparent: true,
                opacity: 0.7,
                depthWrite: false,
                depthTest: true
            });
            const sprite = new THREE.Sprite(material);
            sprite.position.copy(posicao);
            sprite.position.y += 0.02; // ligeiramente acima do chão
            sprite.scale.set(0.25, 0.25, 1);
            scene.add(sprite);
            
            pegadas.push({
                sprite: sprite,
                tempo: PEGADA_DURACAO
            });
            
            // Remove as mais antigas se exceder o limite
            while (pegadas.length > MAX_PEGADAS) {
                const velha = pegadas.shift();
                scene.remove(velha.sprite);
                velha.sprite.material.dispose();
            }
        }

        function atualizarPegadas(delta) {
            // Envelhece e remove as que expiraram
            for (let i = pegadas.length - 1; i >= 0; i--) {
                pegadas[i].tempo -= delta;
                const progresso = 1 - (pegadas[i].tempo / PEGADA_DURACAO);
                // Encolhe e some gradualmente
                const escala = 0.25 * (1 - progresso * 0.5);
                pegadas[i].sprite.scale.set(escala, escala, 1);
                pegadas[i].sprite.material.opacity = 0.7 * (1 - progresso);
                
                if (pegadas[i].tempo <= 0) {
                    scene.remove(pegadas[i].sprite);
                    pegadas[i].sprite.material.dispose();
                    pegadas.splice(i, 1);
                }
            }
        }

        // ==========================================
        // CONTROLES
        // ==========================================
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        const instructions = document.getElementById('instructions');
        
        let audioContext;
        let isAudioStarted = false;

        instructions.addEventListener('click', function () {
            controls.lock();
            if (!isAudioStarted) {
                startProceduralWind();
                fetchWikiArticle("Neve");
                isAudioStarted = true;
            }
        });

        controls.addEventListener('lock', () => { blocker.style.display = 'none'; });
        controls.addEventListener('unlock', () => { blocker.style.display = 'flex'; });

        const moveState = { forward: false, backward: false, left: false, right: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        document.addEventListener('keydown', (event) => {
            switch (event.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyD': moveState.right = true; break;
            }
        });

        document.addEventListener('keyup', (event) => {
            switch (event.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyD': moveState.right = false; break;
            }
        });

        function startProceduralWind() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = 2 * audioContext.sampleRate;
            const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            
            const whiteNoise = audioContext.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;

            const gainNode = audioContext.createGain();
            gainNode.gain.value = 0.5;

            whiteNoise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioContext.destination);
            whiteNoise.start(0);

            setInterval(() => {
                const targetFreq = 200 + Math.random() * 600;
                const targetVol = 0.3 + Math.random() * 0.5;
                filter.frequency.setTargetAtTime(targetFreq, audioContext.currentTime, 2);
                gainNode.gain.setTargetAtTime(targetVol, audioContext.currentTime, 2);
            }, 3000);
        }

        let prevTime = performance.now();
        let walkTime = 0; 
        const windDirection = new THREE.Vector3(-0.1, 0, -0.05);

        function checkBiomeTransition(px, pz) {
            const dist = Math.hypot(px - currentArticleCenter.x, pz - currentArticleCenter.y);
            if (dist > BIOME_RADIUS && currentLinks.length > 0) {
                const prng = mulberry32(cyrb53(`${Math.floor(px)}_${Math.floor(pz)}`, biomeParams.seed));
                const randomIndex = Math.floor(prng() * currentLinks.length);
                const nextArticle = currentLinks[randomIndex];
                currentArticleCenter.set(px, pz);
                fetchWikiArticle(nextArticle);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1);

            if (controls.isLocked) {
                biomeParams.currentAmplitude += (biomeParams.targetAmplitute - biomeParams.currentAmplitude) * delta * 0.5;
                biomeParams.currentRoughness += (biomeParams.targetRoughness - biomeParams.currentRoughness) * delta * 0.5;
                biomeParams.currentFogDensity += (biomeParams.targetFogDensity - biomeParams.currentFogDensity) * delta * 0.5;
                scene.fog.density = biomeParams.currentFogDensity;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveState.forward) - Number(moveState.backward);
                direction.x = Number(moveState.right) - Number(moveState.left);
                direction.normalize();

                const speed = 15.0;
                if (moveState.forward || moveState.backward) velocity.z -= direction.z * speed * delta;
                if (moveState.left || moveState.right) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                const px = camera.position.x;
                const pz = camera.position.z;

                checkBiomeTransition(px, pz);

                const groundHeight = getElevation(px, pz);
                const isMoving = Math.abs(velocity.x) > 0.1 || Math.abs(velocity.z) > 0.1;
                
                if (isMoving) {
                    walkTime += delta * 5;
                    // Sistema de pegadas
                    const posAtual = new THREE.Vector3(px, groundHeight, pz);
                    if (ultimaPosicaoPegada.length() === 0) {
                        ultimaPosicaoPegada.copy(posAtual);
                    }
                    const distancia = posAtual.distanceTo(ultimaPosicaoPegada);
                    if (distancia >= DISTANCIA_ENTRE_PEGADAS) {
                        adicionarPegada(posAtual);
                        ultimaPosicaoPegada.copy(posAtual);
                    }
                } else {
                    ultimaPosicaoPegada.set(0,0,0); // reseta ao parar
                }
                
                const headBob = isMoving ? Math.sin(walkTime) * 0.1 : 0;
                camera.position.y = groundHeight + 1.7 + headBob;

                // Atualiza terreno
                terrain.position.x = Math.floor(px / 10) * 10;
                terrain.position.z = Math.floor(pz / 10) * 10;
                const positions = terrainGeometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    const globalX = terrain.position.x + positions[i];
                    const globalZ = terrain.position.z + positions[i + 2];
                    positions[i + 1] = getElevation(globalX, globalZ) - terrain.position.y;
                }
                terrainGeometry.attributes.position.needsUpdate = true;
                terrainGeometry.computeVertexNormals();

                // Atualiza neve (floating origin)
                const snowPos = snowGeometry.attributes.position.array;
                const range = 60;
                for (let i = 0; i < particleCount; i++) {
                    snowPos[i * 3] += windDirection.x + snowVelocities[i].x;
                    snowPos[i * 3 + 1] -= snowVelocities[i].y;
                    snowPos[i * 3 + 2] += windDirection.z + snowVelocities[i].z;

                    while (snowPos[i * 3] < px - range) snowPos[i * 3] += range * 2;
                    while (snowPos[i * 3] > px + range) snowPos[i * 3] -= range * 2;
                    while (snowPos[i * 3 + 2] < pz - range) snowPos[i * 3 + 2] += range * 2;
                    while (snowPos[i * 3 + 2] > pz + range) snowPos[i * 3 + 2] -= range * 2;
                    if (snowPos[i * 3 + 1] < groundHeight - 1) {
                        snowPos[i * 3 + 1] = camera.position.y + 30;
                    }
                }
                snowGeometry.attributes.position.needsUpdate = true;

                // Atualiza envelhecimento das pegadas
                atualizarPegadas(delta);
            }

            renderer.render(scene, camera);
            prevTime = time;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth / FATOR_PIXEL, window.innerHeight / FATOR_PIXEL, false);
        });

        animate();
    </script>
</body>
</html>
