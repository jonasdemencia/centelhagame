<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevasca Infinita - Biomas Textuais</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        #instructions {
            text-align: center;
            cursor: pointer;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }
        p {
            color: #aaaaaa;
            font-size: 1.1rem;
        }

        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            z-index: 5;
            pointer-events: none;
            text-shadow: 1px 1px 3px black;
            max-width: 400px;
        }
        #hud h2 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #hud p {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        #loading {
            color: #88ccff;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div id="blocker">
        <div id="instructions">
            <h1>O INVERNO ETERNO</h1>
            <p>Clique para iniciar</p>
            <p style="font-size: 0.9rem; margin-top: 20px;">Use W, A, S, D para caminhar. A cada 200 passos, uma nova fronteira de conhecimento é cruzada.</p>
        </div>
    </div>

    <div id="hud">
        <div id="loading">Atravessando fronteira textual...</div>
        <h2 id="wiki-title">Conectando...</h2>
        <p id="wiki-stats">Aguardando dados estruturais.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ==========================================
        // 1. SISTEMA DETERMINÍSTICO E ANÁLISE DE TEXTO
        // ==========================================
        function cyrb53(str, seed = 0) {
            let h1 = 0xdeadbeef ^ seed,
                h2 = 0x41c6ce57 ^ seed;
            for (let i = 0, ch; i < str.length; i++) {
                ch = str.charCodeAt(i);
                h1 = Math.imul(h1 ^ ch, 2654435761);
                h2 = Math.imul(h2 ^ ch, 1597334677);
            }
            h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
            h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
            return 4294967296 * (2097151 & h2) + (h1 >>> 0);
        }

        function mulberry32(a) {
            return function () {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        function calculateEntropy(text) {
            const len = text.length;
            const frequencies = {};
            for (let i = 0; i < len; i++) {
                const char = text[i];
                frequencies[char] = (frequencies[char] || 0) + 1;
            }
            let entropy = 0;
            for (const char in frequencies) {
                const p = frequencies[char] / len;
                entropy -= p * Math.log2(p);
            }
            return entropy;
        }

        // ==========================================
        // 2. PARÂMETROS DO BIOMA
        // ==========================================
        const biomeParams = {
            targetAmplitute: 1.5,
            currentAmplitude: 1.5,
            targetRoughness: 0.1,
            currentRoughness: 0.1,
            targetFogDensity: 0.04,
            currentFogDensity: 0.04,
            seed: 12345,
        };

        let currentArticleCenter = new THREE.Vector2(0, 0);
        let currentLinks = [];
        const BIOME_RADIUS = 200;

        // ==========================================
        // 3. INTEGRAÇÃO WIKIPEDIA API
        // ==========================================
        async function fetchWikiArticle(title = 'Inverno') {
            document.getElementById('loading').style.display = 'block';

            const url = `https://pt.wikipedia.org/w/api.php?action=query&prop=extracts|links&exintro=true&explaintext=true&pllimit=50&format=json&origin=*&titles=${encodeURIComponent(title)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                const page = pages[pageId];

                if (!page || pageId == -1) return fetchWikiArticle('Frio');

                const text = page.extract || page.title;
                currentLinks = page.links ? page.links.map((l) => l.title) : ['Gelo'];

                const length = text.length;
                const entropy = calculateEntropy(text);
                const wordFreq = text.split(/\s+/).length / length;

                biomeParams.targetAmplitute = 0.5 + ((length % 1000) / 1000) * 3.5;
                biomeParams.targetRoughness = 0.02 + ((entropy % 5) / 5) * 0.13;
                biomeParams.targetFogDensity = 0.01 + wordFreq * 0.5;
                biomeParams.seed = cyrb53(page.title);

                document.getElementById('wiki-title').innerText = page.title;
                document.getElementById('wiki-stats').innerText =
                    `Entropia (Aspereza): ${entropy.toFixed(2)}\nTamanho (Elevação): ${length} bytes\nFronteiras disponíveis: ${currentLinks.length}`;
            } catch (e) {
                console.error('Erro ao buscar Wiki:', e);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // ==========================================
        // CONFIGURAÇÃO DA CENA
        // ==========================================
        const scene = new THREE.Scene();
        const fogColor = new THREE.Color(0xd0e4f5); // Tom de neve mais claro e frio
        scene.background = fogColor;
        scene.fog = new THREE.FogExp2(fogColor, biomeParams.currentFogDensity);

        const perspectiveCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        renderer.shadowMap.enabled = true; // Habilitar sombras para profundidade das pegadas
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Iluminação mais suave para realçar depressões
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff5e6, 2.5);
        sunLight.position.set(50, 60, 30);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 200;
        sunLight.shadow.camera.left = -80;
        sunLight.shadow.camera.right = 80;
        sunLight.shadow.camera.top = 80;
        sunLight.shadow.camera.bottom = -80;
        sunLight.shadow.bias = -0.0001;
        scene.add(sunLight);

        // Luz de preenchimento azulada para evitar sombras muito escuras
        const fillLight = new THREE.DirectionalLight(0xcceeff, 1.2);
        fillLight.position.set(-30, 20, -30);
        scene.add(fillLight);

        // ==========================================
        // TERRENO
        // ==========================================
        const terrainSize = 150;
        const terrainSegments = 120; // Mais vértices para suavizar as depressões das pegadas
        const terrainGeometry = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSegments, terrainSegments);
        terrainGeometry.rotateX(-Math.PI / 2);

        const terrainMaterial = new THREE.MeshStandardMaterial({
            color: 0xf8faff, // Branco muito claro, quase neve pura
            roughness: 0.75,
            metalness: 0.02,
            flatShading: false,
        });
        const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
        terrain.receiveShadow = true;
        terrain.castShadow = false;
        scene.add(terrain);

        // ==========================================
        // SISTEMA DE PEGADAS (FOOTPRINTS)
        // ==========================================
        const footprints = [];
        const MAX_FOOTPRINTS = 80;
        const FOOTPRINT_LIFETIME = 20; // segundos que a pegada permanece visível
        const STEP_DISTANCE = 0.45; // distância mínima entre cada passo
        const FOOTPRINT_DEPTH = 0.06; // profundidade da depressão (metros)
        const FOOTPRINT_RADIUS = 0.18; // raio de cada "pé"
        const FOOT_OFFSET = 0.25; // distância lateral entre os dois pés

        let lastFootprintPos = new THREE.Vector2(0, 0);
        let footprintToggle = true; // alterna pé esquerdo / direito
        let distanceSinceLastStep = 0;

        // Adiciona um novo par de pegadas na posição do jogador
        function addFootprint(x, z, angle) {
            // Cada "passo" adiciona dois pés (esquerdo e direito) com um pequeno offset lateral
            const perpX = Math.sin(angle) * FOOT_OFFSET;
            const perpZ = Math.cos(angle) * FOOT_OFFSET;

            const leftFoot = {
                x: x - perpX,
                z: z - perpZ,
                age: 0,
            };
            const rightFoot = {
                x: x + perpX,
                z: z + perpZ,
                age: 0,
            };

            footprints.push(leftFoot, rightFoot);

            // Remove os mais antigos se exceder o limite
            while (footprints.length > MAX_FOOTPRINTS) {
                footprints.shift();
            }
        }

        // Calcula a depressão causada por todas as pegadas em uma coordenada mundial
        function getFootprintDepression(worldX, worldZ) {
            let totalDepth = 0;
            const now = performance.now() / 1000;

            // Percorre apenas pegadas ativas
            for (let i = footprints.length - 1; i >= 0; i--) {
                const fp = footprints[i];
                const age = now - fp.age;
                if (age > FOOTPRINT_LIFETIME) {
                    footprints.splice(i, 1); // limpeza tardia
                    continue;
                }

                const dx = worldX - fp.x;
                const dz = worldZ - fp.z;
                const distSq = dx * dx + dz * dz;

                // Influência gaussiana: depressão forte no centro, suave nas bordas
                const sigma = FOOTPRINT_RADIUS * 0.6;
                if (distSq < (FOOTPRINT_RADIUS * 2.5) ** 2) {
                    // Fade out suave com a idade (desaparece gradualmente nos últimos 3 segundos)
                    let fade = 1.0;
                    const remaining = FOOTPRINT_LIFETIME - age;
                    if (remaining < 3.0) {
                        fade = Math.max(0, remaining / 3.0);
                    }
                    const depth = FOOTPRINT_DEPTH * Math.exp(-distSq / (2 * sigma * sigma)) * fade;
                    totalDepth -= depth; // valor negativo = depressão
                }
            }
            return totalDepth;
        }

        // ==========================================
        // FUNÇÃO DE ELEVAÇÃO DO TERRENO (com pegadas)
        // ==========================================
        function getElevation(x, z) {
            const r = biomeParams.currentRoughness;
            const a = biomeParams.currentAmplitude;
            const sOffset = biomeParams.seed % 1000;

            const baseH =
                Math.sin((x + sOffset) * r) * a +
                Math.cos((z + sOffset) * r) * a +
                Math.sin((x + sOffset) * (r * 0.3) + (z + sOffset) * (r * 0.4)) * (a * 1.5);

            // Adiciona depressão das pegadas
            const footprintDepth = getFootprintDepression(x, z);
            return baseH + footprintDepth;
        }

        // ==========================================
        // NEVE (PARTÍCULAS)
        // ==========================================
        const particleCount = 25000;
        const snowGeometry = new THREE.BufferGeometry();
        const snowPositions = new Float32Array(particleCount * 3);
        const snowVelocities = [];

        for (let i = 0; i < particleCount; i++) {
            snowPositions[i * 3] = (Math.random() - 0.5) * 60;
            snowPositions[i * 3 + 1] = Math.random() * 40;
            snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
            snowVelocities.push({
                x: (Math.random() - 0.5) * 0.03,
                y: Math.random() * 0.06 + 0.08,
                z: (Math.random() - 0.5) * 0.03,
            });
        }
        snowGeometry.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));

        const snowMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.12,
            transparent: true,
            opacity: 0.85,
            depthWrite: false,
            blending: THREE.NormalBlending,
        });
        const snowParticles = new THREE.Points(snowGeometry, snowMaterial);
        snowParticles.frustumCulled = false;
        scene.add(snowParticles);

        // ==========================================
        // CONTROLES E ÁUDIO
        // ==========================================
        const controls = new PointerLockControls(perspectiveCamera, document.body);
        const blocker = document.getElementById('blocker');
        const instructions = document.getElementById('instructions');

        let audioContext;
        let isAudioStarted = false;

        instructions.addEventListener('click', function () {
            controls.lock();
            if (!isAudioStarted) {
                startProceduralWind();
                fetchWikiArticle('Neve');
                isAudioStarted = true;
                // Inicializa a última posição da pegada
                lastFootprintPos.set(perspectiveCamera.position.x, perspectiveCamera.position.z);
            }
        });

        controls.addEventListener('lock', function () {
            blocker.style.display = 'none';
        });
        controls.addEventListener('unlock', function () {
            blocker.style.display = 'flex';
        });

        const moveState = { forward: false, backward: false, left: false, right: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        document.addEventListener('keydown', (event) => {
            switch (event.code) {
                case 'KeyW':
                    moveState.forward = true;
                    break;
                case 'KeyA':
                    moveState.left = true;
                    break;
                case 'KeyS':
                    moveState.backward = true;
                    break;
                case 'KeyD':
                    moveState.right = true;
                    break;
            }
        });

        document.addEventListener('keyup', (event) => {
            switch (event.code) {
                case 'KeyW':
                    moveState.forward = false;
                    break;
                case 'KeyA':
                    moveState.left = false;
                    break;
                case 'KeyS':
                    moveState.backward = false;
                    break;
                case 'KeyD':
                    moveState.right = false;
                    break;
            }
        });

        function startProceduralWind() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = 2 * audioContext.sampleRate;
            const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

            const whiteNoise = audioContext.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;

            const gainNode = audioContext.createGain();
            gainNode.gain.value = 0.4;

            whiteNoise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioContext.destination);
            whiteNoise.start(0);

            setInterval(() => {
                const targetFreq = 200 + Math.random() * 600;
                const targetVol = 0.25 + Math.random() * 0.4;
                filter.frequency.setTargetAtTime(targetFreq, audioContext.currentTime, 2);
                gainNode.gain.setTargetAtTime(targetVol, audioContext.currentTime, 2);
            }, 3000);
        }

        // ==========================================
        // LOOP PRINCIPAL
        // ==========================================
        let prevTime = performance.now();
        let walkTime = 0;
        const windDirection = new THREE.Vector3(-0.08, 0, -0.04);

        function checkBiomeTransition(px, pz) {
            const dist = Math.hypot(px - currentArticleCenter.x, pz - currentArticleCenter.y);
            if (dist > BIOME_RADIUS && currentLinks.length > 0) {
                const prng = mulberry32(cyrb53(`${Math.floor(px)}_${Math.floor(pz)}`, biomeParams.seed));
                const randomIndex = Math.floor(prng() * currentLinks.length);
                const nextArticle = currentLinks[randomIndex];
                currentArticleCenter.set(px, pz);
                fetchWikiArticle(nextArticle);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1); // cap para evitar saltos
            const now = time / 1000;

            if (controls.isLocked === true) {
                // Transição suave de parâmetros
                biomeParams.currentAmplitude +=
                    (biomeParams.targetAmplitute - biomeParams.currentAmplitude) * delta * 0.5;
                biomeParams.currentRoughness +=
                    (biomeParams.targetRoughness - biomeParams.currentRoughness) * delta * 0.5;
                biomeParams.currentFogDensity +=
                    (biomeParams.targetFogDensity - biomeParams.currentFogDensity) * delta * 0.5;
                scene.fog.density = biomeParams.currentFogDensity;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveState.forward) - Number(moveState.backward);
                direction.x = Number(moveState.right) - Number(moveState.left);
                direction.normalize();

                const speed = 15.0;
                if (moveState.forward || moveState.backward) velocity.z -= direction.z * speed * delta;
                if (moveState.left || moveState.right) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                const px = perspectiveCamera.position.x;
                const pz = perspectiveCamera.position.z;

                checkBiomeTransition(px, pz);

                // --- GERAÇÃO DE PEGADAS ---
                const dx = px - lastFootprintPos.x;
                const dz = pz - lastFootprintPos.y;
                distanceSinceLastStep += Math.sqrt(dx * dx + dz * dz);

                if (distanceSinceLastStep > STEP_DISTANCE) {
                    distanceSinceLastStep = 0;
                    // Calcula o ângulo da direção do movimento
                    const angle = Math.atan2(velocity.x, velocity.z);
                    addFootprint(px, pz, angle);
                    lastFootprintPos.set(px, pz);
                    footprintToggle = !footprintToggle;
                }

                // Altura do terreno + head bob
                const groundHeight = getElevation(px, pz);
                const isMoving = Math.abs(velocity.x) > 0.15 || Math.abs(velocity.z) > 0.15;
                if (isMoving) walkTime += delta * 8;
                const headBob = isMoving ? Math.sin(walkTime) * 0.08 : 0;
                perspectiveCamera.position.y = groundHeight + 1.7 + headBob;

                // Atualiza terreno ao redor do jogador
                terrain.position.x = Math.floor(px / 10) * 10;
                terrain.position.z = Math.floor(pz / 10) * 10;

                const positions = terrainGeometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    const globalX = terrain.position.x + positions[i];
                    const globalZ = terrain.position.z + positions[i + 2];
                    positions[i + 1] = getElevation(globalX, globalZ) - terrain.position.y;
                }
                terrainGeometry.attributes.position.needsUpdate = true;
                terrainGeometry.computeVertexNormals();

                // --- ANIMAÇÃO DA NEVE (floating origin) ---
                const snowPos = snowGeometry.attributes.position.array;
                const range = 60;
                for (let i = 0; i < particleCount; i++) {
                    snowPos[i * 3] += windDirection.x + snowVelocities[i].x;
                    snowPos[i * 3 + 1] -= snowVelocities[i].y;
                    snowPos[i * 3 + 2] += windDirection.z + snowVelocities[i].z;

                    // Reposiciona com floating origin
                    while (snowPos[i * 3] < px - range) snowPos[i * 3] += range * 2;
                    while (snowPos[i * 3] > px + range) snowPos[i * 3] -= range * 2;
                    while (snowPos[i * 3 + 2] < pz - range) snowPos[i * 3 + 2] += range * 2;
                    while (snowPos[i * 3 + 2] > pz + range) snowPos[i * 3 + 2] -= range * 2;

                    if (snowPos[i * 3 + 1] < groundHeight - 2) {
                        snowPos[i * 3 + 1] = perspectiveCamera.position.y + 30;
                    }
                }
                snowGeometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, perspectiveCamera);
            prevTime = time;
        }

        window.addEventListener('resize', () => {
            perspectiveCamera.aspect = window.innerWidth / window.innerHeight;
            perspectiveCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
